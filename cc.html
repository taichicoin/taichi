<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>BSC 钱包 Gas 花费查询 - MegaNode</title> <style> body { font-family: "Microsoft YaHei", Arial, sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); color: #fff; margin: 0; padding: 20px; min-height: 100vh; } .container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.4); } .header { padding: 30px; text-align: center; background: rgba(0,0,0,0.2); } h1 { margin: 0 0 8px 0; font-size: 28px; } p { margin: 0; opacity: 0.9; } .input-area { padding: 25px 30px; display: flex; flex-direction: column; gap: 15px; } input { padding: 16px; font-size: 18px; border: none; border-radius: 12px; outline: none; } button { padding: 16px 40px; font-size: 18px; font-weight: bold; background: #00d4ff; color: #000; border: none; border-radius: 12px; cursor: pointer; } button:hover { background: #ffeb3b; transform: scale(1.03); } .result { padding: 30px; background: rgba(0,0,0,0.2); display: none; flex-direction: column; gap: 20px; } .result.show { display: flex; } .stat { display: flex; justify-content: space-between; align-items: center; font-size: 22px; padding: 15px 20px; background: rgba(255,255,255,0.1); border-radius: 12px; } .loading { text-align: center; padding: 20px; font-size: 18px; display: none; } footer { text-align: center; padding: 20px; font-size: 14px; opacity: 0.8; } .error { color: #ff6b6b; text-align: center; margin-top: 10px; } </style> </head> <body> <div class="container"> <div class="header"> <h1>🔍 BSC 钱包 Gas 花费查询（MegaNode）</h1> <p>输入地址 → 直接显示「发起总交易数」和「⛽️ 总手续费」<br>使用你申请的 MegaNode API</p> </div> <div class="input-area"> <input type="text" id="address" placeholder="0xf3a037fc1935a3af9c9b6a0dd6d3c6ad73f49d46" maxlength="42"> <input type="text" id="apikey" placeholder="MegaNode API Key" value="ec926ecfa63045eaaa5ced21e846c420"> <button onclick="queryGas()">查询 Gas 花费</button> </div> <div id="loading" class="loading">正在从 MegaNode 获取全部交易记录（可能需要几秒）...</div> <div id="result" class="result"> <div class="stat"> <span>🚀 发起总交易数</span> <span id="txCount" style="font-size:28px; font-weight:bold;">--</span> </div> <div class="stat"> <span>⛽️ 总手续费</span> <span id="gasTotal" style="font-size:28px; font-weight:bold; color:#ffeb3b;">-- BNB</span> </div> <div style="text-align:center; font-size:14px; opacity:0.8;"> 数据来自 MegaNode nr_getAssetTransfers（BSC 增强 API）<br> 仅统计「发起」（external）交易的手续费，已自动分页抓取全部记录 </div> </div> <div id="error" class="error"></div> <footer> 完全单文件 HTML • 使用你的 MegaNode Key • 免费额度内可用 </footer> </div> <script> async function fetchAllTransfers(addr, apiKey) { let allTransfers = []; let pageKey = ""; const baseUrl = `https://bsc-mainnet.nodereal.io/v1/${apiKey}`; do { const body = { jsonrpc: "2.0", method: "nr_getAssetTransfers", params: [{ category: ["external"], fromAddress: addr, fromBlock: "0x0", order: "asc", maxCount: "0x3E8", // 最大 1000 条/页 pageKey: pageKey }], id: 1 }; const res = await fetch(baseUrl, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }); const data = await res.json(); if (data.error) throw new Error(data.error.message); const result = data.result || {}; if (result.transfers && Array.isArray(result.transfers)) { allTransfers = allTransfers.concat(result.transfers); } pageKey = result.pageKey || ""; } while (pageKey); return allTransfers; } async function queryGas() { const addr = document.getElementById("address").value.trim().toLowerCase(); const apiKey = document.getElementById("apikey").value.trim(); const loading = document.getElementById("loading"); const result = document.getElementById("result"); const errorDiv = document.getElementById("error"); errorDiv.textContent = ""; result.classList.remove("show"); if (!addr || !addr.startsWith("0x") || addr.length !== 42) { errorDiv.textContent = "❌ 请输入正确的 BSC 钱包地址（42 位，以 0x 开头）"; return; } if (!apiKey) { errorDiv.textContent = "⚠️ 请填写 MegaNode API Key"; return; } loading.style.display = "block"; try { const transfers = await fetchAllTransfers(addr, apiKey); let outgoingCount = 0; let totalGasBNB = 0; transfers.forEach(tx => { if (tx.from && tx.from.toLowerCase() === addr && tx.receiptsStatus === 1) { outgoingCount++; const gasUsed = parseInt(tx.gasUsed || 0); const gasPrice = parseInt(tx.gasPrice || 0); totalGasBNB += (gasUsed * gasPrice) / 1e18; } }); document.getElementById("txCount").textContent = outgoingCount.toLocaleString(); document.getElementById("gasTotal").innerHTML = `${totalGasBNB.toFixed(6)} <small>BNB</small>`; result.classList.add("show"); } catch (err) { errorDiv.textContent = `❌ 查询出错：${err.message}（Key 可能无效或额度不足）`; } finally { loading.style.display = "none"; } } // 回车查询 document.getElementById("address").addEventListener("keypress", e => { if (e.key === "Enter") queryGas(); }); document.getElementById("apikey").addEventListener("keypress", e => { if (e.key === "Enter") queryGas(); }); // 默认示例 window.onload = () => { document.getElementById("address").value = "0xf3a037fc1935a3af9c9b6a0dd6d3c6ad73f49d46"; }; </script> </body> </html>
