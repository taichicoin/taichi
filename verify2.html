<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-image: url('./bg.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 80px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.35);
            z-index: 0;
        }
        /* 右上角小尺寸连接钱包按钮 */
        .btn-small {
            position: fixed;
            top: 20px;
            right: 20px;
            height: 36px;
            padding: 0 16px;
            font-size: 14px;
            border-radius: 8px;
            width: auto;
            margin-bottom: 0;
            z-index: 10;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 16px;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .address-info {
            width: fit-content;
            margin-left: auto;
            padding: 8px 12px;
            background-color: rgba(241, 245, 249, 0.8);
            border-radius: 8px;
            font-size: 14px;
            color: #475569;
            text-align: right;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background-color: #2563eb;
            color: #ffffff;
        }
        .btn-primary:hover, .btn-primary:active {
            background-color: #1d4ed8;
        }
        .btn-success {
            background-color: #5eead4;
            color: #0f172a;
        }
        .btn-success:hover, .btn-success:active {
            background-color: #2dd4bf;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .tips {
            font-size: 13px;
            color: #f1f5f9;
            text-align: center;
            margin-top: 24px;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <button class="btn btn-small btn-primary" id="connectWalletBtn">
        连接钱包
    </button>

    <div class="container">
        <h1>Twitter任务活动</h1>
        <p class="desc">关注+点赞+转推指定推文，即可获得专属奖励</p>
        
        <div class="address-info" id="addressBox" style="display: none;">
            已连接：<span id="walletAddress"></span>
        </div>

        <button class="btn btn-success" id="twitterTaskBtn" disabled>
            前往点赞转推完成任务
        </button>

        <p class="tips">
            请在DEEP/OKX钱包内置浏览器中打开本页面<br>
            完成任务后请返回页面确认
        </p>
    </div>

    <script>
        // ===================== 配置区（已按你的需求设置好） =====================
        const CONFIG = {
            officialSite: "https://taichicoin.xyz",
            twitterLink: "https://x.com/i/status/2035345304766361607",
            pageTitle: "Twitter任务活动",
            taskDesc: "关注+点赞+转推指定推文，即可获得专属奖励",
            connectBtnText: "连接钱包",
            connectedBtnText: "已连接",
            twitterBtnText: "前往点赞转推完成任务"
        };
        // ============================================================================

        // 全局变量
        let currentAccount = null;
        let currentProvider = null;
        const connectWalletBtn = document.getElementById('connectWalletBtn');
        const twitterTaskBtn = document.getElementById('twitterTaskBtn');
        const addressBox = document.getElementById('addressBox');
        const walletAddress = document.getElementById('walletAddress');

        // 钱包地址缩短
        function shortenAddress(address) {
            return address ? address.slice(0, 6) + '...' + address.slice(-4) : '';
        }

        // 【核心修复】获取钱包provider，兼容异步注入+多钱包场景
        function getProvider() {
            // 优先匹配DEEP/OKX钱包，再兼容其他EVM钱包
            if (window.okxwallet) return window.okxwallet;
            if (window.ethereum) return window.ethereum;
            if (window.web3?.currentProvider) return window.web3.currentProvider;
            return null;
        }

        // 【核心修复】钱包连接逻辑，彻底解决点击没反应
        async function connectWallet() {
            try {
                // 点击按钮时才获取provider，避免页面加载时注入未完成
                const provider = getProvider();
                if (!provider) {
                    alert('未检测到钱包，请在DEEP/OKX钱包内置浏览器中打开本页面');
                    return;
                }

                currentProvider = provider;
                // 发起授权请求，严格在用户点击事件内执行，不会被拦截
                const accounts = await provider.request({
                    method: 'eth_requestAccounts'
                });

                // 连接成功处理
                if (accounts && accounts.length > 0) {
                    currentAccount = accounts[0];
                    walletAddress.textContent = shortenAddress(currentAccount);
                    addressBox.style.display = 'block';
                    connectWalletBtn.textContent = CONFIG.connectedBtnText;
                    connectWalletBtn.classList.remove('btn-primary');
                    connectWalletBtn.classList.add('btn-success');
                    twitterTaskBtn.disabled = false;
                    alert('钱包连接成功！');
                }

            } catch (error) {
                console.error('钱包连接失败：', error);
                // 全场景错误提示，不会静默没反应
                if (error.code === 4001) {
                    alert('您已拒绝钱包授权，请重新点击连接并允许授权');
                } else if (error.code === -32002) {
                    alert('钱包授权已在处理中，请查看钱包弹窗');
                } else {
                    alert(`连接失败：${error.message || '未知错误，请刷新页面重试'}`);
                }
            }
        }

        // 【核心修复】监听钱包账号切换/断开，兼容异步注入
        function initWalletListener() {
            const provider = getProvider();
            if (provider) {
                provider.on('accountsChanged', (accounts) => {
                    if (accounts.length === 0) {
                        // 钱包断开连接
                        currentAccount = null;
                        addressBox.style.display = 'none';
                        connectWalletBtn.textContent = CONFIG.connectBtnText;
                        connectWalletBtn.classList.remove('btn-success');
                        connectWalletBtn.classList.add('btn-primary');
                        twitterTaskBtn.disabled = true;
                    } else {
                        // 账号切换
                        currentAccount = accounts[0];
                        walletAddress.textContent = shortenAddress(currentAccount);
                    }
                });
            }
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 绑定点击事件
            connectWalletBtn.addEventListener('click', connectWallet);
            // 【核心修复】Twitter跳转，用location.href避免钱包拦截弹窗
            twitterTaskBtn.addEventListener('click', () => {
                const confirmJump = confirm('即将跳转到Twitter推文页面，请确保您的网络可正常访问境外网站');
                if (confirmJump) {
                    location.href = CONFIG.twitterLink;
                }
            });

            // 监听钱包注入完成，解决异步注入问题
            if (window.ethereum) {
                initWalletListener();
            } else {
                window.addEventListener('ethereum#initialized', initWalletListener, { once: true });
                // 兜底：3秒后再次检测，确保不会错过注入
                setTimeout(initWalletListener, 3000);
            }
        });
    </script>
</body>
</html>
