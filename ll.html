<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多钱包连接示例</title>
  <!-- 引入Web3Modal和Ethers.js -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/web3modal@2.8.6/dist/index.js"></script>
  <style>
    body { font-family: Arial, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; }
    button { padding: 12px 24px; font-size:16px; cursor:pointer; border:none; border-radius:6px; background-color:#4CAF50; color:white; }
  </style>
</head>
<body>
  <button id="connectWalletBtn">连接钱包</button>

  <script>
    const providerOptions = {
      // 可以加入各种移动/PC钱包的provider
      metamask: {
        id: "injected",
        name: "MetaMask",
        type: "injected"
      },
      okx: {
        package: true, // OKX Wallet Extension/ Mobile 已经集成injected
      },
      trustwallet: {
        package: true, // TP Wallet Mobile/Injected
      }
    };

    const web3Modal = new Web3Modal.default({
      cacheProvider: false,
      providerOptions,
      theme: "dark"
    });

    const connectWalletBtn = document.getElementById('connectWalletBtn');

    connectWalletBtn.addEventListener('click', async () => {
      try {
        const provider = await web3Modal.connect();
        const ethersProvider = new ethers.BrowserProvider(provider);
        const signer = await ethersProvider.getSigner();
        const address = await signer.getAddress();
        alert(`钱包已连接: ${address}`);
      } catch (err) {
        console.error(err);
        alert('钱包连接失败');
      }
    });
  </script>
</body>
  </html>
