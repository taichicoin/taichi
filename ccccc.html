<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>BSC 钱包 Gas 花费查询 - 直接显示</title> <style> body { font-family: "Microsoft YaHei", Arial, sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); color: #fff; margin: 0; padding: 20px; min-height: 100vh; } .container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.4); } .header { padding: 30px; text-align: center; background: rgba(0,0,0,0.2); } h1 { margin: 0 0 8px 0; font-size: 28px; } p { margin: 0; opacity: 0.9; } .input-area { padding: 25px 30px; display: flex; flex-direction: column; gap: 15px; } input { padding: 16px; font-size: 18px; border: none; border-radius: 12px; outline: none; } button { padding: 16px 40px; font-size: 18px; font-weight: bold; background: #00d4ff; color: #000; border: none; border-radius: 12px; cursor: pointer; } button:hover { background: #ffeb3b; transform: scale(1.03); } .result { padding: 30px; background: rgba(0,0,0,0.2); display: none; flex-direction: column; gap: 20px; } .result.show { display: flex; } .stat { display: flex; justify-content: space-between; align-items: center; font-size: 22px; padding: 15px 20px; background: rgba(255,255,255,0.1); border-radius: 12px; } .loading { text-align: center; padding: 20px; font-size: 18px; display: none; } footer { text-align: center; padding: 20px; font-size: 14px; opacity: 0.8; } .error { color: #ff6b6b; text-align: center; margin-top: 10px; } </style> </head> <body> <div class="container"> <div class="header"> <h1>🔍 BSC 钱包 Gas 花费查询</h1> <p>输入地址 → 网页直接计算并显示「发起总交易数」和「⛽️ 总手续费」<br>无需跳转、无需 iframe</p> </div> <div class="input-area"> <input type="text" id="address" placeholder="0xf3a037fc1935a3af9c9b6a0dd6d3c6ad73f49d46" maxlength="42"> <input type="text" id="apikey" placeholder="Etherscan API Key（免费获取）" value=""> <div style="font-size:14px; opacity:0.8;"> <a href="https://etherscan.io/myapikey" target="_blank" style="color:#ffeb3b;">点击免费注册 Etherscan API Key</a>（支持 BSC 链） </div> <button onclick="queryGas()">查询 Gas 花费</button> </div> <div id="loading" class="loading">正在从区块链查询数据，请稍等...</div> <div id="result" class="result"> <div class="stat"> <span>🚀 发起总交易数</span> <span id="txCount" style="font-size:28px; font-weight:bold;">--</span> </div> <div class="stat"> <span>⛽️ 总手续费</span> <span id="gasTotal" style="font-size:28px; font-weight:bold; color:#ffeb3b;">-- BNB</span> </div> <div style="text-align:center; font-size:14px; opacity:0.8;"> 数据来自 Etherscan V2 API（BSC Chain）<br> 仅统计「发起」（转出）的交易手续费 </div> </div> <div id="error" class="error"></div> <footer> 完全单文件 HTML • 纯浏览器计算 • 数据实时来自区块链 </footer> </div> <script> async function queryGas() { const addr = document.getElementById("address").value.trim().toLowerCase(); const apiKey = document.getElementById("apikey").value.trim(); const loading = document.getElementById("loading"); const result = document.getElementById("result"); const errorDiv = document.getElementById("error"); errorDiv.textContent = ""; result.classList.remove("show"); if (!addr || !addr.startsWith("0x") || addr.length !== 42) { errorDiv.textContent = "❌ 请输入正确的 BSC 钱包地址（42 位，以 0x 开头）"; return; } if (!apiKey) { errorDiv.textContent = "⚠️ 请填写 Etherscan API Key（免费注册）"; return; } loading.style.display = "block"; try { const url = `https://api.etherscan.io/v2/api?apikey=${apiKey}&chainid=56&module=account&action=txlist&address=${addr}&startblock=0&endblock=99999999&page=1&offset=10000&sort=asc`; const res = await fetch(url); const data = await res.json(); if (data.status !== "1" || !data.result || !Array.isArray(data.result)) { throw new Error(data.message || "查询失败"); } const txs = data.result; let outgoingCount = 0; let totalGasBNB = 0; txs.forEach(tx => { if (tx.from && tx.from.toLowerCase() === addr) { outgoingCount++; const gasUsed = parseInt(tx.gasUsed || 0); const gasPrice = parseInt(tx.gasPrice || 0); totalGasBNB += (gasUsed * gasPrice) / 1e18; } }); // 显示结果 document.getElementById("txCount").textContent = outgoingCount.toLocaleString(); document.getElementById("gasTotal").innerHTML = `${totalGasBNB.toFixed(6)} <small>BNB</small>`; result.classList.add("show"); } catch (err) { errorDiv.textContent = `❌ 查询出错：${err.message}（可能是 API Key 无效或频率限制）`; } finally { loading.style.display = "none"; } } // 支持回车查询 document.getElementById("address").addEventListener("keypress", e => { if (e.key === "Enter") queryGas(); }); document.getElementById("apikey").addEventListener("keypress", e => { if (e.key === "Enter") queryGas(); }); // 默认示例 window.onload = () => { document.getElementById("address").value = "0xf3a037fc1935a3af9c9b6a0dd6d3c6ad73f49d46"; }; </script> </body> </html>
