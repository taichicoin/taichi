<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YY Card · Login</title>

    <!-- 语言包（必须在 loading.js 之前加载） -->
    <script src="/index/lang.js"></script>

    <script src="/js/config.js"></script>
    <script src="/index/onlinecheck.js"></script>
    <link rel="stylesheet" href="/index/loading.css">
    <script src="/index/loading.js"></script>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- 登录页面样式 -->
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<!-- 全屏浮动粒子层 -->
<div class="particles"></div>

<div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
    <div class="login-box" id="login-box" style="display: none;">
        <div class="logo">Y⚔️Y Card</div>

        <!-- Google 登录按钮 -->
        <button class="btn-google" id="google-login-btn" data-lang-key="login_google">
            <img src="/assets/logo/ggbtn.png" alt="" class="btn-bg-img">
            <span class="btn-text">Sign in with Google</span>
        </button>

        <!-- Telegram 登录按钮 -->
        <button class="btn-telegram" id="telegram-login-btn" data-lang-key="login_telegram">
            <img src="/assets/logo/tgbtn.png" alt="" class="btn-bg-img">
            <span class="btn-text">Sign in with Telegram</span>
        </button>

        <div class="footer">Classics of Mountains and Seas · Journey to the West · Three Kingdoms</div>
    </div>

    <div id="log-panel" style="display: none;">
        <div class="log-title">SYSTEM LOG</div>
        <div id="log-list"></div>
    </div>
</div>

<script>
    (function() {
        if (window.Telegram?.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    })();
</script>

<script>
    const lang = window.YYCardLoginLang;
    const logPanel = document.getElementById('log-panel');
    const logList = document.getElementById('log-list');

    function pageLog(msg, isError = false) {
        logPanel.style.display = 'block';
        const line = document.createElement('div');
        line.className = 'log-line';
        if (isError) line.classList.add('log-error');
        line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        logList.appendChild(line);
        logPanel.scrollTop = logPanel.scrollHeight;
    }

    async function loadSupabaseSDK() {
        const CDN_LIST = [
            'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js',
            'https://unpkg.com/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.45.0/supabase.min.js'
        ];
        for (const url of CDN_LIST) {
            if (typeof supabase !== 'undefined' && typeof supabase.createClient === 'function') return true;
            try {
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = url;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
                await new Promise(r => setTimeout(r, 200));
            } catch(e) {}
        }
        return (typeof supabase !== 'undefined' && typeof supabase.createClient === 'function');
    }

    async function telegramLogin(supabaseClient) {
        const tg = window.Telegram?.WebApp;
        if (!tg?.initData) {
            pageLog('❌ Cannot get Telegram login data', true);
            return false;
        }

        try {
            const res = await fetch(`${window.YYCardConfig.SUPABASE_URL}/functions/v1/telegram-simple-auth`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    initData: tg.initData,
                    api_key: 'sk_MyGame_2026_tg_checkin_!@#QwErTy'
                })
            });
            const body = await res.json();
            if (body.error) {
                pageLog('Telegram login failed: ' + body.error, true);
                return false;
            }
            await supabaseClient.auth.setSession({
                access_token: body.access_token,
                refresh_token: body.refresh_token
            });
            pageLog('Telegram login success');
            return true;
        } catch(e) {
            pageLog('Telegram login error: ' + e.message, true);
            return false;
        }
    }

    // 确保 profiles 表中有该用户记录，如无则自动创建
    async function ensureProfileAndEnter(supabaseClient, user) {
        const { data: profile } = await supabaseClient
            .from('profiles')
            .select('id')
            .eq('id', user.id)
            .maybeSingle();

        if (!profile) {
            pageLog('Profile not found, creating...');
            const DEFAULT_AVATAR = window.YYCardConfig.DEFAULT_AVATAR || '/assets/logo/avatar.png';
            const { error: createErr } = await supabaseClient
                .from('profiles')
                .insert({
                    id: user.id,
                    username: '',
                    display_name: user.user_metadata?.full_name || user.user_metadata?.first_name || user.email,
                    avatar_url: user.user_metadata?.avatar_url || DEFAULT_AVATAR,
                    telegram_id: user.user_metadata?.telegram_id || null
                });
            if (createErr) {
                pageLog('Profile creation failed: ' + createErr.message, true);
                return false;
            }
            pageLog('Profile created successfully');
        } else {
            pageLog('Profile exists');
        }

        sessionStorage.setItem('yy_logged_in', '1');
        await YYCardLoading.start(supabaseClient, YYCardOnlineCheck);
        return true;
    }

    (async function() {
        pageLog('Initializing...');

        if (!window.YYCardConfig) {
            pageLog('❌ Config failed to load', true);
            return;
        }

        const sdkLoaded = await loadSupabaseSDK();
        if (!sdkLoaded) {
            pageLog('❌ SDK load failed', true);
            return;
        }

        let supabaseClient;
        try {
            supabaseClient = supabase.createClient(
                window.YYCardConfig.SUPABASE_URL,
                window.YYCardConfig.SUPABASE_ANON_KEY,
                { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } }
            );
            pageLog('Supabase client created');
        } catch(e) {
            pageLog('❌ Client creation failed: ' + e.message, true);
            return;
        }

        const { data: { session } } = await supabaseClient.auth.getSession();
        const isTelegramEnv = !!(window.Telegram?.WebApp?.initData);

        // 如果已有有效会话
        if (session) {
            const { data: { user }, error: userErr } = await supabaseClient.auth.getUser();
            if (!userErr && user) {
                const entered = await ensureProfileAndEnter(supabaseClient, user);
                if (entered) return; // 已进入游戏，不再显示登录框
            }
            // 获取用户失败或档案创建失败，清除无效会话
            await supabaseClient.auth.signOut();
            sessionStorage.removeItem('yy_logged_in');
        }

        // 以下是无有效会话的处理
        // 如果是 Telegram 环境，尝试自动登录
        if (isTelegramEnv) {
            pageLog('Telegram environment detected, trying auto-login...');
            const success = await telegramLogin(supabaseClient);
            if (success) {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    const entered = await ensureProfileAndEnter(supabaseClient, user);
                    if (entered) return;
                }
            }
            pageLog('Auto-login unsuccessful, showing login box');
        }

        // 显示登录框
        document.getElementById('login-box').style.display = 'block';

        // 绑定 Google 登录按钮
        const googleBtn = document.getElementById('google-login-btn');
        const googleTextSpan = googleBtn.querySelector('.btn-text');
        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            googleTextSpan.textContent = lang.t('redirecting');
            sessionStorage.setItem('yy_logged_in', '1');
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.YYCardConfig.LOGIN_PAGE_URL }
            });
            if (error) {
                sessionStorage.removeItem('yy_logged_in');
                alert(lang.t('login_failed') + error.message);
                googleBtn.disabled = false;
                googleTextSpan.textContent = lang.t('login_google');
            }
        });

        // 绑定 Telegram 登录按钮
        const telegramBtn = document.getElementById('telegram-login-btn');
        const telegramTextSpan = telegramBtn.querySelector('.btn-text');

        if (isTelegramEnv) {
            telegramTextSpan.textContent = lang.t('login_telegram');
        } else {
            telegramTextSpan.textContent = lang.t('login_telegram_web') || 'Open in Telegram';
        }

        telegramBtn.addEventListener('click', async () => {
            if (isTelegramEnv) {
                telegramBtn.disabled = true;
                telegramTextSpan.textContent = lang.t('signing_in');
                const success = await telegramLogin(supabaseClient);
                if (!success) {
                    telegramBtn.disabled = false;
                    telegramTextSpan.textContent = lang.t('login_telegram');
                    return;
                }
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    await ensureProfileAndEnter(supabaseClient, user);
                } else {
                    pageLog('Failed to get user after Telegram login', true);
                    telegramBtn.disabled = false;
                    telegramTextSpan.textContent = lang.t('login_telegram');
                }
            } else {
                window.location.href = 'https://t.me/masaappbot';
            }
        });

        pageLog('Welcome Hero!');
    })();
</script>
</body>
</html>
