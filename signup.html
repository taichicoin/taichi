<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 | 太极悠悠牌</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {theme:{extend:{colors:{cf:{dark:'#0f111a',darker:'#090b10',gold:'#FFD700'}}}}
  </script>
  <style>body{background:#0f111a;}</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">

  <h1 class="text-5xl font-bold mb-12 text-cf-gold">太极悠悠牌</h1>
  <button onclick="signInWithGoogle()" class="w-64 py-3 bg-white text-black rounded-lg">
    使用 Google 账号登录
  </button>

  <script type="module" src="js/supabase/client.js"></script>
  <script type="module" src="js/supabase/auth.js"></script>

  <script type="module">
    import {supabase, getCurrentUser} from './js/supabase/auth.js';

    async function start() {
      // 防止无限解析token：只解析一次，并且清空url #
      if(location.hash.includes("access_token")){
        await supabase.auth.getSessionFromUrl();
        // 关键：清除浏览器地址栏 # 防止卡死
        history.replaceState(null,document.title,"/signup");
        location.replace("/card");
        return;
      }

      // 已经登录直接跳游戏
      const user = await getCurrentUser();
      if(user){
        location.replace("/card");
      }
    }
    start();
  </script>
</body>
</html>
