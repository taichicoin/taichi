<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 · YY Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f0f0f0;
            padding: 20px;
        }
        .login-box {
            max-width: 420px;
            width: 100%;
            background: rgba(20, 28, 48, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,215,0,0.2);
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d76e, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
        }
        .btn-google {
            background: #ffffff;
            color: #1e1e2f;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #0a0e17;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
        }
        .btn-google:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #0a0e17; }
        .btn-google:active { transform: translateY(4px); box-shadow: 0 4px 0 #0a0e17; }
        .footer {
            margin-top: 32px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">⚔️ YY Card</div>
    <button class="btn-google" id="google-login-btn">
        <span style="font-size:1.8rem;">G</span> 使用 Google 登录
    </button>
    <div class="footer">山海经 · 西游 · 三国</div>
</div>

<script>
    // ========== Supabase 配置 ==========
    const SUPABASE_URL = 'https://sznjaotjoljaiawbvfro.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN';
    // =================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('google-login-btn').addEventListener('click', async () => {
        const { error } = await supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/yycard'  // 登录成功后跳转到大厅
            }
        });
        if (error) alert('登录失败: ' + error.message);
    });

    // 如果已登录，直接跳转大厅
    (async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) window.location.href = '/yycard';
    })();
</script>
</body>
</html>
