<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · YY Card</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f0f0f0;
        }
        .login-box {
            max-width: 420px;
            background: rgba(20, 28, 48, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d76e, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
        }
        .btn-google {
            background: #fff;
            color: #1e1e2f;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #0a0e17;
            cursor: pointer;
            width: 100%;
        }
        .footer { margin-top: 32px; opacity: 0.7; }
        #status-message { margin-top: 20px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">⚔️ YY Card</div>
    <button class="btn-google" id="google-login-btn">
        <span style="font-size:1.8rem;">G</span> 使用 Google 登录
    </button>
    <div class="footer">山海经 · 西游 · 三国</div>
    <div id="status-message"></div>
</div>

<script>
    (function() {
        const SUPABASE_URL = 'https://sznjaotjoljaiawbvfro.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const statusEl = document.getElementById('status-message');
        function setStatus(msg) { statusEl.textContent = msg; console.log(msg); }

        let authReady = false;

        // 监听认证状态变化
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth state changed:', event, session?.user?.email);
            authReady = true;
            
            if (session?.user) {
                setStatus('✅ 已登录，正在跳转...');
                window.location.replace('/yycard');
            } else {
                setStatus('👤 请登录');
            }
        });

        // 点击登录
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            setStatus('🔄 正在跳转到 Google...');
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/yycard' }
            });
            if (error) {
                setStatus('❌ 登录失败: ' + error.message);
            }
        });

        // 初始检查：如果已经就绪且有用户，跳转
        setTimeout(() => {
            if (!authReady) setStatus('⏳ 正在验证身份...');
        }, 500);
    })();
</script>
</body>
</html>
