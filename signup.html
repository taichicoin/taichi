<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>登录 | 太极悠悠牌</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme:{
        extend:{
          colors:{
            cf:{dark:'#0f111a',darker:'#090b10',gold:'#FFD700'}
          }
        }
      }
    }
  </script>
  <style>
    body{background:#0f111a;}
    @media (max-width: 640px) {
      button {width: 90vw !important;font-size: 16px !important;}

<body class="min-h-screen flex flex-col items-center justify-center">
  <h1 class="text-5xl font-bold mb-12 text-cf-gold">太极悠悠牌</h1>
  <button id="googleLoginBtn" onclick="signInWithGoogle()" class="w-64 py-3 bg-white text-black rounded-lg text-md font-medium hover:bg-gray-100 transition">
    使用 Google 账号登录
  </button>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0'
const SUPA_URL = "https://sznjaotjoljaiawbvfro.supabase.co";
const SUPA_ANON_KEY = "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN";
const supabase = createClient(SUPA_URL, SUPA_ANON_KEY);

window.signInWithGoogle = async () => {
  const { error } = await supabase.auth.signInWithOAuth({
    provider:"google",
    options:{
      redirectTo: `${location.origin}/card`,
      scopes:"email profile"
    }
  })
  if(error) alert("登录失败："+error.message);
}

// ========== 修复：正确解析谷歌回调，防止死循环 ==========
async function handleRedirect() {
  // Supabase OAuth 回调
  if(location.hash.includes("access_token")){
    await supabase.auth.exchangeCodeForSession(location.hash);
    // 清hash，不要清空页面历史
    history.replaceState(null,document.title,"/card");
    return;
  }

  // 优先用 getSession 检测！不是 getUser
  const {data:{session}} = await supabase.auth.getSession();
  if(session){
    location.href="/card";
  }
}

handleRedirect();
</script>
</body>
</html>
