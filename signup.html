<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 · YY Card</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f0f0f0;
            padding: 20px;
        }
        .login-box {
            max-width: 420px;
            width: 100%;
            background: rgba(20, 28, 48, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,215,0,0.2);
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d76e, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .btn-google {
            background: #ffffff;
            color: #1e1e2f;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #0a0e17;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
        }
        .btn-google:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #0a0e17; }
        .btn-google:active { transform: translateY(4px); box-shadow: 0 4px 0 #0a0e17; }
        .footer {
            margin-top: 32px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .debug-info {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #aaa;
            text-align: left;
            background: #1a1e2e;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">⚔️ YY Card</div>
    <button class="btn-google" id="google-login-btn">
        <span style="font-size:1.8rem;">G</span> 使用 Google 登录
    </button>
    <div class="footer">山海经 · 西游 · 三国</div>
    <!-- 调试信息区（默认隐藏，出现错误时可显示） -->
    <div id="debug-info" class="debug-info"></div>
</div>

<script>
    (function() {
        // ========== Supabase 配置 ==========
        const SUPABASE_URL = 'https://sznjaotjoljaiawbvfro.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN';
        
        const debugEl = document.getElementById('debug-info');
        function log(msg, isError = false) {
            console.log(msg);
            if (isError) console.error(msg);
            // 同时在页面显示（方便移动端调试）
            debugEl.style.display = 'block';
            debugEl.innerHTML += (isError ? '❌ ' : '✅ ') + msg + '<br>';
        }

        try {
            log('🚀 步骤1: 开始初始化 Supabase...');
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            log('✅ 步骤2: Supabase 初始化完成');
            
            const loginBtn = document.getElementById('google-login-btn');
            if (!loginBtn) {
                log('❌ 步骤3: 未找到登录按钮元素！', true);
                return;
            }
            log('🔍 步骤3: 登录按钮已找到');

            // 绑定点击事件
            loginBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                log('🖱️ 步骤4: 登录按钮被点击');
                
                const redirectUrl = window.location.origin + '/yycard';
                log('🔗 步骤5: 准备 OAuth 重定向到: ' + redirectUrl);
                
                try {
                    const { data, error } = await supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: { redirectTo: redirectUrl }
                    });
                    
                    if (error) {
                        log('❌ 步骤6: OAuth 错误: ' + error.message, true);
                        alert('登录失败: ' + error.message);
                    } else {
                        log('✅ 步骤6: OAuth 流程已启动，等待重定向...');
                    }
                } catch (err) {
                    log('💥 步骤6: 意外错误: ' + err.message, true);
                    alert('发生意外错误，请重试');
                }
            });

            // 检查是否已登录
            (async () => {
                try {
                    const { data: { user } } = await supabase.auth.getUser();
                    log('👤 步骤0: 当前用户状态: ' + (user ? user.email : '未登录'));
                    if (user) {
                        log('🔀 步骤0: 已登录，即将跳转到大堂');
                        window.location.href = '/yycard';
                    }
                } catch (err) {
                    log('⚠️ 步骤0: 检查登录状态时出错: ' + err.message);
                }
            })();

        } catch (err) {
            log('💥 初始化失败: ' + err.message, true);
            alert('页面初始化失败，请刷新重试');
        }
    })();
</script>
</body>
</html>
