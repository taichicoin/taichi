<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>登录 | 太极悠悠牌</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cf: {
              dark: '#0f111a',
              darker: '#090b10',
              blue: '#165DFF',
              gold: '#FFD700',
              red: '#FF4D4F'
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .btn-disabled { @apply bg-gray-500 cursor-not-allowed hover:bg-gray-500; }
    }
    html,body { max-width: 100vw; overflow-x: hidden; min-height: 100vh; }
  </style>
</head>
<body class="bg-cf-dark text-white flex flex-col items-center justify-center p-4">
  <div class="text-center w-full max-w-sm">
    <h1 class="text-[clamp(2.5rem,8vw,4rem)] font-bold mb-12 text-cf-gold drop-shadow-lg">太极悠悠牌</h1>
    
    <!-- 登录按钮 -->
    <button 
      id="google-login-btn" 
      onclick="TaijiAuth.signInWithGoogle()" 
      class="w-full max-w-xs mx-auto py-3 bg-white text-black rounded-lg text-lg font-medium hover:bg-gray-100 transition-all active:scale-95"
    >
      使用 Google 账号登录
    </button>

    <!-- 错误提示 -->
    <p id="error-tip" class="mt-4 text-cf-red text-sm hidden"></p>

    <!-- 加载状态 -->
    <div id="loading-box" class="mt-6 hidden">
      <div class="w-8 h-8 border-2 border-cf-gold border-t-transparent rounded-full animate-spin mx-auto"></div>
      <p class="text-gray-400 text-sm mt-2">正在跳转登录...</p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';
    // 全局统一配置
    const SUPA_CONFIG = {
      url: "https://sznjaotjoljaiawbvfro.supabase.co",
      key: "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN",
      redirectPath: "/card"
    };
    // 单例Supabase客户端
    const supabase = createClient(SUPA_CONFIG.url, SUPA_CONFIG.key);
    window.supabase = supabase;

    // 登录逻辑命名空间，避免全局污染
    window.TaijiAuth = {
      isLoading: false,
      // 谷歌登录
      async signInWithGoogle() {
        if (this.isLoading) return;
        this.setLoading(true);
        this.clearError();

        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: `${window.location.origin}${SUPA_CONFIG.redirectPath}`,
            scopes: "email profile",
            queryParams: { access_type: 'offline', prompt: 'consent' }
          }
        });

        if (error) {
          this.setError(`登录失败：${error.message}`);
          this.setLoading(false);
        }
      },
      // 加载状态控制
      setLoading(status) {
        this.isLoading = status;
        const btn = document.getElementById('google-login-btn');
        const loadingBox = document.getElementById('loading-box');
        if (status) {
          btn.disabled = true;
          btn.classList.add('btn-disabled');
          loadingBox.classList.remove('hidden');
        } else {
          btn.disabled = false;
          btn.classList.remove('btn-disabled');
          loadingBox.classList.add('hidden');
        }
      },
      // 错误提示
      setError(msg) {
        const tip = document.getElementById('error-tip');
        tip.innerText = msg;
        tip.classList.remove('hidden');
      },
      clearError() {
        document.getElementById('error-tip').classList.add('hidden');
      },
      // 初始化页面
      async init() {
        // 处理OAuth回调
        if (window.location.hash.includes("access_token")) {
          this.setLoading(true);
          const { error } = await supabase.auth.getSessionFromUrl();
          window.history.replaceState(null, document.title, window.location.pathname);
          if (!error) {
            window.location.replace(SUPA_CONFIG.redirectPath);
            return;
          }
          this.setError("登录回调处理失败，请重试");
          this.setLoading(false);
          return;
        }

        // 已登录用户直接跳转
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
          window.location.replace(SUPA_CONFIG.redirectPath);
        }
      }
    };

    // 页面加载完成初始化
    window.addEventListener('DOMContentLoaded', () => TaijiAuth.init());
    // 禁止已登录用户后退到登录页
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) TaijiAuth.init();
    });
  </script>
</body>
</html>
