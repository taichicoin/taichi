<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>登录 | 太极悠悠牌</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cf: { dark: '#0f111a', darker: '#090b10', gold: '#FFD700' }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f111a; }
    @media (max-width: 640px) {
      button { width: 90vw !important; font-size: 16px !important; }
      h1 { font-size: 32px !important; }
    }
    #loading-tip { display: none; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">
  <h1 class="text-5xl font-bold mb-12 text-cf-gold">太极悠悠牌</h1>
  <button id="googleLoginBtn" onclick="signInWithGoogle()" class="w-64 py-3 bg-white text-black rounded-lg text-md font-medium hover:bg-gray-100 transition">
    使用 Google 账号登录
  </button>
  <p id="loading-tip" class="mt-4 text-gray-400">正在登录，请稍候...</p>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0'
const SUPA_URL = "https://sznjaotjoljaiawbvfro.supabase.co";
const SUPA_ANON_KEY = "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN";

// 【关键修复】客户端精准配置，强制会话持久化
const supabase = createClient(SUPA_URL, SUPA_ANON_KEY, {
  auth: {
    persistSession: true, // 强制持久化会话到localStorage
    autoRefreshToken: true, // 自动刷新token
    detectSessionInUrl: true // 只有登录页开启URL检测，处理回调
  }
});

const loginBtn = document.getElementById("googleLoginBtn");
const loadingTip = document.getElementById("loading-tip");

// 谷歌登录方法
window.signInWithGoogle = async () => {
  loginBtn.disabled = true;
  loadingTip.style.display = "block";
  
  const { error } = await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      // 【关键修复】回调地址固定为signup页，专门处理授权，不跳card
      redirectTo: `${location.origin}/signup`,
      scopes: "email profile",
      queryParams: {
        access_type: 'offline',
        prompt: 'consent'
      }
    }
  })

  if (error) {
    alert("登录失败：" + error.message);
    loginBtn.disabled = false;
    loadingTip.style.display = "none";
  }
}

// 【核心修复】统一处理谷歌授权回调，只在登录页处理
async function initLogin() {
  console.log("=== 登录页初始化 ===");
  
  // 1. 处理谷歌授权回调（只有这里处理，card页不处理）
  const currentUrl = new URL(window.location.href);
  const code = currentUrl.searchParams.get("code");
  const hasAuthHash = location.hash.includes("access_token") || location.hash.includes("code");

  if (hasAuthHash || code) {
    console.log("检测到授权回调，正在兑换会话...");
    // 官方标准方法：兑换授权码为正式会话
    const { data: { session }, error } = await supabase.auth.exchangeCodeForSession(window.location.href);
    
    if (error || !session) {
      console.error("会话兑换失败：", error);
      alert("登录失败，授权已过期，请重试");
      loginBtn.disabled = false;
      loadingTip.style.display = "none";
      // 清掉无效的hash，避免重复处理
      history.replaceState(null, document.title, "/signup");
      return;
    }

    console.log("会话兑换成功，用户ID：", session.user.id);
    // 清掉地址栏的授权参数，避免刷新重复处理
    history.replaceState(null, document.title, "/card");
    // 【关键】会话存好后，再跳card页，不会再闪回
    location.href = "/card";
    return;
  }

  // 2. 正常检测登录态：已登录直接跳card
  const { data: { session } } = await supabase.auth.getSession();
  console.log("当前会话状态：", session ? "已登录" : "未登录");
  
  if (session) {
    location.href = "/card";
  } else {
    // 未登录，显示登录按钮
    loginBtn.disabled = false;
    loadingTip.style.display = "none";
  }
}

// 页面加载执行
initLogin();
</script>
</body>
</html>
