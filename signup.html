<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up - Taiji Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .signup-container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
        }
        .signup-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }
        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 3px solid #667eea;
        }
        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }
        .btn-primary:disabled {
            background: #b0b8f0;
            cursor: not-allowed;
        }
        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .btn-google {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #333;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-google:hover {
            background: #f5f5f5;
            border-color: #ccc;
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }
        .divider::before {
            left: 0;
        }
        .divider::after {
            right: 0;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }
        .toast.show {
            transform: translateX(0);
        }
        .toast.success {
            background: #10b981;
        }
        .toast.error {
            background: #ef4444;
        }
        .toast.info {
            background: #3b82f6;
        }
        @media (max-width: 480px) {
            .signup-container {
                padding: 30px 20px;
            }
            .signup-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <h1 class="signup-title">Create Account</h1>
        <div class="avatar-preview">
            <img id="avatarImg" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="Avatar">
        </div>
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
        </div>
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password (min 6 characters)" autocomplete="new-password">
        </div>
        <button class="btn-primary" id="signUpBtn">Sign Up</button>
        <div class="divider">OR</div>
        <button class="btn-google" id="googleSignInBtn">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path d="M17.64 9.204c0-.638-.057-1.256-.164-1.856H9v3.517h4.844a4.12 4.12 0 01-1.796 2.707v2.245h2.908c1.698-1.566 2.684-3.868 2.684-6.613z" fill="#4285F4"></path>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.183l-2.908-2.245c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.71H.964v2.32A8.996 8.996 0 009 18z" fill="#34A853"></path>
                <path d="M3.964 10.722a5.396 5.396 0 010-3.444V4.958H.964A8.996 8.996 0 000 9c0 1.452.348 2.826.964 4.042l3.001-2.32z" fill="#FBBC05"></path>
                <path d="M9 3.58c1.322 0 2.508.454 3.44 1.346l2.582-2.582C13.464.806 11.427 0 9 0A8.996 8.996 0 00.964 4.958l3.001 2.32C4.672 5.164 6.656 3.58 9 3.58z" fill="#EA4335"></path>
            </svg>
            Continue with Google
        </button>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        // 统一配置管理
        const CONFIG = {
            SUPA_URL: "https://sznjaotjoljaiawbvfro.supabase.co",
            SUPA_ANON_KEY: "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN",
            AVATAR_API: "https://api.dicebear.com/7.x/avataaars/svg?seed=",
            USERNAME_RULE: /^[a-z0-9_]{3,20}$/
        };

        // 单例Supabase客户端（避免重复实例导致的会话冲突）
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';
        const supabase = createClient(CONFIG.SUPA_URL, CONFIG.SUPA_ANON_KEY);

        // 全局工具函数
        const TaijiAuth = {
            toast: (message, type = 'info') => {
                const toastEl = document.getElementById('toast');
                toastEl.textContent = message;
                toastEl.className = `toast ${type}`;
                toastEl.classList.add('show');
                setTimeout(() => {
                    toastEl.classList.remove('show');
                }, 3000);
            },

            // 跳转页面
            redirectTo: (path) => {
                window.location.replace(`${window.location.origin}${path}`);
            },

            // 用户名实时格式化
            formatUsername: (input) => {
                return input.toLowerCase().replace(/[^a-z0-9_]/g, '').slice(0, 20);
            }
        };

        // DOM元素
        const usernameInput = document.getElementById('username');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const signUpBtn = document.getElementById('signUpBtn');
        const googleSignInBtn = document.getElementById('googleSignInBtn');
        const avatarImg = document.getElementById('avatarImg');

        // 核心逻辑：页面初始化先校验登录态（解决登录后卡死不跳转的核心问题）
        async function initAuthCheck() {
            const { data: { user } } = await supabase.auth.getUser();
            // 已登录用户直接跳转到游戏页，不会停留在signup
            if (user) {
                TaijiAuth.toast('已登录，正在进入游戏...', 'success');
                TaijiAuth.redirectTo('/card');
                return;
            }
            // 监听登录状态变化，登录成功立刻跳转
            supabase.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    TaijiAuth.toast('登录成功！', 'success');
                    TaijiAuth.redirectTo('/card');
                }
                if (event === 'AUTH_ERROR') {
                    TaijiAuth.toast('登录授权失败，请重试', 'error');
                }
            });
        }

        // 头像实时预览
        usernameInput.addEventListener('input', (e) => {
            const formattedName = TaijiAuth.formatUsername(e.target.value);
            e.target.value = formattedName;
            avatarImg.src = formattedName ? `${CONFIG.AVATAR_API}${formattedName}` : `${CONFIG.AVATAR_API}default`;
        });

        // 邮箱密码注册逻辑
        signUpBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            // 前端校验
            if (!username) {
                TaijiAuth.toast('请输入用户名', 'error');
                return;
            }
            if (!CONFIG.USERNAME_RULE.test(username)) {
                TaijiAuth.toast('用户名仅支持小写字母、数字、下划线，3-20位', 'error');
                return;
            }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                TaijiAuth.toast('请输入有效的邮箱地址', 'error');
                return;
            }
            if (!password || password.length < 6) {
                TaijiAuth.toast('密码长度不能少于6位', 'error');
                return;
            }

            // 防重复点击
            signUpBtn.disabled = true;
            signUpBtn.textContent = '正在注册...';

            try {
                // 1. 注册账号
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            username
                        }
                    }
                });

                if (authError) throw authError;

                // 2. 同步用户信息到profiles表
                if (authData.user) {
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .upsert({
                            id: authData.user.id,
                            username,
                            email,
                            avatar_url: `${CONFIG.AVATAR_API}${username}`,
                            created_at: new Date().toISOString()
                        }, { onConflict: 'id' });

                    if (profileError) throw profileError;
                }

                TaijiAuth.toast('注册成功！正在进入游戏...', 'success');
            } catch (error) {
                console.error('注册失败：', error);
                TaijiAuth.toast(error.message || '注册失败，请重试', 'error');
                // 重置按钮
                signUpBtn.disabled = false;
                signUpBtn.textContent = 'Sign Up';
            }
        });

        // Google登录逻辑（修复redirectTo，回调直接到card页，避免二次跳转）
        googleSignInBtn.addEventListener('click', async () => {
            googleSignInBtn.disabled = true;
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: `${window.location.origin}/card`,
                        scopes: 'email profile'
                    }
                });
                if (error) throw error;
            } catch (error) {
                console.error('Google登录失败：', error);
                TaijiAuth.toast(error.message || 'Google登录失败，请重试', 'error');
                googleSignInBtn.disabled = false;
            }
        });

        // 页面初始化执行
        initAuthCheck();
    </script>
</body>
</html>
