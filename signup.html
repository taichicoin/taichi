<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 关键修复：强制移动视图，禁止缩放 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- 告诉Chrome强制使用移动UA，不切换桌面模式 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>登录 | 太极悠悠牌</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {theme:{extend:{colors:{cf:{dark:'#0f111a',darker:'#090b10',gold:'#FFD700'}}}}
  </script>
  <style>
    body{background:#0f111a;}
    /* 确保按钮在移动设备上自适应 */
    @media (max-width: 640px) {
      button {
        width: 90vw !important;
        font-size: 16px !important;
      }
      h1 {
        font-size: 32px !important;
      }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">
  <h1 class="text-5xl font-bold mb-12 text-cf-gold">太极悠悠牌</h1>
  <button onclick="signInWithGoogle()" class="w-64 py-3 bg-white text-black rounded-lg text-lg font-medium hover:bg-gray-100 transition">
    使用 Google 账号登录
  </button>

  <!-- 加载Supabase核心 -->
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0'
    const SUPA_URL = "https://sznjaotjoljaiawbvfro.supabase.co";
    const SUPA_ANON_KEY = "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN";
    const supabase = createClient(SUPA_URL, SUPA_ANON_KEY);

    window.signInWithGoogle = async () => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: `${window.location.origin}/card`,
          scopes: "email profile",
          queryParams: { access_type: 'offline', prompt: 'consent' }
        }
      });
      if (error) alert('登录失败：' + error.message);
    };

    async function init() {
      // 处理谷歌授权回调，防止死循环
      if (window.location.hash.includes("access_token")) {
        await supabase.auth.getSessionFromUrl();
        window.history.replaceState(null, document.title, "/signup");
        window.location.replace("/card");
        return;
      }

      // 已登录直接跳card
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        window.location.replace("/card");
      }
    }

    init();
  </script>
</body>
</html>
