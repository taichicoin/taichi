<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAICHI 空投查询</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 229, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "TAICHI • AIRDROP • BSC";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12vw;
      font-weight: 900;
      color: rgba(0, 229, 255, 0.025);
      white-space: nowrap;
      z-index: 0;
    }

    .card {
      background: rgba(20, 20, 35, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 229, 255, 0.2);
      padding: 40px 32px;
      border-radius: 24px;
      width: 100%;
      max-width: 520px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(0, 229, 255, 0.1),
        0 0 28px rgba(0, 229, 255, 0.15);
      position: relative;
      z-index: 1;
      transition: all 0.3s ease;
    }

    .card:hover {
      box-shadow: 
        0 12px 40px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(0, 229, 255, 0.3),
        0 0 40px rgba(0, 229, 255, 0.25);
      transform: translateY(-2px);
    }

    h1 {
      background: linear-gradient(90deg, #00e5ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.4rem;
      font-weight: 900;
      margin-bottom: 32px;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
    }

    .input-group {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 18px 20px;
      background: rgba(28, 28, 45, 0.9);
      border: 1px solid rgba(100, 116, 137, 0.4);
      border-radius: 16px;
      color: #f0f0f0;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    input:focus {
      border-color: #00e5ff;
      box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.25);
      background: rgba(32, 32, 50, 0.95);
    }

    input::placeholder {
      color: #64748b;
    }

    button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(90deg, #00e5ff, #8b5cf6);
      color: #000;
      border: none;
      border-radius: 16px;
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0, 229, 255, 0.3);
      letter-spacing: 0.5px;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(0, 229, 255, 0.4);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .result {
      margin: 24px 0;
      padding: 20px;
      border-radius: 16px;
      background: rgba(28, 28, 45, 0.7);
      border-left: 4px solid #475569;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .success {
      border-left: 4px solid #00e5ff;
      background: rgba(0, 229, 255, 0.05);
    }

    .error {
      border-left: 4px solid #ff4444;
      background: rgba(255, 68, 68, 0.05);
    }

    .register-form {
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid rgba(100, 116, 137, 0.2);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>TAICHI 空投注册</h1>

    <div class="input-group">
      <input type="text" id="address" placeholder="输入BSC钱包地址 (0x...)">
    </div>
    <button id="checkBtn">查询空投资格</button>

    <div id="result" class="result hidden"></div>

    <div id="registerForm" class="register-form hidden">
      <div class="input-group">
        <input type="text" id="twitterUser" placeholder="输入推特用户名 (@xxx)">
      </div>
      <div class="input-group">
        <input type="text" id="tweetLink" placeholder="输入推文回复链接">
      </div>
      <button id="submitBtn">提交注册</button>
    </div>
  </div>

  <script>
    const RPC_URLS = [
      'https://bsc-dataseed1.bnbchain.org',
      'https://bsc-dataseed2.bnbchain.org',
      'https://bsc.publicnode.com'
    ];

    const QUALIFY_MIN_TX = 300;
    const TIER1_MAX_TX = 499;
    const TIER1_AIRDROP = 500;
    const TIER2_MIN_TX = 500;
    const MAX_AIRDROP = 5000;

    const SUPABASE_URL = "https://sznjaotjoljaiawbvfro.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN";

    const checkBtn = document.getElementById('checkBtn');
    const resultDiv = document.getElementById('result');
    const registerForm = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    
    let currentWallet = '';
    let currentTxCount = 0;
    let currentAirdrop = 0;

    async function getTxCount(address) {
      for (const rpc of RPC_URLS) {
        try {
          const res = await fetch(rpc, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              jsonrpc: '2.0',
              id: 1,
              method: 'eth_getTransactionCount',
              params: [address, 'latest']
            })
          });
          const data = await res.json();
          if (data.result) return parseInt(data.result, 16);
        } catch (e) {}
      }
      throw new Error('RPC 连接失败，请重试');
    }

    checkBtn.addEventListener('click', async () => {
      const address = document.getElementById('address').value.trim();
      if (!address.startsWith('0x') || address.length !== 42) {
        resultDiv.className = 'result error';
        resultDiv.textContent = '请输入有效的BSC钱包地址';
        resultDiv.classList.remove('hidden');
        return;
      }

      checkBtn.disabled = true;
      checkBtn.textContent = '查询中...';
      resultDiv.classList.remove('hidden');
      resultDiv.textContent = '正在查询链上数据...';

      try {
        const txCount = await getTxCount(address);
        currentWallet = address;
        currentTxCount = txCount;

        let qualified = false;
        let airdropAmount = 0;

        if (txCount >= QUALIFY_MIN_TX) {
          qualified = true;
          if (txCount <= TIER1_MAX_TX) {
            airdropAmount = TIER1_AIRDROP;
          } else if (txCount >= TIER2_MIN_TX && txCount <= MAX_AIRDROP) {
            airdropAmount = txCount;
          } else {
            airdropAmount = MAX_AIRDROP;
          }
        }

        currentAirdrop = airdropAmount;

        if (qualified) {
          resultDiv.className = 'result success';
          resultDiv.innerHTML = `
            ✅ 符合空投资格<br>
            钱包地址: ${address}<br>
            链上交易数: ${txCount}<br>
            可领取空投: ${airdropAmount} TAICHI
          `;
          registerForm.classList.remove('hidden');
        } else {
          resultDiv.className = 'result error';
          resultDiv.innerHTML = `
            ❌ 暂不符合空投资格<br>
            钱包地址: ${address}<br>
            链上交易数: ${txCount}<br>
            需要至少300笔交易才能参与
          `;
          registerForm.classList.add('hidden');
        }
      } catch (err) {
        resultDiv.className = 'result error';
        resultDiv.textContent = err.message || '查询失败，请稍后重试';
      } finally {
        checkBtn.disabled = false;
        checkBtn.textContent = '查询空投资格';
      }
    });

    submitBtn.addEventListener('click', async () => {
      const username = document.getElementById('twitterUser').value.trim();
      const replylink = document.getElementById('tweetLink').value.trim();

      if (!currentWallet) {
        alert("请先查询资格");
        return;
      }
      if (!username || !replylink) {
        alert("请填写完整信息");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "提交中...";

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registrations`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({
            address: currentWallet,
            username: username,
            replylink: replylink,
            tx_count: currentTxCount,
            airdrop_amount: currentAirdrop
          })
        });

        if (res.ok) {
          alert("✅ 注册成功！每个地址/用户名/链接仅限一次");
          registerForm.classList.add("hidden");
          resultDiv.innerHTML += "<br><br>✅ 注册完成";
        } else {
          const err = await res.json().catch(() => ({}));
          if (err.code === "23505") {
            alert("❌ 地址 / 用户名 / 回复链接 已被使用");
          } else {
            alert("❌ 注册失败，请稍后重试");
          }
        }
      } catch (e) {
        alert("网络错误，请重试");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "提交注册";
      }
    });
  </script>
</body>
</html>
