<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAICHI 空投资格查询（全自动免费版）</title>
<style>
body {
  font-family: "Microsoft YaHei", Arial, sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
}
.container {
  max-width: 500px;
  margin: 40px auto;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.header {
  padding: 25px;
  text-align: center;
  background: rgba(0,0,0,0.3);
}
h1 {
  margin: 0 0 8px 0;
  font-size: 24px;
}
.input-area {
  padding: 25px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}
input {
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
}
button {
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
  background: #00d4ff;
  color: #000;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}
button:hover {
  background: #ffeb3b;
  transform: scale(1.02);
}
.result {
  padding: 25px;
  background: rgba(0,0,0,0.3);
  display: none;
  flex-direction: column;
  gap: 15px;
}
.result.show {
  display: flex;
}
.stat {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 18px;
  padding: 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 12px;
}
.loading {
  text-align: center;
  padding: 20px;
  color: #ffeb3b;
}
.error {
  color: #ff6b6b;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🔍 TAICHI 空投资格查询</h1>
    <p>输入地址 → 自动查 Gas → 秒出结果（完全免费）</p>
  </div>
  <div class="input-area">
    <input type="text" id="address" placeholder="输入 BSC 钱包地址（0x...）" value="0xf3a037fc1935a3af9c9b6a0dd6d3c6ad73f49d46">
    <button onclick="check()">一键查询</button>
  </div>
  <div id="loading" class="loading" style="display:none;">🚀 正在查询...</div>
  <div id="result" class="result">
    <div class="stat">
      <span>发起交易数</span>
      <span id="txCount"></span>
    </div>
    <div class="stat">
      <span>总 Gas 消耗</span>
      <span id="gasTotal" style="color:#ffeb3b;"></span>
    </div>
    <div class="stat">
      <span>空投资格</span>
      <span id="qualify" style="font-weight:bold;"></span>
    </div>
    <div class="stat">
      <span>可领 TAICHI</span>
      <span id="amount" style="font-size:22px; color:#ffeb3b;"></span>
    </div>
  </div>
  <div id="error" class="error"></div>
</div>

<script>
// 替换成你自己的 Cloudflare Worker 地址
const WORKER_URL = 'https://你的-worker名.你的用户名.workers.dev/'

const AIRDROP_RULES = [
  { min: 0.01, max: 0.02, amount: 500 },
  { min: 0.02, max: 0.03, amount: 800 },
  { min: 0.03, max: 0.04, amount: 1000 },
  { min: 0.04, max: 0.05, amount: 1500 },
  { min: 0.05, max: 0.1, amount: 1600 },
  { min: 0.1, max: 0.5, amount: 2000 },
  { min: 0.5, max: Infinity, amount: 5000 }
]

async function check() {
  const addr = document.getElementById('address').value.trim().toLowerCase()
  const loading = document.getElementById('loading')
  const result = document.getElementById('result')
  const error = document.getElementById('error')

  error.textContent = ''
  result.classList.remove('show')
  loading.style.display = 'block'

  if (!addr || !addr.startsWith('0x') || addr.length !== 42) {
    error.textContent = '❌ 地址格式错误'
    loading.style.display = 'none'
    return
  }

  try {
    const res = await fetch(`${WORKER_URL}?address=${addr}`)
    const data = await res.json()

    if (data.error) throw new Error(data.error)

    let amount = 0
    let qualify = '❌ 不符合'
    for (const rule of AIRDROP_RULES) {
      if (data.totalGasBNB >= rule.min && data.totalGasBNB < rule.max) {
        amount = rule.amount
        qualify = '✅ 符合'
        break
      }
    }

    document.getElementById('txCount').textContent = data.txCount
    document.getElementById('gasTotal').textContent = data.totalGasBNB.toFixed(6) + ' BNB'
    document.getElementById('qualify').textContent = qualify
    document.getElementById('amount').textContent = amount + ' TAICHI'
    result.classList.add('show')
  } catch (err) {
    error.textContent = `❌ 查询失败：${err.message}`
  } finally {
    loading.style.display = 'none'
  }
}

document.getElementById('address').addEventListener('keypress', e => {
  if (e.key === 'Enter') check()
})
</script>
</body>
</html>
