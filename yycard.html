<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YY Card · 游戏大厅</title>
    <link rel="stylesheet" href="css/lobby.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app">
    <!-- 大厅视图 -->
    <div id="lobby-view" class="view active">
        <div class="header-bar">
            <div class="user-profile">
                <img id="lobby-avatar" class="avatar" src="" alt="avatar">
                <div class="user-info">
                    <div id="lobby-username"></div>
                    <div id="lobby-wallet" class="user-wallet"></div>
                </div>
            </div>
            <button class="btn" id="logout-btn">登出</button>
        </div>
        <button class="btn-primary" id="start-match-btn">⚡ 开始匹配</button>
        <div id="match-status" class="match-status">等待开始...</div>
        <div class="action-buttons">
            <button class="btn" id="set-username-btn">设置游戏ID</button>
            <button class="btn" id="bind-wallet-btn">绑定钱包</button>
            <button class="btn" id="change-avatar-btn">修改头像</button>
        </div>
    </div>
    <!-- 对战视图、模态框等（略，完整代码见之前） -->
</div>

<!-- 按依赖顺序加载模块 -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script src="js/matchmaking.js"></script>
<script src="js/game-state.js"></script>
<script src="js/battle.js"></script>
<script src="js/main.js"></script>  <!-- 初始化入口 -->
</body>
</html>
