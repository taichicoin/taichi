<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YY Card · 游戏大厅 (内联调试版)</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
            min-height: 100vh;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        #app {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 28, 48, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .view { display: none; }
        .view.active { display: block; }
        .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #f5d76e; object-fit: cover; }
        .user-info { font-weight: 600; }
        .user-wallet { font-size: 0.7rem; opacity: 0.8; }
        .btn {
            background: #2e3f5e; color: white; border: none; padding: 10px 16px;
            border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.1s;
        }
        .btn:hover { background: #3e5275; }
        .btn-primary {
            background: linear-gradient(145deg, #f5d76e, #f0b34b); color: #0b0f1c;
            padding: 16px; width: 100%; font-size: 1.2rem; border: none;
            border-radius: 60px; font-weight: bold; cursor: pointer; margin: 10px 0;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .match-status { margin: 15px 0; padding: 10px; background: #1a2338; border-radius: 20px; text-align: center; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .action-buttons .btn { flex: 1; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; align-items: center;
            justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #1e2a44; padding: 24px; border-radius: 24px;
            max-width: 380px; width: 90%; text-align: center;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        input {
            width: 100%; padding: 14px; border-radius: 40px; border: none;
            background: #0f1a2b; color: white; font-size: 1rem;
            text-align: center; margin: 10px 0;
        }
        .error-msg { color: #ff7b7b; font-size: 0.9rem; }
        .cool-down { color: #f5d76e; }
        #debug-panel {
            margin-top: 20px; padding: 10px; background: #1a1e2e;
            border-radius: 10px; font-size: 0.8rem; max-height: 150px; overflow-y: auto;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- 大厅视图 -->
    <div id="lobby-view" class="view active">
        <div class="header-bar">
            <div class="user-profile">
                <img id="lobby-avatar" class="avatar" src="" alt="avatar">
                <div class="user-info">
                    <div id="lobby-username"></div>
                    <div id="lobby-wallet" class="user-wallet"></div>
                </div>
            </div>
            <button class="btn" id="logout-btn">登出</button>
        </div>
        <button class="btn-primary" id="start-match-btn" disabled>请先设置游戏ID</button>
        <div id="match-status" class="match-status">等待开始...</div>
        <div class="action-buttons">
            <button class="btn" id="set-username-btn">设置游戏ID</button>
            <button class="btn" id="bind-wallet-btn">绑定钱包</button>
            <button class="btn" id="change-avatar-btn">修改头像</button>
        </div>
        <!-- 调试面板 -->
        <div id="debug-panel"></div>
    </div>

    <!-- 用户名模态框 -->
    <div id="username-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>设置游戏ID</h3>
            <p>7位小写字母或数字，设置后不可更改</p>
            <input type="text" id="username-input" maxlength="7" placeholder="例如: king123">
            <div id="username-error" class="error-msg"></div>
            <button class="btn-primary" id="confirm-username-btn">确认</button>
            <button class="btn" id="cancel-username-btn">取消</button>
        </div>
    </div>

    <!-- 钱包模态框 -->
    <div id="wallet-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>绑定以太坊钱包</h3>
            <input type="text" id="wallet-input" placeholder="0x...">
            <div id="wallet-error" class="error-msg"></div>
            <div class="modal-buttons">
                <button class="btn" id="confirm-wallet-btn">确认</button>
                <button class="btn" id="cancel-wallet-btn">取消</button>
            </div>
        </div>
    </div>

    <!-- 头像模态框 -->
    <div id="avatar-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>更换头像</h3>
            <p id="cooldown-warning" class="cool-down"></p>
            <input type="file" id="avatar-file-input" accept="image/png,image/jpeg,image/webp">
            <div id="upload-status"></div>
            <div class="modal-buttons">
                <button class="btn" id="upload-avatar-btn">上传</button>
                <button class="btn" id="cancel-avatar-btn">取消</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ==================== 内联调试版 ====================
    (async function() {
        // ----- 辅助函数：页面内调试面板 -----
        function logToScreen(msg, isError = false) {
            console.log(msg);
            const panel = document.getElementById('debug-panel');
            if (panel) {
                panel.innerHTML += (isError ? '❌ ' : '✅ ') + msg + '<br>';
            }
        }

        logToScreen('🚀 脚本开始执行');

        // ----- Supabase 配置 -----
        const SUPABASE_URL = 'https://sznjaotjoljaiawbvfro.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        logToScreen('Supabase 客户端已创建');

        // ----- 全局变量 -----
        let currentUser = null;
        let currentProfile = null;

        // ----- 工具函数 -----
        function formatAddress(addr) {
            if (!addr) return '';
            return addr.slice(0, 6) + '...' + addr.slice(-4);
        }

        function isValidUsername(u) {
            return /^[a-z0-9]{7}$/.test(u);
        }

        function isValidEthAddress(addr) {
            return /^0x[a-fA-F0-9]{40}$/.test(addr);
        }

        function calculateCooldown(lastModified) {
            if (!lastModified) return { canChange: true, remaining: 0 };
            const diff = Date.now() - new Date(lastModified).getTime();
            const cooldownMs = 15 * 24 * 60 * 60 * 1000;
            if (diff >= cooldownMs) return { canChange: true, remaining: 0 };
            return { canChange: false, remaining: cooldownMs - diff };
        }

        function formatRemaining(ms) {
            const days = Math.floor(ms / (24 * 60 * 60 * 1000));
            const hours = Math.floor((ms % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
            return `${days}天${hours}小时`;
        }

        // ----- 认证检查 -----
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = '/yycard/signup';
                return null;
            }
            currentUser = user;
            logToScreen(`当前用户: ${user.email}`);
            return user;
        }

        // ----- 确保 profiles 记录存在 -----
        async function ensureProfile() {
            const { data, error } = await supabase
                .from('profiles')
                .upsert({
                    id: currentUser.id,
                    display_name: currentUser.user_metadata?.full_name || currentUser.email,
                    avatar_url: currentUser.user_metadata?.avatar_url || '/yycard/assets/default-avatar.png',
                }, { onConflict: 'id' })
                .select('*')
                .single();
            if (error) {
                logToScreen(`创建档案失败: ${error.message}`, true);
                return null;
            }
            logToScreen(`档案已同步: ${data.display_name}`);
            return data;
        }

        // ----- 加载档案 -----
        async function loadProfile() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            if (error) {
                logToScreen(`加载档案失败: ${error.message}`, true);
                return null;
            }
            currentProfile = data;
            updateLobbyUI();
            return data;
        }

        // ----- 更新大厅UI -----
        function updateLobbyUI() {
            document.getElementById('lobby-avatar').src = currentProfile?.avatar_url || '/yycard/assets/default-avatar.png';
            document.getElementById('lobby-username').textContent =
                currentProfile?.username || currentProfile?.display_name || currentUser.email;
            const wallet = currentProfile?.wallet_address;
            document.getElementById('lobby-wallet').textContent = wallet ? formatAddress(wallet) : '未绑定钱包';
            
            const btn = document.getElementById('start-match-btn');
            if (!currentProfile?.username) {
                btn.disabled = true;
                btn.textContent = '请先设置游戏ID';
            } else {
                btn.disabled = false;
                btn.textContent = '⚡ 开始匹配';
            }
            logToScreen('UI已更新');
        }

        // ----- 绑定所有按钮事件 -----
        function bindEvents() {
            logToScreen('开始绑定事件...');
            
            // 登出
            const logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    await supabase.auth.signOut();
                    window.location.href = '/yycard/signup';
                });
                logToScreen('登出按钮已绑定');
            }

            // 设置用户名
            const setUsernameBtn = document.getElementById('set-username-btn');
            const usernameModal = document.getElementById('username-modal');
            const usernameInput = document.getElementById('username-input');
            const usernameErr = document.getElementById('username-error');
            if (setUsernameBtn) {
                setUsernameBtn.addEventListener('click', () => {
                    usernameModal.style.display = 'flex';
                    usernameInput.value = '';
                    usernameErr.textContent = '';
                });
                logToScreen('设置用户名按钮已绑定');
            }
            document.getElementById('confirm-username-btn')?.addEventListener('click', async () => {
                const val = usernameInput.value.trim();
                if (!isValidUsername(val)) {
                    usernameErr.textContent = '必须是7位小写字母或数字';
                    return;
                }
                const { data: exist } = await supabase.from('profiles').select('username').eq('username', val).maybeSingle();
                if (exist) {
                    usernameErr.textContent = '该用户名已被使用';
                    return;
                }
                await supabase.from('profiles').update({ username: val }).eq('id', currentUser.id);
                usernameModal.style.display = 'none';
                await loadProfile();
            });
            document.getElementById('cancel-username-btn')?.addEventListener('click', () => {
                usernameModal.style.display = 'none';
            });

            // 绑定钱包
            const bindWalletBtn = document.getElementById('bind-wallet-btn');
            const walletModal = document.getElementById('wallet-modal');
            const walletInput = document.getElementById('wallet-input');
            const walletErr = document.getElementById('wallet-error');
            if (bindWalletBtn) {
                bindWalletBtn.addEventListener('click', () => {
                    walletModal.style.display = 'flex';
                    walletInput.value = '';
                    walletErr.textContent = '';
                });
                logToScreen('绑定钱包按钮已绑定');
            }
            document.getElementById('confirm-wallet-btn')?.addEventListener('click', async () => {
                const val = walletInput.value.trim();
                if (!isValidEthAddress(val)) {
                    walletErr.textContent = '无效的以太坊地址';
                    return;
                }
                await supabase.from('profiles').update({ wallet_address: val }).eq('id', currentUser.id);
                walletModal.style.display = 'none';
                await loadProfile();
            });
            document.getElementById('cancel-wallet-btn')?.addEventListener('click', () => {
                walletModal.style.display = 'none';
            });

            // 修改头像
            const changeAvatarBtn = document.getElementById('change-avatar-btn');
            const avatarModal = document.getElementById('avatar-modal');
            const fileInput = document.getElementById('avatar-file-input');
            const statusDiv = document.getElementById('upload-status');
            const warnDiv = document.getElementById('cooldown-warning');
            if (changeAvatarBtn) {
                changeAvatarBtn.addEventListener('click', () => {
                    const cooldown = calculateCooldown(currentProfile?.avatar_last_modified);
                    warnDiv.textContent = cooldown.canChange ? '' : `冷却中，剩余 ${formatRemaining(cooldown.remaining)}`;
                    avatarModal.style.display = 'flex';
                    fileInput.value = '';
                    statusDiv.innerHTML = '';
                });
                logToScreen('修改头像按钮已绑定');
            }
            document.getElementById('upload-avatar-btn')?.addEventListener('click', async () => {
                const file = fileInput.files[0];
                if (!file) return;
                const cooldown = calculateCooldown(currentProfile?.avatar_last_modified);
                if (!cooldown.canChange) {
                    alert('头像每15天只能修改一次');
                    return;
                }
                const ext = file.name.split('.').pop();
                const path = `${currentUser.id}_${Date.now()}.${ext}`;
                statusDiv.innerHTML = '上传中...';
                const { error: upErr } = await supabase.storage.from('avatars').upload(path, file, { upsert: true });
                if (upErr) {
                    statusDiv.innerHTML = '上传失败: ' + upErr.message;
                    return;
                }
                const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(path);
                await supabase.from('profiles').update({
                    avatar_url: urlData.publicUrl,
                    avatar_last_modified: new Date().toISOString()
                }).eq('id', currentUser.id);
                avatarModal.style.display = 'none';
                await loadProfile();
            });
            document.getElementById('cancel-avatar-btn')?.addEventListener('click', () => {
                avatarModal.style.display = 'none';
            });

            // 开始匹配
            const matchBtn = document.getElementById('start-match-btn');
            if (matchBtn) {
                matchBtn.addEventListener('click', () => {
                    alert('匹配功能开发中...');
                });
                logToScreen('开始匹配按钮已绑定');
            }

            logToScreen('所有事件绑定完成');
        }

        // ----- 主流程 -----
        const user = await checkAuth();
        if (!user) return;
        
        const profile = await ensureProfile();
        if (!profile) return;
        
        await loadProfile();
        bindEvents();
        
        logToScreen('🎉 初始化完成！请尝试点击按钮');
    })();
</script>
</body>
</html>
