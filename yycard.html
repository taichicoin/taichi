<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 【总纲竖版适配】强制竖版、禁止缩放、刘海屏适配，完美匹配手机DApp浏览器 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover, orientation=portrait">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>YY Card · 太极卡牌自走棋</title>
    <meta name="description" content="YY Card 山海经·西游·三国 竖版卡牌自走棋">

    <!-- 【稳定修复】Supabase SDK 加载方案（基于有效CDN，彻底解决加载失败问题） -->
    <!-- 主源：已验证有效的jsdelivr完整UMD包 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js" id="supabase-main-script"></script>
    
    <!-- 【非阻塞兜底加载】无document.write，无页面清空风险，3重重试兜底 -->
    <script>
        window.supabaseLoadState = {
            loaded: false,
            retryCount: 0,
            maxRetry: 3
        };

        // SDK加载成功校验
        function checkSupabaseLoaded() {
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                window.supabaseLoadState.loaded = true;
                console.log('✅ Supabase SDK 加载成功，版本：2.45.0');
                // 加载成功后触发应用初始化
                if (window.onSupabaseLoaded) window.onSupabaseLoaded();
                return true;
            }
            return false;
        }

        // 重试加载逻辑
        function retryLoadSupabase() {
            if (window.supabaseLoadState.retryCount >= window.supabaseLoadState.maxRetry) {
                console.error('❌ Supabase SDK 加载失败，已达最大重试次数，请检查网络环境');
                alert('游戏核心SDK加载失败，请刷新页面重试');
                return;
            }

            window.supabaseLoadState.retryCount++;
            console.warn(`⚠️ SDK加载失败，开始第${window.supabaseLoadState.retryCount}次重试`);

            // 重新创建脚本加载
            const script = document.createElement('script');
            script.src = `https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js?retry=${window.supabaseLoadState.retryCount}`;
            script.onload = () => {
                if (!checkSupabaseLoaded()) retryLoadSupabase();
            };
            script.onerror = retryLoadSupabase;
            document.head.appendChild(script);
        }

        // 主脚本加载完成检测
        document.getElementById('supabase-main-script').onload = () => {
            if (!checkSupabaseLoaded()) retryLoadSupabase();
        };
        // 主脚本加载失败触发重试
        document.getElementById('supabase-main-script').onerror = retryLoadSupabase;
    </script>

    <!-- 【总纲路径适配】全资源相对路径，完美匹配/yycard permalink -->
    <link rel="stylesheet" href="./css/lobby.css">
    <link rel="stylesheet" href="./css/battle.css">
</head>
<body>
<div id="app">
    <!-- ================================== 大厅视图（总纲已稳定）================================== -->
    <div id="lobby-view" class="view-container">
        <!-- 顶部用户信息栏 -->
        <div class="header-bar">
            <div class="user-profile">
                <img id="lobby-avatar" class="avatar" src="./assets/default-avatar.png" alt="头像" onerror="this.src='./assets/default-avatar.png'">
                <div class="user-info">
                    <div id="lobby-username" class="username">未设置ID</div>
                    <div id="lobby-wallet" class="user-wallet">未绑定钱包</div>
                    <div id="lobby-card-count" class="user-card">改名卡：0张</div>
                </div>
            </div>
            <button class="btn btn-secondary" id="logout-btn">登出</button>
        </div>

        <!-- 核心匹配按钮 -->
        <button class="btn-primary match-main-btn" id="start-match-btn" disabled>请先设置游戏ID</button>
        
        <!-- 匹配状态区 -->
        <div class="match-status-row" id="match-status-row" style="display: none;">
            <div id="match-status" class="match-status-text">⏳ 正在匹配玩家...（0/8）</div>
            <button class="btn btn-danger" id="cancel-match-btn">取消匹配</button>
        </div>

        <!-- 个人设置操作区 -->
        <div class="profile-action-buttons">
            <button class="btn" id="set-username-btn">设置游戏ID</button>
            <button class="btn" id="bind-wallet-btn">绑定钱包</button>
            <button class="btn" id="change-avatar-btn">更换头像</button>
        </div>

        <!-- 调试面板（开发用） -->
        <div id="debug-panel" class="debug-panel"></div>
    </div>

    <!-- ================================== 对战视图（严格匹配总纲UI布局）================================== -->
    <div id="battle-view" class="view-container" style="display: none;">
        <!-- 左上角操作区 -->
        <div class="top-left-actions">
            <button class="btn" id="leave-battle-btn">🚪 退出</button>
            <button class="btn" id="settings-btn">⚙️ 设置</button>
        </div>

        <!-- 顶部全局信息栏（总纲要求，战斗/准备阶段全显示） -->
        <div class="top-global-info">
            <span>🏪 Lv.<span id="shop-level">1</span></span>
            <span>💰 <span id="my-gold">0</span></span>
            <span>❤️ <span id="my-health">100</span></span>
            <span>🔄 回合<span id="round-num">1</span></span>
        </div>

        <!-- 右上角8人玩家状态栏（总纲要求，全阶段保留） -->
        <div class="players-status-bar">
            <div id="player-status-list" class="player-status-list"></div>
        </div>

        <!-- 【准备阶段专属】商店区域（总纲要求：顶部居中，3张卡） -->
        <div class="shop-area prepare-only">
            <div class="shop-header">
                <span>商店等级 Lv.<span id="shop-level-detail">1</span></span>
                <span>剩余金币：<span id="shop-gold">0</span></span>
            </div>
            <div id="shop-container" class="shop-cards-grid"></div>
            <div class="shop-actions">
                <button class="btn" id="refresh-shop-btn">🔄 刷新 (1金币)</button>
                <button class="btn" id="buy-exp-btn">📈 升级商店</button>
            </div>
        </div>

        <!-- 棋盘核心区域（总纲镜像对称布局） -->
        <div class="board-container">
            <!-- 【战斗阶段专属】敌方棋盘 -->
            <div class="enemy-board-section battle-only">
                <div class="board-label">敌方阵容</div>
                <div id="enemy-board" class="board-grid"></div>
            </div>

            <!-- 【战斗阶段专属】楚河汉界 + 回合倒计时 -->
            <div class="battle-divider-row battle-only">
                <div class="battle-divider-text">━━━━━ ⚔️ 楚河汉界 ⚔️ ━━━━━</div>
                <div class="battle-timer" id="phase-timer">00:00</div>
            </div>

            <!-- 我方棋盘（全阶段显示，准备阶段为准备卡槽） -->
            <div class="my-board-section">
                <div class="board-label prepare-only">我方准备卡槽</div>
                <div class="board-label battle-only">我方阵容</div>
                <div id="my-board" class="board-grid"></div>
            </div>
        </div>

        <!-- 【准备阶段专属】手牌区域（总纲要求：底部横向滑动，上限15张） -->
        <div class="hand-area prepare-only">
            <div class="hand-header">
                <span>手牌 (<span id="hand-count">0</span>/15)</span>
            </div>
            <div id="hand-container" class="hand-scroll-container"></div>
        </div>

        <!-- 【准备阶段专属】底部操作按钮栏 -->
        <div class="bottom-actions prepare-only">
            <button class="btn" id="refresh-shop-btn-bottom">🔄 刷新商店</button>
            <button class="btn" id="buy-exp-btn-bottom">📈 升级商店</button>
            <button class="btn-primary" id="end-prepare-btn">✅ 结束准备</button>
        </div>
    </div>
</div>

<!-- ================================== 模态框组件 ================================== -->
<!-- 头像上传模态框 -->
<div id="avatar-modal" class="modal">
    <div class="modal-content">
        <h3>更换头像</h3>
        <p id="avatar-cooldown-warning" class="warning-text"></p>
        <input type="file" id="avatar-file-input" accept="image/png,image/jpeg,image/webp">
        <div id="avatar-upload-status" class="upload-status"></div>
        <div class="modal-buttons">
            <button class="btn btn-primary" id="upload-avatar-btn">确认上传</button>
            <button class="btn" id="cancel-avatar-btn">取消</button>
        </div>
    </div>
</div>

<!-- 游戏ID设置模态框 -->
<div id="username-modal" class="modal">
    <div class="modal-content">
        <h3>设置游戏ID</h3>
        <p class="tip-text">1-7位小写字母/数字，全局唯一，首次设置免费</p>
        <input type="text" id="username-input" maxlength="7" placeholder="输入游戏ID" pattern="[a-z0-9]{1,7}">
        <div id="username-status" class="status-text"></div>
        <div class="modal-buttons">
            <button class="btn btn-primary" id="confirm-username-btn">确认设置</button>
            <button class="btn" id="cancel-username-btn">取消</button>
        </div>
    </div>
</div>

<!-- 钱包绑定模态框 -->
<div id="wallet-modal" class="modal">
    <div class="modal-content">
        <h3>绑定以太坊钱包</h3>
        <p class="tip-text">输入0x开头的42位钱包地址</p>
        <input type="text" id="wallet-input" maxlength="42" placeholder="0x...">
        <div id="wallet-status" class="status-text"></div>
        <div class="modal-buttons">
            <button class="btn btn-primary" id="confirm-wallet-btn">确认绑定</button>
            <button class="btn" id="cancel-wallet-btn">取消</button>
        </div>
    </div>
</div>

<!-- ================================== JS 加载（严格按依赖顺序，匹配总纲文件结构）================================== -->
<script>
    // SDK加载完成后，按顺序加载业务JS
    window.onSupabaseLoaded = function() {
        // 按依赖顺序加载JS：配置→工具→认证→商店→经济→游戏机制→匹配→重连→对战→UI
        const jsFiles = [
            './js/config.js',
            './js/utils.js',
            './js/auth.js',
            './js/shop.js',
            './js/economy.js',
            './js/game-mechanics.js',
            './js/matchmaking.js',
            './js/reconnect.js',
            './js/battle.js',
            './js/profile-ui.js'
        ];

        let loadedCount = 0;
        // 串行加载，确保依赖顺序
        function loadNextJs() {
            if (loadedCount >= jsFiles.length) {
                // 全部加载完成，初始化应用
                if (window.initApp) window.initApp();
                return;
            }

            const script = document.createElement('script');
            script.src = jsFiles[loadedCount];
            script.onload = () => {
                console.log(`✅ ${jsFiles[loadedCount]} 加载成功`);
                loadedCount++;
                loadNextJs();
            };
            script.onerror = () => {
                console.error(`❌ ${jsFiles[loadedCount]} 加载失败`);
                alert(`游戏模块加载失败：${jsFiles[loadedCount]}，请刷新页面重试`);
            };
            document.body.appendChild(script);
        }

        // 开始加载
        loadNextJs();
    };

    // 页面加载完成后，检查SDK是否已加载
    document.addEventListener('DOMContentLoaded', () => {
        if (window.supabaseLoadState.loaded) {
            window.onSupabaseLoaded();
        }
    });

    // ==================== 应用主入口（严格匹配总纲重连/初始化规则）====================
    window.initApp = async function() {
        console.log('🚀 YY Card 应用初始化开始');
        const auth = window.YYCardAuth;
        const profileUI = window.YYCardProfileUI;
        const matchmaking = window.YYCardMatchmaking;
        const shop = window.YYCardShop;
        const battle = window.YYCardBattle;

        // 1. 预加载卡牌模板（总纲要求，必须提前加载否则商店空白）
        if (shop) await shop.loadTemplates();
        else console.error('❌ shop.js 模块加载失败');

        // 2. 初始化认证系统
        if (!auth) {
            console.error('❌ auth.js 模块加载失败');
            alert('认证模块加载失败，请刷新页面');
            return;
        }
        const authSuccess = await auth.init();
        if (!authSuccess) {
            // 未登录，跳转到登录页
            window.location.href = window.YYCardConfig?.LOGIN_PAGE_URL || './signup';
            return;
        }

        // 3. 初始化个人资料UI
        if (profileUI) {
            profileUI.update();
            profileUI.bindEvents();
        }

        // 4. 绑定匹配按钮事件
        const startMatchBtn = document.getElementById('start-match-btn');
        const cancelMatchBtn = document.getElementById('cancel-match-btn');
        
        if (startMatchBtn && matchmaking) {
            startMatchBtn.onclick = () => matchmaking.start();
        }
        if (cancelMatchBtn && matchmaking) {
            cancelMatchBtn.onclick = () => matchmaking.cancel();
        }

        // 5. 绑定登出事件
        document.getElementById('logout-btn').onclick = async () => {
            console.log('🔚 玩家登出');
            // 先取消匹配/退出对局
            if (matchmaking) await matchmaking.cancel();
            if (battle) await battle.leaveBattle();
            // 登出并跳转登录页
            await auth.signOut();
            window.location.href = window.YYCardConfig?.LOGIN_PAGE_URL || './signup';
        };

        // 6. 页面关闭前清理房间记录
        window.addEventListener('beforeunload', (e) => {
            const uid = auth.currentUser?.id;
            if (!uid) return;
            // 发送keepalive请求清理房间记录
            fetch(`${window.YYCardConfig.SUPABASE_URL}/rest/v1/room_players?player_id=eq.${uid}`, {
                method: 'DELETE',
                headers: {
                    'apikey': window.YYCardConfig.SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${auth.currentSession?.access_token}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                keepalive: true
            }).catch(err => console.warn('页面关闭清理房间失败:', err));
        });

        // 7. 【总纲重连系统】检测进行中的对局/匹配
        if (window.YYCardReconnect) {
            await window.YYCardReconnect.checkAndHandleReconnect();
        }

        console.log('✅ YY Card 大厅初始化完成');
    };
</script>
</body>
</html>
