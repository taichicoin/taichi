<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>YY Card · 游戏大厅</title>
    <!-- Supabase SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" onerror="this.src='https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js';this.onerror=null;"></script>

    <style>
/* ==================== 全局通用 ==================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
body {
  overscroll-behavior: none;
  touch-action: pan-y;
  background: radial-gradient(circle at 20% 20%, #1a2a4a, #0a0f1a 60%, #050810);
  min-height: 100vh;
  color: #f0f0f0;
  font-family: 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
}
.btn {
  background: #2e3f5e;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 4px 0 #121927;
  font-family: inherit;
}
.btn:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #121927;
}
.btn-primary {
  background: linear-gradient(145deg, #f5d76e, #f0b34b);
  color: #0b0f1c;
  box-shadow: 0 4px 0 #a05f20;
}

/* ==================== 大厅样式 lobby.css ==================== */
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
}
.user-profile {
  display: flex;
  gap: 12px;
  align-items: center;
}
.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid #f5d76e;
  background:#2a3a5c;
}
.user-info{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.user-wallet,.user-card{
  font-size:0.8rem;
  opacity:0.8;
}
#start-match-btn{
  display:block;
  margin:30px auto;
  padding:16px 32px;
  font-size:1.1rem;
}
.match-row{
  text-align:center;
}
.action-buttons{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:40px;
}
.debug-panel{
  position:fixed;
  bottom:10px;
  left:10px;
  font-size:0.7rem;
  opacity:0.6;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:200;
}
.modal-content{
  background:#101828;
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,215,0,0.3);
  min-width:280px;
}
.modal-buttons{
  display:flex;
  gap:10px;
  justify-content:right;
  margin-top:16px;
}

/* ==================== 对局样式 battle.css ==================== */
/* 右上角8名玩家状态栏 */
.players-status-bar {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 100;
  width: 140px;
  background: rgba(10, 18, 30, 0.85);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 8px 10px;
  border: 1px solid rgba(255, 215, 0, 0.3);
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}
.player-status-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.player-status-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.player-status-item img {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 1.5px solid #f5d76e;
  background: #2a3a5c;
  object-fit: cover;
}
.player-status-item .hp-bar {
  flex: 1;
  height: 6px;
  background: #3a4a6a;
  border-radius: 3px;
  overflow: hidden;
}
.player-status-item .hp-fill {
  height: 100%;
  background: #e94560;
  width: 0%;
  transition: width 0.3s ease;
}

/* 左上角操作区 */
.top-left-actions {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 100;
  display: flex;
  gap: 8px;
  align-items: center;
}

/* 商店区域 */
.shop-area {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 24px);
  max-width: 700px;
  z-index: 90;
  background: rgba(10, 18, 30, 0.9);
  backdrop-filter: blur(8px);
  border-radius: 16px;
  padding: 12px;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
.shop-info {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #f5d76e;
  font-weight: bold;
  font-size: 0.9rem;
}
.shop-cards {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 4px 0;
  scrollbar-width: none;
}
.shop-cards::-webkit-scrollbar {display: none;}
.shop-actions{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-top:8px;
}

/* 棋盘 */
.board-area {
  position: fixed;
  top: 180px;
  bottom: 180px;
  left: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 16px;
}
.enemy-board-section,.my-board-section {
  background: rgba(0, 0, 0, 0.2);
  border-radius: 16px;
  padding: 12px;
  border: 1px solid rgba(255,215,0,0.1);
}
.board-label {
  font-size: 0.8rem;
  opacity: 0.7;
  margin-bottom: 8px;
  text-align: left;
  padding-left: 4px;
  color: #aab9d4;
}
.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.battle-divider {
  text-align: center;
  margin: 8px 0;
  color: #f5d76e;
  font-weight: bold;
  text-shadow: 0 0 8px #000;
  letter-spacing: 4px;
  font-size: 1.1rem;
}
.battle-timer {
  text-align: center;
  font-size: 0.9rem;
  color: #e94560;
  margin: -8px 0 8px;
}

/* 手牌区 */
.hand-area {
  position: fixed;
  bottom: 110px;
  left: 20px;
  right: 20px;
  z-index: 89;
  background: rgba(10, 18, 30, 0.7);
  backdrop-filter: blur(8px);
  border-radius: 20px;
  padding: 8px 12px;
  border: 1px solid rgba(255,215,0,0.2);
}
.hand-label {
  font-size: 0.7rem;
  margin-bottom: 4px;
  padding-left: 4px;
  color: #aab9d4;
}
.hand {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.hand::-webkit-scrollbar {display: none;}

/* 底部准备按钮 */
.prepare-actions {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 90;
  display: flex;
  gap: 12px;
  justify-content: center;
}

/* 卡牌通用 */
.card-slot{cursor:pointer;}
.card {
  background: linear-gradient(145deg, #1a2a4a, #0a0f1a);
  border: 2px solid #3a4a6a;
  border-radius: 12px;
  padding: 6px;
  text-align: center;
  font-size: 0.8rem;
  transition: all 0.15s;
  box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}
.card.selected {
  border-color: #f5d76e;
  box-shadow: 0 0 15px rgba(255,215,0,0.5);
  transform: translateY(-4px);
}
.empty-slot{opacity:0.3;}
.card-name { font-weight: bold; }
.card-stats { font-size: 0.75rem; display: flex; justify-content: center; gap: 6px; margin:4px 0; }
.card-price { color: #f5d76e; }
.card-star{color:#f5d76e;font-size:0.7rem;}

/* 阶段切换 */
.prepare-only { display: block; }
.battle-only { display: none; }
.battle-view-mode .prepare-only { display: none; }
.battle-view-mode .battle-only { display: block; }

/* 移动端适配 */
@media (max-width: 768px) {
  .shop-area {
    width: calc(100% - 16px);
    top: 50px;
  }
  .board-area {
    top: 160px;
    bottom: 160px;
    left: 12px;
    right: 12px;
    gap: 12px;
  }
  .board { gap: 8px; }
  .hand-area {
    bottom: 100px;
    left: 12px;
    right: 12px;
  }
  .players-status-bar { width: 120px; }
}
    </style>
</head>
<body>
<div id="app">
    <!-- ===== 大厅视图 ===== -->
    <div id="lobby-view">
        <div class="header-bar">
            <div class="user-profile">
                <img id="lobby-avatar" class="avatar" src="" alt="avatar" onerror="this.src='assets/default-avatar.png'">
                <div class="user-info">
                    <div id="lobby-username"></div>
                    <div id="lobby-wallet" class="user-wallet"></div>
                    <div id="lobby-card-count" class="user-card">改名卡：0张</div>
                </div>
            </div>
            <button class="btn" id="logout-btn">登出</button>
        </div>
        <button class="btn-primary" id="start-match-btn" disabled>请先设置游戏ID</button>
        
        <div class="match-row">
            <div id="match-status"></div>
            <button class="btn" id="cancel-match-btn">取消匹配</button>
        </div>

        <div class="action-buttons">
            <button class="btn" id="set-username-btn">设置游戏ID</button>
            <button class="btn" id="bind-wallet-btn">绑定钱包</button>
            <button class="btn" id="change-avatar-btn">修改头像</button>
        </div>
        <div id="debug-panel" class="debug-panel"></div>
    </div>

    <!-- ===== 对战视图 ===== -->
    <div id="battle-view" style="display:none;">
        <div class="top-left-actions">
            <button class="btn" id="leave-battle-btn">🚪 退出</button>
            <button class="btn" id="settings-btn">⚙️</button>
        </div>

        <div class="players-status-bar">
            <div id="player-status-list" class="player-status-list"></div>
        </div>

        <div class="shop-area prepare-only">
            <div class="shop-info">
                <span>🏪 Lv.<span id="shop-level">1</span></span>
                <span>💰 <span id="my-gold">5</span></span>
            </div>
            <div id="shop-container" class="shop-cards"></div>
            <div class="shop-actions">
                <button class="btn" id="refresh-shop-btn">🔄</button>
                <button class="btn" id="buy-exp-btn">📈</button>
            </div>
        </div>

        <div class="board-area">
            <div class="enemy-board-section battle-only">
                <div class="board-label">敌方</div>
                <div id="enemy-board" class="board"></div>
            </div>
            <div class="battle-divider battle-only">⚔️ 楚河汉界 ⚔️</div>
            <div class="battle-timer" id="phase-timer">00:00</div>
            <div class="my-board-section">
                <div class="board-label prepare-only">我方准备区</div>
                <div class="board-label battle-only">我方</div>
                <div id="my-board" class="board"></div>
            </div>
        </div>

        <div class="hand-area prepare-only">
            <div class="hand-label">手牌 (<span id="hand-count">0</span>/15) | ❤️ <span id="my-health">100</span> | 🔄 回合 <span id="round-num">1</span></div>
            <div id="hand-container" class="hand"></div>
        </div>

        <div class="prepare-actions prepare-only">
            <button class="btn" id="refresh-shop-btn-bottom">🔄 刷新</button>
            <button class="btn" id="buy-exp-btn-bottom">📈 升级</button>
            <button class="btn-primary" id="end-prepare-btn">✅ 准备</button>
        </div>
    </div>
</div>

<!-- 头像上传模态框 -->
<div id="avatar-modal" class="modal">
    <div class="modal-content">
        <h3>更换头像</h3>
        <p id="cooldown-warning"></p>
        <input type="file" id="avatar-file-input" accept="image/png,image/jpeg,image/webp">
        <div id="upload-status"></div>
        <div class="modal-buttons">
            <button class="btn" id="upload-avatar-btn">上传</button>
            <button class="btn" id="cancel-avatar-btn">取消</button>
        </div>
    </div>
</div>

<!-- 模块化 JS（顺序必须正确） -->
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile-ui.js"></script>
<script src="js/matchmaking.js"></script>
<script src="js/battle.js"></script>
<script>
    // ==================== 重连检测 ====================
    async function checkReconnect() {
        const auth = window.YYCardAuth;
        const uid = auth.currentUser?.id;
        if (!uid) return;

        const { data: myRoomPlayer } = await supabase
            .from('room_players')
            .select('room_id, is_bot')
            .eq('player_id', uid)
            .maybeSingle();
        if (!myRoomPlayer) return;

        const roomId = myRoomPlayer.room_id;
        const { data: room } = await supabase
            .from('rooms')
            .select('status')
            .eq('id', roomId)
            .single();
        if (!room) return;

        if (room.status === 'battle') {
            const shouldReconnect = confirm('检测到您有一场进行中的对局，是否重新连接？\n\n点击“确定”重连，点击“取消”放弃并开始新游戏。');
            if (shouldReconnect) {
                auth.log('🔄 玩家选择重连');
                document.getElementById('lobby-view').style.display = 'none';
                document.getElementById('battle-view').style.display = 'block';
                if (window.YYCardMatchmaking) window.YYCardMatchmaking.setCurrentRoom(roomId);
                if (window.YYCardBattle?.enterBattle) window.YYCardBattle.enterBattle(roomId);
            } else {
                auth.log('🚫 玩家放弃重连，清理房间记录');
                await supabase.from('room_players').delete().eq('player_id', uid);
                const { data: realPlayers } = await supabase
                    .from('room_players')
                    .select('player_id')
                    .eq('room_id', roomId)
                    .eq('is_bot', false);
                if (!realPlayers || realPlayers.length === 0) {
                    await supabase.from('game_states').delete().eq('room_id', roomId);
                    await supabase.from('rooms').delete().eq('id', roomId);
                    auth.log(`🧹 房间 ${roomId} 已无真人，已清理`);
                }
            }
        } else if (room.status === 'waiting') {
            auth.log('🔄 检测到等待中的匹配，恢复状态...');
            if (window.YYCardMatchmaking) {
                window.YYCardMatchmaking.setCurrentRoom(roomId);
                window.YYCardMatchmaking.subscribeToRoom(roomId);
            }
            document.getElementById('start-match-btn').disabled = true;
            document.getElementById('start-match-btn').textContent = '⏳ 匹配中...';
            document.getElementById('match-status').style.display = 'block';
            document.getElementById('cancel-match-btn').style.display = 'inline-block';
        }
    }

    // ==================== 主入口 ====================
    window.initApp = async function() {
        const auth = window.YYCardAuth;
        const profileUI = window.YYCardProfileUI;
        const matchmaking = window.YYCardMatchmaking;

        const success = await auth.init();
        if (!success) return;

        profileUI.update();
        profileUI.bindEvents();

        document.getElementById('start-match-btn').onclick = () => {
            if (matchmaking?.start) matchmaking.start();
            else auth.log('❌ 匹配模块未正确加载', true);
        };
        document.getElementById('cancel-match-btn').onclick = () => {
            if (matchmaking?.cancel) matchmaking.cancel();
        };
        document.getElementById('logout-btn').onclick = async () => {
            auth.log('🔚 正在登出...');
            if (matchmaking?.cancel) await matchmaking.cancel();
            await auth.signOut();
            window.location.href = window.YYCardConfig.LOGIN_PAGE_URL;
        };

        window.addEventListener('beforeunload', () => {
            const uid = auth.currentUser?.id;
            if (uid) {
                fetch(`${window.YYCardConfig.SUPABASE_URL}/rest/v1/room_players?player_id=eq.${uid}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': window.YYCardConfig.SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${auth.currentSession?.access_token}`,
                        'Content-Type': 'application/json'
                    },
                    keepalive: true
                }).catch(e => console.warn('页面关闭清理失败:', e));
            }
        });

        await checkReconnect();
        auth.log('✅ 大厅初始化完成');
    };

    document.addEventListener('DOMContentLoaded', () => {
        if (typeof window.initApp === 'function') window.initApp();
        else console.error('❌ initApp 函数未定义');
    });
</script>
</body>
</html>
