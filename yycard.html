<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YY Card · 游戏大厅</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
            min-height: 100vh;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        #app {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 28, 48, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #f5d76e; object-fit: cover; background: #2a3a5c; }
        .user-info { font-weight: 600; }
        .user-wallet { font-size: 0.7rem; opacity: 0.8; }
        .btn {
            background: #2e3f5e; color: white; border: none; padding: 10px 16px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(145deg, #f5d76e, #f0b34b); color: #0b0f1c;
            padding: 16px; width: 100%; font-size: 1.2rem; border: none;
            border-radius: 60px; font-weight: bold; cursor: pointer; margin: 10px 0;
        }
        .debug-panel {
            margin-top: 20px; padding: 10px; background: #1a1e2e;
            border-radius: 10px; font-size: 0.8rem; max-height: 200px; overflow-y: auto;
        }
        .error-msg { color: #ff7b7b; }
    </style>
</head>
<body>
<div id="app">
    <div id="lobby-view" class="view">
        <div class="header-bar">
            <div class="user-profile">
                <img id="lobby-avatar" class="avatar" src="" alt="avatar">
                <div class="user-info">
                    <div id="lobby-username">加载中...</div>
                    <div id="lobby-wallet" class="user-wallet"></div>
                </div>
            </div>
            <button class="btn" id="logout-btn">登出</button>
        </div>
        <button class="btn-primary" id="start-match-btn" disabled>请先设置游戏ID</button>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn" id="set-username-btn">设置游戏ID</button>
            <button class="btn" id="bind-wallet-btn">绑定钱包</button>
        </div>
        <div class="debug-panel" id="debug-panel"></div>
    </div>
</div>

<script>
    (function() {
        const SUPABASE_URL = 'https://sznjaotjoljaiawbvfro.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentProfile = null;
        
        const debugEl = document.getElementById('debug-panel');
        function log(msg, isError = false) {
            console.log(msg);
            const line = document.createElement('div');
            line.className = isError ? 'error-msg' : '';
            line.textContent = (isError ? '❌ ' : '✅ ') + msg;
            debugEl.appendChild(line);
        }

        async function init() {
            log('🚀 大厅初始化开始');
            
            // 1. 检查认证
            const { data: { user }, error: userError } = await supabase.auth.getUser();
            if (userError) {
                log(`认证检查失败: ${userError.message}`, true);
                window.location.href = '/yycard/signup';
                return;
            }
            if (!user) {
                log('未登录，跳转到登录页', true);
                window.location.href = '/yycard/signup';
                return;
            }
            currentUser = user;
            log(`已登录: ${user.email}`);
            
            // 2. 确保 profiles 存在
            const { data: profile, error: profileError } = await supabase
                .from('profiles')
                .upsert({
                    id: user.id,
                    display_name: user.user_metadata?.full_name || user.email,
                    avatar_url: user.user_metadata?.avatar_url || '/yycard/assets/default-avatar.png',
                }, { onConflict: 'id' })
                .select('*')
                .single();
                
            if (profileError) {
                log(`档案操作失败: ${profileError.message}`, true);
                return;
            }
            currentProfile = profile;
            log(`档案已同步: ${profile.display_name}`);
            
            // 3. 更新UI
            updateUI();
            
            // 4. 绑定事件
            document.getElementById('logout-btn').addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = '/yycard/signup';
            });
            
            document.getElementById('set-username-btn').addEventListener('click', () => {
                const name = prompt('请输入7位小写字母或数字的游戏ID:');
                if (!name) return;
                if (!/^[a-z0-9]{7}$/.test(name)) {
                    alert('格式错误，必须是7位小写字母或数字');
                    return;
                }
                supabase.from('profiles').update({ username: name }).eq('id', user.id).then(async ({ error }) => {
                    if (error) {
                        alert('设置失败: ' + error.message);
                    } else {
                        alert('设置成功！');
                        const { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                        currentProfile = data;
                        updateUI();
                    }
                });
            });
            
            document.getElementById('bind-wallet-btn').addEventListener('click', () => {
                const addr = prompt('请输入以太坊钱包地址 (0x开头):');
                if (!addr) return;
                if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) {
                    alert('无效的以太坊地址');
                    return;
                }
                supabase.from('profiles').update({ wallet_address: addr }).eq('id', user.id).then(async ({ error }) => {
                    if (error) {
                        alert('绑定失败: ' + error.message);
                    } else {
                        alert('绑定成功！');
                        const { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                        currentProfile = data;
                        updateUI();
                    }
                });
            });
            
            log('🎉 大厅初始化完成');
        }

        function updateUI() {
            if (!currentProfile) return;
            document.getElementById('lobby-avatar').src = currentProfile.avatar_url || '/yycard/assets/default-avatar.png';
            document.getElementById('lobby-username').textContent = currentProfile.username || currentProfile.display_name;
            const wallet = currentProfile.wallet_address;
            document.getElementById('lobby-wallet').textContent = wallet ? wallet.slice(0,6)+'...'+wallet.slice(-4) : '未绑定钱包';
            
            const btn = document.getElementById('start-match-btn');
            if (!currentProfile.username) {
                btn.disabled = true;
                btn.textContent = '请先设置游戏ID';
            } else {
                btn.disabled = false;
                btn.textContent = '⚡ 开始匹配';
                btn.onclick = () => alert('匹配功能开发中...');
            }
        }

        init();
    })();
</script>
</body>
</html>
