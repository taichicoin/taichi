<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YY Card · 游戏大厅</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
            min-height: 100vh;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        #app {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 28, 48, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }
        .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #f5d76e; object-fit: cover; background: #2a3a5c; }
        .user-info { font-weight: 600; }
        .user-wallet { font-size: 0.7rem; opacity: 0.8; }
        .btn {
            background: #2e3f5e; color: white; border: none; padding: 10px 16px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(145deg, #f5d76e, #f0b34b); color: #0b0f1c;
            padding: 16px; width: 100%; font-size: 1.2rem; border: none;
            border-radius: 60px; font-weight: bold; cursor: pointer; margin: 10px 0;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .action-buttons .btn { flex: 1; }
        .debug-panel {
            margin-top: 20px; padding: 10px; background: #1a1e2e;
            border-radius: 10px; font-size: 0.8rem; max-height: 150px; overflow-y: auto;
        }
        .error-msg { color: #ff7b7b; }
    </style>
</head>
<body>
<div id="app">
    <!-- 加载中视图 -->
    <div id="loading-view" class="loading">
        <p>⏳ 正在验证身份...</p>
        <div class="debug-panel" id="debug-panel"></div>
    </div>

    <!-- 大厅视图（初始隐藏） -->
    <div id="lobby-view" style="display:none;">
        <div class="header-bar">
            <div class="user-profile">
                <img id="lobby-avatar" class="avatar" src="" alt="avatar">
                <div class="user-info">
                    <div id="lobby-username">加载中...</div>
                    <div id="lobby-wallet" class="user-wallet"></div>
                </div>
            </div>
            <button class="btn" id="logout-btn">登出</button>
        </div>
        <button class="btn-primary" id="start-match-btn" disabled>请先设置游戏ID</button>
        <div class="action-buttons">
            <button class="btn" id="set-username-btn">设置游戏ID</button>
            <button class="btn" id="bind-wallet-btn">绑定钱包</button>
            <button class="btn" id="change-avatar-btn">修改头像</button>
        </div>
        <div class="debug-panel" id="lobby-debug-panel"></div>
    </div>
</div>

<script>
    (function() {
        const SUPABASE_URL = 'https://sznjaotjoljaiawbvfro.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentProfile = null;
        let authResolved = false;

        const loadingView = document.getElementById('loading-view');
        const lobbyView = document.getElementById('lobby-view');
        const debugPanel = document.getElementById('debug-panel');
        const lobbyDebugPanel = document.getElementById('lobby-debug-panel');

        function log(msg, isError = false, target = debugPanel) {
            console.log(msg);
            if (target) {
                const line = document.createElement('div');
                line.className = isError ? 'error-msg' : '';
                line.textContent = (isError ? '❌ ' : '✅ ') + msg;
                target.appendChild(line);
            }
        }

        // 显示大厅
        function showLobby(user, profile) {
            loadingView.style.display = 'none';
            lobbyView.style.display = 'block';
            currentUser = user;
            currentProfile = profile;
            
            // 更新UI
            document.getElementById('lobby-avatar').src = profile.avatar_url || '/yycard/assets/default-avatar.png';
            document.getElementById('lobby-username').textContent = profile.username || profile.display_name;
            const wallet = profile.wallet_address;
            document.getElementById('lobby-wallet').textContent = wallet ? wallet.slice(0,6)+'...'+wallet.slice(-4) : '未绑定钱包';
            
            const matchBtn = document.getElementById('start-match-btn');
            if (!profile.username) {
                matchBtn.disabled = true;
                matchBtn.textContent = '请先设置游戏ID';
            } else {
                matchBtn.disabled = false;
                matchBtn.textContent = '⚡ 开始匹配';
                matchBtn.onclick = () => alert('匹配功能开发中...');
            }

            // 绑定事件
            document.getElementById('logout-btn').onclick = async () => {
                await supabase.auth.signOut();
                window.location.href = '/yycard/signup';
            };
            
            document.getElementById('set-username-btn').onclick = () => {
                const name = prompt('请输入7位小写字母或数字的游戏ID:');
                if (!name) return;
                if (!/^[a-z0-9]{7}$/.test(name)) { alert('格式错误'); return; }
                supabase.from('profiles').update({ username: name }).eq('id', user.id).then(async ({ error }) => {
                    if (error) alert('设置失败: ' + error.message);
                    else {
                        const { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                        currentProfile = data;
                        showLobby(user, data);
                    }
                });
            };
            
            document.getElementById('bind-wallet-btn').onclick = () => {
                const addr = prompt('请输入以太坊钱包地址 (0x开头):');
                if (!addr) return;
                if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) { alert('无效地址'); return; }
                supabase.from('profiles').update({ wallet_address: addr }).eq('id', user.id).then(async ({ error }) => {
                    if (error) alert('绑定失败: ' + error.message);
                    else {
                        const { data } = await supabase.from('profiles').select('*').eq('id', user.id).single();
                        currentProfile = data;
                        showLobby(user, data);
                    }
                });
            };

            log('🎉 大厅加载完成', false, lobbyDebugPanel);
        }

        // 监听认证状态 —— 这是解决闪烁的关键！
        supabase.auth.onAuthStateChange(async (event, session) => {
            console.log('Auth event:', event, session?.user?.email);
            
            if (event === 'INITIAL_SESSION' || event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') {
                if (session?.user) {
                    const user = session.user;
                    log(`认证成功: ${user.email}`, false, debugPanel);
                    
                    // 确保 profiles 存在
                    const { data: profile, error } = await supabase
                        .from('profiles')
                        .upsert({
                            id: user.id,
                            display_name: user.user_metadata?.full_name || user.email,
                            avatar_url: user.user_metadata?.avatar_url || '/yycard/assets/default-avatar.png',
                        }, { onConflict: 'id' })
                        .select('*')
                        .single();
                    
                    if (error) {
                        log(`档案操作失败: ${error.message}`, true, debugPanel);
                    } else {
                        log(`档案已就绪: ${profile.display_name}`, false, debugPanel);
                        authResolved = true;
                        showLobby(user, profile);
                    }
                }
            }
            
            if (event === 'SIGNED_OUT') {
                log('用户已登出', false, debugPanel);
                window.location.href = '/yycard/signup';
            }
        });

        // 超时保护：如果 3 秒后仍未认证成功，显示错误
        setTimeout(() => {
            if (!authResolved) {
                log('认证超时，请刷新页面或重新登录', true, debugPanel);
            }
        }, 3000);
    })();
</script>
</body>
</html>
