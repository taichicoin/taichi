<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>YY Card · 游戏大厅</title>
    <!-- ========== 【核心优化1】DNS预连接 + 预加载，大幅提升CDN加载速度 ========== -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://cdn.skypack.dev" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <!-- ========== 【核心优化2】全局状态锁，彻底解决加载竞态问题 ========== -->
    <script>
        // 全局唯一加载状态锁
        window.SDK_STATE = {
            loaded: false,
            supabase: null,
            initPromise: null,
            error: null,
            retryCount: 0,
            maxRetry: 5, // 增加最大重试次数
            loadTimeout: 10000 // 单轮加载超时10秒，适配慢网络
        };
        console.log('✅ 初始化SDK加载状态锁');
    </script>

    <!-- ========== 【核心优化3】主CDN加载：先绑定事件再设置src，彻底解决事件丢失问题 ========== -->
    <script id="supabase-main-script"></script>
    <script>
        // 主CDN：unpkg（全球/香港地区最稳定，优先加载）
        const mainScript = document.getElementById('supabase-main-script');
        const mainCDN = 'https://unpkg.com/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js';

        // 先绑定事件，再设置src！！！（之前的核心bug就在这里）
        mainScript.onload = function() {
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                window.SDK_STATE.loaded = true;
                window.SDK_STATE.supabase = supabase;
                console.log('✅ 主CDN Supabase SDK加载成功，对象已挂载');
            } else {
                console.warn('⚠️ 主CDN脚本加载完成，但supabase对象未正确挂载');
                mainScript.onerror();
            }
        };

        mainScript.onerror = function() {
            console.warn('⚠️ 主CDN加载失败，切换备用CDN1：jsDelivr');
            loadBackupCDN1();
        };

        // 延迟设置src，确保事件绑定完成
        setTimeout(() => {
            mainScript.src = mainCDN;
        }, 0);
    </script>

    <!-- ========== 【核心优化4】多层CDN兜底 + ESM双模式兜底 ========== -->
    <script>
        // 备用CDN1：jsDelivr
        function loadBackupCDN1() {
            if (window.SDK_STATE.loaded) return;
            const script = document.createElement('script');
            const cdnUrl = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js';
            
            script.onload = function() {
                if (typeof supabase !== 'undefined' && supabase.createClient) {
                    window.SDK_STATE.loaded = true;
                    window.SDK_STATE.supabase = supabase;
                    console.log('✅ 备用CDN1 jsDelivr 加载成功');
                } else {
                    console.warn('⚠️ 备用CDN1加载完成，但对象未挂载，切换备用CDN2：Skypack');
                    loadBackupCDN2();
                }
            };

            script.onerror = function() {
                console.warn('⚠️ 备用CDN1加载失败，切换备用CDN2：Skypack');
                loadBackupCDN2();
            };

            script.src = cdnUrl;
            document.head.appendChild(script);
        }

        // 备用CDN2：Skypack
        function loadBackupCDN2() {
            if (window.SDK_STATE.loaded) return;
            const script = document.createElement('script');
            const cdnUrl = 'https://cdn.skypack.dev/@supabase/supabase-js@2.45.0';
            
            script.type = 'module';
            script.onload = function() {
                console.log('✅ 备用CDN2 Skypack ESM模块加载成功');
                // ESM模式下手动挂载到全局
                import(cdnUrl).then((module) => {
                    window.supabase = module;
                    window.SDK_STATE.loaded = true;
                    window.SDK_STATE.supabase = module;
                    console.log('✅ ESM模块已挂载到全局window.supabase');
                }).catch((err) => {
                    console.warn('⚠️ ESM模块导入失败，切换终极兜底CDN：cdnjs', err);
                    loadFinalBackupCDN();
                });
            };

            script.onerror = function() {
                console.warn('⚠️ 备用CDN2加载失败，切换终极兜底CDN：cdnjs');
                loadFinalBackupCDN();
            };

            document.head.appendChild(script);
        }

        // 终极兜底CDN：cdnjs
        function loadFinalBackupCDN() {
            if (window.SDK_STATE.loaded) return;
            window.SDK_STATE.retryCount++;
            console.log(`🔄 终极兜底CDN加载，重试次数：${window.SDK_STATE.retryCount}/${window.SDK_STATE.maxRetry}`);

            const script = document.createElement('script');
            const cdnUrl = 'https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.45.0/supabase.min.js';
            
            script.onload = function() {
                if (typeof supabase !== 'undefined' && supabase.createClient) {
                    window.SDK_STATE.loaded = true;
                    window.SDK_STATE.supabase = supabase;
                    console.log('✅ 终极兜底CDN cdnjs 加载成功');
                } else {
                    handleSDKLoadFailed('脚本加载完成，但supabase对象未正确挂载');
                }
            };

            script.onerror = function() {
                if (window.SDK_STATE.retryCount < window.SDK_STATE.maxRetry) {
                    console.warn(`⚠️ 终极兜底CDN加载失败，${2}秒后重试`);
                    setTimeout(loadFinalBackupCDN, 2000);
                } else {
                    handleSDKLoadFailed('所有CDN均加载失败');
                }
            };

            script.src = cdnUrl;
            document.head.appendChild(script);
        }

        // SDK加载失败处理
        function handleSDKLoadFailed(reason) {
            const errorMsg = `❌ Supabase SDK加载失败：${reason}，请检查网络连接后刷新页面重试`;
            console.error(errorMsg);
            window.SDK_STATE.error = new Error(errorMsg);
            alert(errorMsg);
        }

        // 全局初始化Promise，确保所有后续逻辑等待SDK加载完成
        window.SDK_STATE.initPromise = new Promise((resolve, reject) => {
            const checkInterval = setInterval(() => {
                if (window.SDK_STATE.loaded) {
                    clearInterval(checkInterval);
                    resolve(window.SDK_STATE.supabase);
                }
                if (window.SDK_STATE.error) {
                    clearInterval(checkInterval);
                    reject(window.SDK_STATE.error);
                }
            }, 300);

            // 全局超时保护
            setTimeout(() => {
                clearInterval(checkInterval);
                if (!window.SDK_STATE.loaded) {
                    handleSDKLoadFailed('加载超时');
                    reject(new Error('SDK加载超时'));
                }
            }, 60000); // 全局超时60秒，极端慢网络也能覆盖
        });
    </script>

    <!-- 样式文件加载 -->
    <link rel="stylesheet" href="/css/lobby.css">
    <link rel="stylesheet" href="/css/battle.css">
    <style>
        /* 仅保留无冲突的全局基础样式 */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f0f23;
        }
        img {
            pointer-events: none;
            draggable: false;
            max-width: 100%;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #f5d76e;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: #2a2a4e;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: #3a3a5e;
        }
        .btn-primary {
            background: #f5d76e;
            color: #1a1a2e;
            font-weight: bold;
            padding: 12px 24px;
            font-size: 16px;
        }
        .btn-primary:hover {
            background: #f9e79f;
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .debug-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 120px;
            overflow-y: auto;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            font-size: 10px;
            padding: 6px;
            z-index: 99999;
            font-family: monospace;
        }
        #match-status, #cancel-match-btn {
            display: none;
        }
        /* 隐藏JS同步用的元素，不影响布局 */
        #round-num, #my-health {
            position: absolute;
            top: -9999px;
            left: -9999px;
            opacity: 0;
            pointer-events: none;
            width: 0;
            height: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div id="app">
    <!-- ===== 大厅视图 ===== -->
    <div id="lobby-view">
        <!-- 顶部固定区 -->
        <div class="top-section">
            <div class="header-bar">
                <div class="user-profile">
                    <img id="lobby-avatar" class="avatar" src="" alt="avatar" onerror="this.src='/assets/default-avatar.png'">
                    <div class="user-info">
                        <div id="lobby-username">未设置ID</div>
                        <div id="lobby-wallet" class="user-wallet">未绑定钱包</div>
                        <div id="lobby-card-count" class="user-card">改名卡：0张</div>
                    </div>
                </div>
                <button class="btn" id="logout-btn">登出</button>
            </div>

            <div class="action-buttons">
                <button class="btn" id="set-username-btn">设置游戏ID</button>
                <button class="btn" id="bind-wallet-btn">绑定钱包</button>
                <button class="btn" id="change-avatar-btn">修改头像</button>
            </div>

            <div class="match-row">
                <div id="match-status"></div>
                <button class="btn" id="cancel-match-btn">取消匹配</button>

        </div>

        <div class="spacer">
            <button class="btn-primary" id="start-match-btn" disabled>请先设置游戏ID</button>
        </div>

        <div id="debug-panel" class="debug-panel"></div>
    </div>

    <!-- ===== 对战视图 ===== -->
    <div id="battle-view" style="display:none;">
        <!-- JS同步用隐藏元素 -->
        <span id="round-num">1</span>
        <span id="my-health">100</span>

        <!-- 顶部回合&血量信息 -->
        <div class="top-center-info prepare-only">
            <span>🔄 回合 <span id="round-num-top">1</span></span>

        <!-- 顶部操作按钮 -->
        <div class="top-right-actions">

        </div>

        <!-- 左侧玩家状态列表 -->
        <div class="players-status-bar">
            <div id="player-status-list" class="player-status-list"></div>
        </div>

        <!-- 商店区域：准备阶段专属 -->
        <div class="shop-area prepare-only">
            <div class="shop-info">
                <span>🏪 Lv.<span id="shop-level">1</span></span>
                <span>💰 <span id="my-gold">5</span></span>
            </div>
            <div id="shop-container" class="shop-cards"></div>
            <div class="shop-bottom-bar">
                <div class="shop-actions">
                    <button class="btn" id="refresh-shop-btn">🔄 刷新</button>
                    <button class="btn btn-primary" id="buy-exp-btn">📈 升级</button>
                </div>
                <div class="prepare-timer-btn">
                    <div class="prepare-num" id="phase-timer">25</div>

        </div>

        <!-- 棋盘区域 -->
        <div class="board-area">
            <!-- 敌方棋盘：战斗阶段专属 -->
            <div class="enemy-board-section battle-only">
                <div class="board-label">敌方</div>
                <div id="enemy-board" class="board"></div>
            </div>
            <!-- 分割线 -->
            <div class="battle-divider">
                <span class="prepare-only">VS</span>
                <span class="battle-only">⚔️ 楚河汉界 ⚔️</span>
            </div>
            <!-- 战斗阶段计时器 -->
            <div class="battle-timer battle-only" id="phase-timer-battle">00:00</div>

            <div class="my-board-section">
                <div class="board-label prepare-only">我方准备区</div>
                <div class="board-label battle-only">我方</div>

        <!-- 手牌区域：准备阶段专属 -->

</div>

<!-- 头像上传模态框 -->
<div id="avatar-modal" class="modal">
    <div class="modal-content">

<!-- ========== 脚本加载【严格依赖顺序，确保SDK加载完成后执行】 ========== -->
<script>
    // 等待SDK加载完成后，再加载所有业务脚本
    window.SDK_STATE.initPromise.then(() => {
        console.log('✅ SDK加载完成，开始加载业务脚本');
        const scriptList = [
            '/js/config.js',
            '/js/utils.js',
            '/js/combat.js',
            '/js/auth.js',
            '/js/profile-ui.js',
            '/js/matchmaking.js',
            '/js/battle.js',
            '/js/shop.js'
        ];

        let loadedCount = 0;
        scriptList.forEach((src) => {
            const script = document.createElement('script');
            script.src = src;
            script.onload = () => {
                loadedCount++;
                console.log(`✅ 业务脚本加载完成：${src} (${loadedCount}/${scriptList.length})`);
                if (loadedCount === scriptList.length) {
                    console.log('✅ 所有业务脚本加载完成，启动主应用');
                    window.initApp?.();
                }
            };
            script.onerror = () => {
                console.error(`❌ 业务脚本加载失败：${src}`);
                alert(`业务脚本加载失败：${src}\n请检查文件路径后刷新页面`);
            };
            document.body.appendChild(script);
        });
    }).catch((err) => {
        console.error('❌ SDK初始化失败', err);
    });
</script>

<script>
    // ==================== 回合&血量实时同步 ====================
    document.addEventListener('DOMContentLoaded', async () => {
        // 等待SDK加载完成
        await window.SDK_STATE.initPromise;
        console.log('✅ DOM加载完成，SDK就绪');

        // 回合数同步
        const roundNumTop = document.getElementById('round-num-top');
        const originalRoundNum = document.getElementById('round-num');
        if (originalRoundNum && roundNumTop) {
            const roundObserver = new MutationObserver(() => {
                roundNumTop.textContent = originalRoundNum.textContent || '1';
            });
            roundObserver.observe(originalRoundNum, { childList: true, characterData: true, subtree: true });
        }

        // 血量同步
        const myHealthTop = document.getElementById('my-health-top');
        const originalMyHealth = document.getElementById('my-health');
        if (originalMyHealth && myHealthTop) {
            const healthObserver = new MutationObserver(() => {
                myHealthTop.textContent = originalMyHealth.textContent || '100';
            });
            healthObserver.observe(originalMyHealth, { childList: true, characterData: true, subtree: true });
        }

        // 战斗阶段退出按钮同步绑定
        const leaveBattleBtn = document.getElementById('leave-battle-btn');
        const leaveBattleBtnBattle = document.getElementById('leave-battle-btn-battle');
        if (leaveBattleBtn && leaveBattleBtnBattle) {
            leaveBattleBtnBattle.onclick = () => leaveBattleBtn.click();
        }
    });

    // ==================== 对局重连检测 ====================
    async function checkReconnect() {
        const auth = window.YYCardAuth;
        const uid = auth?.currentUser?.id;
        if (!uid) return;

        console.log('🔍 检测进行中的对局...');
        // 查询玩家所在房间
        const { data: myRoomPlayer, error: roomPlayerError } = await supabase
            .from('room_players')
            .select('room_id, is_bot')
            .eq('player_id', uid)
            .maybeSingle();
        
        if (roomPlayerError || !myRoomPlayer) {
            console.log('✅ 无进行中的对局');
            return;
        }

        const roomId = myRoomPlayer.room_id;
        // 查询房间状态
        const { data: room, error: roomError } = await supabase
            .from('rooms')
            .select('status')
            .eq('id', roomId)
            .single();
        
        if (roomError || !room) return;

        // 战斗中对局重连
        if (room.status === 'battle') {
            const shouldReconnect = confirm('检测到您有一场进行中的对局，是否重新连接？\n\n点击「确定」重连，点击「取消」放弃对局');
            if (shouldReconnect) {
                auth.log('🔄 玩家确认重连对局');
                document.getElementById('lobby-view').style.display = 'none';
                document.getElementById('battle-view').style.display = 'block';
                window.YYCardMatchmaking?.setCurrentRoom?.(roomId);
                window.YYCardBattle?.enterBattle?.(roomId);
            } else {
                auth.log('🚫 玩家放弃重连，清理房间记录');
                await window.YYCardMatchmaking?.leaveAndClean?.();
            }
        }
        // 等待中匹配恢复
        else if (room.status === 'waiting') {
            auth.log('🔄 恢复等待中的匹配');
            window.YYCardMatchmaking?.setCurrentRoom?.(roomId);
            const startMatchBtn = document.getElementById('start-match-btn');
            if (startMatchBtn) {
                startMatchBtn.disabled = true;
                startMatchBtn.textContent = '⏳ 匹配中...';
            }
            document.getElementById('match-status').style.display = 'block';
            document.getElementById('cancel-match-btn').style.display = 'inline-block';
        }
    }

    // ==================== 主应用初始化 ====================
    window.initApp = async function() {
        console.log('🚀 开始初始化主应用');
        // 等待SDK就绪
        await window.SDK_STATE.initPromise;

        // 校验核心模块加载
        const requiredModules = [
            'YYCardConfig', 'YYCardUtils', 'YYCardCombat', 
            'YYCardAuth', 'YYCardProfileUI', 'YYCardMatchmaking', 
            'YYCardBattle', 'YYCardShop'
        ];
        const missingModules = requiredModules.filter(module => typeof window[module] === 'undefined');
        if (missingModules.length > 0) {
            console.error('❌ 核心模块加载失败:', missingModules);
            alert(`游戏模块加载失败：${missingModules.join(', ')}\n请检查文件路径后刷新页面`);
            return;
        }

        // 加载卡牌模板
        try {
            await window.YYCardUtils.loadCardTemplates();
            console.log('✅ 卡牌模板加载完成');
        } catch (e) {
            console.error('❌ 卡牌模板加载失败', e);
            alert('卡牌资源加载失败，请刷新页面重试');
            return;
        }

        // 初始化认证模块
        const auth = window.YYCardAuth;
        const authSuccess = await auth.init();
        if (!authSuccess) {
            alert('登录状态失效，请重新登录');
            window.location.href = window.YYCardConfig?.LOGIN_PAGE_URL || '/login.html';
            return;
        }

        // 初始化UI和事件绑定
        const profileUI = window.YYCardProfileUI;
        const matchmaking = window.YYCardMatchmaking;
        profileUI.update();
        profileUI.bindEvents();

        // 匹配按钮事件
        const startMatchBtn = document.getElementById('start-match-btn');
        const cancelMatchBtn = document.getElementById('cancel-match-btn');
        const logoutBtn = document.getElementById('logout-btn');

        if (startMatchBtn) {
            startMatchBtn.onclick = () => {
                if (matchmaking?.start) matchmaking.start();
                else auth.log('❌ 匹配模块未加载', true);
            };
        }
        if (cancelMatchBtn) {
            cancelMatchBtn.onclick = () => {
                if (matchmaking?.cancel) matchmaking.cancel();
            };
        }
        if (logoutBtn) {
            logoutBtn.onclick = async () => {
                auth.log('🔚 玩家登出');
                await matchmaking?.leaveAndClean?.();
                await auth.signOut();
                window.location.href = window.YYCardConfig?.LOGIN_PAGE_URL || '/login.html';
            };
        }

        // 页面关闭清理逻辑
        window.addEventListener('beforeunload', (e) => {
            const uid = auth.currentUser?.id;
            if (!uid) return;

            const isInBattle = document.getElementById('battle-view').style.display === 'block';
            const isMatching = cancelMatchBtn && cancelMatchBtn.style.display === 'inline-block';

            // 非战斗/非匹配状态，清理房间记录
            if (!isInBattle && !isMatching) {
                fetch(`${window.YYCardConfig.SUPABASE_URL}/rest/v1/room_players?player_id=eq.${uid}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': window.YYCardConfig.SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${auth.currentSession?.access_token}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    keepalive: true
                }).catch(err => console.warn('页面关闭清理失败:', err));
            }
        });

        // 执行重连检测
        await checkReconnect();
        auth.log('✅ 大厅初始化完成');
    };
</script>
</body>
</html>
