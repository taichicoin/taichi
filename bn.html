<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter Task - Taichi Coin</title>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Chakra Petch',sans-serif}
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap');
        
        body{
            background:#0a0a1a;
            background-image:radial-gradient(circle at 50% 50%, rgba(60,20,120,0.3), rgba(10,5,30,1));
            min-height:100vh;
            padding:60px 20px 20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            position:relative;
            overflow:hidden;
        }
        
        /* 赛博故障扫描线 */
        body::before{
            content:'';position:fixed;top:0;left:0;width:100%;height:100%;
            background:linear-gradient(transparent 50%, rgba(0,220,255,0.02) 50%);
            background-size:100% 4px;
            animation:scan 8s linear infinite;
            z-index:0;
        }
        @keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(100vh)}}
        
        /* 故障动画 */
        @keyframes glitch{
            0%{transform:translate(0)}
            20%{transform:translate(-2px,2px)}
            40%{transform:translate(-2px,-2px)}
            60%{transform:translate(2px,2px)}
            80%{transform:translate(2px,-2px)}
            100%{transform:translate(0)}
        }
        
        .top-bar{
            position:fixed;top:20px;left:20px;right:20px;
            display:flex;justify-content:space-between;gap:12px;z-index:10;
        }
        .btn-small{
            height:44px;padding:0 20px;border-radius:8px;border:1px solid #00d4ff;
            font-size:16px;font-weight:600;cursor:pointer;
            background:rgba(0,10,30,0.7);
            color:#00d4ff;
            text-transform:uppercase;
            letter-spacing:1px;
            transition:all 0.3s ease;
            box-shadow:0 0 10px rgba(0,212,255,0.3);
        }
        .btn-small:hover{
            background:rgba(0,212,255,0.1);
            box-shadow:0 0 20px rgba(0,212,255,0.6);
            animation:glitch 0.3s linear;
        }
        .btn-success{
            border-color:#ff00ff;
            color:#ff00ff;
            box-shadow:0 0 10px rgba(255,0,255,0.3);
        }
        .address-top{
            height:44px;padding:0 16px;background:rgba(0,10,30,0.7);
            border:1px solid #00d4ff;border-radius:8px;
            font-size:14px;display:none;align-items:center;gap:8px;
            color:#00d4ff;
            box-shadow:0 0 10px rgba(0,212,255,0.3);
        }
        .container{
            width:100%;max-width:480px;
            background:rgba(0,10,30,0.5);
            border:1px solid rgba(0,212,255,0.3);
            border-radius:16px;
            padding:40px 24px;
            position:relative;z-index:2;
            box-shadow:0 0 40px rgba(0,212,255,0.1), inset 0 0 30px rgba(0,212,255,0.05);
            backdrop-filter:blur(10px);
            overflow:hidden;
        }
        .container::before{
            content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
            background:linear-gradient(90deg, transparent, rgba(0,212,255,0.1), transparent);
            animation:slide 5s linear infinite;
        }
        @keyframes slide{0%{left:-100%}100%{left:100%}}
        
        h1{
            font-size:32px;text-align:center;margin-bottom:20px;
            color:#00d4ff;text-transform:uppercase;
            letter-spacing:2px;
            text-shadow:0 0 10px rgba(0,212,255,0.8), 0 0 20px rgba(255,0,255,0.4);
            animation:glitch 3s infinite alternate;
        }
        .reward-info {
            color: #c0fdff;
            text-align: center;
            font-size: 16px;
            line-height: 1.9;
            margin-bottom: 28px;
            text-shadow:0 0 8px rgba(0,212,255,0.4);
        }
        .h-captcha{
            display:flex;justify-content:center;margin:24px auto;display:none;
        }
        @media (max-width:480px){.h-captcha{transform:scale(0.9);transform-origin:center;}}
        
        .btn-twitter{
            background:linear-gradient(90deg, #00d4ff, #00aaff);
            color:#000;width:100%;height:56px;border:none;border-radius:8px;
            font-size:18px;font-weight:700;cursor:pointer;
            text-transform:uppercase;letter-spacing:1px;
            transition:all 0.3s ease;
            margin-bottom:16px;display:none;
            box-shadow:0 0 15px rgba(0,212,255,0.4);
        }
        .btn-twitter:hover{
            transform:translateY(-3px);
            box-shadow:0 0 25px rgba(0,212,255,0.7);
            animation:glitch 0.3s linear;
        }
        .btn-verify{
            width:100%;height:56px;border:none;border-radius:8px;
            font-size:19px;font-weight:700;cursor:pointer;
            background:linear-gradient(90deg, #ff00ff, #00d4ff);
            color:#fff;
            text-transform:uppercase;letter-spacing:1px;
            transition:all 0.3s ease;display:none;
            box-shadow:0 0 15px rgba(255,0,255,0.4);
        }
        .btn-verify:hover{
            transform:translateY(-3px);
            box-shadow:0 0 25px rgba(255,0,255,0.7);
            animation:glitch 0.3s linear;
        }
        .btn-verify:disabled{opacity:0.5;cursor:not-allowed;}
        .tips{
            font-size:13px;color:#c0fdff;text-align:center;margin-top:24px;
            line-height:1.6;position:relative;z-index:2;
        }

        .tally-overlay{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,5,20,0.7);
            z-index:9999;display:none;
            align-items:center;justify-content:center;
        }
        .tally-modal{
            width:100vw;height:100vh;
            background:rgba(0,10,30,0.8);
            border:none;position:relative;overflow:hidden;
        }
        .tally-iframe{width:100%;height:100%;border:none;}
        .close-btn{
            position:fixed;top:20px;right:20px;
            width:44px;height:44px;border-radius:50%;
            background:#000;border:2px solid #ff00ff;
            color:#ff00ff;font-size:22px;font-weight:bold;
            cursor:pointer;z-index:10000;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="address-top" id="addressTop">
        Connected: <span id="walletDisplay"></span>
    </div>
    <button class="btn-small btn-primary" id="connectBtn">Connect Wallet</button>
</div>

<div class="container">
    <h1>Twitter Task Verification</h1>
    
    <div class="reward-info">
        Prize pool:<br>
        • 2 500 000 $CHI AIRDROP<br>
        • 5000 WHITELIST<br>
        • Each address eligible 500 $CHI
    </div>

    <button class="btn-twitter" id="twitterBtn">Like / RT / Tag 3 friends</button>

    <div class="h-captcha" 
         data-sitekey="cf246c60-cb9c-44a6-9cf6-1fe6e60e01b8" 
         data-callback="onCaptchaSuccess"
         data-expired-callback="onCaptchaExpired">
    </div>

    <button class="btn-verify" id="verifyBtn">Verify and submit to tally</button>
</div>

<p class="tips">
    Desktop: Install MetaMask/OKX Wallet Extension<br>
    Mobile: Open in Wallet App DApp Browser
</p>

<div class="tally-overlay" id="tallyOverlay">
    <div class="tally-modal">
        <button class="close-btn" id="closeBtn">×</button>
        <iframe class="tally-iframe" id="tallyFrame"></iframe>
    </div>
</div>

<script>
// 功能逻辑和上一版完全一致，无修改
const TALLY_URL = "https://tally.so/r/rjEXEN";
const TWITTER_URL = "https://x.com/i/status/203534530476636160";

let currentAccount = null;
let isCaptchaPassed = false;
let twitterTaskDone = false;

const $connect = document.getElementById('connectBtn');
const $addrBox = document.getElementById('addressTop');
const $display = document.getElementById('walletDisplay');
const $twitterBtn = document.getElementById('twitterBtn');
const $captcha = document.querySelector('.h-captcha');
const $verifyBtn = document.getElementById('verifyBtn');
const $tallyOverlay = document.getElementById('tallyOverlay');
const $tallyFrame = document.getElementById('tallyFrame');
const $closeBtn = document.getElementById('closeBtn');

function shortAddress(addr) {
    return addr ? `${addr.slice(0,6)}...${addr.slice(-4)}` : '';
}

function getProvider() {
    return window.ethereum || window.okxwallet || window.tpwallet || window.trustwallet;
}

function refreshUI() {
    $twitterBtn.style.display = currentAccount ? "block" : "none";
    $captcha.style.display = (currentAccount && twitterTaskDone) ? "flex" : "none";
    $verifyBtn.style.display = (currentAccount && twitterTaskDone && isCaptchaPassed) ? "block" : "none";
}

window.onCaptchaSuccess = function() {
    isCaptchaPassed = true;
    refreshUI();
}

window.onCaptchaExpired = function() {
    isCaptchaPassed = false;
    refreshUI();
}

function openTallyModal() {
    if (!currentAccount || !isCaptchaPassed) return;
    const formUrl = `${TALLY_URL}?wallet=${encodeURIComponent(currentAccount)}`;
    $tallyFrame.src = formUrl;
    $tallyOverlay.style.display = 'flex';
}

function closeTallyModal() {
    $tallyOverlay.style.display = 'none';
    $tallyFrame.src = '';
}

$twitterBtn.onclick = () => {
    if (!currentAccount) return;
    window.open(TWITTER_URL, '_blank');
    setTimeout(() => {
        twitterTaskDone = true;
        refreshUI();
    }, 800);
};

$connect.onclick = async () => {
    const p = getProvider();
    if (!p) {
        alert("Please open in wallet DApp browser or install wallet extension");
        return;
    }
    if (currentAccount) {
        currentAccount = null;
        twitterTaskDone = false;
        isCaptchaPassed = false;
        $addrBox.style.display = "none";
        $connect.textContent = "Connect Wallet";
        refreshUI();
        return;
    }
    try {
        const accounts = await p.request({ method: "eth_requestAccounts" });
        currentAccount = accounts[0];
        $display.textContent = shortAddress(currentAccount);
        $addrBox.style.display = "flex";
        $connect.textContent = "Connected";
        refreshUI();
    } catch (err) {
        alert("Connection failed: " + (err.message || "Please retry"));
    }
};

$verifyBtn.onclick = openTallyModal;
$closeBtn.onclick = closeTallyModal;
$tallyOverlay.onclick = (e) => {
    if (e.target === $tallyOverlay) closeTallyModal();
};

refreshUI();
</script>
</body>
</html>
