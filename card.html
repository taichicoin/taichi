<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>太极悠悠牌</title>

  <script>
    (function fixChromeDesktopMode(){
      document.documentElement.style.zoom = "1";
      document.documentElement.style.width = "100vw";
      document.documentElement.style.maxWidth = "100vw";
      window.visualViewport && (window.visualViewport.scale = 1);
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cf: {
              dark: '#0f111a', 
              darker: '#090b10', 
              blue: '#165DFF',
              gold: '#FFD700', 
              red: '#FF4D4F', 
              green: '#52C41A', 
              gray: '#1f2335'
            }
          }
        }
      }
    }
  </script>

  <style type="text/tailwindcss">
    @layer utilities {
      .card-glow { box-shadow: 0 0 15px rgba(22, 93, 255, 0.5); }
      .player-glow { box-shadow: 0 0 10px rgba(82, 196, 26, 0.7); }
      .hp-bar { background: linear-gradient(90deg, #FF4D4F 0%, #FF7875 100%); }
      .modal-backdrop { backdrop-filter: blur(4px); }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .btn-disabled { @apply bg-gray-600 cursor-not-allowed hover:bg-gray-600; }
    }
    html,body{max-width:100vw; overflow-x:hidden;}
    .body-lock { overflow: hidden !important; position: fixed; width: 100% !important; height: 100vh !important; }
  </style>
</head>
<body class="bg-cf-dark text-white min-h-screen overflow-x-hidden">
  <div id="app-container" class="min-h-screen flex flex-col">
    <!-- 大厅页面 -->
    <div id="lobby-page" class="min-h-screen flex flex-col">
      <header class="h-16 bg-cf-darker flex items-center justify-between px-4 sm:px-6 border-b border-gray-700">
        <h1 class="text-xl sm:text-2xl font-bold text-cf-gold">太极悠悠牌</h1>
        <div class="relative">
          <button id="user-menu-btn" class="flex items-center space-x-2 sm:space-x-3 hover:bg-cf-gray px-2 sm:px-3 py-2 rounded-lg transition-colors">
            <img id="user-avatar" src="" alt="头像" class="w-8 h-8 rounded-full bg-gray-700 object-cover">
            <span id="user-name" class="font-medium max-w-[80px] sm:max-w-none truncate"></span>
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>
          <div id="user-menu" class="hidden absolute right-0 top-12 w-48 bg-cf-gray rounded-lg shadow-lg py-2 z-50">
            <div id="googleEmailLine" class="px-4 py-2 text-gray-300 text-sm border-b border-gray-700 truncate">
              加载中...
            </div>
            <button onclick="TaijiGame.openAvatarModal()" class="w-full text-left px-4 py-2 hover:bg-cf-dark transition-colors">修改头像</button>
            <button id="menuRenameBtn" onclick="TaijiGame.openRenameModal()" class="w-full text-left px-4 py-2 hover:bg-cf-dark transition-colors">修改用户名</button>
            <button id="menuBindWalletBtn" onclick="TaijiGame.bindWallet()" class="w-full text-left px-4 py-2 hover:bg-cf-dark transition-colors">绑定钱包</button>
            <button id="menuUnbindWalletBtn" onclick="TaijiGame.unbindWallet()" class="w-full text-left px-4 py-2 hover:bg-cf-dark transition-colors hidden">解绑钱包</button>
            <hr class="my-2 border-gray-700">
            <button onclick="TaijiGame.signOut()" class="w-full text-left px-4 py-2 text-cf-red hover:bg-cf-dark transition-colors">退出登录</button>
          </div>
        </div>
      </header>

      <main class="flex-1 flex flex-col items-center justify-center p-4">
        <h2 class="text-2xl sm:text-3xl font-bold mb-8 text-center">欢迎来到太极悠悠牌</h2>
        <button 
          id="match-btn" 
          onclick="TaijiGame.startMatchmaking()" 
          class="px-10 sm:px-12 py-4 bg-cf-blue text-xl font-bold rounded-lg hover:bg-blue-600 transition-all card-glow active:scale-95"
        >
          快速匹配
        </button>
        <p id="match-status" class="mt-4 text-gray-400 hidden">正在匹配中... (0/8)</p>
        <button id="cancel-match-btn" onclick="TaijiGame.cancelMatchmaking()" class="mt-2 text-gray-400 hover:text-white transition-colors hidden">取消匹配</button>
      </main>
    </div>

    <!-- 游戏页面 -->
    <div id="game-page" class="hidden min-h-screen flex flex-col">
      <header class="h-12 bg-cf-darker flex items-center justify-between px-4 border-b border-gray-700">
        <div class="flex items-center space-x-4">
          <span id="phaseTitle" class="font-medium">第 1 回合</span>
          <span id="timerNum" class="text-cf-gold text-xl font-bold">30</span>
        </div>
        <span id="room-id" class="text-gray-400 text-sm">房间号：加载中</span>
      </header>
      <div class="flex-1 flex flex-col sm:flex-row overflow-hidden">
        <!-- 玩家列表 -->
        <aside class="w-full sm:w-48 bg-cf-darker p-2 sm:space-y-2 border-b sm:border-b-0 sm:border-r border-gray-700 max-h-[120px] sm:max-h-none overflow-x-auto sm:overflow-y-auto scrollbar-hide">
          <div id="playersList" class="flex sm:flex-col space-x-2 sm:space-x-0 sm:space-y-2"></div>
        </aside>
        <!-- 战斗棋盘 -->
        <main class="flex-1 flex flex-col min-h-0">
          <div id="battle-board" class="flex-1 grid grid-cols-4 grid-rows-3 gap-2 p-4 bg-cf-gray overflow-auto"></div>
          <footer class="h-auto sm:h-40 bg-cf-darker border-t border-gray-700 p-2">
            <div id="shop" class="flex space-x-2 mb-2 overflow-x-auto scrollbar-hide pb-2"></div>
            <div id="hand" class="flex space-x-2 h-20 overflow-x-auto scrollbar-hide pb-2"></div>
          </footer>
        </main>
        <!-- 玩家信息面板 -->
        <aside class="w-full sm:w-48 bg-cf-darker p-4 border-t sm:border-t-0 sm:border-l border-gray-700 flex sm:flex-col justify-between">
          <div class="flex sm:block space-x-4 sm:space-x-0">
            <div class="mb-4">
              <p class="text-gray-400 text-sm">金币</p>
              <p id="goldText" class="text-2xl font-bold text-cf-gold">10</p>
            </div>
            <div class="mb-4">
              <p class="text-gray-400 text-sm">等级 <span id="levelText">1</span></p>
              <div class="w-full bg-gray-700 rounded-full h-2">
                <div id="expBar" class="hp-bar h-2 rounded-full w-0"></div>
              </div>
              <p id="expText" class="text-xs text-gray-400 mt-1">0/2</p>
            </div>
            <div class="mb-4 sm:mb-0">
              <p class="text-gray-400 text-sm">人口</p>
              <p id="popText" class="text-xl font-bold">1/1</p>
            </div>
          </div>
          <div class="flex sm:flex-col space-x-2 sm:space-x-0 sm:space-y-2 mt-2 sm:mt-0">
            <button onclick="TaijiGame.payToRefreshShop()" class="flex-1 sm:w-full py-2 bg-cf-blue rounded hover:bg-blue-600 transition-colors text-sm">刷新 (2金)</button>
            <button onclick="TaijiGame.buyExp()" class="flex-1 sm:w-full py-2 bg-cf-green rounded hover:bg-green-600 transition-colors text-sm">买经验 (4金)</button>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <!-- 首次设置用户名弹窗 -->
  <div id="username-set-modal" class="hidden fixed inset-0 bg-black/80 modal-backdrop flex items-center justify-center z-[9999] p-4">
    <div class="bg-cf-gray p-6 rounded-lg w-full max-w-sm">
      <h3 class="text-xl font-bold mb-2 text-center">设置唯一用户名</h3>
      <p class="text-gray-400 text-sm mb-4 text-center">1-7位小写字母/数字，全局唯一，设置后进入游戏</p>
      <div class="mb-4">
        <input 
          type="text" 
          id="username-input" 
          placeholder="请输入1-7位小写字母/数字" 
          maxlength="7"
          oninput="TaijiGame.formatUsernameInput(this)"
          class="w-full bg-cf-dark border border-gray-600 rounded px-3 py-2 focus:outline-none focus:border-cf-blue"
        >
        <p id="username-tip" class="text-xs text-gray-400 mt-1">仅支持小写英文字母a-z、数字0-9</p>
      </div>
      <div class="flex justify-center">
        <button 
          id="submit-username-btn" 
          onclick="TaijiGame.submitFirstUsername()" 
          class="w-full py-2 bg-cf-blue rounded hover:bg-blue-600 font-medium transition-colors"
        >
          确认设置并进入
        </button>
      </div>
    </div>
  </div>

  <!-- 修改用户名弹窗 -->
  <div id="username-rename-modal" class="hidden fixed inset-0 bg-black/70 modal-backdrop flex items-center justify-center z-50 p-4">
    <div class="bg-cf-gray p-6 rounded-lg w-full max-w-sm">
      <h3 class="text-xl font-bold mb-4">修改用户名</h3>
      <div class="mb-4 bg-cf-dark/50 p-3 rounded">
        <p class="text-sm text-gray-300 mb-1">当前用户名：<span id="current-username" class="text-white font-medium"></span></p>
        <p class="text-sm text-gray-300 mb-1">剩余改名卡：<span id="rename-card-count" class="text-cf-gold font-medium">0</span></p>
        <p id="last-rename-tip" class="text-sm text-gray-400">上次改名：从未修改</p>
        <p id="rename-limit-tip" class="text-sm text-cf-red mt-2 hidden">无可用改名卡，且未满1年冷却，无法修改</p>
      </div>
      <div class="mb-4">
        <input 
          type="text" 
          id="rename-input" 
          placeholder="新用户名" 
          maxlength="7"
          oninput="TaijiGame.formatUsernameInput(this)"
          class="w-full bg-cf-dark border border-gray-600 rounded px-3 py-2 focus:outline-none focus:border-cf-blue"
        >
        <p id="rename-tip" class="text-xs text-gray-400 mt-1">仅支持小写英文字母a-z、数字0-9</p>
      </div>
      <div class="flex justify-end space-x-2">
        <button onclick="TaijiGame.closeRenameModal()" class="px-4 py-2 bg-gray-600 rounded hover:bg-gray-500 transition-colors">取消</button>
        <button 
          id="submit-rename-btn" 
          onclick="TaijiGame.submitRename()" 
          class="px-4 py-2 bg-cf-blue rounded hover:bg-blue-600 transition-colors"
        >
          确认修改
        </button>
      </div>
    </div>
  </div>

  <!-- 修改头像弹窗 -->
  <div id="avatar-modal" class="hidden fixed inset-0 bg-black/70 modal-backdrop flex items-center justify-center z-50 p-4">
    <div class="bg-cf-gray p-6 rounded-lg w-full max-w-sm">
      <h3 class="text-xl font-bold mb-4">修改头像</h3>
      <input 
        type="file" 
        id="avatar-input" 
        accept="image/jpeg,image/png,image/webp" 
        class="mb-4 w-full text-sm text-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-cf-blue file:text-white hover:file:bg-blue-600"
      >
      <p id="avatar-tip" class="text-xs text-gray-400 mb-4">仅支持JPG/PNG/WebP格式，最大2MB</p>
      <div class="flex justify-end space-x-2">
        <button onclick="TaijiGame.closeAvatarModal()" class="px-4 py-2 bg-gray-600 rounded hover:bg-gray-500 transition-colors">取消</button>
        <button 
          onclick="TaijiGame.uploadAvatar()" 
          class="px-4 py-2 bg-cf-blue rounded hover:bg-blue-600 transition-colors"
        >
          确定
        </button>
      </div>
    </div>
  </div>

  <!-- 全局提示弹窗 -->
  <div id="toast" class="fixed top-4 right-4 bg-cf-gray px-4 py-2 rounded shadow-lg z-[10000] hidden transform transition-all">
    <span id="toast-text"></span>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';
    // 全局配置
    const CONFIG = {
      SUPA_URL: "https://sznjaotjoljaiawbvfro.supabase.co",
      SUPA_KEY: "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN",
      USERNAME_RULE: /^[a-z0-9]{1,7}$/,
      MAX_AVATAR_SIZE: 2 * 1024 * 1024, // 2MB
      MATCH_MAX_PLAYERS: 8,
      AVATAR_API: "https://api.dicebear.com/7.x/avataaars/svg?seed="
    };
    // 单例Supabase客户端
    const supabase = createClient(CONFIG.SUPA_URL, CONFIG.SUPA_KEY);
    window.supabase = supabase;

    // 游戏核心逻辑命名空间
    window.TaijiGame = {
      // 全局状态
      currentUser: null,
      currentUserProfile: null,
      matchSubscription: null,
      currentRoom: null,
      gameTimer: null,
      // 工具函数：全局提示
      toast(msg, type = "info") {
        const toastEl = document.getElementById('toast');
        const textEl = document.getElementById('toast-text');
        textEl.innerText = msg;
        toastEl.classList.remove('hidden', 'bg-cf-red', 'bg-cf-green', 'bg-cf-blue');
        toastEl.classList.add(type === "error" ? 'bg-cf-red' : type === "success" ? 'bg-cf-green' : 'bg-cf-blue');
        toastEl.classList.remove('translate-x-full');
        toastEl.classList.add('translate-x-0');
        setTimeout(() => {
          toastEl.classList.add('hidden');
        }, 3000);
      },
      // 用户名输入实时格式化：自动转小写，过滤非法字符
      formatUsernameInput(inputEl) {
        inputEl.value = inputEl.value.toLowerCase().replace(/[^a-z0-9]/g, '');
      },
      // 页面切换
      showPage(pageName) {
        ["lobby", "game"].forEach(page => {
          document.getElementById(`${page}-page`).classList.add('hidden');
        });
        document.getElementById(`${pageName}-page`).classList.remove('hidden');
      },
      // 登录态校验
      async checkLogin() {
        const { data: { session }, error } = await supabase.auth.getSession();
        if (error || !session) {
          window.location.replace("/signup");
          return false;
        }
        this.currentUser = session.user;
        // 读取用户资料
        const { data: profile, error: profileError } = await supabase
          .from("profiles")
          .select("*")
          .eq("id", this.currentUser.id)
          .single();
        
        if (profileError || !profile) {
          this.toast("读取用户资料失败，请刷新页面重试", "error");
          console.error("用户资料读取失败", profileError);
          return false;
        }
        this.currentUserProfile = profile;
        return true;
      },
      // 加载用户UI
      async loadUserUI() {
        const profile = this.currentUserProfile;
        // 顶部用户信息
        document.getElementById("user-name").textContent = profile.username;
        // 修复头像地址，确保正确加载SVG
        const avatarUrl = profile.avatar_url ?? `${CONFIG.AVATAR_API}${encodeURIComponent(this.currentUser.id)}`;
        document.getElementById("user-avatar").src = avatarUrl;
        // 邮箱显示
        const emailEl = document.getElementById("googleEmailLine");
        const email = this.currentUser.email || "";
        emailEl.innerText = email.length > 22 ? `${email.slice(0, 19)}…` : email;
        // 钱包绑定状态
        const bindBtn = document.getElementById("menuBindWalletBtn");
        const unbindBtn = document.getElementById("menuUnbindWalletBtn");
        if (profile.wallet_address) {
          const shortAddr = `${profile.wallet_address.slice(0, 6)}…${profile.wallet_address.slice(-4)}`;
          bindBtn.innerText = `已绑定：${shortAddr}`;
          bindBtn.disabled = true;
          bindBtn.classList.add('btn-disabled');
          unbindBtn.classList.remove("hidden");
        } else {
          bindBtn.innerText = "绑定钱包";
          bindBtn.disabled = false;
          bindBtn.classList.remove('btn-disabled');
          unbindBtn.classList.add("hidden");
        }
      },
      // 首次设置用户名弹窗控制
      showUsernameSetModal() {
        document.getElementById("app-container").classList.add("hidden");
        document.getElementById("username-set-modal").classList.remove("hidden");
        document.body.classList.add("body-lock");
      },
      hideUsernameSetModal() {
        document.getElementById("app-container").classList.remove("hidden");
        document.getElementById("username-set-modal").classList.add("hidden");
        document.body.classList.remove("body-lock");
      },
      // 提交首次用户名
      async submitFirstUsername() {
        const inputEl = document.getElementById("username-input");
        const tipEl = document.getElementById("username-tip");
        const btnEl = document.getElementById("submit-username-btn");
        const username = inputEl.value.trim().toLowerCase();

        // 格式校验
        if (!CONFIG.USERNAME_RULE.test(username)) {
          tipEl.className = "text-xs text-red-400 mt-1";
          tipEl.innerText = "格式错误！仅支持1-7位小写字母、数字";
          return;
        }

        // 禁用按钮，防止重复提交
        btnEl.disabled = true;
        btnEl.classList.add('btn-disabled');
        tipEl.className = "text-xs text-gray-400 mt-1";
        tipEl.innerText = "正在检测用户名是否可用...";

        try {
          // 检测用户名是否被占用
          const { data: existUser } = await supabase
            .from("profiles")
            .select("id")
            .eq("username", username)
            .single();
          
          if (existUser) {
            tipEl.className = "text-xs text-red-400 mt-1";
            tipEl.innerText = "该用户名已被占用，请换一个";
            btnEl.disabled = false;
            btnEl.classList.remove('btn-disabled');
            return;
          }

          // 写入数据库
          tipEl.innerText = "正在保存用户名...";
          const { error: updateError } = await supabase
            .from("profiles")
            .update({ username: username })
            .eq("id", this.currentUser.id);
          
          if (updateError) throw updateError;

          // 重新读取最新资料
          const { data: newProfile } = await supabase
            .from("profiles")
            .select("*")
            .eq("id", this.currentUser.id)
            .single();
          this.currentUserProfile = newProfile;

          // 成功进入
          tipEl.className = "text-xs text-green-400 mt-1";
          tipEl.innerText = "设置成功，正在进入...";
          this.toast("用户名设置成功！", "success");
          setTimeout(() => {
            this.hideUsernameSetModal();
            this.loadUserUI();
          }, 800);

        } catch (err) {
          tipEl.className = "text-xs text-red-400 mt-1";
          tipEl.innerText = `保存失败：${err.message}`;
          btnEl.disabled = false;
          btnEl.classList.remove('btn-disabled');
        }
      },
      // 修改用户名弹窗
      async openRenameModal() {
        // 重新读取最新资料
        const { data: newProfile } = await supabase
          .from("profiles")
          .select("*")
          .eq("id", this.currentUser.id)
          .single();
        this.currentUserProfile = newProfile;
        const profile = this.currentUserProfile;

        // 填充弹窗信息
        document.getElementById("current-username").innerText = profile.username;
        document.getElementById("rename-card-count").innerText = profile.rename_card_count || 0;
        document.getElementById("rename-input").value = "";
        document.getElementById("rename-tip").className = "text-xs text-gray-400 mt-1";
        document.getElementById("rename-tip").innerText = "仅支持小写英文字母a-z、数字0-9";

        // 计算冷却时间
        const lastRenameTipEl = document.getElementById("last-rename-tip");
        const limitTipEl = document.getElementById("rename-limit-tip");
        const submitBtnEl = document.getElementById("submit-rename-btn");
        let canRename = false;

        if (profile.last_rename_date) {
          const lastDate = new Date(profile.last_rename_date);
          const nextFreeDate = new Date(lastDate);
          nextFreeDate.setFullYear(nextFreeDate.getFullYear() + 1);
          const now = new Date();
          const isCoolDownOver = now >= nextFreeDate;

          lastRenameTipEl.innerText = `上次改名：${lastDate.toLocaleDateString()} | 下次免费改名：${nextFreeDate.toLocaleDateString()}`;
          // 改名规则：有改名卡 或 冷却结束
          canRename = (profile.rename_card_count > 0) || isCoolDownOver;
        } else {
          lastRenameTipEl.innerText = "从未改名";
          canRename = true;
        }

        // 禁用/启用按钮
        if (!canRename) {
          limitTipEl.classList.remove("hidden");
          submitBtnEl.disabled = true;
          submitBtnEl.classList.add('btn-disabled');
        } else {
          limitTipEl.classList.add("hidden");
          submitBtnEl.disabled = false;
          submitBtnEl.classList.remove('btn-disabled');
        }

        document.getElementById("username-rename-modal").classList.remove("hidden");
        document.body.classList.add("body-lock");
      },
      closeRenameModal() {
        document.getElementById("username-rename-modal").classList.add("hidden");
        document.body.classList.remove("body-lock");
      },
      // 提交改名
      async submitRename() {
        const inputEl = document.getElementById("rename-input");
        const tipEl = document.getElementById("rename-tip");
        const btnEl = document.getElementById("submit-rename-btn");
        const profile = this.currentUserProfile;
        const newName = inputEl.value.trim().toLowerCase();

        // 格式校验
        if (!CONFIG.USERNAME_RULE.test(newName)) {
          tipEl.className = "text-xs text-red-400 mt-1";
          tipEl.innerText = "格式错误！仅支持1-7位小写字母、数字";
          return;
        }
        if (newName === profile.username) {
          tipEl.className = "text-xs text-red-400 mt-1";
          tipEl.innerText = "新用户名不能和当前用户名一致";
          return;
        }

        // 二次校验改名权限
        const haveCard = (profile.rename_card_count || 0) > 0;
        let canYearFree = false;
        if (!profile.last_rename_date) {
          canYearFree = true;
        } else {
          const lastDate = new Date(profile.last_rename_date);
          const nextFreeDate = new Date(lastDate);
          nextFreeDate.setFullYear(nextFreeDate.getFullYear() + 1);
          canYearFree = new Date() >= nextFreeDate;
        }
        if (!haveCard && !canYearFree) {
          tipEl.className = "text-xs text-red-400 mt-1";
          tipEl.innerText = "无可用改名卡，且未满1年冷却，无法修改";
          return;
        }

        // 禁用按钮
        btnEl.disabled = true;
        btnEl.classList.add('btn-disabled');
        tipEl.className = "text-xs text-gray-400 mt-1";
        tipEl.innerText = "正在检测用户名是否可用...";

        try {
          // 检测占用
          const { data: existUser } = await supabase
            .from("profiles")
            .select("id")
            .eq("username", newName)
            .single();
          
          if (existUser) {
            tipEl.className = "text-xs text-red-400 mt-1";
            tipEl.innerText = "该用户名已被占用，请换一个";
            btnEl.disabled = false;
            btnEl.classList.remove('btn-disabled');
            return;
          }

          // 写入数据库
          tipEl.innerText = "正在修改用户名...";
          const updateData = {
            username: newName,
            last_rename_date: new Date().toISOString()
          };
          // 有改名卡且未到免费时间，扣卡
          if (haveCard && !canYearFree) {
            updateData.rename_card_count = (profile.rename_card_count || 0) - 1;
          }

          const { error: updateError } = await supabase
            .from("profiles")
            .update(updateData)
            .eq("id", this.currentUser.id);
          
          if (updateError) throw updateError;

          // 更新本地资料和UI
          const { data: newProfile } = await supabase
            .from("profiles")
            .select("*")
            .eq("id", this.currentUser.id)
            .single();
          this.currentUserProfile = newProfile;
          await this.loadUserUI();

          // 成功提示
          tipEl.className = "text-xs text-green-400 mt-1";
          tipEl.innerText = "修改成功！";
          this.toast("用户名修改成功！", "success");
          setTimeout(() => {
            this.closeRenameModal();
          }, 1000);

        } catch (err) {
          tipEl.className = "text-xs text-red-400 mt-1";
          tipEl.innerText = `修改失败：${err.message}`;
          btnEl.disabled = false;
          btnEl.classList.remove('btn-disabled');
        }
      },
      // 头像弹窗控制
      openAvatarModal() {
        document.getElementById("avatar-input").value = "";
        document.getElementById("avatar-tip").className = "text-xs text-gray-400 mb-4";
        document.getElementById("avatar-tip").innerText = "仅支持JPG/PNG/WebP格式，最大2MB";
        document.getElementById("avatar-modal").classList.remove("hidden");
        document.body.classList.add("body-lock");
      },
      closeAvatarModal() {
        document.getElementById("avatar-modal").classList.add("hidden");
        document.body.classList.remove("body-lock");
      },
      // 上传头像
      async uploadAvatar() {
        const fileInput = document.getElementById("avatar-input");
        const tipEl = document.getElementById("avatar-tip");
        const file = fileInput.files[0];

        if (!file) {
          tipEl.className = "text-xs text-red-400 mb-4";
          tipEl.innerText = "请选择要上传的图片";
          return;
        }
        // 格式校验
        const allowTypes = ["image/jpeg", "image/png", "image/webp"];
        if (!allowTypes.includes(file.type)) {
          tipEl.className = "text-xs text-red-400 mb-4";
          tipEl.innerText = "仅支持JPG/PNG/WebP格式的图片";
          return;
        }
        // 大小校验
        if (file.size > CONFIG.MAX_AVATAR_SIZE) {
          tipEl.className = "text-xs text-red-400 mb-4";
          tipEl.innerText = "图片大小不能超过2MB";
          return;
        }

        try {
          tipEl.className = "text-xs text-gray-400 mb-4";
          tipEl.innerText = "正在上传头像...";
          // 生成文件名
          const fileName = `${this.currentUser.id}-${Date.now()}-${file.name.replace(/\s/g, '')}`;
          // 上传到存储
          const { error: uploadError } = await supabase.storage
            .from("avatars")
            .upload(fileName, file, { cacheControl: "31536000", upsert: true });
          
          if (uploadError) throw uploadError;

          // 获取公网地址
          const { data: { publicUrl } } = supabase.storage
            .from("avatars")
            .getPublicUrl(fileName);
          
          // 更新用户资料
          const { error: updateError } = await supabase
            .from("profiles")
            .update({ avatar_url: publicUrl })
            .eq("id", this.currentUser.id);
          
          if (updateError) throw updateError;

          // 更新UI
          document.getElementById("user-avatar").src = publicUrl;
          this.toast("头像修改成功！", "success");
          this.closeAvatarModal();

        } catch (err) {
          tipEl.className = "text-xs text-red-400 mb-4";
          tipEl.innerText = `上传失败：${err.message}`;
        }
      },
      // 钱包绑定/解绑
      bindWallet() {
        this.toast("钱包绑定功能开发中，敬请期待", "info");
      },
      async unbindWallet() {
        if (!confirm("确定要解绑钱包吗？解绑后将无法使用钱包相关功能")) return;
        try {
          const { error } = await supabase
            .from("profiles")
            .update({ wallet_address: null })
            .eq("id", this.currentUser.id);
          if (error) throw error;
          this.toast("钱包解绑成功", "success");
          await this.checkLogin();
          await this.loadUserUI();
        } catch (err) {
          this.toast(`解绑失败：${err.message}`, "error");
        }
      },
      // 退出登录
      async signOut() {
        await supabase.auth.signOut();
        // 清理订阅
        if (this.matchSubscription) {
          await supabase.removeChannel(this.matchSubscription);
          this.matchSubscription = null;
        }
        window.location.href = "/signup";
      },
      // 匹配功能
      async startMatchmaking() {
        if (!this.currentUser || !this.currentUserProfile?.username) {
          this.toast("请先设置用户名", "error");
          return;
        }
        const avatarUrl = document.getElementById("user-avatar").src;

        try {
          // 加入匹配队列
          await supabase.from("matching").upsert({
            user_id: this.currentUser.id,
            username: this.currentUserProfile.username,
            avatar_url: avatarUrl,
            created_at: new Date().toISOString()
          }, { onConflict: "user_id" });

          // 更新UI
          document.getElementById("match-btn").classList.add("hidden");
          document.getElementById("match-status").classList.remove("hidden");
          document.getElementById("cancel-match-btn").classList.remove("hidden");

          // 订阅匹配队列变化
          this.matchSubscription = supabase.channel("matchmaking")
            .on("postgres_changes", { event: "*", schema: "public", table: "matching" }, async () => {
              // 获取当前匹配人数
              const { count, error } = await supabase
                .from("matching")
                .select("*", { count: "exact", head: true });
              
              if (!error) {
                document.getElementById("match-status").innerText = `正在匹配中... (${count}/${CONFIG.MATCH_MAX_PLAYERS})`;
                // 人数达标，自动进入房间
                if (count >= CONFIG.MATCH_MAX_PLAYERS) {
                  await this.enterGameRoom();
                }
              }
            })
            .subscribe();

        } catch (err) {
          this.toast(`加入匹配失败：${err.message}`, "error");
        }
      },
      async cancelMatchmaking() {
        try {
          // 移除匹配记录
          await supabase.from("matching").delete().eq("user_id", this.currentUser.id);
          // 取消订阅
          if (this.matchSubscription) {
            await supabase.removeChannel(this.matchSubscription);
            this.matchSubscription = null;
          }
          // 恢复UI
          document.getElementById("match-btn").classList.remove("hidden");
          document.getElementById("match-status").classList.add("hidden");
          document.getElementById("cancel-match-btn").classList.add("hidden");
          this.toast("已取消匹配", "info");
        } catch (err) {
          this.toast(`取消匹配失败：${err.message}`, "error");
        }
      },
      // 进入游戏房间
      async enterGameRoom() {
        // 清理匹配订阅
        if (this.matchSubscription) {
          await supabase.removeChannel(this.matchSubscription);
          this.matchSubscription = null;
        }
        // 切换到游戏页面
        this.showPage("game");
        this.toast("匹配成功，进入游戏！", "success");
        // 这里补充房间创建、游戏初始化逻辑
        this.initGameRoom();
      },
      // 游戏房间初始化（基础框架）
      initGameRoom() {
        // 初始化计时器
        this.startGameTimer(30);
        // 渲染玩家列表（示例）
        this.renderPlayerList();
      },
      // 游戏计时器
      startGameTimer(seconds) {
        let timeLeft = seconds;
        const timerEl = document.getElementById("timerNum");
        timerEl.innerText = timeLeft;
        // 清理旧计时器
        if (this.gameTimer) clearInterval(this.gameTimer);
        // 启动新计时器
        this.gameTimer = setInterval(() => {
          timeLeft--;
          timerEl.innerText = timeLeft;
          if (timeLeft <= 0) {
            clearInterval(this.gameTimer);
            this.toast("回合结束！", "info");
            // 回合结束逻辑
          }
        }, 1000);
      },
      // 渲染玩家列表（示例）
      renderPlayerList() {
        const listEl = document.getElementById("playersList");
        // 示例数据，实际从房间数据获取
        const mockPlayers = [
          { username: this.currentUserProfile.username, avatar: document.getElementById("user-avatar").src, isSelf: true },
          { username: "player01", avatar: `${CONFIG.AVATAR_API}player01`, isSelf: false },
          { username: "player02", avatar: `${CONFIG.AVATAR_API}player02`, isSelf: false },
        ];
        listEl.innerHTML = mockPlayers.map(player => `
          <div class="flex items-center space-x-2 p-2 rounded ${player.isSelf ? 'bg-cf-blue/20 player-glow' : 'hover:bg-cf-dark/50'}">
            <img src="${player.avatar}" alt="${player.username}" class="w-8 h-8 rounded-full bg-gray-700 object-cover">
            <span class="truncate ${player.isSelf ? 'font-bold' : ''}">${player.username}</span>
          </div>
        `).join('');
      },
      // 游戏功能占位
      payToRefreshShop() {
        this.toast("商店刷新功能开发中", "info");
      },
      buyExp() {
        this.toast("购买经验功能开发中", "info");
      },
      // 页面初始化
      async init() {
        // 校验登录
        const isLoginValid = await this.checkLogin();
        if (!isLoginValid) return;

        // 校验用户名是否有效
        const hasValidUsername = this.currentUserProfile.username 
          && this.currentUserProfile.username.trim() !== "" 
          && CONFIG.USERNAME_RULE.test(this.currentUserProfile.username);
        
        if (!hasValidUsername) {
          this.showUsernameSetModal();
          return;
        }

        // 有效用户名，加载大厅UI
        await this.loadUserUI();
        this.showPage("lobby");
      },
      // 页面清理
      async destroy() {
        if (this.matchSubscription) {
          await supabase.removeChannel(this.matchSubscription);
        }
        if (this.gameTimer) {
          clearInterval(this.gameTimer);
        }
      }
    };

    // 页面加载完成初始化
    window.addEventListener('DOMContentLoaded', () => TaijiGame.init());
    // 页面关闭/刷新时清理
    window.addEventListener('beforeunload', () => TaijiGame.destroy());
    // 页面后退/前进时重新校验
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) TaijiGame.init();
    });

    // 用户菜单点击事件
    document.getElementById('user-menu-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      document.getElementById('user-menu').classList.toggle('hidden');
    });
    // 点击页面其他区域关闭菜单
    document.addEventListener('click', (e) => {
      if (!e.target.closest("#user-menu-btn") && !e.target.closest("#user-menu")) {
        document.getElementById('user-menu').classList.add("hidden");
      }
    });
  </script>
</body>
</html>
