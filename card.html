<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太极悠悠牌</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cf: {
              dark: '#0f111a',
              darker: '#090b10',
              blue: '#165DFF',
              gold: '#FFD700',
              red: '#FF4D4F',
              green: '#52C41A',
              gray: '#1f2335'
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .card-glow { box-shadow: 0 0 15px rgba(22, 93, 255, 0.5); }
      .player-glow { box-shadow: 0 0 10px rgba(82, 196, 26, 0.7); }
      .hp-bar { background: linear-gradient(90deg, #FF4D4F 0%, #FF7875 100%); }
    }
  </style>
</head>
<body class="bg-cf-dark text-white min-h-screen overflow-hidden">

  <!-- ================== 1. 登录页面 ================== -->
  <div id="login-page" class="flex flex-col items-center justify-center min-h-screen">
    <h1 class="text-5xl font-bold mb-12 text-cf-gold">太极悠悠牌</h1>
    <div class="space-y-4 w-80">
      <button onclick="signInWithGoogle()" class="w-full py-3 bg-white text-black rounded-lg font-medium hover:bg-gray-100 transition">
        使用 Google 登录
      </button>
      <button onclick="signInWithWallet()" class="w-full py-3 bg-cf-blue rounded-lg font-medium hover:bg-blue-600 transition">
        使用 钱包 登录
      </button>
    </div>
    <p class="mt-8 text-gray-400 text-sm">登录即表示同意用户协议和隐私政策</p>
  </div>

  <!-- ================== 2. 大厅页面 ================== -->
  <div id="lobby-page" class="hidden min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="h-16 bg-cf-darker flex items-center justify-between px-6 border-b border-gray-700">
      <h1 class="text-2xl font-bold text-cf-gold">太极悠悠牌</h1>
      
      <!-- 右上角用户信息 -->
      <div class="relative">
        <button id="user-menu-btn" class="flex items-center space-x-3 hover:bg-cf-gray px-3 py-2 rounded-lg transition">
          <img id="user-avatar" src="" alt="头像" class="w-8 h-8 rounded-full object-cover">
          <span id="user-name" class="font-medium"></span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
        
        <!-- 用户下拉菜单 -->
        <div id="user-menu" class="hidden absolute right-0 top-12 w-48 bg-cf-gray rounded-lg shadow-lg py-2 z-50">
          <button onclick="openAvatarModal()" class="w-full text-left px-4 py-2 hover:bg-cf-dark transition">修改头像</button>
          <button onclick="bindWallet()" class="w-full text-left px-4 py-2 hover:bg-cf-dark transition">绑定钱包</button>
          <button onclick="bindGoogle()" class="w-full text-left px-4 py-2 hover:bg-cf-dark transition">绑定谷歌账号</button>
          <hr class="my-2 border-gray-700">
          <button onclick="signOut()" class="w-full text-left px-4 py-2 text-cf-red hover:bg-cf-dark transition">退出登录</button>
        </div>
      </div>
    </header>

    <!-- 大厅主体 -->
    <main class="flex-1 flex flex-col items-center justify-center">
      <h2 class="text-3xl font-bold mb-8">欢迎来到太极悠悠牌</h2>
      <button id="match-btn" onclick="startMatchmaking()" class="px-12 py-4 bg-cf-blue text-xl font-bold rounded-lg hover:bg-blue-600 transition card-glow">
        快速匹配
      </button>
      <p id="match-status" class="mt-4 text-gray-400 hidden">正在匹配中... (0/8)</p>
      <button id="cancel-match-btn" onclick="cancelMatchmaking()" class="mt-2 text-gray-400 hover:text-white hidden">取消匹配</button>
    </main>
  </div>

  <!-- ================== 3. 对战页面（1:1复刻CF悠悠牌） ================== -->
  <div id="game-page" class="hidden min-h-screen flex flex-col">
    <!-- 顶部栏 -->
    <header class="h-12 bg-cf-darker flex items-center justify-between px-4 border-b border-gray-700">
      <div class="flex items-center space-x-4">
        <span id="phase-text" class="font-medium">第 1 回合</span>
        <span id="timer" class="text-cf-gold text-xl font-bold">30</span>
      </div>
      <span id="room-id" class="text-gray-400">房间号：加载中</span>
    </header>

    <div class="flex flex-1 overflow-hidden">
      <!-- 左侧玩家列表（8人） -->
      <aside class="w-48 bg-cf-darker p-2 space-y-2 border-r border-gray-700">
        <div id="players-list" class="space-y-2">
          <!-- 8个玩家项会通过JS动态生成 -->
        </div>
      </aside>

      <!-- 中间棋盘区域（3×4） -->
      <main class="flex-1 flex flex-col">
        <!-- 战斗棋盘 -->
        <div id="battle-board" class="flex-1 grid grid-cols-4 grid-rows-3 gap-2 p-4 bg-cf-gray">
          <!-- 12个站位会通过JS动态生成 -->
        </div>

        <!-- 底部手牌+商店 -->
        <footer class="h-40 bg-cf-darker border-t border-gray-700 p-2">
          <!-- 商店 -->
          <div id="shop" class="flex space-x-2 mb-2">
            <!-- 5个商店卡牌会通过JS动态生成 -->
          </div>
          
          <!-- 手牌 -->
          <div id="hand" class="flex space-x-2 h-20 overflow-x-auto">
            <!-- 手牌会通过JS动态生成 -->
          </div>
        </footer>
      </main>

      <!-- 右侧信息栏 -->
      <aside class="w-48 bg-cf-darker p-4 border-l border-gray-700 flex flex-col justify-between">
        <div>
          <div class="mb-4">
            <p class="text-gray-400 text-sm">金币</p>
            <p id="gold" class="text-2xl font-bold text-cf-gold">10</p>
          </div>
          <div class="mb-4">
            <p class="text-gray-400 text-sm">等级 <span id="level">1</span></p>
            <div class="w-full bg-gray-700 rounded-full h-2 mt-1">
              <div id="exp-bar" class="hp-bar h-2 rounded-full" style="width: 0%"></div>
            </div>
            <p id="exp-text" class="text-xs text-gray-400 mt-1">0/2</p>
          </div>
          <div class="mb-4">
            <p class="text-gray-400 text-sm">人口</p>
            <p id="population" class="text-xl font-bold">1/1</p>
          </div>
        </div>

        <div class="space-y-2">
          <button onclick="payToRefreshShop()" class="w-full py-2 bg-cf-blue rounded hover:bg-blue-600 transition">
            刷新 (2金)
          </button>
          <button onclick="buyExp()" class="w-full py-2 bg-cf-green rounded hover:bg-green-600 transition">
            买经验 (4金)
          </button>
        </div>
      </aside>
    </div>
  </div>

  <!-- 修改头像弹窗 -->
  <div id="avatar-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-cf-gray p-6 rounded-lg w-96">
      <h3 class="text-xl font-bold mb-4">修改头像</h3>
      <input type="file" id="avatar-input" accept="image/*" class="mb-4">
      <div class="flex justify-end space-x-2">
        <button onclick="closeAvatarModal()" class="px-4 py-2 bg-gray-600 rounded hover:bg-gray-500 transition">取消</button>
        <button onclick="uploadAvatar()" class="px-4 py-2 bg-cf-blue rounded hover:bg-blue-600 transition">确定</button>
      </div>
    </div>
  </div>

  <!-- 引入之前的Supabase脚本 -->
  <script type="module" src="js/supabase/client.js"></script>
  <script type="module" src="js/supabase/auth.js"></script>
  <script type="module" src="js/supabase/multiplayer.js"></script>
  <script src="js/main.js"></script>

  <script>
    // 全局变量
    let currentUser = null
    let matchSubscription = null

    // ================== 页面切换逻辑 ==================
    async function init() {
      // 检查登录状态
      currentUser = await getCurrentUser()
      if (currentUser) {
        showPage('lobby')
        loadUserInfo()
      } else {
        showPage('login')
      }

      // 用户菜单切换
      document.getElementById('user-menu-btn').addEventListener('click', () => {
        document.getElementById('user-menu').classList.toggle('hidden')
      })

      // 点击其他地方关闭菜单
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#user-menu-btn') && !e.target.closest('#user-menu')) {
          document.getElementById('user-menu').classList.add('hidden')
        }
      })
    }

    function showPage(page) {
      document.getElementById('login-page').classList.add('hidden')
      document.getElementById('lobby-page').classList.add('hidden')
      document.getElementById('game-page').classList.add('hidden')
      document.getElementById(`${page}-page`).classList.remove('hidden')
    }

    // ================== 用户信息与绑定 ==================
    async function loadUserInfo() {
      const { data: profile } = await supabase
        .from('profiles')
        .select('username, avatar_url, wallet_address')
        .eq('id', currentUser.id)
        .single()

      document.getElementById('user-name').textContent = profile.username || '玩家' + currentUser.id.slice(0, 6)
      document.getElementById('user-avatar').src = profile.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + currentUser.id
    }

    async function bindWallet() {
      await signInWithWallet()
    }

    async function bindGoogle() {
      await supabase.auth.linkIdentity({ provider: 'google' })
      alert('谷歌账号绑定成功')
    }

    // ================== 头像上传 ==================
    function openAvatarModal() {
      document.getElementById('avatar-modal').classList.remove('hidden')
    }

    function closeAvatarModal() {
      document.getElementById('avatar-modal').classList.add('hidden')
    }

    async function uploadAvatar() {
      const file = document.getElementById('avatar-input').files[0]
      if (!file) return

      const filePath = `${currentUser.id}/${Date.now()}.${file.name.split('.').pop()}`
      
      // 上传头像
      const { error } = await supabase.storage
        .from('avatars')
        .upload(filePath, file)

      if (error) {
        alert('上传失败：' + error.message)
        return
      }

      // 获取头像URL
      const { data: { publicUrl } } = supabase.storage
        .from('avatars')
        .getPublicUrl(filePath)

      // 更新用户资料
      await supabase
        .from('profiles')
        .update({ avatar_url: publicUrl })
        .eq('id', currentUser.id)

      // 更新UI
      document.getElementById('user-avatar').src = publicUrl
      closeAvatarModal()
      alert('头像修改成功')
    }

    // ================== 快速匹配系统 ==================
    async function startMatchmaking() {
      // 加入匹配队列
      await supabase
        .from('matchmaking')
        .insert({
          user_id: currentUser.id,
          username: document.getElementById('user-name').textContent,
          avatar_url: document.getElementById('user-avatar').src
        })

      // 更新UI
      document.getElementById('match-btn').classList.add('hidden')
      document.getElementById('match-status').classList.remove('hidden')
      document.getElementById('cancel-match-btn').classList.remove('hidden')

      // 订阅匹配队列
      matchSubscription = supabase
        .channel('matchmaking')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'matchmaking' }, async () => {
          // 检查队列人数
          const { count } = await supabase
            .from('matchmaking')
            .select('*', { count: 'exact', head: true })

          document.getElementById('match-status').textContent = `正在匹配中... (${count}/8)`

          // 满8人自动开始游戏
          if (count >= 8) {
            // 第一个加入的玩家作为房主创建房间
            const { data: queue } = await supabase
              .from('matchmaking')
              .select('user_id')
              .order('created_at', { ascending: true })
              .limit(8)

            if (queue[0].user_id === currentUser.id) {
              // 房主创建房间
              const room = await createRoom()
              
              // 把所有玩家加入房间
              for (const player of queue) {
                await supabase
                  .from('room_players')
                  .insert({
                    room_id: room.id,
                    user_id: player.user_id,
                    username: player.username,
                    avatar_url: player.avatar_url,
                    hp: 100,
                    gold: 10,
                    level: 1,
                    exp: 0
                  })
              }

              // 清空匹配队列
              await supabase.from('matchmaking').delete().neq('user_id', '00000000-0000-0000-0000-000000000000')
              
              // 开始游戏
              await startGame()
            }

            // 取消订阅
            supabase.removeChannel(matchSubscription)
            
            // 进入游戏页面
            showPage('game')
            document.getElementById('room-id').textContent = '房间号：' + currentRoom.id
          }
        })
        .subscribe()
    }

    async function cancelMatchmaking() {
      // 离开队列
      await supabase
        .from('matchmaking')
        .delete()
        .eq('user_id', currentUser.id)

      // 取消订阅
      if (matchSubscription) {
        supabase.removeChannel(matchSubscription)
      }

      // 更新UI
      document.getElementById('match-btn').classList.remove('hidden')
      document.getElementById('match-status').classList.add('hidden')
      document.getElementById('cancel-match-btn').classList.add('hidden')
    }

    // ================== 对战UI更新函数（和之前的multiplayer.js对接） ==================
    window.updatePlayersUI = async function() {
      const { data: players } = await supabase
        .from('room_players')
        .select('*')
        .eq('room_id', currentRoom.id)
        .order('hp', { ascending: false })

      const playersList = document.getElementById('players-list')
      playersList.innerHTML = ''

      players.forEach(player => {
        const isMe = player.user_id === currentUser.id
        const playerEl = document.createElement('div')
        playerEl.className = `p-2 rounded ${isMe ? 'bg-cf-gray player-glow' : 'bg-cf-dark'} ${player.eliminated ? 'opacity-50' : ''}`
        playerEl.innerHTML = `
          <div class="flex items-center space-x-2 mb-1">
            <img src="${player.avatar_url}" alt="" class="w-6 h-6 rounded-full">
            <span class="text-sm truncate">${player.username}</span>
          </div>
          <div class="w-full bg-gray-700 rounded-full h-2">
            <div class="hp-bar h-2 rounded-full" style="width: ${player.hp}%"></div>
          </div>
          <p class="text-xs text-right mt-1">${player.hp}/100</p>
        `
        playersList.appendChild(playerEl)
      })

      // 更新自己的信息
      const me = players.find(p => p.user_id === currentUser.id)
      if (me) {
        document.getElementById('gold').textContent = me.gold
        document.getElementById('level').textContent = me.level
        document.getElementById('population').textContent = `${me.level}/${me.level}`
        const expNeeded = [0, 2, 6, 10, 16, 22, 30, 40, 50][me.level]
        document.getElementById('exp-bar').style.width = `${(me.exp / expNeeded) * 100}%`
        document.getElementById('exp-text').textContent = `${me.exp}/${expNeeded}`
      }
    }

    window.updateTimerUI = function(seconds) {
      document.getElementById('timer').textContent = seconds
    }

    window.showPrepareUI = function(phase, time) {
      document.getElementById('phase-text').textContent = `第 ${phase} 回合 - 准备阶段`
      // 显示商店和手牌
      document.getElementById('shop').classList.remove('opacity-50')
      document.getElementById('hand').classList.remove('opacity-50')
    }

    window.showFightingUI = function(time) {
      document.getElementById('phase-text').textContent = `第 ${currentRoom.current_phase} 回合 - 战斗阶段`
      // 隐藏商店和手牌交互
      document.getElementById('shop').classList.add('opacity-50')
      document.getElementById('hand').classList.add('opacity-50')
    }

    window.showGameResultUI = function(winnerId) {
      const isWin = winnerId === currentUser.id
      alert(isWin ? '恭喜你获得第一名！' : '游戏结束')
      showPage('lobby')
    }

    // 初始化
    init()
  </script>
</body>
</html>
