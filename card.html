<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>All Faction Card Game</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <!-- 新增：双方总血量显示 -->
  <div class="hp-bar" style="text-align:center; margin:8px 0; font-size:14px; font-weight:bold;">
    我方总血量：<span id="player-hp" style="color:#2ee060">30</span>
     ｜ 
    敌方总血量：<span id="enemy-hp" style="color:#ff4444">30</span>
  </div>

  <div class="shop-section">
    <div class="shop-header">
      <div class="shop-title">Card Shop</div>
      <div class="gold-display">Gold: <span id="current-gold">2</span></div>
    </div>
    <div class="shop-cards" id="shop-cards"></div>
  </div>

  <div class="control-bar">
    <div class="turn-display">Turn: <span id="current-turn">1</span></div>
    <button id="next-turn-btn">Next</button>
    <button id="refresh-btn">(1G)</button>
    <!-- 新增：开始对战按钮 -->
    <button id="battle-btn" style="background:#f368e0;">开始对战</button>
  </div>

  <div class="grid-section">
    <div class="grid-title">Your Deck (Max 6)</div>
    <div class="card-grid" id="card-grid">
      <div class="grid-slot"></div><div class="grid-slot"></div><div class="grid-slot"></div>
      <div class="grid-slot"></div><div class="grid-slot"></div><div class="grid-slot"></div>
    </div>
  </div>

  <!-- 新增：战斗日志 -->
  <div class="battle-log" style="margin:10px auto; max-width:350px; height:100px; background:rgba(0,0,0,0.3); border-radius:8px; padding:6px; font-size:11px; color:#fff; overflow-y:auto;">
    <div id="log-text">等待对战开始...</div>
  </div>
</div>

<div id="drag-preview"></div>
<footer>© 2026 Taichicoin · Built by AI</footer>

<script src="js/faction-shanhaijing.js"></script>
<script src="js/faction-xiyou.js"></script>
<script src="js/faction-sanguo.js"></script>
<script src="js/faction-fengshen.js"></script>
<script src="js/main.js"></script>
</body>
</html>
