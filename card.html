  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {

          colors: {
            cf: {
              dark: '#0f111a', darker: '#090b10', blue: '#165DFF',

  <style type="text/tailwindcss">
    @layer utilities {
      .card-glow { box-shadow: 0 0 15px rgba(22, 93, 255, 0.5); }
      .player-glow { box-shadow: 0 0 10px rgba(82, 196, 26, 0.7); }

</head>
<body class="bg-cf-dark text-white min-h-screen overflow-hidden">

  <div id="app-container" class="min-h-screen flex flex-col">
    <div id="lobby-page" class="min-h-screen flex flex-col">
      <header class="h-16 bg-cf-darker flex items-center justify-between px-6 border-b border-gray-700">
        <h1 class="text-2xl font-bold text-cf-gold">太极悠悠牌</h1>
        <div class="relative">
          <button id="user-menu-btn" class="flex items-center space-x-3 hover:bg-cf-gray px-3 py-2 rounded-lg">
            <img id="user-avatar" src="" alt="头像" class="w-8 h-8 rounded-full">
            <span id="user-name" class="font-medium">加载中</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>
          <div id="user-menu" class="hidden absolute right-0 top-12 w-48 bg-cf-gray rounded-lg shadow-lg py-2 z-50">
            <div id="googleEmailLine" class="px-4 py-2 text-gray-300 text-sm border-b border-gray-700 truncate">
              加载中...
            </div>

            <button onclick="openAvatarModal()" class="w-full text-left px-4 py-2 hover:bg-cf-dark">修改头像</button>
            <button id="menuRenameBtn" onclick="openRenameModal()" class="w-full text-left px-4 py-2 hover:bg-cf-dark hidden">修改用户名</button>
            <button id="menuBindWalletBtn" onclick="bindWallet()" class="w-full text-left px-4 py-2 hover:bg-cf-dark">绑定钱包</button>
            <button id="menuUnbindWalletBtn" onclick="unbindWallet()" class="w-full text-left px-4 py-2 hover:bg-cf-dark hidden">解绑钱包</button>
            
            <hr class="my-2 border-gray-700">
            <button onclick="signOut()" class="w-full text-left px-4 py-2 text-cf-red hover:bg-cf-dark">退出登录</button>
          </div>
        </div>
      </header>

      <main class="flex-1 flex flex-col items-center justify-center">
        <h2 class="text-3xl font-bold mb-8">欢迎来到太极悠悠牌</h2>
        <button id="match-btn" onclick="startMatchmaking()" class="px-12 py-4 bg-cf-blue text-xl font-bold rounded-lg hover:bg-blue-600 transition card-glow">
          快速匹配
        </button>
        <p id="match-status" class="mt-4 text-gray-400 hidden">正在匹配中... (0/8)</p>
        <button id="cancel-match-btn" onclick="cancelMatchmaking()" class="mt-2 text-gray-400 hover:text-white hidden">取消匹配</button>
      </main>
    </div>

    <div id="game-page" class="hidden min-h-screen flex flex-col">
      <header class="h-12 bg-cf-darker flex items-center justify-between px-4 border-b border-gray-700">
        <div class="flex items-center space-x-4">
          <span id="phaseTitle" class="font-medium">第 1 回合</span>
          <span id="timerNum" class="text-cf-gold text-xl font-bold">30</span>
        </div>
        <span id="room-id" class="text-gray-400">房间号：加载中</span>
      </header>
      <div class="flex flex-1 overflow-hidden">
        <aside class="w-48 bg-cf-darker p-2 space-y-2 border-r border-gray-700">
          <div id="playersList" class="space-y-2"></div>
        </aside>
        <main class="flex-1 flex flex-col">
          <div id="battle-board" class="flex-1 grid grid-cols-4 grid-rows-3 gap-2 p-4 bg-cf-gray"></div>
          <footer class="h-40 bg-cf-darker border-t border-gray-700 p-2">
            <div id="shop" class="flex space-x-2 mb-2"></div>
            <div id="hand" class="flex space-x-2 h-20 overflow-x-auto"></div>
          </footer>
        </main>
        <aside class="w-48 bg-cf-darker p-4 border-l border-gray-700 flex flex-col justify-between">
          <div>
            <div class="mb-4">
              <p class="text-400 text-sm">金币</p>
              <p id="goldText" class="text-2xl font-bold text-cf-gold">10</p>
            </div>
            <div class="mb-4">
              <p class="text-gray-400 text-sm">等级 <span id="levelText">1</span></p>
              <div class="w-full bg-gray-700 rounded-full h-2">
                <div id="expBar" class="hp-bar h-2 rounded-full"></div>
              </div>
              <p id="expText" class="text-xs text-gray-400 mt-1">0/2</p>
            </div>
            <div class="mb-4">
              <p class="text-400 text-sm">人口</p>
              <p id="popText" class="text-xl font-bold">1/1</p>
            </div>
          </div>
          <div class="space-y-2">
            <button onclick="payToRefreshShop()" class="w-full py-2 bg-cf-blue rounded hover:bg-blue-600">刷新 (2金)</button>
            <button onclick="buyExp()" class="w-full py-2 bg-cf-green rounded hover:bg-green-600">买经验 (4金)</button>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div id="username-set-modal" class="hidden fixed inset-0 bg-black/80 modal-backdrop flex items-center justify-center z-[9999]">
    <div class="bg-cf-gray p-6 rounded-lg w-96 max-w-[90vw]">
      <h3 class="text-xl font-bold mb-2 text-center">设置唯一用户名</h3>
      <p class="text-gray-400 text-sm mb-4 text-center">首次设置昵称免费，后续需要改名卡或等待一年</p>
      
      <div class="mb-4">
        <input 
          type="text" 
          id="username-input" 
          placeholder="1-7位小写字母/数字" 
          maxlength="7"
          class="w-full bg-cf-dark border border-gray-600 rounded px-3 py-2 focus:outline-none focus:border-cf-blue"
        >
        <p id="username-tip" class="text-xs text-gray-400 mt-1">仅 a-z 0-9，1~7位，全局唯一</p>
      </div>

      <div class="flex justify-center">
        <button id="submit-username-btn" onclick="submitFirstUsername()" class="w-full py-2 bg-cf-blue rounded hover:bg-blue-600 font-medium">
          确认设置
        </button>
      </div>
    </div>
  </div>

  <div id="username-rename-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-cf-gray p-6 rounded-lg w-96 max-w-[90vw]">
      <h3 class="text-xl font-bold mb-4">修改用户名</h3>
      
      <div class="mb-4 bg-cf-dark/50 p-3 rounded">
        <p class="text-sm text-gray-300 mb-1">当前用户名：<span id="current-username" class="text-white font-medium"></span></p>
        <p class="text-sm text-gray-300 mb-1">剩余改名卡：<span id="rename-card-count" class="text-cf-gold font-medium">0</span></p>
        <p id="last-rename-tip" class="text-sm text-gray-400">上次改名：从未修改</p>
      </div>

      <div class="mb-4">
        <input 
          type="text" 
          id="rename-input" 
          placeholder="新用户名" 
          maxlength="7"
          class="w-full bg-cf-dark border border-gray-600 rounded px-3 py-2 focus:outline-none focus:border-cf-blue"
        >
        <p id="rename-tip" class="text-xs text-gray-400 mt-1">仅 a-z 0-9，1~7位</p>
      </div>

      <div class="flex justify-end space-x-2">
        <button onclick="closeRenameModal()" class="px-4 py-2 bg-gray-600 rounded">取消</button>
        <button id="submit-rename-btn" onclick="submitRename()" class="px-4 py-2 bg-cf-blue rounded">确认修改</button>
      </div>
    </div>
  </div>

  <div id="avatar-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-cf-gray p-6 rounded-lg w-96">
      <h3 class="text-xl font-bold mb-4">修改头像</h3>
      <input type="file" id="avatar-input" accept="image/*" class="mb-4">
      <div class="flex justify-end space-x-2">
        <button onclick="closeAvatarModal()" class="px-4 py-2 bg-gray-600 rounded">取消</button>
        <button onclick="uploadAvatar()" class="px-4 py-2 bg-cf-blue">确定</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/supabase/client.js"></script>
  <script type="module" src="js/supabase/auth.js"></script>
  <script type="module" src="js/supabase/multiplayer.js"></script>
  <script type="module" src="js/main.js"></script>

  <script>
    let currentUser = null;
    let currentUserProfile = null;
    let matchSubscription = null;
    let currentRoom = null;
    const usernameRule = /^[a-z0-9]{1,7}$/;

    async function checkLogin(){
      const {getCurrentUser, getUserProfile} = await import('./js/supabase/auth.js');
      const u = await getCurrentUser();
      if(!u){
        location.href="/signup";
        return;
      }
      currentUser = u;
      window.currentUser = currentUser;

      const profile = await getUserProfile();
      if(!profile) return;
      currentUserProfile = profile;
      window.currentUserProfile = currentUserProfile;

      // 修复：只有完全没设置 username 才弹窗，设置过永远不再弹
      if(!profile.username || profile.username.trim() === ""){
        showUsernameSetModal();
        return;
      }

      await loadUserInfo();
    }

    function showPage(page){
      ["lobby","game"].forEach(x=>{
        document.getElementById(x+"-page").classList.add("hidden");
      })
      document.getElementById(page+"-page").classList.remove("hidden");
    }

    async function loadUserInfo(){
      const profile = currentUserProfile;
      if(!profile) return;

      document.getElementById("user-name").textContent = profile.username;
      document.getElementById("user-avatar").src
        = profile.avatar_url ?? `https://api.dicebear.com/7.x/avataaars?seed=${currentUser.id}`;

      const emailEl = document.getElementById("googleEmailLine");
      let displayMail = currentUser.email;
      if(displayMail.length > 22){
        displayMail = displayMail.slice(0,19) + "…";
      }
      emailEl.innerText = displayMail;

      const bindBtn = document.getElementById("menuBindWalletBtn");
      const unbindBtn = document.getElementById("menuUnbindWalletBtn");
      const renameBtn = document.getElementById("menuRenameBtn");
      renameBtn.classList.remove("hidden");

      if(profile.wallet_address){
        const short = profile.wallet_address.slice(0,6)+"…"+profile.wallet_address.slice(-4);
        bindBtn.innerText = "已绑定："+short;
        bindBtn.disabled = true;
        unbindBtn.classList.remove("hidden");
      }else{
        bindBtn.innerText = "绑定钱包";
        bindBtn.disabled = false;
        unbindBtn.classList.add("hidden");
      }
    }

    function showUsernameSetModal(){
      document.getElementById("app-container").classList.add("hidden");
      document.getElementById("username-set-modal").classList.remove("hidden");
      document.body.classList.add("body-lock");
    }

    function hideUsernameSetModal(){
      document.getElementById("app-container").classList.remove("hidden");
      document.getElementById("username-set-modal").classList.add("hidden");
      document.body.classList.remove("body-lock");
    }

    // ========== 修复关键点：首次设置只写username，不写入改名时间、不扣卡 ==========
    async function submitFirstUsername(){
      const {supabase} = await import('./js/supabase/client.js');
      const input = document.getElementById("username-input");
      const tip = document.getElementById("username-tip");
      const btn = document.getElementById("submit-username-btn");
      const username = input.value.trim().toLowerCase();

      if(!usernameRule.test(username)){
        tip.className = "text-xs text-cf-red mt-1";
        tip.innerText = "格式错误！1-7位小写字母/数字";
        return;
      }

      btn.disabled = true;
      btn.innerText = "提交中...";
      tip.className = "text-xs text-gray-400 mt-1";

      const {data:existData} = await supabase
        .from("profiles")
        .select("id")
        .eq("username", username)
        .single();

      if(existData){
        tip.className = "text-xs text-cf-red mt-1";
        tip.innerText = "用户名已被占用";
        btn.disabled = false;
        btn.innerText = "确认设置";
        return;
      }

      // 只写入用户名！！不改 last_rename_date、不改改名卡
      const {error} = await supabase
        .from("profiles")
        .update({ username: username })
        .eq("id", currentUser.id);

      if(error){
        tip.className = "text-xs text-cf-red mt-1";
        tip.innerText = "失败："+error.message;
        btn.disabled = false;
        btn.innerText = "确认设置";
        return;
      }

      const {getUserProfile} = await import('./js/supabase/auth.js');
      currentUserProfile = await getUserProfile();
      hideUsernameSetModal();
      await loadUserInfo();
    }

    // ========== 打开弹窗立刻赋值，修复看不到用户名 ==========
    function openRenameModal(){
      const p = currentUserProfile;
      document.getElementById("current-username").textContent = p.username ?? "";
      document.getElementById("rename-card-count").textContent = p.rename_card_count ?? 0;

      const tipEl = document.getElementById("last-rename-tip");
      if(p.last_rename_date){
        const oldD = new Date(p.last_rename_date);
        const nextD = new Date(oldD);
        nextD.setFullYear(nextD.getFullYear()+1);
        tipEl.innerText = `上次改名:${oldD.toLocaleDateString()},下次免费:${nextD.toLocaleDateString()}`;
      }else{
        tipEl.innerText = "上次改名:从未改名(可使用改名卡修改)";
      }

      document.getElementById("rename-input").value="";
      document.getElementById("rename-tip").className="text-xs text-gray-400 mt-1";
      document.getElementById("rename-tip").innerText="仅 a-z 0-9，1~7位";
      document.getElementById("username-rename-modal").classList.remove("hidden");
    }

    function closeRenameModal(){
      document.getElementById("username-rename-modal").classList.add("hidden");
    }

    // ========== 严格改名逻辑：卡0、未满一年禁止改名 ==========
    async function submitRename(){
      const {supabase} = await import('./js/supabase/client.js');
      const input = document.getElementById("rename-input");
      const tip = document.getElementById("rename-tip");
      const btn = document.getElementById("submit-rename-btn");
      const newName = input.value.trim().toLowerCase();
      const p = currentUserProfile;

      if(!usernameRule.test(newName)){
        tip.className="text-xs text-cf-red mt-1";
        tip.innerText="格式错误！1-7位小写字母/数字";
        return;
      }
      if(newName === p.username){
        tip.className="text-xs text-cf-red mt-1";
        tip.innerText="不能和当前用户名一样";
        return;
      }

      const hasCard = Number(p.rename_card_count ?? 0) > 0;
      let canFree = false;

      if(p.last_rename_date){
        const last = new Date(p.last_rename_date);
        const now = new Date();
        let diffOK = false;
        if(now.getFullYear() > last.getFullYear()+1) diffOK=true;
        if(now.getFullYear() === last.getFullYear()+1){
          if(now.getMonth() > last.getMonth()) diffOK=true;
          if(now.getMonth()===last.getMonth() && now.getDate()>=last.getDate()) diffOK=true;
        }
        canFree = diffOK;
      }

      // 核心限制：没卡、也没满一年 → 禁止改名
      if(!hasCard && !canFree){
        tip.className="text-xs text-cf-red mt-1";
        tip.innerText="❌ 改名卡为0，且未满一年，禁止改名";
        return;
      }

      btn.disabled=true;
      btn.innerText="提交中...";
      tip.className="text-xs text-gray-400 mt-1";

      const {data:exist} = await supabase.from("profiles").select("id").eq("username",newName).single();
      if(exist){
        tip.className="text-xs text-cf-red mt-1";
        tip.innerText="用户名已占用";
        btn.disabled=false;
        btn.innerText="确认修改";
        return;
      }

      const updatePayload = {
        username:newName,
        last_rename_date: new Date().toISOString()
      };

      // 消耗改名卡，免费一年改名不扣卡
      if(hasCard && !canFree){
        updatePayload.rename_card_count = p.rename_card_count - 1;
      }

      const {error} = await supabase.from("profiles").update(updatePayload).eq("id",currentUser.id);
      if(error){
        tip.className="text-xs text-cf-red mt-1";
        tip.innerText="改名失败:"+error.message;
        btn.disabled=false;
        btn.innerText="确认修改";
        return;
      }

      const {getUserProfile} = await import('./js/supabase/auth.js');
      currentUserProfile = await getUserProfile();
      await loadUserInfo();
      tip.className="text-xs text-cf-green mt-1";
      tip.innerText="改名成功";
      setTimeout(()=>closeRenameModal(),1000);
    }

    window.bindWallet = async ()=>{
      const {bindWalletFlow} = await import('./js/supabase/auth.js');
      await bindWalletFlow();
    };

    window.unbindWallet = async function(){
      const {supabase} = await import('./js/supabase/client.js');
      if(!currentUser) return;
      const ok = confirm("确定解绑钱包？解绑后需等待7天。");
      if(!ok) return;
      const { error } = await supabase.from("profiles").update({ wallet_address: null }).eq("id", currentUser.id);
      if(error) return alert("解绑失败："+error.message);
      alert("钱包已解绑");
      checkLogin();
    }

    window.signOut = async function(){
      const {supabase} = await import('./js/supabase/client.js');
      await supabase.auth.signOut();
      window.location.replace("/signup");
    };

    window.bindGoogle = ()=>{};
    window.openAvatarModal = ()=>document.getElementById("avatar-modal").classList.remove("hidden");
    window.closeAvatarModal = ()=>document.getElementById("avatar-modal").classList.add("hidden");

    window.uploadAvatar = async ()=>{
      const {uploadUserAvatar} = await import('./js/supabase/auth.js');
      let file = document.getElementById("avatar-input").files[0];
      if(!file) return;
      const url = await uploadUserAvatar(file)
      if(url){
        document.getElementById("user-avatar").src = url;
        closeAvatarModal();
      }
    }

    async function startMatchmaking(){
      const {supabase} = await import('./js/supabase/client.js');
      if(!currentUser || !currentUserProfile?.username) return;
      await supabase.from("matching").insert({
        user_id: currentUser.id,
        username: currentUserProfile.username,
        avatar_url: document.getElementById("user-avatar").src
      }).catch(()=>{});

      document.getElementById("match-btn").classList.add("hidden");
      document.getElementById("match-status").classList.remove("hidden");
      document.getElementById("cancel-match-btn").classList.remove("hidden");

      matchSubscription = supabase.channel("matchmaking")
      .on("postgres_changes",{event:"*",schema:"public",table:"matching"},async ()=>{
        const {count} = await supabase.from("matching").select("*",{count:"exact",head:true});
        document.getElementById("match-status").innerText = `正在匹配中... (${count}/8)`;
        if(count >= 8){
          const {data:queue} = await supabase.from("matching")
            .select("user_id,username,avatar_url")
            .order("created_at",true).limit(8);
          if(queue[0].user_id === currentUser.id){
            await createRoom();
            for(let p of queue){
              await supabase.from("room_players").insert({
                room_id: currentRoom.id,
                user_id: p.user_id,
                username: p.username,
                avatar_url: p.avatar_url,
                hp:100, gold:10, level:1, exp:0
              })
            }
            await supabase.from("matching").delete().neq("user_id","00000000-0000-0000-0000-000000000000");
            await startGame();
          }
          supabase.removeChannel(matchSubscription);
          showPage("game");
          document.getElementById("room-id").textContent = "房间号："+currentRoom.id;
        }
      }).subscribe();
    }

    async function cancelMatchmaking(){
      const {supabase} = await import('./js/supabase/client.js');
      await supabase.from("matching").delete().eq("user_id",currentUser.id);
      if(matchSubscription) supabase.removeChannel(matchSubscription);
      document.getElementById("match-btn").classList.remove("hidden");
      document.getElementById("match-status").classList.add("hidden");
      document.getElementById("cancel-match-btn").classList.add("hidden");
    }

    window.startMatchmaking = startMatchmaking;
    window.cancelMatchmaking = cancelMatchmaking;

    document.getElementById('user-menu-btn').addEventListener('click', ()=>{
      document.getElementById('user-menu').classList.toggle('hidden')
    })
    document.addEventListener('click',e=>{
      if(!e.target.closest("#user-menu-btn") && !e.target.closest("#user-menu")){
        document.getElementById('user-menu').classList.add("hidden");
      }
    })

    checkLogin();
  </script>
</body>
</html>
