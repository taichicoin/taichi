<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Shan Hai Jing Card Game</title>
<!-- 引入外部CSS -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <div class="shop-section">
    <div class="shop-header">
      <div class="shop-title">Card Shop</div>
      <div class="gold-display">Gold: <span id="current-gold">2</span></div>
    </div>
    <div class="shop-cards" id="shop-cards"></div>
  </div>

  <div class="control-bar">
    <div class="turn-display">Turn: <span id="current-turn">1</span></div>
    <button id="next-turn-btn">Next</button>
    <button id="refresh-btn">Refresh(1G)</button>
  </div>

  <div class="grid-section">
    <div class="grid-title">Your Deck (Max 6)</div>
    <div class="card-grid" id="card-grid">
      <div class="grid-slot"></div><div class="grid-slot"></div><div class="grid-slot"></div>
      <div class="grid-slot"></div><div class="grid-slot"></div><div class="grid-slot"></div>
    </div>
  </div>
</div>

<div id="drag-preview"></div>
<footer>© 2026 Taichicoin · Built by AI</footer>

<!-- 引入外部JS逻辑 -->
<script src="js/main.js"></script>
</body>
</html>
