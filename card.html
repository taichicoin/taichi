<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 统一移动端适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game - Taiji Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* 弹窗滚动锁定 */
        body.body-lock {
            overflow: hidden;
        }
        /* 顶部导航栏 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #e94560;
        }
        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-name {
            font-size: 16px;
            font-weight: 600;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-danger {
            background: #e94560;
            color: white;
        }
        .btn-danger:hover {
            background: #d1354f;
        }
        .btn-primary {
            background: #0f3460;
            color: white;
        }
        .btn-primary:hover {
            background: #19477a;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* 游戏主体区域 */
        .game-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-title {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        /* 匹配区域 */
        .match-section {
            text-align: center;
            padding: 40px 20px;
            background: #16213e;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .match-status {
            font-size: 18px;
            margin-bottom: 20px;
            color: #a8a8b3;
        }
        .player-list {
            display: flex;
            gap: 16px;
            margin: 30px 0;
            overflow-x: auto;
            padding: 10px 0;
            /* 移动端隐藏滚动条 */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .player-list::-webkit-scrollbar {
            display: none;
        }
        .player-card {
            flex-shrink: 0;
            width: 100px;
            text-align: center;
        }
        .player-card-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 8px;
            overflow: hidden;
            border: 2px solid #0f3460;
            background: #0f3460;
        }
        .player-card-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-card-name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* 游戏区域 */
        .game-area {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-top: 30px;
        }
        .game-main {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
        }
        .game-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .sidebar-card {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
        }
        .sidebar-card h3 {
            font-size: 16px;
            margin-bottom: 12px;
            color: #e94560;
        }
        /* Toast提示样式 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 9999;
            transform: translateX(120%);
            transition: transform 0.3s;
        }
        .toast.show {
            transform: translateX(0);
        }
        .toast.success {
            background: #10b981;
        }
        .toast.error {
            background: #ef4444;
        }
        .toast.info {
            background: #3b82f6;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
            }
            .header {
                padding: 12px 16px;
            }
            .user-name {
                max-width: 100px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .game-container {
                padding: 16px;
            }
            .match-section {
                padding: 30px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="user-info">
            <div class="user-avatar">
                <img id="userAvatar" src="" alt="Avatar">
            </div>
            <div class="user-name" id="userName">--</div>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" id="matchBtn">Start Match</button>
            <button class="btn btn-danger" id="logoutBtn">Logout</button>
        </div>
    </header>

    <!-- 游戏主体 -->
    <main class="game-container">
        <h1 class="game-title">Taiji Game Room</h1>

        <!-- 匹配区域 -->
        <section class="match-section" id="matchSection">
            <div class="match-status" id="matchStatus">Waiting for match... Click "Start Match" to join the game</div>
            <div class="player-list" id="playerList"></div>
            <button class="btn btn-primary" id="cancelMatchBtn" style="display: none;">Cancel Match</button>
        </section>

        <!-- 游戏核心区域 -->
        <div class="game-area">
            <div class="game-main" id="gameMain">
                <p style="text-align: center; color: #a8a8b3; margin-top: 100px;">Game will start after matching completed</p>
            </div>
            <div class="game-sidebar">
                <div class="sidebar-card">
                    <h3>Game Rules</h3>
                    <p style="font-size: 14px; line-height: 1.6; color: #a8a8b3;">
                        1. 4 players per room<br>
                        2. Take turns to play cards<br>
                        3. The player with the highest points wins
                    </p>
                </div>
                <div class="sidebar-card">
                    <h3>Room Info</h3>
                    <p style="font-size: 14px; color: #a8a8b3;" id="roomInfo">No room joined</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast提示容器 -->
    <div id="toast" class="toast"></div>

    <script type="module">
        // 固定Supabase版本，与登录页保持一致
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.45.0';

        // 统一配置管理，与登录页同步
        const CONFIG = {
            SUPA_URL: "https://sznjaotjoljaiawbvfro.supabase.co",
            SUPA_ANON_KEY: "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN",
            AVATAR_API: "https://api.dicebear.com/7.x/avataaars/svg?seed=",
            MAX_PLAYERS: 4
        };

        // 单例Supabase客户端，彻底解决重复实例导致的踢下线问题
        const supabase = createClient(CONFIG.SUPA_URL, CONFIG.SUPA_ANON_KEY);
        window.supabase = supabase;

        // DOM元素
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const matchBtn = document.getElementById('matchBtn');
        const cancelMatchBtn = document.getElementById('cancelMatchBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const matchStatus = document.getElementById('matchStatus');
        const playerList = document.getElementById('playerList');
        const roomInfo = document.getElementById('roomInfo');
        const toast = document.getElementById('toast');

        // 全局变量
        let currentUser = null;
        let userProfile = null;
        let matchSubscription = null;

        // 通用Toast提示函数
        function showToast(message, type = 'info', duration = 3000) {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.className = 'toast';
            }, duration);
        }

        // 核心修复：页面初始化先校验登录态，未登录直接跳回登录页
        // 先校验，再渲染DOM，避免闪屏和未登录访问
        async function checkAuth() {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (error || !user) {
                // 未登录，直接跳回登录页，无任何多余操作
                window.location.replace('/signup');
                return null;
            }
            currentUser = user;
            return user;
        }

        // 获取用户资料
        async function getUserProfile() {
            if (!currentUser) return;

            try {
                // 先查用户是否有资料
                let { data: profile, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', currentUser.id)
                    .single();

                // Google登录用户，自动创建资料
                if (error && error.code === 'PGRST116') {
                    const username = currentUser.email?.split('@')[0] || `user_${currentUser.id.substring(0, 8)}`;
                    const avatarSeed = username;

                    const { data: newProfile, error: insertError } = await supabase
                        .from('profiles')
                        .insert({
                            id: currentUser.id,
                            username: username,
                            avatar_seed: avatarSeed,
                            created_at: new Date().toISOString()
                        })
                        .select('*')
                        .single();

                    if (insertError) throw insertError;
                    profile = newProfile;
                } else if (error) {
                    throw error;
                }

                userProfile = profile;
                // 渲染用户信息
                renderUserInfo();

            } catch (error) {
                showToast(`Failed to load user info: ${error.message}`, 'error');
            }
        }

        // 渲染用户信息
        function renderUserInfo() {
            if (!userProfile) return;
            userName.textContent = userProfile.username;
            userAvatar.src = `${CONFIG.AVATAR_API}${userProfile.avatar_seed}`;
        }

        // 渲染匹配玩家列表
        function renderPlayerList(players) {
            playerList.innerHTML = '';
            if (!players || players.length === 0) {
                matchStatus.textContent = 'Waiting for match... Click "Start Match" to join the game';
                return;
            }

            players.forEach(player => {
                const playerCard = document.createElement('div');
                playerCard.className = 'player-card';
                playerCard.innerHTML = `
                    <div class="player-card-avatar">
                        <img src="${CONFIG.AVATAR_API}${player.avatar_seed}" alt="${player.username}">
                    </div>
                    <div class="player-card-name">${player.username}</div>
                `;
                playerList.appendChild(playerCard);
            });

            matchStatus.textContent = `Matching: ${players.length}/${CONFIG.MAX_PLAYERS} players`;
            roomInfo.textContent = `${players.length} players in queue`;

            // 人数达标自动进入房间
            if (players.length >= CONFIG.MAX_PLAYERS) {
                showToast('Match completed! Game is starting...', 'success');
                if (matchSubscription) {
                    matchSubscription.unsubscribe();
                    matchSubscription = null;
                }
                matchBtn.style.display = 'none';
                cancelMatchBtn.style.display = 'none';
            }
        }

        // 开始匹配
        matchBtn.addEventListener('click', async () => {
            if (!currentUser || !userProfile) {
                showToast('User info not loaded', 'error');
                return;
            }

            matchBtn.disabled = true;
            matchBtn.textContent = 'Matching...';

            try {
                // 加入匹配队列
                const { error } = await supabase
                    .from('matching')
                    .insert({
                        user_id: currentUser.id,
                        username: userProfile.username,
                        avatar_seed: userProfile.avatar_seed,
                        joined_at: new Date().toISOString()
                    });

                if (error) throw error;

                showToast('Joined match queue!', 'success');
                matchBtn.style.display = 'none';
                cancelMatchBtn.style.display = 'inline-block';

                // 订阅匹配队列实时更新
                matchSubscription = supabase
                    .channel('matching-channel')
                    .on(
                        'postgres_changes',
                        { event: '*', schema: 'public', table: 'matching' },
                        async () => {
                            // 实时获取最新匹配列表
                            const { data: players } = await supabase
                                .from('matching')
                                .select('*')
                                .order('joined_at', { ascending: true });
                            
                            renderPlayerList(players);
                        }
                    )
                    .subscribe();

                // 初始化加载匹配列表
                const { data: players } = await supabase
                    .from('matching')
                    .select('*')
                    .order('joined_at', { ascending: true });
                
                renderPlayerList(players);

            } catch (error) {
                showToast(`Failed to join match: ${error.message}`, 'error');
                matchBtn.disabled = false;
                matchBtn.textContent = 'Start Match';
            }
        });

        // 取消匹配
        cancelMatchBtn.addEventListener('click', async () => {
            cancelMatchBtn.disabled = true;

            try {
                // 移除订阅
                if (matchSubscription) {
                    matchSubscription.unsubscribe();
                    matchSubscription = null;
                }

                // 从匹配队列移除
                const { error } = await supabase
                    .from('matching')
                    .delete()
                    .eq('user_id', currentUser.id);

                if (error) throw error;

                showToast('Match canceled', 'info');
                cancelMatchBtn.style.display = 'none';
                matchBtn.style.display = 'inline-block';
                matchBtn.disabled = false;
                matchBtn.textContent = 'Start Match';

                // 清空列表
                renderPlayerList([]);
                roomInfo.textContent = 'No room joined';

            } catch (error) {
                showToast(`Failed to cancel match: ${error.message}`, 'error');
                cancelMatchBtn.disabled = false;
            }
        });

        // 退出登录
        logoutBtn.addEventListener('click', async () => {
            logoutBtn.disabled = true;

            try {
                // 先取消匹配，清理数据
                if (matchSubscription) {
                    matchSubscription.unsubscribe();
                    matchSubscription = null;
                }
                await supabase.from('matching').delete().eq('user_id', currentUser.id);

                // 退出登录
                const { error } = await supabase.auth.signOut();
                if (error) throw error;

                showToast('Logout success! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.replace('/signup');
                }, 800);

            } catch (error) {
                showToast(`Logout failed: ${error.message}`, 'error');
                logoutBtn.disabled = false;
            }
        });

        // 浏览器后退拦截：已登录用户后退到登录页会自动跳回，避免逻辑混乱
        window.addEventListener('popstate', async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                window.history.pushState(null, document.title, window.location.href);
            }
        });

        // 页面初始化流程：先校验登录态 → 再加载用户数据 → 最后初始化功能
        async function initPage() {
            const user = await checkAuth();
            if (!user) return;

            await getUserProfile();
            // 禁止浏览器后退
            window.history.pushState(null, document.title, window.location.href);
        }

        // 启动页面
        initPage();
    </script>
</body>
</html>
