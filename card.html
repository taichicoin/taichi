<!DOCTYPE html> <html lang="zh"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>卡牌图鉴 · 星辰史诗版</title> <script src="https://cdn.tailwindcss.com"></script> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"> <style> @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&amp;family=Playfair+Display:wght@700&amp;display=swap'); :root { --gold: #f5d76e; --gold-dark: #c5a46e; } body { background: radial-gradient(circle at 20% 20%, #1f160f 0%, #0f0a05 50%); color: #f5e8c7; font-family: 'Noto Sans SC', system-ui, sans-serif; } .gold-gradient { background: linear-gradient(90deg, #f5d76e, #fff3c4, #f5d76e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; } .card-wrapper { width: 100%; max-width: 185px; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; } .card-wrapper:hover { transform: translateY(-16px) scale(1.03); box-shadow: 0 25px 60px -15px rgb(0 0 0 / 0.5), 0 0 0 1px rgba(245, 215, 110, 0.15); } .card-wrapper.rarity-Legendary:hover { box-shadow: 0 25px 60px -15px rgb(245 158 11 / 0.3), 0 0 25px rgb(245 158 11 / 0.4); } .card-image-area { position: relative; border-radius: 16px 16px 0 0; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1); } .card-image-area img { transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); } .card-wrapper:hover .card-image-area img { transform: scale(1.08); } .stat-badge { background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 4px 15px rgba(0,0,0,0.4); } .glass { background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.12); } .section-title { font-family: 'Playfair Display', serif; letter-spacing: -0.02em; } .rarity-Legendary { border-color: #f59e0b; } .rarity-Epic { border-color: #c026ff; } .rarity-Rare { border-color: #3b82f6; } .rarity-Common { border-color: #64748b; } .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); } @keyframes modalPop { from { transform: scale(0.8) translateY(40px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } } .skill-glass { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); } </style> </head> <body class="min-h-screen pb-12"> <!-- 顶部导航 --> <div class="max-w-[1400px] mx-auto px-6 pt-8"> <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-8"> <div> <div class="flex items-center gap-x-3"> <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-amber-400 to-yellow-600 flex items-center justify-center shadow-lg"> <i class="fa-solid fa-gem text-white text-3xl"></i> </div> <div> <h1 class="text-5xl font-bold tracking-tighter section-title gold-gradient">卡牌图鉴</h1> <p class="text-amber-300/70 text-sm tracking-[3px] mt-1">STARFORGE COLLECTION</p> </div> </div> </div> <div class="flex items-center gap-3"> <div class="px-4 py-1.5 rounded-2xl glass text-sm flex items-center gap-2"> <i class="fa-solid fa-cards text-amber-400"></i> <span id="total-count" class="font-semibold">0</span> <span class="text-amber-400/60">/ 已加载</span> </div> <div onclick="randomCard()" class="px-5 py-2 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10 flex items-center gap-2 text-sm cursor-pointer transition-colors"> <i class="fa-solid fa-dice"></i> <span>随机抽取</span> </div> </div> </div> <!-- 控制栏 --> <div class="glass rounded-3xl p-4 mb-8 flex flex-col lg:flex-row gap-4 items-center"> <!-- 搜索 --> <div class="flex-1 w-full"> <div class="relative"> <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-amber-400/70"></i> <input id="search-input" type="text" placeholder="搜索卡牌名称、技能或阵营..." class="w-full bg-white/5 border border-white/10 pl-11 pr-4 py-3 rounded-2xl text-white placeholder:text-white/40 focus:outline-none focus:border-amber-400/50 transition-colors"> </div> </div> <!-- 稀有度筛选 --> <div class="flex gap-2 flex-wrap"> <div onclick="toggleRarityFilter(this, 'All')" class="rarity-btn active px-4 py-1.5 text-xs font-medium rounded-2xl cursor-pointer bg-white/10 border border-white/20">全部</div> <div onclick="toggleRarityFilter(this, 'Common')" class="rarity-btn px-4 py-1.5 text-xs font-medium rounded-2xl cursor-pointer border border-slate-400 text-slate-300">普通</div> <div onclick="toggleRarityFilter(this, 'Rare')" class="rarity-btn px-4 py-1.5 text-xs font-medium rounded-2xl cursor-pointer border border-blue-400 text-blue-300">稀有</div> <div onclick="toggleRarityFilter(this, 'Epic')" class="rarity-btn px-4 py-1.5 text-xs font-medium rounded-2xl cursor-pointer border border-purple-400 text-purple-300">史诗</div> <div onclick="toggleRarityFilter(this, 'Legendary')" class="rarity-btn px-4 py-1.5 text-xs font-medium rounded-2xl cursor-pointer border border-amber-400 text-amber-300">传说</div> </div> <!-- 阵营 & 排序 --> <div class="flex gap-3 w-full lg:w-auto"> <select id="faction-select" class="bg-white/5 border border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-amber-400/50"> <option value="all">全部阵营</option> </select> <select id="sort-select" class="bg-white/5 border border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-amber-400/50"> <option value="default">默认排序</option> <option value="atk-desc">攻击力 ↓</option> <option value="hp-desc">生命值 ↓</option> <option value="rarity-desc">稀有度 ↓</option> </select> </div> </div> </div> <!-- 卡牌画廊 --> <div class="max-w-[1400px] mx-auto px-6"> <div id="card-gallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-6 justify-center"> </div> </div> <!-- 详情弹窗 --> <div id="modal" onclick="if (event.target.id === 'modal') closeModal()" class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[100] flex items-center justify-center p-4"> <div onclick="event.stopImmediatePropagation()" class="modal w-full max-w-3xl glass rounded-3xl overflow-hidden border border-white/10 shadow-2xl"> <div class="flex flex-col md:flex-row"> <!-- 左侧大图 --> <div class="md:w-5/12 relative bg-black/40 p-6 flex items-center justify-center"> <div class="relative w-full max-w-[280px]"> <img id="modal-image" class="w-full rounded-2xl shadow-2xl border border-white/10" alt=""> <div id="modal-atk" class="stat-badge absolute bottom-4 left-4 px-4 py-1 rounded-2xl flex items-center gap-2 text-lg font-bold text-red-400"></div> <div id="modal-hp" class="stat-badge absolute bottom-4 right-4 px-4 py-1 rounded-2xl flex items-center gap-2 text-lg font-bold text-emerald-400"></div> </div> </div> <!-- 右侧信息 --> <div class="md:w-7/12 p-8 flex flex-col"> <div class="flex justify-between items-start"> <div> <div id="modal-name" class="text-4xl font-bold tracking-tight mb-1"></div> <div class="flex items-center gap-3"> <span id="modal-faction" class="px-3 py-1 text-sm rounded-full bg-white/10"></span> <span id="modal-rarity" class="px-3 py-1 text-sm font-semibold rounded-full"></span> </div> </div> <button onclick="closeModal()" class="text-white/60 hover:text-white transition-colors text-3xl leading-none">×</button> </div> <div class="mt-auto pt-8"> <div class="text-xs tracking-[2px] text-amber-400/70 mb-2">技能效果</div> <div id="modal-skill" class="skill-glass p-5 rounded-2xl text-[15px] leading-relaxed text-white/90 min-h-[120px]"></div> </div> </div> </div> </div> </div> <script> // Tailwind 配置 function initTailwind() { document.documentElement.style.setProperty('--accent', '#f5d76e'); } let allCards = []; let filteredCards = []; let selectedRarities = new Set(); async function loadData() { const container = document.getElementById('card-gallery'); const countEl = document.getElementById('total-count'); try { const [imagesRes, charsRes] = await Promise.all([ fetch('data/image.json'), fetch('data/characters.json') ]); if (!imagesRes.ok || !charsRes.ok) throw new Error('数据文件加载失败'); const images = await imagesRes.json(); const charactersArr = await charsRes.json(); const charMap = {}; if (Array.isArray(charactersArr)) { charactersArr.forEach(c => { charMap[c.card_id] = c; }); } allCards = Object.keys(images).map(cardId => { const imgData = images[cardId]; const charData = charMap[cardId] || {}; return { id: cardId, name: imgData.name || cardId, image: imgData.image, faction: charData.faction || '未知', rarity: charData.rarity || 'Common', base_atk: charData.base_atk ?? 0, base_hp: charData.base_hp ?? 0, skillDesc: parseSkillDesc(charData.skill) }; }); countEl.textContent = allCards.length; setupFilters(); renderCards(allCards); } catch (err) { console.error(err); container.innerHTML = ` <div class="col-span-full text-center py-12"> <i class="fa-solid fa-exclamation-triangle text-4xl text-amber-400 mb-4"></i> <p class="text-xl">数据加载失败</p> <p class="text-white/50 mt-1">请确认 data/image.json 和 data/characters.json 存在</p> </div> `; } } function parseSkillDesc(raw) { if (!raw) return '暂无技能描述'; try { const obj = JSON.parse(raw); return obj.skill_describe || obj.skillName || raw; } catch { return raw; } } function createCardElement(card) { const wrapper = document.createElement('div'); wrapper.className = `card-wrapper group glass rounded-3xl overflow-hidden border border-white/10 cursor-pointer rarity-${card.rarity}`; wrapper.innerHTML = ` <div class="card-image-area relative aspect-[185/250] bg-zinc-950"> <img src="${card.image}" alt="${card.name}" class="w-full h-full object-cover" loading="lazy"> <!-- 攻击力 --> <div class="stat-badge absolute bottom-3 left-3 px-3 py-1 rounded-2xl flex items-center gap-1.5 text-sm font-bold text-red-400"> <i class="fa-solid fa-sword text-xs"></i> <span>${card.base_atk}</span> </div> <!-- 生命值 --> <div class="stat-badge absolute bottom-3 right-3 px-3 py-1 rounded-2xl flex items-center gap-1.5 text-sm font-bold text-emerald-400"> <i class="fa-solid fa-heart text-xs"></i> <span>${card.base_hp}</span> </div> </div> <div class="p-4 glass"> <div class="flex justify-between items-center mb-3"> <div class="font-semibold text-[15px] truncate pr-2">${card.name}</div> <div class="px-2.5 py-px text-[10px] font-bold rounded tracking-wider ${card.rarity === 'Legendary' ? 'bg-amber-400 text-black' : card.rarity === 'Epic' ? 'bg-purple-500 text-white' : card.rarity === 'Rare' ? 'bg-blue-500 text-white' : 'bg-slate-400 text-black'}"> ${card.rarity} </div> </div> <div class="flex items-center justify-between text-xs mb-3"> <span class="text-amber-300/80">${card.faction}</span> </div> <div class="skill-glass px-3 py-2.5 rounded-2xl text-xs leading-snug text-white/80 line-clamp-2"> ${card.skillDesc} </div> </div> `; wrapper.onclick = () => showModal(card); return wrapper; } function renderCards(cards) { const container = document.getElementById('card-gallery'); container.innerHTML = ''; if (cards.length === 0) { container.innerHTML = `<div class="col-span-full text-center py-16 text-white/40">没有找到符合条件的卡牌</div>`; return; } const fragment = document.createDocumentFragment(); cards.forEach(card => { fragment.appendChild(createCardElement(card)); }); container.appendChild(fragment); } function setupFilters() { // 阵营下拉 const factionSelect = document.getElementById('faction-select'); const factions = [...new Set(allCards.map(c => c.faction))].sort(); factions.forEach(f => { const opt = document.createElement('option'); opt.value = f; opt.textContent = f; factionSelect.appendChild(opt); }); // 事件监听 document.getElementById('search-input').addEventListener('input', applyFilters); factionSelect.addEventListener('change', applyFilters); document.getElementById('sort-select').addEventListener('change', applyFilters); // 初始渲染全部 filteredCards = [...allCards]; renderCards(filteredCards); } function toggleRarityFilter(element, rarity) { const allBtn = document.querySelector('.rarity-btn'); if (rarity === 'All') { // 点击全部 → 清空其他 document.querySelectorAll('.rarity-btn').forEach(btn => btn.classList.remove('active', 'bg-white/10')); element.classList.add('active', 'bg-white/10'); selectedRarities.clear(); } else { // 取消“全部”高亮 if (allBtn) allBtn.classList.remove('active', 'bg-white/10'); if (selectedRarities.has(rarity)) { selectedRarities.delete(rarity); element.classList.remove('active', 'bg-white/10'); } else { selectedRarities.add(rarity); element.classList.add('active', 'bg-white/10'); } } applyFilters(); } function applyFilters() { const searchTerm = document.getElementById('search-input').value.toLowerCase().trim(); const faction = document.getElementById('faction-select').value; const sortMode = document.getElementById('sort-select').value; let result = allCards; // 搜索 if (searchTerm) { result = result.filter(card => card.name.toLowerCase().includes(searchTerm) || card.faction.toLowerCase().includes(searchTerm) || card.skillDesc.toLowerCase().includes(searchTerm) ); } // 稀有度 if (selectedRarities.size > 0) { result = result.filter(card => selectedRarities.has(card.rarity)); } // 阵营 if (faction !== 'all') { result = result.filter(card => card.faction === faction); } // 排序 if (sortMode === 'atk-desc') { result.sort((a, b) => b.base_atk - a.base_atk); } else if (sortMode === 'hp-desc') { result.sort((a, b) => b.base_hp - a.base_hp); } else if (sortMode === 'rarity-desc') { const order = { Common: 1, Rare: 2, Epic: 3, Legendary: 4 }; result.sort((a, b) => order[b.rarity] - order[a.rarity]); } filteredCards = result; renderCards(filteredCards); } function showModal(card) { const modal = document.getElementById('modal'); document.getElementById('modal-image').src = card.image; document.getElementById('modal-name').textContent = card.name; document.getElementById('modal-faction').textContent = card.faction; document.getElementById('modal-atk').innerHTML = `<i class="fa-solid fa-sword mr-2"></i>${card.base_atk}`; document.getElementById('modal-hp').innerHTML = `<i class="fa-solid fa-heart mr-2"></i>${card.base_hp}`; const rarityEl = document.getElementById('modal-rarity'); rarityEl.textContent = card.rarity; rarityEl.className = `px-4 py-1 text-sm font-bold rounded-2xl ${ card.rarity === 'Legendary' ? 'bg-amber-400 text-black' : card.rarity === 'Epic' ? 'bg-purple-500 text-white' : card.rarity === 'Rare' ? 'bg-blue-500 text-white' : 'bg-slate-400 text-black' }`; document.getElementById('modal-skill').textContent = card.skillDesc || '暂无技能描述'; modal.classList.remove('hidden'); modal.classList.add('flex'); } function closeModal() { const modal = document.getElementById('modal'); modal.classList.remove('flex'); modal.classList.add('hidden'); } function randomCard() { if (allCards.length === 0) return; const randomIndex = Math.floor(Math.random() * allCards.length); showModal(allCards[randomIndex]); } // 初始化 function init() { initTailwind(); // 默认“全部”按钮激活 const allBtn = document.querySelector('.rarity-btn'); if (allBtn) allBtn.classList.add('active', 'bg-white/10'); loadData(); // 键盘 ESC 关闭弹窗 document.addEventListener('keydown', function(e) { if (e.key === "Escape") { const modal = document.getElementById('modal'); if (!modal.classList.contains('hidden')) closeModal(); } }); } window.onload = init; </script> </body> </html>
