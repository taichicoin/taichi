<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shan Hai Jing Card Game</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', sans-serif;
  }
  body {
    background: #1a1a2e;
    color: #fff;
    padding: 20px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  /* --- 商店区域 --- */
  .shop-section {
    margin-bottom: 20px;
    position: relative; /* 为金币绝对定位做准备 */
  }
  .shop-title {
    font-size: 24px;
    font-weight: bold;
    color: #feca57;
    margin-bottom: 15px;
  }
  .shop-cards {
    display: flex;
    gap: 15px;
    position: relative;
  }
  .card {
    width: 180px;
    height: 250px;
    border: 3px solid #d4af37;
    border-radius: 12px;
    overflow: hidden;
    cursor: grab;
    background: #000;
    position: relative;
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }
  .card .stats {
    position: absolute;
    bottom: 8px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 10px;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 2px 2px 3px #000;
  }
  .card .atk { color: #ff4757; } /* 攻击红色 */
  .card .hp { color: #2ed573; } /* 生命绿色 */
  .card .cost {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #ff6b6b;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border: 2px solid white;
  }
  .card.insufficient-funds {
    cursor: not-allowed;
    opacity: 0.6;
  }

  /* --- 金币显示（商店第3张卡牌右上角） --- */
  .gold-display {
    position: absolute;
    top: -10px;
    right: 0px; /* 对齐第3张卡牌右上角 */
    font-size: 20px;
    font-weight: bold;
    color: #ffcc00;
    background: #161624;
    padding: 8px 15px;
    border-radius: 8px;
    border: 2px solid #d4af37;
    z-index: 10;
  }

  /* --- 中间控制栏（商店和卡组之间） --- */
  .control-bar {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 20px 0;
    justify-content: center; /* 居中对齐 */
  }
  .turn-display {
    font-size: 18px;
    background: #3742fa;
    padding: 5px 15px;
    border-radius: 20px;
  }
  #next-turn-btn, #refresh-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  #next-turn-btn {
    background: linear-gradient(135deg, #2ed573, #20bf6b);
  }
  #refresh-btn {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  }
  #next-turn-btn:disabled, #refresh-btn:disabled {
    background: #666;
    cursor: not-allowed;
    transform: none;
  }
  #next-turn-btn:hover:not(:disabled), #refresh-btn:hover:not(:disabled) {
    transform: scale(1.05);
  }

  /* --- 卡组区域（格子挨紧） --- */
  .grid-section {
    margin-top: 20px;
  }
  .grid-title {
    font-size: 20px;
    font-weight: bold;
    color: #feca57;
    margin-bottom: 15px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px; /* 缩小间距，让格子更紧凑 */
  }
  .grid-slot {
    width: 180px;
    height: 250px;
    border: 2px dashed #666;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .grid-slot.drag-over {
    border-color: #feca57;
    background: rgba(254, 202, 87, 0.1);
  }
</style>
</head>
<body>
<div class="container">
  <!-- 商店区域 -->
  <div class="shop-section">
    <div class="shop-title">Card Shop</div>
    <div class="shop-cards" id="shop-cards">
      <!-- 金币显示在第3张卡牌右上角 -->
      <div class="gold-display">Gold: <span id="current-gold">2</span></div>
    </div>
  </div>

  <!-- 中间控制栏（商店和卡组之间） -->
  <div class="control-bar">
    <div class="turn-display">Turn: <span id="current-turn">1</span></div>
    <button id="next-turn-btn">Next Turn</button>
    <button id="refresh-btn">Refresh (1 Gold)</button>
  </div>

  <!-- 卡组格子区域 -->
  <div class="grid-section">
    <div class="grid-title">Your Deck (Max 6)</div>
    <div class="card-grid" id="card-grid">
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
    </div>
  </div>
</div>

<script>
  // 1. 卡牌数据库 (包含属性和消耗)
  const allCardsData = [
    { id: 1, name: "Ying Dragon", image: "yl.jpg", atk: 3, hp: 5, cost: 1 },
    { id: 2, name: "Nine-Tailed Fox", image: "jwf.jpg", atk: 8, hp: 10, cost: 3 },
    { id: 3, name: "Bai Ze", image: "bz.jpg", atk: 5, hp: 10, cost: 2 },
    { id: 4, name: "Qiong Qi", image: "qq.jpg", atk: 10, hp: 15, cost: 4 },
    { id: 5, name: "Zhu Jiuyin", image: "zjy.jpg", atk: 12, hp: 18, cost: 5 }
  ];

  // 2. 游戏状态变量
  let currentGold = 2;      // 初始金币 (第1回合: 2)
  let currentTurn = 1;      // 当前回合数
  let draggedCard = null;   // 正在拖动的卡牌数据
  let isNextTurnDisabled = false; // 防止快速点击

  // 回合金币增长配置
  const turnGoldIncrement = [0, 2, 3, 5, 7, 10, 15, 20]; 
  // 索引对应回合:
  // 回合1: +2 (初始), 回合2: +3, 回合3: +5, 回合4: +7, 以此类推...

  // 3. 初始化商店 (随机显示3张)
  function renderShop() {
    const shopContainer = document.getElementById("shop-cards");
    // 保留金币元素
    const goldEl = document.querySelector(".gold-display");
    shopContainer.innerHTML = "";
    shopContainer.appendChild(goldEl); // 重新插入金币元素
    
    // 洗牌算法
    const shuffledCards = [...allCardsData].sort(() => Math.random() - 0.5);
    const selectedCards = shuffledCards.slice(0, 3);

    selectedCards.forEach(card => {
      const cardElement = document.createElement("div");
      cardElement.className = "card";
      cardElement.draggable = true;
      
      // 判断金币是否足够
      if (currentGold < card.cost) {
        cardElement.classList.add("insufficient-funds");
        cardElement.draggable = false; // 金币不足时不可拖动
      }

      cardElement.innerHTML = `
        <img src="${card.image}" alt="${card.name}">
        <div class="cost">${card.cost}</div>
        <div class="stats">
          <span class="atk">${card.atk}</span>
          <span class="hp">${card.hp}</span>
        </div>
      `;

      cardElement.addEventListener("dragstart", (e) => {
        if (cardElement.classList.contains('insufficient-funds')) return;
        draggedCard = { ...card }; // 复制数据
        e.dataTransfer.setData("text/plain", card.id);
      });

      shopContainer.appendChild(cardElement);
    });

    // 更新按钮状态
    updateButtonStates();
  }

  // 4. 初始化格子拖放事件
  function initGridSlots() {
    const slots = document.querySelectorAll(".grid-slot");
    
    slots.forEach(slot => {
      // 拖入时高亮
      slot.addEventListener("dragover", (e) => {
        e.preventDefault();
        if (draggedCard && slot.children.length === 0) {
          slot.classList.add("drag-over");
        }
      });
      
      // 离开时恢复
      slot.addEventListener("dragleave", () => {
        slot.classList.remove("drag-over");
      });

      // 放置卡牌
      slot.addEventListener("drop", (e) => {
        e.preventDefault();
        slot.classList.remove("drag-over");
        
        if (!draggedCard || slot.children.length > 0) return;

        // 扣除金币
        currentGold -= draggedCard.cost;
        updateGameStatus();

        // 创建卡组中的卡牌元素
        const deckCard = document.createElement("div");
        deckCard.className = "card";
        deckCard.innerHTML = `
          <img src="${draggedCard.image}" alt="${draggedCard.name}">
          <div class="stats">
            <span class="atk">${draggedCard.atk}</span>
            <span class="hp">${draggedCard.hp}</span>
          </div>
        `;
        
        slot.appendChild(deckCard);
        draggedCard = null; // 重置拖动对象
        
        // 刷新商店UI（检查金币变化）
        renderShop();
      });
    });
  }

  // 5. 下一回合按钮逻辑
  document.getElementById("next-turn-btn").addEventListener("click", startNextTurn);
  function startNextTurn() {
    if (isNextTurnDisabled) return;
    
    currentTurn++;
    // 根据回合数增加金币 (如果有定义)
    const addGold = turnGoldIncrement[currentTurn] || 0;
    currentGold += addGold;

    // 如果是第7回合及以后，按钮变灰不可点
    if (currentTurn >= 7) {
      isNextTurnDisabled = true;
      document.getElementById("next-turn-btn").disabled = true;
      document.getElementById("next-turn-btn").innerText = "Game Over";
    }

    updateGameStatus();
    renderShop(); // 刷新卡牌
  }

  // 6. 刷新按钮逻辑（消耗1金币）
  document.getElementById("refresh-btn").addEventListener("click", () => {
    if (currentGold >= 1) {
      currentGold -= 1;
      updateGameStatus();
      renderShop();
    }
  });

  // 7. 更新UI显示 (金币和回合)
  function updateGameStatus() {
    document.getElementById("current-gold").innerText = currentGold;
    document.getElementById("current-turn").innerText = currentTurn;
    updateButtonStates();
  }

  // 8. 更新按钮状态（金币不足时禁用刷新按钮）
  function updateButtonStates() {
    const refreshBtn = document.getElementById("refresh-btn");
    refreshBtn.disabled = currentGold < 1;
  }

  // 9. 页面加载初始化
  window.onload = () => {
    renderShop();
    initGridSlots();
    updateButtonStates();
  };
</script>
</body>
</html>
