<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌图鉴</title>
    <style>
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 30px;
        }
        #card-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 10px;
        }
        /* 基础卡片容器（由 YYCardRender 生成后会被附加样式） */
        .card {
            position: relative;
            width: 160px;
            height: 220px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 商店风格攻防数值 */
        .card[data-card-type="gallery"] .card-stats {
            position: absolute;
            top: 65%;
            left: 0;
            width: 100%;
            height: 0;
            z-index: 2;
            pointer-events: none;
        }
        .card[data-card-type="gallery"] .card-atk {
            position: absolute;
            left: 6%;
            top: 65%;
            transform: translateY(-50%);
            color: #ff4d4d;
            font-weight: bold;
            text-shadow: 0 0 4px #000;
            font-size: 1.1em;
        }
        .card[data-card-type="gallery"] .card-hp {
            position: absolute;
            right: 6%;
            top: 65%;
            transform: translateY(-50%);
            color: #4dff4d;
            font-weight: bold;
            text-shadow: 0 0 4px #000;
            font-size: 1.1em;
        }
        /* 技能描述面板（图片底部） */
        .card-skill-desc {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 28%;
            background: rgba(0,0,0,0.75);
            color: #fff;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2px 4px;
            box-sizing: border-box;
            z-index: 1;
            line-height: 1.2;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
            word-break: break-word;
            font-size: 0.7em;
        }
        /* 稀有度/阵营标签 */
        .card-meta {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            display: flex;
            justify-content: space-between;
            z-index: 2;
            pointer-events: none;
            font-size: 0.7em;
            text-shadow: 0 0 4px #000;
        }
        .card-faction {
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .card-rarity {
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>📜 全卡牌图鉴</h1>
    <div id="card-gallery"></div>

    <!-- 你的核心渲染库 -->
    <script src="YYCardRender.js"></script>

    <script>
        (function() {
            // 依赖检测
            if (!window.YYCardRender || !window.YYCardRender.createCardElement) {
                document.getElementById('card-gallery').innerHTML = 
                    '<p style="color:red;text-align:center;">缺少 YYCardRender 库，请引入后再试</p>';
                return;
            }
            const render = window.YYCardRender;

            // ========== 数据加载 ==========
            async function loadJSON(url) {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`加载失败: ${url}`);
                return res.json();
            }

            async function buildCardList() {
                const [characters, images] = await Promise.all([
                    loadJSON('data/characters.json'),
                    loadJSON('data/image.json')
                ]);

                // 合并数据
                const cardList = [];
                for (const char of characters) {
                    // 从 image.json 获取图片路径和显示名
                    const imgData = images[char.card_id];
                    if (!imgData) continue;  // 没有图片的跳过

                    // 解析技能描述
                    let skillDesc = '';
                    if (char.skill) {
                        try {
                            const skillObj = JSON.parse(char.skill);
                            skillDesc = skillObj.skill_describe || skillObj.skillName || '';
                        } catch {
                            skillDesc = char.skill;
                        }
                    }

                    // 构建卡片对象（符合 YYCardRender 期望的结构）
                    cardList.push({
                        card_id: char.card_id,
                        cardId: char.card_id,
                        name: imgData.name || char.card_id,
                        type: char.type,
                        faction: char.faction,
                        rarity: char.rarity,
                        image: imgData.image,
                        base_atk: char.base_atk || 0,
                        base_hp: char.base_hp || 0,
                        skill: char.skill,
                        skillDesc: skillDesc,
                        // 以下字段确保 isValidCard 返回 true
                        isValid: true
                    });
                }
                return cardList;
            }

            // ========== 渲染 ==========
            async function renderGallery() {
                const container = document.getElementById('card-gallery');
                try {
                    const cards = await buildCardList();
                    if (cards.length === 0) {
                        container.innerHTML = '<p style="color:#aaa;">暂无卡牌数据</p>';
                        return;
                    }

                    container.innerHTML = '';
                    const fragment = document.createDocumentFragment();

                    for (const card of cards) {
                        // 使用核心渲染库创建元素（商店风格）
                        const el = render.createCardElement(card, 'gallery');
                        el.setAttribute('data-card-type', 'gallery');

                        // 追加技能描述面板（覆盖底部）
                        if (card.skillDesc) {
                            const descDiv = document.createElement('div');
                            descDiv.className = 'card-skill-desc';
                            descDiv.textContent = card.skillDesc;
                            // 动态字号
                            const len = card.skillDesc.length;
                            descDiv.style.fontSize = len <= 8 ? '0.75em' : (len <= 15 ? '0.7em' : '0.6em');
                            el.appendChild(descDiv);
                        }

                        // 追加阵营/稀有度标签（可选）
                        const metaDiv = document.createElement('div');
                        metaDiv.className = 'card-meta';
                        metaDiv.innerHTML = `
                            <span class="card-faction">${card.faction || '无'}</span>
                            <span class="card-rarity">${card.rarity}</span>
                        `;
                        el.appendChild(metaDiv);

                        fragment.appendChild(el);
                    }
                    container.appendChild(fragment);
                } catch (err) {
                    console.error(err);
                    container.innerHTML = '<p style="color:red;">图鉴加载失败，请检查数据文件</p>';
                }
            }

            // 启动
            window.addEventListener('DOMContentLoaded', renderGallery);
        })();
    </script>
</body>
</html>
