<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡牌图鉴</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #eee;
            --gold: #ffd700;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: var(--gold);
            margin-bottom: 30px;
        }
        #card-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 10px;
        }

        /* 卡片容器 */
        .card {
            position: relative;
            width: 160px;
            height: 220px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            background: var(--card-bg);
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 攻击力 */
        .card-atk {
            position: absolute;
            left: 6%;
            top: 65%;
            transform: translateY(-50%);
            color: #ff4d4d;
            font-weight: bold;
            text-shadow: 0 0 4px #000;
            font-size: 1.1em;
            z-index: 3;
            pointer-events: none;
        }
        /* 生命值 */
        .card-hp {
            position: absolute;
            right: 6%;
            top: 65%;
            transform: translateY(-50%);
            color: #4dff4d;
            font-weight: bold;
            text-shadow: 0 0 4px #000;
            font-size: 1.1em;
            z-index: 3;
            pointer-events: none;
        }

        /* 技能描述 */
        .card-skill-desc {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 28%;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2px 6px;
            box-sizing: border-box;
            z-index: 2;
            line-height: 1.3;
            text-shadow: 1px 1px 2px black;
            word-break: break-word;
            pointer-events: none;
        }

        /* 阵营 / 稀有度标签 */
        .card-meta {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            display: flex;
            justify-content: space-between;
            z-index: 3;
            pointer-events: none;
            font-size: 0.7em;
            text-shadow: 0 0 4px #000;
        }
        .card-faction {
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
            color: #ccc;
        }
        .card-rarity {
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .rarity-Common { color: #aaa; }
        .rarity-Rare { color: #4da6ff; }
        .rarity-Epic { color: #c44dff; }
        .rarity-Legendary { color: #ffaa00; }
    </style>
</head>
<body>
    <h1>📜 全卡牌图鉴（共 <span id="card-count">0</span> 张）</h1>
    <div id="card-gallery"></div>

    <script>
        (async function() {
            const container = document.getElementById('card-gallery');
            const countSpan = document.getElementById('card-count');

            // 加载 JSON
            async function loadJSON(url) {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`无法加载 ${url}`);
                return res.json();
            }

            // 解析技能描述
            function parseSkillDesc(rawSkill) {
                if (!rawSkill) return '';
                try {
                    const obj = JSON.parse(rawSkill);
                    return obj.skill_describe || obj.skillName || '';
                } catch {
                    return rawSkill;
                }
            }

            // 动态字号
            function calcFontSize(text) {
                const len = text.length;
                if (len <= 6) return '0.8em';
                if (len <= 10) return '0.7em';
                if (len <= 15) return '0.6em';
                return '0.55em';
            }

            // 创建卡片元素
            function createCardElement(card) {
                const el = document.createElement('div');
                el.className = 'card';

                // 图片
                const img = document.createElement('img');
                img.src = card.image;
                img.alt = card.name;
                img.loading = 'lazy';
                el.appendChild(img);

                // 攻击力
                const atk = document.createElement('div');
                atk.className = 'card-atk';
                atk.textContent = card.base_atk;
                el.appendChild(atk);

                // 生命值
                const hp = document.createElement('div');
                hp.className = 'card-hp';
                hp.textContent = card.base_hp;
                el.appendChild(hp);

                // 技能描述
                const desc = document.createElement('div');
                desc.className = 'card-skill-desc';
                desc.textContent = card.skillDesc || '未知技能';
                desc.style.fontSize = calcFontSize(desc.textContent);
                el.appendChild(desc);

                // 阵营 + 稀有度
                const meta = document.createElement('div');
                meta.className = 'card-meta';
                meta.innerHTML = `
                    <span class="card-faction">${card.faction}</span>
                    <span class="card-rarity rarity-${card.rarity}">${card.rarity}</span>
                `;
                el.appendChild(meta);

                return el;
            }

            try {
                // 1. 加载两个数据源
                const [images, charactersArr] = await Promise.all([
                    loadJSON('data/image.json'),
                    loadJSON('data/characters.json')
                ]);

                // 2. 将 characters 数组转为以 card_id 为键的 Map
                const charMap = {};
                if (Array.isArray(charactersArr)) {
                    charactersArr.forEach(c => {
                        charMap[c.card_id] = c;
                    });
                }

                // 3. 以 image.json 为主，遍历所有 key
                const imageKeys = Object.keys(images);
                const cardList = [];

                for (const cardId of imageKeys) {
                    const imgData = images[cardId];
                    const charData = charMap[cardId];   // 可能为 undefined

                    // 合并信息
                    const card = {
                        name: imgData.name || cardId,
                        image: imgData.image,
                        faction: charData?.faction || '未知',
                        rarity: charData?.rarity || 'Common',
                        base_atk: charData?.base_atk ?? 0,
                        base_hp: charData?.base_hp ?? 0,
                        skillDesc: charData ? parseSkillDesc(charData.skill) : ''
                    };
                    cardList.push(card);
                }

                // 4. 渲染
                countSpan.textContent = cardList.length;
                if (cardList.length === 0) {
                    container.innerHTML = '<p style="color:#aaa; text-align:center;">暂无卡牌数据</p>';
                    return;
                }

                const fragment = document.createDocumentFragment();
                for (const card of cardList) {
                    fragment.appendChild(createCardElement(card));
                }
                container.innerHTML = '';
                container.appendChild(fragment);

            } catch (error) {
                console.error(error);
                container.innerHTML = '<p style="color:red; text-align:center;">图鉴加载失败，请检查数据文件路径</p>';
            }
        })();
    </script>
</body>
</html>
