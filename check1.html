<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAICHI 空投查询</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    body {
      background: #121212;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1e1e1e;
      padding: 30px;
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
    }
    h1 {
      color: #00e5ff;
      font-size: 2rem;
      margin-bottom: 24px;
    }
    .input-group {
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 16px;
      background: #2d2d2d;
      border: 2px solid #444;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: #00e5ff;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #00e5ff;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result {
      margin: 20px 0;
      padding: 16px;
      border-radius: 12px;
      background: #2d2d2d;
    }
    .success {
      border-left: 4px solid #00e5ff;
    }
    .error {
      border-left: 4px solid #ff4444;
    }
    .register-form {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #333;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>TAICHI 空投注册</h1>

    <div class="input-group">
      <input type="text" id="address" placeholder="输入BSC钱包地址 (0x...)">
    </div>
    <button id="checkBtn">查询空投资格</button>

    <div id="result" class="result hidden"></div>

    <div id="registerForm" class="register-form hidden">
      <div class="input-group">
        <input type="text" id="twitterUser" placeholder="输入推特用户名 (@xxx)">
      </div>
      <div class="input-group">
        <input type="text" id="tweetLink" placeholder="输入推文回复链接">
      </div>
      <button id="submitBtn">提交注册</button>
    </div>
  </div>

  <script>
    const RPC_URLS = [
      'https://bsc-dataseed1.bnbchain.org',
      'https://bsc-dataseed2.bnbchain.org',
      'https://bsc.publicnode.com'
    ];

    const QUALIFY_MIN_TX = 300;
    const TIER1_MAX_TX = 499;
    const TIER1_AIRDROP = 500;
    const TIER2_MIN_TX = 500;
    const MAX_AIRDROP = 5000;

    // 你自己的 Supabase 信息（已填好）
    const SUPABASE_URL = "https://sznjaotjoljaiawbvfro.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN";

    const checkBtn = document.getElementById('checkBtn');
    const resultDiv = document.getElementById('result');
    const registerForm = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    
    let currentWallet = '';
    let currentTxCount = 0;
    let currentAirdrop = 0;

    async function getTxCount(address) {
      for (const rpc of RPC_URLS) {
        try {
          const res = await fetch(rpc, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              jsonrpc: '2.0',
              id: 1,
              method: 'eth_getTransactionCount',
              params: [address, 'latest']
            })
          });
          const data = await res.json();
          if (data.result) return parseInt(data.result, 16);
        } catch (e) {}
      }
      throw new Error('RPC 连接失败，请重试');
    }

    checkBtn.addEventListener('click', async () => {
      const address = document.getElementById('address').value.trim();
      if (!address.startsWith('0x') || address.length !== 42) {
        resultDiv.className = 'result error';
        resultDiv.textContent = '请输入有效的BSC钱包地址';
        resultDiv.classList.remove('hidden');
        return;
      }

      checkBtn.disabled = true;
      checkBtn.textContent = '查询中...';
      resultDiv.classList.remove('hidden');
      resultDiv.textContent = '正在查询链上数据...';

      try {
        const txCount = await getTxCount(address);
        currentWallet = address;
        currentTxCount = txCount;

        let qualified = false;
        let airdropAmount = 0;

        if (txCount >= QUALIFY_MIN_TX) {
          qualified = true;
          if (txCount <= TIER1_MAX_TX) {
            airdropAmount = TIER1_AIRDROP;
          } else if (txCount >= TIER2_MIN_TX && txCount <= MAX_AIRDROP) {
            airdropAmount = txCount;
          } else {
            airdropAmount = MAX_AIRDROP;
          }
        }

        currentAirdrop = airdropAmount;

        if (qualified) {
          resultDiv.className = 'result success';
          resultDiv.innerHTML = `
            ✅ 符合空投资格<br>
            钱包地址: ${address}<br>
            链上交易数: ${txCount}<br>
            可领取空投: ${airdropAmount} TAICHI
          `;
          registerForm.classList.remove('hidden');
        } else {
          resultDiv.className = 'result error';
          resultDiv.innerHTML = `
            ❌ 暂不符合空投资格<br>
            钱包地址: ${address}<br>
            链上交易数: ${txCount}<br>
            需要至少300笔交易才能参与
          `;
          registerForm.classList.add('hidden');
        }
      } catch (err) {
        resultDiv.className = 'result error';
        resultDiv.textContent = err.message || '查询失败，请稍后重试';
      } finally {
        checkBtn.disabled = false;
        checkBtn.textContent = '查询空投资格';
      }
    });

    // 已对接 Supabase 真实注册接口
    submitBtn.addEventListener('click', async () => {
      const username = document.getElementById('twitterUser').value.trim();
      const replylink = document.getElementById('tweetLink').value.trim();

      if (!currentWallet) {
        alert("请先查询资格");
        return;
      }
      if (!username || !replylink) {
        alert("请填写完整信息");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "提交中...";

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registrations`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({
            address: currentWallet,
            username: username,
            replylink: replylink,
            tx_count: currentTxCount,
            airdrop_amount: currentAirdrop
          })
        });

        if (res.ok) {
          alert("✅ 注册成功！每个地址/用户名/链接仅限一次");
          registerForm.classList.add("hidden");
          resultDiv.innerHTML += "<br><br>✅ 注册完成";
        } else {
          const err = await res.json().catch(() => ({}));
          if (err.code === "23505") {
            alert("❌ 地址 / 用户名 / 回复链接 已被使用");
          } else {
            alert("❌ 注册失败，请稍后重试");
          }
        }
      } catch (e) {
        alert("网络错误，请重试");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "提交注册";
      }
    });
  </script>
</body>
</html>
