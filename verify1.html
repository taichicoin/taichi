<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
        body{background-image:url('./bg.jpg');background-size:cover;background-position:center center;background-repeat:no-repeat;background-attachment:fixed;min-height:100vh;padding:80px 20px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.35);z-index:0}
        .top-bar{position:fixed;top:20px;left:20px;right:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:10}
        .btn-small{height:44px;padding:0 20px;font-size:18px;font-weight:600;border-radius:12px;border:none;cursor:pointer;transition:all 0.2s ease;white-space:nowrap;-webkit-tap-highlight-color:transparent}
        .btn-primary{background-color:#2563eb;color:#fff}
        .btn-primary:hover,.btn-primary:active{background-color:#1d4ed8}
        .btn-success{background-color:#5eead4;color:#0f172a}
        .btn-success:hover,.btn-success:active{background-color:#2dd4bf}
        .address-top{height:44px;padding:0 16px;background-color:rgba(255,255,255,0.95);border-radius:12px;font-size:14px;color:#1e293b;display:none;align-items:center;gap:8px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .container{width:100%;max-width:480px;background:rgba(255,255,255,0.95);border-radius:24px;box-shadow:0 4px 20px rgba(0,0,0,0.15);padding:40px 24px;position:relative;z-index:1}
        h1{font-size:28px;font-weight:700;color:#1e293b;text-align:center;margin-bottom:12px}
        .desc{font-size:16px;color:#64748b;text-align:center;margin-bottom:32px;line-height:1.5}
        .btn{width:100%;height:56px;border:none;border-radius:16px;font-size:18px;font-weight:600;cursor:pointer;transition:all 0.2s ease;margin-bottom:16px;pointer-events:auto;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
        .btn-success{background-color:#5eead4;color:#0f172a}
        .btn-success:hover,.btn-success:active{background-color:#2dd4bf}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .tips{font-size:13px;color:#f1f5f9;text-align:center;margin-top:24px;line-height:1.4;position:relative;z-index:1}
        .wc-modal{position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
        .wc-modal.active{display:flex}
        .wc-content{width:100%;max-width:400px;background:#fff;border-radius:20px;padding:24px;text-align:center;position:relative}
        .wc-close{width:32px;height:32px;border:none;background:none;font-size:24px;color:#64748b;cursor:pointer;position:absolute;top:16px;right:16px}
        .wc-qr{width:280px;height:280px;margin:0 auto 16px;border-radius:12px}
        .wc-tips{font-size:14px;color:#64748b;margin-bottom:16px;line-height:1.4}
        .wc-loading{font-size:14px;color:#64748b;margin-top:12px}
    </style>
    <!-- 用最稳的 CDN 源，双兜底 -->
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/sign-client@2.13.3/dist/index.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/qrcode-modal@1.8.11/dist/index.umd.min.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="address-top" id="addressTop">
            已连接：<span id="walletAddress"></span>
        </div>
        <button class="btn-small btn-primary" id="connectWalletBtn">
            连接钱包
        </button>
    </div>

    <div class="container">
        <h1>Twitter任务活动</h1>
        <p class="desc">关注+点赞+转推指定推文，即可获得专属奖励</p>
        <button class="btn btn-success" id="twitterTaskBtn" disabled>
            前往点赞转推完成任务
        </button>
        <p class="tips">
            手机/电脑普通浏览器均可使用，扫码/唤起钱包连接<br>
            完成任务后请返回页面确认
        </p>
    </div>

    <div class="wc-modal" id="wcModal">
        <div class="wc-content">
            <button class="wc-close" id="wcCloseBtn">×</button>
            <h3 style="margin-bottom:16px;color:#1e293b">WalletConnect 连接钱包</h3>
            <div id="wcQrContainer" class="wc-qr"></div>
            <p class="wc-tips">用OKX/TP/Trust/MetaMask钱包扫码连接，手机端自动唤起APP</p>
            <div class="wc-loading" id="wcLoading">正在初始化连接...</div>
        </div>
    </div>

    <script>
        const CONFIG={
            officialSite:"https://taichicoin.xyz",
            twitterLink:"https://x.com/i/status/2035345304766361607",
            pageTitle:"Twitter任务活动",
            taskDesc:"关注+点赞+转推指定推文，即可获得专属奖励",
            connectBtnText:"连接钱包",
            connectedBtnText:"已连接",
            twitterBtnText:"前往点赞转推完成任务",
            wcProjectId:"a8510af6bab8956f8401418d64c759d3"
        };

        let currentAccount=null,wcSignClient=null,currentSession=null;
        const connectWalletBtn=document.getElementById('connectWalletBtn'),
              twitterTaskBtn=document.getElementById('twitterTaskBtn'),
              addressTop=document.getElementById('addressTop'),
              walletAddress=document.getElementById('walletAddress'),
              wcModal=document.getElementById('wcModal'),
              wcCloseBtn=document.getElementById('wcCloseBtn'),
              wcQrContainer=document.getElementById('wcQrContainer'),
              wcLoading=document.getElementById('wcLoading');

        function shortenAddress(e){return e?`${e.slice(0,6)}...${e.slice(-4)}`:""}

        // 核心修复：等待SDK加载完成再初始化，双兜底
        async function waitForSDK(){
            return new Promise((resolve)=>{
                const check=()=>{
                    if(window.SignClient && window.WalletConnectQRCodeModal){
                        resolve(true);
                    }else{
                        setTimeout(check,300);
                    }
                };
                check();
            });
        }

        async function initWalletConnect(){
            try{
                await waitForSDK();
                const {SignClient}=window;
                wcSignClient=await SignClient.init({
                    projectId:CONFIG.wcProjectId,
                    metadata:{
                        name:CONFIG.pageTitle,
                        description:CONFIG.taskDesc,
                        url:CONFIG.officialSite,
                        icons:[`${CONFIG.officialSite}/icon.png`]
                    }
                });
                // 会话恢复
                if(wcSignClient.session.length>0){
                    const accounts=wcSignClient.session.getAccounts();
                    if(accounts.length>0){
                        const account=accounts[0].split(":")[2];
                        currentSession=wcSignClient.session.getAll()[0];
                        updateConnectedState(account);
                    }
                }
                // 监听断开
                wcSignClient.on("session_delete",()=>disconnectWallet());
                wcSignClient.on("session_update",()=>{
                    const accounts=wcSignClient.session.getAccounts();
                    if(accounts.length>0){
                        currentAccount=accounts[0].split(":")[2];
                        walletAddress.textContent=shortenAddress(currentAccount);
                    }
                });
            }catch(e){
                console.error("WC init failed:",e);
                // 兜底重试
                setTimeout(async()=>{
                    try{
                        await initWalletConnect();
                    }catch(err){
                        console.error("WC init retry failed:",err);
                        alert("WalletConnect初始化失败，请检查网络后刷新页面重试");
                    }
                },2000);
            }
        }

        function updateConnectedState(account){
            currentAccount=account;
            walletAddress.textContent=shortenAddress(account);
            addressTop.style.display="flex";
            connectWalletBtn.textContent=CONFIG.connectedBtnText;
            connectWalletBtn.classList.remove("btn-primary");
            connectWalletBtn.classList.add("btn-success");
            twitterTaskBtn.disabled=false;
            wcModal.classList.remove("active");
        }

        async function connectWallet(){
            if(currentAccount){
                disconnectWallet();
                return;
            }
            if(!wcSignClient){
                alert("WalletConnect正在初始化，请稍等后重试");
                return;
            }
            wcModal.classList.add("active");
            wcLoading.style.display="block";
            wcQrContainer.innerHTML="";
            try{
                const {uri,approval}=await wcSignClient.connect({
                    requiredNamespaces:{
                        eip155:{
                            chains:["eip155:1","eip155:56"],
                            methods:["eth_requestAccounts"],
                            events:["accountsChanged","chainChanged"]
                        }
                    }
                });
                wcLoading.style.display="none";
                const {WalletConnectQRCodeModal}=window;
                WalletConnectQRCodeModal.open(uri,()=>wcModal.classList.remove("active"));
                const session=await approval();
                currentSession=session;
                const account=session.namespaces.eip155.accounts[0].split(":")[2];
                updateConnectedState(account);
                WalletConnectQRCodeModal.close();
            }catch(e){
                console.error("WC connect failed:",e);
                wcModal.classList.remove("active");
                WalletConnectQRCodeModal.close();
                alert("连接失败，请重试");
            }
        }

        function disconnectWallet(){
            if(currentSession&&wcSignClient){
                wcSignClient.disconnect({
                    topic:currentSession.topic,
                    reason:{code:6000,message:"User disconnected"}
                });
            }
            currentAccount=null;
            currentSession=null;
            addressTop.style.display="none";
            connectWalletBtn.textContent=CONFIG.connectBtnText;
            connectWalletBtn.classList.remove("btn-success");
            connectWalletBtn.classList.add("btn-primary");
            twitterTaskBtn.disabled=true;
            alert("已断开钱包连接");
        }

        document.addEventListener('DOMContentLoaded',async()=>{
            await initWalletConnect();
            connectWalletBtn.addEventListener('click',connectWallet);
            wcCloseBtn.addEventListener('click',()=>wcModal.classList.remove("active"));
            wcModal.addEventListener('click',e=>e.target===wcModal&&wcModal.classList.remove("active"));
            twitterTaskBtn.addEventListener('click',()=>{
                confirm("即将跳转到Twitter，请确保网络可访问")&&(location.href=CONFIG.twitterLink)
            });
            document.title=`${CONFIG.pageTitle} - ${CONFIG.officialSite.replace(/^https?:\/\//,'')}`;
            document.querySelector('h1').textContent=CONFIG.pageTitle;
            document.querySelector('.desc').textContent=CONFIG.taskDesc;
            twitterTaskBtn.textContent=CONFIG.twitterBtnText;
        });
    </script>
</body>
</html>
