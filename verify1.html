<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 官网</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            /* 背景图核心设置 */
            background-image: url('./bg.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* 背景半透明遮罩，保证文字清晰不被背景干扰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.35);
            z-index: 0;
        }
        .container {
            width: 100%;
            max-width: 480px;
            /* 卡片半透明，既能看到背景，又不影响内容阅读 */
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 15px;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            /* 解决手机端点击失效/无反馈 */
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background-color: #2563eb;
            color: #ffffff;
        }
        .btn-primary:hover, .btn-primary:active {
            background-color: #1d4ed8;
        }
        .btn-success {
            background-color: #10b981;
            color: #ffffff;
        }
        .btn-success:hover, .btn-success:active {
            background-color: #059669;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .address-info {
            width: 100%;
            padding: 12px;
            background-color: rgba(241, 245, 249, 0.8);
            border-radius: 8px;
            font-size: 14px;
            color: #475569;
            text-align: center;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .tips {
            font-size: 13px;
            color: #f1f5f9;
            text-align: center;
            margin-top: 24px;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Twitter任务活动</h1>
        <p class="desc" id="taskDesc">关注+转推指定推文，即可获得专属奖励</p>
        
        <!-- 钱包地址显示 -->
        <div class="address-info" id="addressBox" style="display: none;">
            已连接钱包：<span id="walletAddress"></span>
        </div>

        <!-- 核心按钮 -->
        <button class="btn btn-primary" id="connectWalletBtn">
            连接钱包
        </button>

        <button class="btn btn-success" id="twitterTaskBtn" disabled>
            前往完成Twitter任务
        </button>

        <p class="tips">
            请在DEEP/OKX钱包内置浏览器中打开本页面<br>
            完成任务后请返回页面确认
        </p>
    </div>

    <script>
        // ===================== 一键修改配置区（你只需要改这里） =====================
        const CONFIG = {
            // 你的官网链接
            officialSite: "https://你的域名.com",
            // 目标推文链接（替换成你的）
            twitterLink: "https://x.com/你的账号/status/你的推文ID",
            // 页面标题文案
            pageTitle: "Twitter任务活动",
            // 页面描述文案
            taskDesc: "关注+转推指定推文，即可获得专属奖励",
            // 按钮文案
            connectBtnText: "连接钱包",
            connectedBtnText: "已连接钱包",
            twitterBtnText: "前往完成Twitter任务"
        };
        // ============================================================================

        // 全局变量
        let currentAccount = null;
        const connectWalletBtn = document.getElementById('connectWalletBtn');
        const twitterTaskBtn = document.getElementById('twitterTaskBtn');
        const addressBox = document.getElementById('addressBox');
        const walletAddress = document.getElementById('walletAddress');
        const taskDesc = document.getElementById('taskDesc');
        const pageTitle = document.querySelector('h1');

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 应用配置文案
            document.title = `${CONFIG.pageTitle} - ${CONFIG.officialSite.replace(/https?:\/\//, '')}`;
            pageTitle.textContent = CONFIG.pageTitle;
            taskDesc.textContent = CONFIG.taskDesc;
            twitterTaskBtn.textContent = CONFIG.twitterBtnText;

            // 绑定按钮点击事件（解决手机端点击没反应的核心：确保DOM加载完成后再绑定）
            bindEvents();
        });

        // 绑定所有事件
        function bindEvents() {
            // 连接钱包按钮点击事件
            connectWalletBtn.addEventListener('click', connectWallet);
            
            // 推特任务按钮点击事件
            twitterTaskBtn.addEventListener('click', () => {
                window.open(CONFIG.twitterLink, '_blank');
            });
        }

        // 核心钱包连接逻辑（完美适配DEEP/OKX内置浏览器）
        async function connectWallet() {
            try {
                // 优先适配DEEP/OKX钱包，兼容其他钱包
                const provider = window.okxwallet || window.ethereum;
                
                // 没检测到钱包，直接提示
                if (!provider) {
                    alert('请在DEEP/OKX钱包内置浏览器中打开本页面');
                    return;
                }

                // 发起钱包授权请求（必须在用户点击事件内执行，不会被浏览器拦截）
                const accounts = await provider.request({
                    method: 'eth_requestAccounts'
                });

                // 连接成功处理
                if (accounts && accounts.length > 0) {
                    currentAccount = accounts[0];
                    // 更新页面状态
                    walletAddress.textContent = currentAccount;
                    addressBox.style.display = 'block';
                    connectWalletBtn.textContent = CONFIG.connectedBtnText;
                    connectWalletBtn.classList.remove('btn-primary');
                    connectWalletBtn.classList.add('btn-success');
                    // 解锁推特任务按钮
                    twitterTaskBtn.disabled = false;
                    alert('钱包连接成功！');
                }

            } catch (error) {
                // 错误捕获，不会静默没反应，会明确提示失败原因
                console.error('钱包连接失败：', error);
                if (error.code === 4001) {
                    alert('您已拒绝钱包授权，请重新点击连接并允许授权');
                } else {
                    alert(`连接失败：${error.message || '未知错误，请刷新页面重试'}`);
                }
            }
        }

        // 监听钱包账号切换
        if (window.okxwallet || window.ethereum) {
            const provider = window.okxwallet || window.ethereum;
            provider.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    // 钱包断开连接
                    currentAccount = null;
                    addressBox.style.display = 'none';
                    connectWalletBtn.textContent = CONFIG.connectBtnText;
                    connectWalletBtn.classList.remove('btn-success');
                    connectWalletBtn.classList.add('btn-primary');
                    twitterTaskBtn.disabled = true;
                } else {
                    // 账号切换
                    currentAccount = accounts[0];
                    walletAddress.textContent = currentAccount;
                }
            });
        }
    </script>
</body>
</html>
