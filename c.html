<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
  <style>
    body{background:#111;color:#ddd;padding:30px;font-family:monospace}
    input,button{width:100%;padding:10px;margin:5px 0}
    .log{padding:10px;border-left:3px solid #666;margin-top:10px}
    .success{border-color:#0a0}
    .error{border-color:#a22}
  </style>
</head>
<body>
  <h3>TAICHI Claim</h3>
  <input id="addr" placeholder="0x...">
  <button onclick="check()">Check Allocation</button>
  <button onclick="claim()">Claim</button>
  <div id="log" class="log"></div>

  <script>
    const CONTRACT = "0xD84d39dEcD14B3bF9936D701988543A12eee3518";
    const API = "https://sznjaotjoljaiawbvfro.supabase.co";
    const KEY = "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN";
    const ABI = ["function claim(uint256,bytes32[]) external"];

    let data = { address: "", amount: "", proof: [] };
    const log = document.getElementById("log");

    async function check() {
      const addr = document.getElementById("addr").value.trim().toLowerCase();
      if (!addr.startsWith("0x")) return show("Invalid address", "error");
      show("Checking...", "");

      try {
        const res = await fetch(`${API}/rest/v1/registrations?address=ilike.${encodeURIComponent(addr)}&select=address,airdrop_amount,merkle_proof`, {
          headers: { apikey: KEY, Authorization: `Bearer ${KEY}` }
        });
        const arr = await res.json();
        if (!arr.length) throw new Error("No allocation");

        const row = arr[0];
        data.address = row.address.toLowerCase();
        data.proof = JSON.parse(row.merkle_proof);
        data.amount = ethers.BigNumber.from(row.airdrop_amount).mul(ethers.BigNumber.from(10).pow(18)).toString();
        show(`Eligible: ${row.airdrop_amount}`, "success");
      } catch (e) {
        show(e.message, "error");
      }
    }

    async function claim() {
      if (!data.address) return show("Check first", "error");
      show("Claiming...", "");

      try {
        await ethereum.request({ method: "eth_requestAccounts" });
        const provider = new ethers.providers.Web3Provider(ethereum);
        const signer = provider.getSigner();
        const wallet = (await signer.getAddress()).toLowerCase();

        if (wallet !== data.address) throw new Error("Wallet mismatch");

        const contract = new ethers.Contract(CONTRACT, ABI, signer);
        const tx = await contract.claim(data.amount, data.proof, { gasLimit: 500000 });
        await tx.wait();
        show(`Success! Tx: ${tx.hash}`, "success");
      } catch (e) {
        console.error(e);
        show(`Failed: ${e.reason || e.message}`, "error");
      }
    }

    function show(text, cls) {
      log.innerText = text;
      log.className = "log " + cls;
    }
  </script>
</body>
</html>
