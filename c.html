<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>BSC 钱包 Gas 花费查询工具</title> <style> body { font-family: "Microsoft YaHei", Arial, sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); color: #fff; margin: 0; padding: 20px; min-height: 100vh; } .container { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.4); } .header { padding: 30px; text-align: center; background: rgba(0,0,0,0.2); } h1 { margin: 0 0 8px 0; font-size: 28px; } p { margin: 0; opacity: 0.9; } .input-area { padding: 20px 30px; display: flex; gap: 15px; background: rgba(255,255,255,0.15); } input { flex: 1; padding: 16px; font-size: 18px; border: none; border-radius: 12px; outline: none; } button { padding: 16px 40px; font-size: 18px; font-weight: bold; background: #00d4ff; color: #000; border: none; border-radius: 12px; cursor: pointer; white-space: nowrap; } button:hover { background: #ffeb3b; transform: scale(1.03); } .iframe-container { position: relative; } iframe { width: 100%; height: 800px; border: none; display: block; } .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; padding: 15px 30px; border-radius: 50px; display: none; } footer { text-align: center; padding: 15px; font-size: 14px; opacity: 0.8; } </style> </head> <body> <div class="container"> <div class="header"> <h1>🔍 BSC 钱包 Gas 花费查询</h1> <p>输入地址 → 直接在网页里查看「发起总交易数」和「⛽️ 手续费」总计</p> </div> <div class="input-area"> <input type="text" id="address" placeholder="0xf3a037fc1935a3af9c9b6a0dd6d3c6ad73f49d46" maxlength="42"> <button onclick="loadExplorer()">查询 Gas 花费</button> </div> <div class="iframe-container"> <div id="loading" class="loading">加载中，请稍等...</div> <iframe id="explorerFrame" src="https://web3.okx.com/explorer/bsc/address/0xf3a037fc1935a3af9c9b6a0dd6d3c6ad73f49d46"></iframe> </div> <footer> 数据由 OKX Web3 Explorer 实时提供 • 在 iframe 中直接看到顶部 Gas 汇总 </footer> </div> <script> function loadExplorer() { const addr = document.getElementById("address").value.trim(); const loading = document.getElementById("loading"); const iframe = document.getElementById("explorerFrame"); if (!addr || !addr.startsWith("0x") || addr.length !== 42) { alert("请输入正确的 BSC 钱包地址（以 0x 开头，共 42 位）"); return; } loading.style.display = "block"; // 构造 OKX 地址页面 URL const url = `https://web3.okx.com/explorer/bsc/address/${addr}`; // 更新 iframe iframe.src = url; // 加载完成后隐藏 loading iframe.onload = () => { loading.style.display = "none"; }; } // 支持回车键查询 document.getElementById("address").addEventListener("keypress", function(e) { if (e.key === "Enter") loadExplorer(); }); // 默认加载示例地址 window.onload = () => { document.getElementById("address").value = "0xf3a037fc1935a3af9c9b6a0dd6d3c6ad73f49d46"; }; </script> </body> </html>
