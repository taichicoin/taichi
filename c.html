<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAICHI Airdrop Check</title>
<style>
  *{box-sizing:border-box;font-family:system-ui}
  body{max-width:500px;margin:40px auto;padding:0 20px;background:#0a0a12;color:#fff}
  .card{background:#161625;padding:24px;border-radius:16px;margin-bottom:20px}
  button{padding:12px 24px;background:#0089ff;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:bold;margin:4px}
  .status{padding:12px;border-radius:8px;margin:10px 0}
  .ok{background:#1b3b2b;color:#9eff9e}
  .no{background:#3b1b1b;color:#ff9e9e}
  input{width:100%;padding:12px;margin:8px 0;background:#10101e;border:1px solid #333;border-radius:10px;color:#fff}
</style>
</head>

<body>
<div class="card">
  <h2>TAICHI Airdrop Check</h2>
  <button id="connect">Connect Wallet</button>
  <div id="address"></div>
</div>

<div class="card">
  <h3>Check Eligibility (BSC)</h3>
  <button id="check" disabled>Check Now</button>
  <div id="result"></div>
</div>

<div class="card" id="form" style="display:none">
  <h3>Register for Airdrop</h3>
  <input id="twitter" placeholder="Twitter / X 账号" required>
  <input id="tg" placeholder="Telegram 账号" required>
  <input id="email" placeholder="邮箱" required>
  <input type="hidden" id="airdropAmount" value="">
  <button id="submit">Submit Registration</button>
</div>

<script>
const API_KEY = "BVI7MUXSXWAC6NXRIXPD4GQQVRT3CH7J86";
// 截止时间：北京时间 2026-02-10 00:00:00（UTC 时间戳）
const CUTOFF_TIME = 1770595200;
let userAddress = "";

// 连接钱包：只拿地址，不管链
document.getElementById("connect").onclick = async () => {
  if(!window.ethereum) {
    alert("请在钱包 DApp 浏览器中打开此页面，或安装 MetaMask/OKX 钱包扩展");
    return;
  }
  try {
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    userAddress = accounts[0].toLowerCase();
    document.getElementById("address").innerText = `钱包地址：${userAddress}`;
    document.getElementById("check").disabled = false;
  } catch(e) {
    alert("连接钱包失败：" + e.message);
    console.error(e);
  }
};

// 统计 BSC 链上的总 Gas 消耗（自动分页，防限流）
async function calculateTotalGas(address) {
  const resultDiv = document.getElementById("result");
  let totalGas = 0;
  let currentPage = 1;
  const maxPages = 100; // 最多 100 页，覆盖 10 万笔交易
  const delay = 250; // 每次请求间隔 250ms，避免限流

  while (currentPage <= maxPages) {
    resultDiv.innerText = `正在查询 BSC 交易记录... (第 ${currentPage} 页)`;
    try {
      const response = await fetch(
        `https://api.bscscan.com/api?module=account&action=txlist` +
        `&address=${address}` +
        `&endtimestamp=${CUTOFF_TIME}` +
        `&page=${currentPage}` +
        `&offset=1000` +
        `&apikey=${API_KEY}`
      );
      const data = await response.json();

      // 没有更多数据，结束循环
      if (!data.result || data.result.length === 0) break;

      // 统计 Gas 消耗：只算用户发起的、成功的交易
      for (const tx of data.result) {
        if (tx.from.toLowerCase() === address && tx.txreceipt_status === "1") {
          const gasUsed = Number(tx.gasUsed);
          const gasPrice = Number(tx.gasPrice);
          totalGas += (gasUsed * gasPrice) / 1e18;
        }
      }

      currentPage++;
      await new Promise(resolve => setTimeout(resolve, delay));
    } catch (error) {
      console.error("查询出错：", error);
      throw new Error("API 请求失败，请检查网络后重试");
    }
  }

  return totalGas;
}

// 检查资格 + 匹配空投阶梯
document.getElementById("check").onclick = async () => {
  if (!userAddress) {
    alert("请先连接钱包");
    return;
  }

  const resultDiv = document.getElementById("result");
  const formDiv = document.getElementById("form");
  resultDiv.innerHTML = "正在查询...";
  formDiv.style.display = "none";

  try {
    const totalGas = await calculateTotalGas(userAddress);
    let airdropAmount = 0;

    // 你的空投阶梯规则
    if (totalGas >= 0.01 && totalGas < 0.02) airdropAmount = 500;
    else if (totalGas >= 0.02 && totalGas < 0.03) airdropAmount = 800;
    else if (totalGas >= 0.03 && totalGas < 0.04) airdropAmount = 1000;
    else if (totalGas >= 0.04 && totalGas < 0.05) airdropAmount = 1500;
    else if (totalGas >= 0.05 && totalGas < 0.1) airdropAmount = 1600;
    else if (totalGas >= 0.1 && totalGas < 0.5) airdropAmount = 2000;
    else if (totalGas >= 0.5) airdropAmount = 5000;

    // 保存空投数量到隐藏输入框
    document.getElementById("airdropAmount").value = airdropAmount;

    // 显示结果
    if (airdropAmount > 0) {
      resultDiv.innerHTML = `
        <div class="ok">
          ✅ 符合空投资格<br>
          2026-02-10 前 BSC Gas 总消耗：${totalGas.toFixed(4)} BNB<br>
          可获得空投：${airdropAmount} TAICHI
        </div>
      `;
      formDiv.style.display = "block";
    } else {
      resultDiv.innerHTML = `
        <div class="no">
          ❌ 不符合空投资格<br>
          2026-02-10 前 BSC Gas 总消耗：${totalGas.toFixed(4)} BNB<br>
          要求：Gas 消耗 ≥ 0.01 BNB
        </div>
      `;
    }
  } catch (error) {
    resultDiv.innerHTML = `<div class="no">❌ 查询失败：${error.message}<br>请刷新页面后重试</div>`;
    console.error(error);
  }
};

// 提交表单
document.getElementById("submit").onclick = () => {
  const twitter = document.getElementById("twitter").value.trim();
  const tg = document.getElementById("tg").value.trim();
  const email = document.getElementById("email").value.trim();
  const airdropAmount = document.getElementById("airdropAmount").value;

  if (!twitter || !tg || !email) {
    alert("请填写完整的信息");
    return;
  }

  // 替换成你的 Tally 表单链接，字段名和表单保持一致
  const formUrl = "https://tally.so/r/你的表单ID?" + new URLSearchParams({
    wallet_address: userAddress,
    twitter: twitter,
    telegram: tg,
    email: email,
    airdrop_amount: airdropAmount
  });

  window.open(formUrl, "_blank");
  alert("登记成功！我们会在空投发放时通知你");
};
</script>
</body>
</html>
