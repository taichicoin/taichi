<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAICHI AIRDROP</title>
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'JetBrains Mono', monospace, system-ui;
      transition: all 0.3s ease;
    }

    /* ========== 深色主题（默认） ========== */
    :root {
      --bg: #0B0E16;
      --card: #111827;
      --input: #0F141F;
      --border: #1F2937;
      --text: #E1E7F5;
      --text-muted: #4B5563;
      --accent: #00B3CF;
      --accent-hover: #009AAD;
      --success: #00B3CF;
      --error: #E53935;
    }

    /* ========== 浅色主题 ========== */
    :root.light {
      --bg: #f8fafc;
      --card: #ffffff;
      --input: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --accent: #009AAD;
      --accent-hover: #007C8C;
      --success: #009AAD;
      --error: #E53935;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image: 
        linear-gradient(rgba(0, 179, 207, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 179, 207, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* 右上角工具栏 */
    .toolbar {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }
    .toolbar button {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .toolbar button:hover {
      background: var(--accent);
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 44px 36px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    h1::after {
      content: 'TAICHI';
      display: block;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 6px;
      margin-top: 6px;
      opacity: 0.8;
    }

    .hcaptcha-wrapper {
      margin: 20px 0;
      display: flex;
      justify-content: center;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      pointer-events: none;
      opacity: 0.6;
    }

    input.enabled {
      pointer-events: all;
      opacity: 1;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    /* 清除按钮 */
    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--card);
      color: var(--text-muted);
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }
    #address.enabled + .clear-btn {
      opacity: 1;
      pointer-events: all;
    }
    .clear-btn:hover {
      color: #fff;
      background: var(--accent);
    }

    button {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: none;
      opacity: 0.6;
    }
    button.enabled {
      pointer-events: all;
      opacity: 1;
    }
    button:hover {
      background: var(--accent-hover);
    }
    button:disabled {
      background: var(--input);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .result {
      margin: 24px 0;
      padding: 18px;
      background: var(--input);
      border-left: 3px solid var(--border);
      border-radius: 0 4px 4px 0;
      font-size: 13px;
      line-height: 1.6;
    }
    .result.success {
      border-left-color: var(--success);
    }
    .result.error {
      border-left-color: var(--error);
    }

    .register-form {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="langBtn">中文</button>
    <button id="themeBtn">Light</button>
  </div>

  <div class="card">
    <h1 id="title">Check and register</h1>

    <div class="hcaptcha-wrapper">
      <div 
        class="h-captcha" 
        data-sitekey="6950fbbe-54f8-4dcc-98d4-4c68e496545a"
        data-theme="dark"
        data-size="normal"
        data-callback="onHCaptchaSuccess"
        data-expired-callback="onHCaptchaExpired"
        data-error-callback="onHCaptchaError"
      ></div>
    </div>

    <div class="input-group">
      <input type="text" id="address" placeholder="BSC ADDRESS (0x...)">
      <button class="clear-btn" onclick="clearAddress()" title="Clear address">×</button>
    </div>
    <button id="checkBtn">CHECK ELIGIBILITY</button>

    <div id="result" class="result hidden"></div>

    <div id="registerForm" class="register-form hidden">
      <div class="input-group">
        <input type="text" id="twitterUser" placeholder="TWITTER USERNAME">
      </div>
      <div class="input-group">
        <input type="text" id="tweetLink" placeholder="TWEET LINK">
      </div>
      <button id="submitBtn">SUBMIT</button>
    </div>
  </div>

  <script>
    const EDGE_API = "https://sznjaotjoljaiawbvfro.supabase.co/functions/v1/c-r";

    // 语言包
    const i18n = {
      en: {
        title: "Check and register",
        addrPlaceholder: "BSC ADDRESS (0x...)",
        checkBtn: "CHECK ELIGIBILITY",
        checking: "CHECKING...",
        twitterPlaceholder: "TWITTER USERNAME",
        tweetPlaceholder: "TWEET LINK",
        submitBtn: "SUBMIT",
        submitting: "SUBMITTING...",
        captchaSuccess: "hCaptcha verified ✅ You can now check eligibility",
        captchaExpired: "hCaptcha expired ❌ Please verify again",
        captchaFailed: "hCaptcha failed ❌ Please try again",
        needCaptcha: "Please complete hCaptcha verification first",
        invalidAddr: "Please enter a valid BSC wallet address",
        scanning: "SCANNING ON-CHAIN DATA...",
        scanFailed: "SCAN FAILED, PLEASE TRY AGAIN",
        eligible: "✅ ELIGIBLE",
        address: "ADDRESS",
        txCount: "TX COUNT",
        airdrop: "AIRDROP",
        notEligible: "❌ NOT ELIGIBLE",
        minRequired: "MIN REQUIRED: 300 TXS",
        checkFirst: "PLEASE CHECK ELIGIBILITY FIRST",
        fillAll: "PLEASE FILL IN ALL FIELDS",
        registered: "✅ REGISTERED SUCCESSFULLY!",
        regComplete: "REGISTRATION COMPLETE",
        regFailed: "REGISTER FAILED",
        networkErr: "NETWORK ERROR, PLEASE TRY AGAIN",
        alreadyRegistered: "Already registered",
      },
      zh: {
        title: "资格查询与注册",
        addrPlaceholder: "BSC 钱包地址 (0x...)",
        checkBtn: "查询资格",
        checking: "查询中...",
        twitterPlaceholder: "推特用户名",
        tweetPlaceholder: "推文链接",
        submitBtn: "提交注册",
        submitting: "提交中...",
        captchaSuccess: "人机验证完成 ✅ 现在可以查询资格",
        captchaExpired: "验证已过期 ❌ 请重新验证",
        captchaFailed: "验证失败 ❌ 请稍后重试",
        needCaptcha: "请先完成人机验证",
        invalidAddr: "请输入有效的 BSC 钱包地址",
        scanning: "正在读取链上数据...",
        scanFailed: "查询失败，请稍后重试",
        eligible: "✅ 符合空投资格",
        address: "地址",
        txCount: "交易数",
        airdrop: "可领取",
        notEligible: "❌ 暂不符合资格",
        minRequired: "最低要求: 300 笔交易",
        checkFirst: "请先查询资格",
        fillAll: "请填写完整信息",
        registered: "✅ 注册成功！",
        regComplete: "注册完成",
        regFailed: "注册失败",
        networkErr: "网络异常，请重试",
        alreadyRegistered: "已注册",
      }
    };

    let lang = "en";
    let isLight = false;

    // DOM
    const title = document.getElementById("title");
    const addrInput = document.getElementById("address");
    const checkBtn = document.getElementById("checkBtn");
    const twitterInput = document.getElementById("twitterUser");
    const tweetInput = document.getElementById("tweetLink");
    const submitBtn = document.getElementById("submitBtn");
    const resultDiv = document.getElementById("result");
    const registerForm = document.getElementById("registerForm");
    const langBtn = document.getElementById("langBtn");
    const themeBtn = document.getElementById("themeBtn");

    // 切换语言
    langBtn.addEventListener("click", () => {
      lang = lang === "en" ? "zh" : "en";
      langBtn.textContent = lang === "en" ? "中文" : "English";
      updateTexts();
    });

    // 切换主题
    themeBtn.addEventListener("click", () => {
      isLight = !isLight;
      themeBtn.textContent = isLight ? "Dark" : "Light";
      document.documentElement.classList.toggle("light", isLight);
    });

    // 更新界面文字
    function updateTexts() {
      const t = i18n[lang];
      title.textContent = t.title;
      addrInput.placeholder = t.addrPlaceholder;
      checkBtn.textContent = checkBtn.disabled ? t.checking : t.checkBtn;
      twitterInput.placeholder = t.twitterPlaceholder;
      tweetInput.placeholder = t.tweetPlaceholder;
      submitBtn.textContent = submitBtn.disabled ? t.submitting : t.submitBtn;
    }

    // 清除地址
    function clearAddress() {
      addrInput.value = "";
      addrInput.focus();
    }

    // hCaptcha
    function onHCaptchaSuccess(token) {
      isHCaptchaValid = true;
      addrInput.classList.add("enabled");
      checkBtn.classList.add("enabled");
      alert(i18n[lang].captchaSuccess);
    }
    function onHCaptchaExpired() {
      isHCaptchaValid = false;
      resetForm();
      alert(i18n[lang].captchaExpired);
    }
    function onHCaptchaError() {
      isHCaptchaValid = false;
      resetForm();
      alert(i18n[lang].captchaFailed);
    }

    function resetForm() {
      addrInput.classList.remove("enabled");
      twitterInput.classList.remove("enabled");
      tweetInput.classList.remove("enabled");
      checkBtn.classList.remove("enabled");
      submitBtn.classList.remove("enabled");
    }

    function requireCaptcha() {
      if (!isHCaptchaValid) {
        alert(i18n[lang].needCaptcha);
        return false;
      }
      return true;
    }

    let currentWallet = "";
    let isHCaptchaValid = false;

    // 查询资格
    checkBtn.addEventListener("click", async () => {
      if (!requireCaptcha()) return;
      const address = addrInput.value.trim();
      const t = i18n[lang];

      if (!address.startsWith("0x") || address.length !== 42) {
        resultDiv.className = "result error";
        resultDiv.textContent = t.invalidAddr;
        resultDiv.classList.remove("hidden");
        return;
      }

      checkBtn.disabled = true;
      checkBtn.textContent = t.checking;
      resultDiv.classList.remove("hidden");
      resultDiv.textContent = t.scanning;

      try {
        const res = await fetch(EDGE_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ address })
        });
        const data = await res.json();
        currentWallet = address;

        if (data.eligible) {
          resultDiv.className = "result success";
          resultDiv.innerHTML = `
            ${t.eligible}<br>
            ${t.address}: ${address}<br>
            ${t.txCount}: ${data.tx_count}<br>
            ${t.airdrop}: ${data.airdrop_amount} TAICHI
          `;
          registerForm.classList.remove("hidden");
          twitterInput.classList.add("enabled");
          tweetInput.classList.add("enabled");
          submitBtn.classList.add("enabled");
        } else {
          resultDiv.className = "result error";
          resultDiv.innerHTML = `
            ${t.notEligible}<br>
            ${t.address}: ${address}<br>
            ${t.txCount}: ${data.tx_count || 0}<br>
            ${t.minRequired}
          `;
          registerForm.classList.add("hidden");
        }
      } catch (err) {
        resultDiv.className = "result error";
        resultDiv.textContent = t.scanFailed;
      } finally {
        checkBtn.disabled = false;
        updateTexts();
      }
    });

    // 提交注册
    submitBtn.addEventListener("click", async () => {
      if (!requireCaptcha()) return;
      const t = i18n[lang];
      const user = twitterInput.value.trim();
      const link = tweetInput.value.trim();

      if (!currentWallet) {
        alert(t.checkFirst);
        return;
      }
      if (!user || !link) {
        alert(t.fillAll);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = t.submitting;

      try {
        const res = await fetch(EDGE_API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            address: currentWallet,
            twitterUser: user,
            tweetLink: link
          })
        });
        const data = await res.json();

        if (data.eligible) {
          alert(t.registered);
          registerForm.classList.add("hidden");
          resultDiv.innerHTML += `<br><br>✅ ${t.regComplete}`;
        } else {
          const msg = data.error === "Already registered" ? t.alreadyRegistered : (data.msg || data.error || t.regFailed);
          alert("❌ " + msg);
        }
      } catch (e) {
        alert(t.networkErr);
      } finally {
        submitBtn.disabled = false;
        updateTexts();
      }
    });
  </script>
</body>
</html>
