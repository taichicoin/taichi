<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>YY Card · 游戏大厅</title>

    <!-- ★ 基路径，所有绝对路径都会自动加上 /taichi/ 前缀 -->
    <base href="/taichi/">

    <!-- PWA 配置 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YY Card">

    <!-- Three.js 导入映射 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- 样式文件 -->
    <link rel="stylesheet" href="/css/lobby.css">
    <link rel="stylesheet" href="/css/battle.css">
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/matchRoom.css">
    <link rel="stylesheet" href="/css/reconnect.css">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        if (typeof supabase === 'undefined') document.write('<script src="https://unpkg.com/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"><\/script>');
    </script>
    <script>
        if (typeof supabase === 'undefined') document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.45.0/supabase.min.js"><\/script>');
    </script>
    <script>
        if (typeof supabase === 'undefined') console.error('❌ Supabase SDK 全部CDN加载失败');
        else console.log('✅ Supabase SDK 加载成功');
    </script>

    <!-- 全局配置 -->
    <script src="/js/config.js"></script>
    <!-- 认证模块 -->
    <script src="/js/auth.js"></script>
    <!-- 登录守卫 -->
    <script>
        (function() {
            const params = new URLSearchParams(location.search);
            if (params.get('auth') === '1') {
                sessionStorage.setItem('yy_logged_in', '1');
                if (window.history && window.history.replaceState) {
                    const cleanUrl = location.pathname + location.hash;
                    window.history.replaceState({}, document.title, cleanUrl);
                }
            } else {
                if (window.YYCardAuth && window.YYCardAuth.requireAuth) {
                    window.YYCardAuth.requireAuth();
                } else {
                    if (sessionStorage.getItem('yy_logged_in') !== '1') {
                        window.location.replace('/taichi/');
                    }
                }
            }
        })();
    </script>
</head>
<body>
<div id="app">
    <!-- ===== 大厅视图 ===== -->
    <div id="lobby-view">
        <!-- 游戏区 -->
        <div id="game-area">
            <div class="top-section">
                <div class="header-bar">
                    <div class="user-profile">
                        <img id="lobby-avatar" class="avatar" src="" alt="avatar" onerror="this.src='/assets/default-avatar.png'">
                        <div class="user-info">
                            <div id="lobby-username"></div>
                            <div id="lobby-wallet" class="user-wallet"></div>
                            <div id="lobby-card-count" class="user-card">改名卡：0张</div>
                        </div>
                    </div>
                </div>
                <div class="action-buttons"></div>
            </div>
            <div class="spacer">
                <!-- ★ 匹配按钮改为图片+文字 -->
                <button class="btn-primary" id="enter-match-room-btn">
                    <img src="/assets/logo/ax.png" alt="匹配" class="btn-match-img">
                    <span class="btn-match-text">匹配赛</span>
                </button>
            </div>
            <div id="debug-panel" class="debug-panel"></div>
        </div>

        <!-- ★ 匹配房间视图（原版布局） -->
        <div id="match-room-view" class="match-room" style="display:none;">
            <!-- 星空 -->
            <div class="match-bg">
                <div class="stars"></div>
                <div class="nebula"></div>
            </div>
            <!-- 顶栏 -->
            <div class="match-header" style="margin-top: 12px; padding-top: env(safe-area-inset-top, 10px); padding-bottom: 12px;">
                <button id="back-to-lobby-btn" class="back-btn">←</button>
                <div class="header-center">
                    <div class="match-title">排位竞技</div>
                    <div class="season-text">Season 1</div>
                </div>
                <div class="online-box">
                    <span class="online-dot"></span>
                    <span id="online-count">1286</span>
                </div>
            </div>
            <!-- 中间 -->
            <div class="arena-section">
                <div class="arena-glow"></div>
                <div class="arena-ring ring1"></div>
                <div class="arena-ring ring2"></div>
                <div class="arena-core">⚔</div>
            </div>
            <!-- 玩家 -->
            <div class="player-panel">
                <img id="match-avatar" src="/assets/default-avatar.png" class="match-avatar">
                <div class="player-name" id="match-player-name">玩家</div>
                <div class="player-rank">⭐ 钻石 III</div>
            </div>
            <!-- 状态 -->
            <div class="status-panel">
                <div id="match-status">点击开始匹配</div>
                <div id="match-timer" style="display:none;">00:00</div>
            </div>
            <!-- 按钮 -->
            <div class="button-area">
                <button id="start-match-btn" class="match-btn start-btn" disabled>⚡ 开始匹配</button>
                <button id="cancel-match-btn" class="match-btn cancel-btn" style="display:none;">取消匹配</button>
            </div>
            <!-- 奖励 -->
            <div class="reward-panel">
                <div class="reward-card"><div>今日奖励</div><b>💰100</b></div>
                <div class="reward-card"><div>首胜奖励</div><b>⭐200EXP</b></div>
                <div class="reward-card"><div>连胜奖励</div><b>🔥×3</b></div>
            </div>
        </div>

        <!-- 资产区已移除，独立为 assetpage.html -->
    </div>

    <!-- ===== 对战视图 ===== -->
    <div id="battle-view" style="display:none;">
        <span id="round-num" style="display:none;">1</span>
        <span id="my-health" style="display:none;">100</span>
        <div class="top-center-info prepare-only">
            <span>🔄 回合 <span id="round-num-top">1</span></span>
            <span>❤️ <span id="my-health-top">100</span></span>
        </div>
        <div class="top-right-actions">
            <button class="btn" id="leave-battle-btn">🚪 退出</button>
            <button class="btn" id="settings-btn">⚙️</button>
        </div>
        <div class="players-status-bar">
            <div id="player-status-list" class="player-status-list"></div>
        </div>
        <div class="shop-area prepare-only">
            <div class="shop-info">
                <span>🏪 Lv.<span id="shop-level">1</span></span>
                <span>💰 <span id="my-gold">5</span></span>
            </div>
            <div id="shop-container" class="shop-cards"></div>
            <div class="shop-bottom-bar">
                <div class="shop-actions">
                    <button class="btn" id="refresh-shop-btn"> 刷新</button>
                    <button class="btn" id="buy-exp-btn"> 升级</button>
                </div>
                <div class="prepare-timer-btn" style="pointer-events: none;">
                    <div class="prepare-num" id="phase-timer">25</div>
                    <div class="prepare-text">倒计时</div>
                </div>
            </div>
            <button id="buy-exp-btn-bottom" style="display:none;"></button>
        </div>
        <div class="board-area">
            <div class="enemy-board-section battle-only">
                <div id="enemy-board" class="board"></div>
            </div>
            <div class="battle-divider battle-only" id="battle-progress-wrapper" style="display: none; flex-direction: column; align-items: center; justify-content: center; gap: 6px; margin: 8px 0;"></div>
            <div class="my-board-section">
                <div id="my-board" class="board"></div>
            </div>
        </div>
        <div class="hand-area">
            <div class="hand-label"><span id="hand-count">0</span>/15</div>
            <div id="hand-container" class="hand"></div>
        </div>
    </div>
</div>

<!-- ★ 右上角按钮容器 -->
<div id="side-btn-container" style="position: fixed; top: 80px; right: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;"></div>

<script src="/js/sidebtn.js"></script>

<script>
    // ==================== 顶部回合/血量同步 ====================
    const roundNumTop = document.getElementById('round-num-top');
    const myHealthTop = document.getElementById('my-health-top');
    const originalRoundNum = document.getElementById('round-num');
    const originalMyHealth = document.getElementById('my-health');
    if (originalRoundNum && roundNumTop) {
        const roundObserver = new MutationObserver(() => { roundNumTop.textContent = originalRoundNum.textContent; });
        roundObserver.observe(originalRoundNum, { childList: true, characterData: true, subtree: true });
    }
    if (originalMyHealth && myHealthTop) {
        const healthObserver = new MutationObserver(() => { myHealthTop.textContent = originalMyHealth.textContent; });
        healthObserver.observe(originalMyHealth, { childList: true, characterData: true, subtree: true });
    }

    // ==================== 谷歌邮箱同步 ====================
    async function syncGoogleProfile(user, supabase) {
        if (!user || user.app_metadata?.provider !== 'google') return;
        const googleEmail = user.email;
        if (!googleEmail) return;
        const { data: existing } = await supabase
            .from('profiles')
            .select('id, google_email')
            .eq('google_email', googleEmail)
            .maybeSingle();
        if (!existing) {
            const { error } = await supabase.from('profiles').upsert({
                id: user.id,
                google_email: googleEmail,
                display_name: user.user_metadata?.full_name || googleEmail,
                avatar_url: user.user_metadata?.avatar_url || '',
                rename_card_count: 1,
                username: ''
            }, { onConflict: 'id' });
            if (error) console.error('谷歌档案写入失败:', error);
            else console.log('✅ 谷歌邮箱已绑定到当前用户');
        } else if (existing.id !== user.id) {
            const { error } = await supabase.from('profiles')
                .update({ id: user.id, google_email: googleEmail })
                .eq('id', existing.id);
            if (error) console.error('谷歌邮箱迁移失败:', error);
            else console.log('⚠️ 谷歌邮箱已迁移到新 UID');
        } else {
            console.log('✅ 谷歌邮箱绑定正确，UID 未变');
        }
    }

    // ==================== 主入口 ====================
    window.initApp = async function() {
        // 等待导航栏创建完成
        await new Promise(r => {
            if (document.getElementById('yy-nav')) r();
            else {
                const obs = new MutationObserver(() => {
                    if (document.getElementById('yy-nav')) { obs.disconnect(); r(); }
                });
                obs.observe(document.body, { childList: true, subtree: true });
            }
        });

        const auth = window.YYCardAuth;
        const profileUI = window.YYCardProfileUI;

        const success = await auth.init();
        if (!success) return;
        sessionStorage.setItem('yy_logged_in', '1');

        if (window.YYCardHeartbeat && auth.currentUser) {
            const userId = auth.currentUser.id;
            window.YYCardHeartbeat.startHeartbeat(userId);
            window.YYCardHeartbeat.setupCleanupOnUnload(userId);
        }

        if (auth.currentUser) {
            await syncGoogleProfile(auth.currentUser, window.supabase);
        }

        profileUI.update();
        if (window.YYCardCheckin) window.YYCardCheckin.init();
        profileUI.bindEvents();

        if (window.YYCardTgShare) {
            await window.YYCardTgShare.init();
        }

        if (window.YYCardCreateRoom) {
            window.YYCardCreateRoom.init();
        }

        window.addEventListener('beforeunload', () => {
            const uid = auth.currentUser?.id;
            if (!uid) return;
            const isInBattle = document.getElementById('battle-view').style.display === 'block';
            const isMatching = document.getElementById('cancel-match-btn').style.display === 'inline-block';
            if (!isInBattle && !isMatching) {
                fetch(`${window.YYCardConfig.SUPABASE_URL}/rest/v1/room_players?player_id=eq.${uid}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': window.YYCardConfig.SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${auth.currentSession?.access_token}`,
                        'Content-Type': 'application/json'
                    },
                    keepalive: true
                }).catch(e => console.warn('页面关闭清理失败:', e));
            }
        });

        await window.YYCardReconnect.check();
        auth.log('✅ 大厅初始化完成');

        // ==================== 语言切换功能 ====================
        let currentLang = (auth.currentProfile && auth.currentProfile.language) || 'zh';

        async function toggleLanguage() {
            if (!auth.currentUser) return;
            const newLang = currentLang === 'zh' ? 'en' : 'zh';
            const { error } = await window.supabase
                .from('profiles')
                .update({ language: newLang })
                .eq('id', auth.currentUser.id);
            if (error) {
                console.error('语言更新失败:', error);
                return;
            }
            currentLang = newLang;
            if (auth.currentProfile) auth.currentProfile.language = newLang;
            const displayEl = document.getElementById('lang-display');
            if (displayEl) displayEl.textContent = newLang === 'zh' ? '中文' : 'English';
        }

        // ==================== 右上角按钮初始化 ====================
        const settingsSvg = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M19.14,12.94a7.48,7.48,0,0,0,.05-.94,7.48,7.48,0,0,0-.05-.94l2.03-1.58a.5.5,0,0,0,.12-.64l-1.92-3.32a.5.5,0,0,0-.6-.22l-2.39.96a7.14,7.14,0,0,0-1.63-.94l-.36-2.54A.5.5,0,0,0,13.9,2H10.1a.5.5,0,0,0-.49.42L9.25,4.96a7.14,7.14,0,0,0-1.63.94L5.23,4.94a.5.5,0,0,0-.6.22L2.71,8.48a.5.5,0,0,0,.12.64l2.03,1.58a7.48,7.48,0,0,0-.05.94,7.48,7.48,0,0,0,.05.94L2.83,14.16a.5.5,0,0,0-.12.64l1.92,3.32a.5.5,0,0,0,.6.22l2.39-.96a7.14,7.14,0,0,0,1.63.94l.36,2.54a.5.5,0,0,0,.49.42h3.8a.5.5,0,0,0,.49-.42l.36-2.54a7.14,7.14,0,0,0,1.63-.94l2.39.96a.5.5,0,0,0,.6-.22l1.92-3.32a.5.5,0,0,0-.12-.64ZM12,15.5A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z"/></svg>`;
        const noticeSvg = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M12 2a1 1 0 0 1 1 1v1.07A7 7 0 0 1 19 11v5l2 2v1H3v-1l2-2v-5a7 7 0 0 1 6-6.93V3a1 1 0 0 1 1-1zm-3 18a3 3 0 0 0 6 0H9z"/></svg>`;
        const mailSvg = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path fill="currentColor" d="M4 5C3.45 5 3 5.45 3 6v12c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V6c0-.55-.45-1-1-1H4zm1 2l7 5.5L19 7H5z"/></svg>`;

        const sideContainer = document.getElementById('side-btn-container');
        if (sideContainer && window.YYCardSideBtn) {
            // 1. 设置按钮（包含语言切换）
            const settingsObj = window.YYCardSideBtn.createWithPanel({
                iconSvg: settingsSvg,
                text: '设置',
                title: '游戏设置',
                contentHtml: `
                    <div class="settings-item" id="lang-switch-item">
                        <span>语言设置</span>
                        <span id="lang-display" style="opacity:.8">${currentLang === 'zh' ? '中文' : 'English'}</span>
                    </div>
                    <div class="settings-item"><span>音效音量</span><span style="opacity:.7">调节 ›</span></div>
                    <div class="settings-item"><span>背景音乐</span><span style="opacity:.7">开启 ›</span></div>
                    <div class="settings-item"><span>账号管理</span><span style="opacity:.7">查看 ›</span></div>
                `,
                appendTo: sideContainer
            });
            // 为语言设置项绑定点击事件，并确保每次打开面板时更新显示
            if (settingsObj && settingsObj.overlay) {
                const langSwitchItem = settingsObj.overlay.querySelector('#lang-switch-item');
                if (langSwitchItem) {
                    langSwitchItem.addEventListener('click', toggleLanguage);
                }
                // 监听面板显示以同步语言状态
                const observer = new MutationObserver(() => {
                    if (settingsObj.overlay.classList.contains('active')) {
                        currentLang = (auth.currentProfile && auth.currentProfile.language) || currentLang;
                        const displayEl = document.getElementById('lang-display');
                        if (displayEl) displayEl.textContent = currentLang === 'zh' ? '中文' : 'English';
                    }
                });
                observer.observe(settingsObj.overlay, { attributes: true, attributeFilter: ['class'] });
            }

            // 2. 公告按钮
            window.YYCardSideBtn.createWithPanel({
                iconSvg: noticeSvg,
                text: '公告',
                title: '最新公告',
                contentHtml: `
                    <div class="settings-item"><span>新版本上线</span><span style="opacity:.7">07-07</span></div>
                    <div class="settings-item"><span>排位赛开启</span><span style="opacity:.7">07-06</span></div>
                    <div class="settings-item"><span>新卡牌预告</span><span style="opacity:.7">07-05</span></div>
                `,
                appendTo: sideContainer
            });

            // 3. 邮件按钮
            window.YYCardSideBtn.createWithPanel({
                iconSvg: mailSvg,
                text: '邮件',
                title: '游戏邮箱',
                contentHtml: `
                    <div class="settings-item"><span>系统邮件</span><span style="color:#ffd76a">3 封未读</span></div>
                    <div class="settings-item"><span>奖励领取</span><span style="opacity:.7">查看 ›</span></div>
                    <div class="settings-item"><span>对战记录</span><span style="opacity:.7">查看 ›</span></div>
                `,
                appendTo: sideContainer
            });
        }

        // 默认显示游戏区
        document.getElementById('game-area').style.display = 'block';
    };

    document.addEventListener('DOMContentLoaded', () => {
        if (typeof window.initApp === 'function') window.initApp();
    });
</script>

<!-- Telegram Mini App 初始化 -->
<script>
    (function() {
        if (!window.Telegram || !window.Telegram.WebApp) return;
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    })();
