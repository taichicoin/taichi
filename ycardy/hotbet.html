<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>热点预测 · YY Card</title>

    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YY Card">

    <link rel="stylesheet" href="/css/hotbet.css">
    <link rel="stylesheet" href="/css/app.css">

    <!-- 全局配置 -->
    <script src="/js/config.js"></script>
    <!-- 登录检查 -->
    <script src="/js/auth-check.js"></script>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        if (typeof supabase === 'undefined') document.write('<script src="https://unpkg.com/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"><\/script>');
    </script>
    <script>
        if (typeof supabase === 'undefined') document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.45.0/supabase.min.js"><\/script>');
    </script>
</head>
<body>
    <!-- 热点预测容器 -->
    <div id="hotbet-area" style="display:flex; flex-direction:column; overflow:hidden; min-height:100vh; padding-bottom:60px;"></div>

    <!-- 公共导航 -->
    <script src="/js/nav.js"></script>

    <!-- 热点预测专属脚本 -->
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/hotbetpage/lang.js"></script>
    <script src="/js/hotbetpage/chiprender.js"></script>
    <script src="/js/hotbetpage/worldcup.js"></script>
    <script src="/js/hotbetpage/crypto.js"></script>
    <script src="/js/hotbetpage/wcbet.js"></script>
    <script src="/js/hotbetpage/mybets.js"></script>
    <script src="/js/hotbetpage/hotbet.js"></script>

    <script>
        (async function() {
            const auth = window.YYCardAuth;
            if (!auth.currentUser) {
                await auth.init();
                if (!auth.currentUser) return;
            }

            if (window.YYCardHotBetLang && window.YYCardHotBetLang.init) {
                await window.YYCardHotBetLang.init();
            }

            if (window.YYCardHotBet && window.YYCardHotBet.init) {
                try {
                    await window.YYCardHotBet.init();
                } catch (err) {
                    console.error('热点预测初始化失败:', err);
                }
            }

            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        })();
    </script>
</body>
</html>
