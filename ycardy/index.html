<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 · YY Card</title>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <!-- 你的公共配置 (包含 SUPABASE_URL, SUPABASE_ANON_KEY) -->
    <script src="/js/config.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0b0f1c url('/assets/default-avatar.png') center center / cover no-repeat;
            background-image: linear-gradient(145deg, rgba(11, 15, 28, 0.85) 0%, rgba(26, 31, 51, 0.85) 100%),
                              url('/assets/default-avatar.png');
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f0f0f0;
        }
        .login-box {
            max-width: 420px;
            background: rgba(20, 28, 48, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d76e, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
        }
        .btn-google {
            background: #fff;
            color: #1e1e2f;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #0a0e17;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn-google:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #0a0e17;
        }
        .footer { margin-top: 32px; opacity: 0.7; font-size: 0.9rem; }
        .loading-text { margin-top: 24px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="login-box" id="login-box">
    <div class="logo">⚔️ YY Card</div>
    <button class="btn-google" id="google-login-btn">
        <span style="font-size:1.8rem;">G</span> 使用 Google 登录
    </button>
    <div class="footer">山海经 · 西游 · 三国</div>
</div>

<div class="loading-text" id="loading-text" style="display:none;">
    🔄 正在检测登录状态...
</div>

<script>
    (async function() {
        // 确保 supabase 和配置已经加载
        if (typeof supabase === 'undefined' || !window.YYCardConfig) {
            document.getElementById('loading-text').style.display = 'block';
            document.getElementById('loading-text').textContent = '❌ 系统加载失败，请刷新重试';
            return;
        }

        const supabaseClient = supabase.createClient(
            window.YYCardConfig.SUPABASE_URL,
            window.YYCardConfig.SUPABASE_ANON_KEY
        );

        // 1. 检查是否已登录
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            // 已登录，直接跳转到游戏大厅
            window.location.replace('game.html');
            return;
        }

        // 2. 未登录，显示登录框
        document.getElementById('loading-text').style.display = 'none';
        document.getElementById('login-box').style.display = '';

        // 3. 绑定 Google 登录
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const btn = document.getElementById('google-login-btn');
            btn.disabled = true;
            btn.textContent = '⏳ 正在跳转...';

            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // 登录成功后回调到这个目录（会再次加载 index.html，
                    // 此时 getSession 会拿到 session 并自动跳转 game.html）
                    redirectTo: 'https://taichicoin.xyz/ycardy/'
                }
            });

            if (error) {
                alert('登录失败: ' + error.message);
                btn.disabled = false;
                btn.textContent = 'G  使用 Google 登录';
            }
        });
    })();
</script>

</body>
</html>
