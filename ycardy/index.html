<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 · YY Card</title>

    <!-- 公共配置 -->
    <script src="/js/config.js"></script>
    <!-- 在线检测排队模块 -->
    <script src="/index/onlinecheck.js"></script>
    <!-- 统一加载与转场模块 -->
    <link rel="stylesheet" href="/index/loading.css">
    <script src="/index/loading.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0b0f1c url('/assets/default-avatar.png') center center / cover no-repeat;
            background-image: linear-gradient(145deg, rgba(11, 15, 28, 0.85) 0%, rgba(26, 31, 51, 0.85) 100%),
                              url('/assets/default-avatar.png');
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f0f0f0;
        }
        .login-box {
            max-width: 420px;
            background: rgba(20, 28, 48, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
            display: none;
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d76e, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
        }
        .btn-google, .btn-telegram {
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-bottom: 16px;
        }
        .btn-google {
            background: #fff;
            color: #1e1e2f;
        }
        .btn-telegram {
            background: #2AABEE;
            color: white;
        }
        .btn-google:active, .btn-telegram:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .footer { margin-top: 32px; opacity: 0.7; font-size: 0.9rem; }
        #log-panel {
            max-width: 420px;
            margin: 10px auto;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.75rem;
            color: #7bffb1;
            text-align: left;
            max-height: 180px;
            overflow-y: auto;
            display: none;
        }
        #log-panel div {
            margin: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }
        .log-error { color: #ff7b7b; }
    </style>
</head>
<body>

<div style="display: flex; flex-direction: column; align-items: center; width: 100%;">

    <div class="login-box" id="login-box">
        <div class="logo">⚔️ YY Card</div>
        <button class="btn-google" id="google-login-btn">
            <span style="font-size:1.8rem;">G</span> 使用 Google 登录
        </button>
        <button class="btn-telegram" id="telegram-login-btn">
            <span style="font-size:1.8rem;">✈️</span> 使用 Telegram 登录
        </button>
        <div class="footer">山海经 · 西游 · 三国</div>
    </div>

    <div id="log-panel"></div>

</div>

<script>
    const logPanel = document.getElementById('log-panel');
    function pageLog(msg, isError = false) {
        logPanel.style.display = 'block';
        const line = document.createElement('div');
        line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        if (isError) line.className = 'log-error';
        logPanel.appendChild(line);
        logPanel.scrollTop = logPanel.scrollHeight;
    }

    // ========== SDK 动态加载 ==========
    async function loadSupabaseSDK() {
        const CDN_LIST = [
            'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js',
            'https://unpkg.com/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.45.0/supabase.min.js'
        ];
        for (const url of CDN_LIST) {
            if (typeof supabase !== 'undefined' && typeof supabase.createClient === 'function') return true;
            try {
                await new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = url;
                    script.onload = resolve;
                    script.onerror = reject;
                    document.head.appendChild(script);
                });
                await new Promise(r => setTimeout(r, 200));
            } catch(e) {}
        }
        return (typeof supabase !== 'undefined' && typeof supabase.createClient === 'function');
    }

    // ========== Telegram 登录（Telegram 环境内） ==========
    async function telegramLogin(supabaseClient) {
        if (!window.Telegram?.WebApp?.initData) {
            pageLog('❌ 不在 Telegram 环境中', true);
            alert('请在 Telegram 中打开');
            return false;
        }
        const tg = window.Telegram.WebApp;
        try {
            const res = await fetch(`${window.YYCardConfig.SUPABASE_URL}/functions/v1/telegram-simple-auth`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    initData: tg.initData,
                    api_key: 'sk_MyGame_2026_tg_checkin_!@#QwErTy'
                })
            });
            const body = await res.json();
            if (body.error) {
                pageLog('Telegram 登录失败: ' + body.error, true);
                return false;
            }
            await supabaseClient.auth.setSession({
                access_token: body.access_token,
                refresh_token: body.refresh_token
            });
            pageLog('✅ Telegram 登录成功');
            return true;
        } catch(e) {
            pageLog('Telegram 登录异常: ' + e.message, true);
            return false;
        }
    }

    // ========== 主流程 ==========
    (async function() {
        pageLog('🚀 开始初始化');

        if (!window.YYCardConfig) {
            pageLog('❌ 配置加载失败', true);
            document.body.innerHTML += '<div style="color:red;position:fixed;top:20px;">配置加载失败，请刷新</div>';
            return;
        }

        const sdkLoaded = await loadSupabaseSDK();
        if (!sdkLoaded) {
            pageLog('❌ SDK 加载失败', true);
            return;
        }

        let supabaseClient;
        try {
            supabaseClient = supabase.createClient(
                window.YYCardConfig.SUPABASE_URL,
                window.YYCardConfig.SUPABASE_ANON_KEY,
                { auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } }
            );
            pageLog('✅ 客户端创建成功');
        } catch(e) {
            pageLog('❌ 客户端创建失败: ' + e.message, true);
            return;
        }

        // 检查是否已登录
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            pageLog('✅ 已登录，进入统一加载流程');
            await YYCardLoading.start(supabaseClient, YYCardOnlineCheck);
            return;
        }

        // ===== 未登录：显示登录按钮（两个按钮都始终可见） =====
        const isTelegram = !!(window.Telegram?.WebApp?.initData);
        document.getElementById('login-box').style.display = 'block';

        // Google 登录按钮
        const googleBtn = document.getElementById('google-login-btn');
        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            googleBtn.textContent = '⏳ 跳转中...';
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.YYCardConfig.LOGIN_PAGE_URL }
            });
            if (error) {
                alert('登录失败: ' + error.message);
                googleBtn.disabled = false;
                googleBtn.textContent = 'G  使用 Google 登录';
            }
        });

        // Telegram 登录按钮（始终显示，根据环境执行不同操作）
        const telegramBtn = document.getElementById('telegram-login-btn');
        telegramBtn.addEventListener('click', async () => {
            if (isTelegram) {
                // 在 Telegram 内：走边缘函数登录
                telegramBtn.disabled = true;
                telegramBtn.textContent = '⏳ 登录中...';
                const success = await telegramLogin(supabaseClient);
                if (!success) {
                    telegramBtn.disabled = false;
                    telegramBtn.textContent = '✈️ 使用 Telegram 登录';
                    return;
                }
                await YYCardLoading.start(supabaseClient, YYCardOnlineCheck);
            } else {
                // 普通浏览器：跳转到 Telegram 机器人链接
                window.open('https://t.me/YYCARDbot', '_blank');
            }
        });

        pageLog('👆 显示登录按钮');
    })();
</script>
</body>
</html>
