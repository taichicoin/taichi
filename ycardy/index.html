<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 · YY Card</title>

    <!-- Supabase SDK (备选CDN，如果这个仍不行可换另一个) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <!-- 公共配置 -->
    <script src="/js/config.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0b0f1c url('/assets/default-avatar.png') center center / cover no-repeat;
            background-image: linear-gradient(145deg, rgba(11, 15, 28, 0.85) 0%, rgba(26, 31, 51, 0.85) 100%),
                              url('/assets/default-avatar.png');
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f0f0f0;
        }
        .login-box {
            max-width: 420px;
            background: rgba(20, 28, 48, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
            margin-bottom: 20px;
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d76e, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
        }
        .btn-google {
            background: #fff;
            color: #1e1e2f;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #0a0e17;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn-google:active {
            transform: translateY(2px);
            box-shadow: 0 4px 0 #0a0e17;
        }
        .footer { margin-top: 32px; opacity: 0.7; font-size: 0.9rem; }
        .loading-text { margin-top: 24px; opacity: 0.8; font-size: 0.9rem; }
        #log-panel {
            max-width: 420px;
            margin: 10px auto;
            background: rgba(0,0,0,0.7);
            border-radius: 12px;
            padding: 12px;
            font-size: 0.75rem;
            color: #7bffb1;
            text-align: left;
            max-height: 220px;
            overflow-y: auto;
            display: none;
        }
        #log-panel div {
            margin: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2px;
        }
        .log-error { color: #ff7b7b; }
    </style>
</head>
<body>

<div style="display: flex; flex-direction: column; align-items: center; width: 100%;">

    <div class="login-box" id="login-box">
        <div class="logo">⚔️ YY Card</div>
        <button class="btn-google" id="google-login-btn">
            <span style="font-size:1.8rem;">G</span> 使用 Google 登录
        </button>
        <div class="footer">山海经 · 西游 · 三国</div>
    </div>

    <div class="loading-text" id="loading-text" style="display:none;">
        🔄 正在检测登录状态...
    </div>

    <div id="log-panel"></div>

</div>

<script>
    // 页面内日志
    const logPanel = document.getElementById('log-panel');
    function pageLog(msg, isError = false) {
        logPanel.style.display = 'block';
        const line = document.createElement('div');
        line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
        if (isError) line.className = 'log-error';
        logPanel.appendChild(line);
        logPanel.scrollTop = logPanel.scrollHeight;
        console.log(msg);
    }

    (async function() {
        pageLog('🚀 脚本开始');

        // 1. 检查 supabase 对象
        pageLog('typeof supabase: ' + typeof window.supabase);
        if (typeof window.supabase === 'undefined') {
            pageLog('❌ supabase 对象不存在，SDK 未加载', true);
            return;
        }

        // 打印 supabase 对象上的所有属性
        const supabaseKeys = Object.keys(window.supabase).sort();
        pageLog('supabase 属性: ' + (supabaseKeys.length ? supabaseKeys.join(', ') : '(空对象)'));

        // 检查常见的构造方式
        const supabaseObj = window.supabase;
        let supabaseClient = null;

        // 方式1: supabase.createClient (推荐方式)
        if (typeof supabaseObj.createClient === 'function') {
            pageLog('✅ 找到 createClient 方法，尝试创建客户端...');
            try {
                supabaseClient = supabaseObj.createClient(
                    window.YYCardConfig.SUPABASE_URL,
                    window.YYCardConfig.SUPABASE_ANON_KEY,
                    {
                        auth: {
                            persistSession: true,
                            autoRefreshToken: true,
                            detectSessionInUrl: true,
                        }
                    }
                );
                pageLog('✅ createClient 成功');
            } catch (e) {
                pageLog('❌ createClient 调用失败: ' + e.message, true);
            }
        }

        // 方式2: supabase 本身是构造函数 (new supabase(...))
        if (!supabaseClient && typeof supabaseObj === 'function') {
            pageLog('🔍 supabase 本身是函数，尝试 new supabase()...');
            try {
                supabaseClient = new supabaseObj(
                    window.YYCardConfig.SUPABASE_URL,
                    window.YYCardConfig.SUPABASE_ANON_KEY,
                    {
                        auth: {
                            persistSession: true,
                            autoRefreshToken: true,
                            detectSessionInUrl: true,
                        }
                    }
                );
                pageLog('✅ new supabase() 成功');
            } catch (e) {
                pageLog('❌ new supabase() 失败: ' + e.message, true);
            }
        }

        // 方式3: 可能 supabase.default.createClient 或 supabase.SupabaseClient
        if (!supabaseClient) {
            if (supabaseObj.default && typeof supabaseObj.default.createClient === 'function') {
                pageLog('🔍 尝试 supabase.default.createClient');
                try {
                    supabaseClient = supabaseObj.default.createClient(
                        window.YYCardConfig.SUPABASE_URL,
                        window.YYCardConfig.SUPABASE_ANON_KEY
                    );
                    pageLog('✅ supabase.default.createClient 成功');
                } catch (e) {
                    pageLog('❌ 失败: ' + e.message, true);
                }
            }
        }

        if (!supabaseClient) {
            pageLog('❌ 所有尝试均失败，无法创建 Supabase 客户端', true);
            document.getElementById('loading-text').style.display = 'block';
            document.getElementById('loading-text').textContent = '❌ 系统初始化失败，请截图日志并联系开发者';
            return;
        }

        // 2. 检查 session
        try {
            const { data, error: sessionErr } = await supabaseClient.auth.getSession();
            if (sessionErr) {
                pageLog('⚠️ getSession 错误: ' + sessionErr.message, true);
            } else {
                pageLog('session: ' + (data.session ? '已登录' : '未登录'));
            }

            if (data.session) {
                pageLog('✅ 已登录，跳转到 game.html');
                window.location.replace('game.html');
                return;
            }
        } catch (e) {
            pageLog('❌ getSession 异常: ' + e.message, true);
            // 仍然显示登录按钮
        }

        // 3. 显示登录界面
        document.getElementById('loading-text').style.display = 'none';
        document.getElementById('login-box').style.display = '';
        pageLog('👆 登录框已显示');

        // 4. 绑定登录按钮
        const btn = document.getElementById('google-login-btn');
        if (!btn) {
            pageLog('❌ 找不到登录按钮', true);
            return;
        }

        btn.addEventListener('click', async () => {
            pageLog('🖱️ 按钮点击');
            btn.disabled = true;
            btn.textContent = '⏳ 跳转中...';

            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: 'https://taichicoin.xyz/ycardy/'
                    }
                });

                if (error) {
                    pageLog('❌ 登录错误: ' + error.message, true);
                    alert('登录失败: ' + error.message);
                    btn.disabled = false;
                    btn.textContent = 'G  使用 Google 登录';
                } else {
                    pageLog('✅ 已发起 OAuth，等待跳转...');
                }
            } catch (e) {
                pageLog('❌ 异常: ' + e.message, true);
                alert('登录异常: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'G  使用 Google 登录';
            }
        });

        pageLog('✅ 一切就绪');
    })();
</script>

</body>
</html>
