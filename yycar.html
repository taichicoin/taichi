<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YY Card · 游戏大厅</title>
    <!-- 修复1：SDK加载加兜底+完整性校验，避免加载失败导致代码崩溃 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onerror="fallbackSupabaseLoad()"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b0f1c 0%, #1a1f33 100%);
            min-height: 100vh;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        #app {
            max-width: 500px;
            width: 100%;
            background: rgba(20, 28, 48, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #f5d76e; object-fit: cover; background: #2a3a5c; }
        .user-info { font-weight: 600; }
        .user-wallet { font-size: 0.7rem; opacity: 0.8; }
        .user-card { font-size: 0.7rem; color: #f5d76e; opacity: 0.9; }
        .btn {
            background: #2e3f5e; color: white; border: none; padding: 10px 16px;
            border-radius: 40px; font-weight: 600; cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(145deg, #f5d76e, #f0b34b); color: #0b0f1c;
            padding: 16px; width: 100%; font-size: 1.2rem; border: none;
            border-radius: 60px; font-weight: bold; cursor: pointer; margin: 10px 0;
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .action-buttons .btn { flex: 1; }
        .debug-panel {
            margin-top: 20px; padding: 10px; background: #1a1e2e;
            border-radius: 10px; font-size: 0.8rem; max-height: 200px; overflow-y: auto;
        }
        .error-msg { color: #ff7b7b; }
        .success-msg { color: #7bffb1; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center;
            justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: #1e2a44; padding: 24px; border-radius: 24px;
            max-width: 380px; width: 90%; text-align: center;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        input {
            width: 100%; padding: 14px; border-radius: 40px; border: none;
            background: #0f1a2b; color: white; font-size: 1rem;
            text-align: center; margin: 10px 0;
        }
        /* 修复：页面加载中禁止点击，避免重复操作触发异常 */
        body.loading { pointer-events: none; opacity: 0.8; }
    </style>
</head>
<body class="loading">
<div id="app">
    <div id="lobby-view">
        <div class="header-bar">
            <div class="user-profile">
                <!-- 头像加载失败自动降级默认图 -->
                <img id="lobby-avatar" class="avatar" src="" alt="avatar" onerror="this.src='/yycard/assets/default-avatar.png'">
                <div class="user-info">
                    <div id="lobby-username"></div>
                    <div id="lobby-wallet" class="user-wallet"></div>
                    <!-- 新增改名卡数量显示 -->
                    <div id="lobby-card-count" class="user-card">改名卡：0张</div>
                </div>
            </div>
            <button class="btn" id="logout-btn">登出</button>
        </div>
        <button class="btn-primary" id="start-match-btn" disabled>请先设置游戏ID</button>
        <div class="action-buttons">
            <button class="btn" id="set-username-btn">设置游戏ID</button>
            <button class="btn" id="bind-wallet-btn">绑定钱包</button>
            <button class="btn" id="change-avatar-btn">修改头像</button>
        </div>
        <div id="debug-panel" class="debug-panel"></div>
    </div>
</div>

<!-- 头像上传模态框 -->
<div id="avatar-modal" class="modal">
    <div class="modal-content">
        <h3>更换头像</h3>
        <p id="cooldown-warning"></p>
        <input type="file" id="avatar-file-input" accept="image/png,image/jpeg,image/webp">
        <div id="upload-status"></div>
        <div class="modal-buttons">
            <button class="btn" id="upload-avatar-btn">上传</button>
            <button class="btn" id="cancel-avatar-btn">取消</button>
        </div>
    </div>
</div>

<script>
    // 修复2：SDK加载失败兜底，避免代码崩溃
    function fallbackSupabaseLoad() {
        console.warn('主CDN加载失败，尝试备用CDN');
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/@supabase/supabase-js@2';
        script.onload = () => {
            console.log('备用CDN加载成功');
            initAfterSdkLoad();
        };
        script.onerror = () => {
            alert('Supabase SDK加载失败，请检查网络后刷新页面');
        };
        document.head.appendChild(script);
    }

    // 全局配置常量
    const SUPABASE_URL = 'https://sznjaotjoljaiawbvfro.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN';
    const DEFAULT_AVATAR = '/yycard/assets/default-avatar.png';
    const RENAME_COOLDOWN_DAYS = 365; // 改名冷却1年
    const LOGIN_PAGE_URL = 'https://taichicoin.xyz/yycard/signup'; // 修复3：绝对路径锁死，避免GitHub Pages路径解析错误
    const MAX_RETRY_COUNT = 3; // 会话校验最大重试次数，避免临时失败直接跳转

    let supabase = null;
    let currentUser = null;
    let currentProfile = null;
    let retryCount = 0;
    const debugPanel = document.getElementById('debug-panel');

    // 日志函数
    function log(msg, isError = false) {
        console.log(msg);
        const line = document.createElement('div');
        line.className = isError ? 'error-msg' : 'success-msg';
        line.textContent = (isError ? '❌ ' : '✅ ') + msg;
        debugPanel.appendChild(line);
        debugPanel.scrollTop = debugPanel.scrollHeight;
    }

    // 工具函数
    function formatAddress(addr) {
        if (!addr) return '';
        return addr.slice(0, 6) + '...' + addr.slice(-4);
    }

    // 冷却时间计算
    function calculateCooldown(lastModified, cooldownDays) {
        if (!lastModified) return { canChange: true, remaining: 0, remainingDays: 0 };
        const diff = Date.now() - new Date(lastModified).getTime();
        const cooldownMs = cooldownDays * 24 * 60 * 60 * 1000;
        if (diff >= cooldownMs) return { canChange: true, remaining: 0, remainingDays: 0 };
        const remainingMs = cooldownMs - diff;
        const remainingDays = Math.ceil(remainingMs / (24 * 60 * 60 * 1000));
        return { canChange: false, remaining: remainingMs, remainingDays: remainingDays };
    }

    function formatRemaining(ms) {
        const days = Math.floor(ms / (24 * 60 * 60 * 1000));
        const hours = Math.floor((ms % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
        return `${days}天${hours}小时`;
    }

    // 更新UI
    function updateUI() {
        if (!currentProfile) return;
        // 头像地址优先级：用户上传 > 谷歌头像 > 默认头像
        const avatarSrc = currentProfile.avatar_url || currentUser?.user_metadata?.avatar_url || DEFAULT_AVATAR;
        document.getElementById('lobby-avatar').src = avatarSrc;
        document.getElementById('lobby-username').textContent = 
            currentProfile.username || currentProfile.display_name || currentUser.email;
        document.getElementById('lobby-wallet').textContent = 
            currentProfile.wallet_address ? formatAddress(currentProfile.wallet_address) : '未绑定钱包';
        // 显示改名卡数量
        document.getElementById('lobby-card-count').textContent = `改名卡：${currentProfile.rename_card_count || 0}张`;
        
        const btn = document.getElementById('start-match-btn');
        btn.disabled = !currentProfile.username;
        btn.textContent = currentProfile.username ? '⚡ 开始匹配' : '请先设置游戏ID';
        
        // 页面初始化完成，解除点击限制
        document.body.classList.remove('loading');
    }

    // 绑定事件
    function bindEvents() {
        document.getElementById('logout-btn').onclick = async () => {
            document.body.classList.add('loading');
            await supabase.auth.signOut();
            log('用户已登出，跳转登录页');
            window.location.href = LOGIN_PAGE_URL;
        };

        // 设置游戏ID逻辑，加1年冷却+改名卡机制
        document.getElementById('set-username-btn').onclick = async () => {
            const isFirstSet = !currentProfile.username;
            const renameCooldown = calculateCooldown(currentProfile.username_last_modified, RENAME_COOLDOWN_DAYS);
            const hasCard = (currentProfile.rename_card_count || 0) >= 1;

            // 非首次设置，且冷却未到，且无改名卡：直接禁止
            if (!isFirstSet && !renameCooldown.canChange && !hasCard) {
                alert(`距离上次改名还有${renameCooldown.remainingDays}天冷却，暂无改名卡，无法修改用户名`);
                return;
            }

            // 非首次设置，冷却未到，但有改名卡：二次确认
            let useCardConfirm = false;
            if (!isFirstSet && !renameCooldown.canChange && hasCard) {
                useCardConfirm = confirm(`距离上次改名还有${renameCooldown.remainingDays}天冷却，本次修改将消耗1张改名卡，是否继续？`);
                if (!useCardConfirm) return;
            }

            // 弹出输入框，正则改为1-7位小写字母+数字
            const name = prompt('请输入1-7位小写字母或数字的游戏ID:');
            if (!name) return;
            if (!/^[a-z0-9]{1,7}$/.test(name)) {
                alert('格式错误，必须是1-7位小写字母或数字');
                return;
            }

            // 构造更新数据
            const updateData = {
                username: name,
                username_last_modified: new Date().toISOString()
            };

            // 消耗改名卡的情况：非首次+冷却未到+确认用卡
            if (!isFirstSet && !renameCooldown.canChange && useCardConfirm) {
                updateData.rename_card_count = (currentProfile.rename_card_count || 0) - 1;
            }

            // 执行数据库更新
            const { error } = await supabase
                .from('profiles')
                .update(updateData)
                .eq('id', currentUser.id);
            
            if (error) {
                alert('设置失败: ' + error.message);
                log(`用户名设置失败: ${error.message}`, true);
                return;
            }

            // 刷新本地数据和UI
            const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            currentProfile = data;
            updateUI();

            // 成功提示
            if (isFirstSet) {
                log(`首次设置用户名成功: ${name}，不消耗改名卡`);
                alert('用户名设置成功！');
            } else if (useCardConfirm) {
                log(`用户名修改成功: ${name}，已消耗1张改名卡，剩余${currentProfile.rename_card_count}张`);
                alert(`用户名修改成功！已消耗1张改名卡，剩余${currentProfile.rename_card_count}张`);
            } else {
                log(`用户名修改成功: ${name}，冷却已重置，下次可免费修改时间为1年后`);
                alert('用户名修改成功！下次免费修改需等待1年');
            }
        };

        document.getElementById('bind-wallet-btn').onclick = async () => {
            const addr = prompt('请输入以太坊钱包地址 (0x开头，42位):');
            if (!addr) return;
            if (!/^0x[a-fA-F0-9]{40}$/.test(addr)) {
                alert('无效的以太坊地址');
                return;
            }
            const { error } = await supabase
                .from('profiles')
                .update({ wallet_address: addr })
                .eq('id', currentUser.id);
            if (error) {
                alert('绑定失败: ' + error.message);
                log(`钱包绑定失败: ${error.message}`, true);
                return;
            }
            const { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            currentProfile = data;
            updateUI();
            log(`钱包已绑定: ${formatAddress(addr)}`);
        };

        const avatarModal = document.getElementById('avatar-modal');
        const fileInput = document.getElementById('avatar-file-input');
        const statusDiv = document.getElementById('upload-status');
        const warnDiv = document.getElementById('cooldown-warning');
        
        document.getElementById('change-avatar-btn').onclick = () => {
            const cooldown = calculateCooldown(currentProfile?.avatar_last_modified, 15);
            warnDiv.textContent = cooldown.canChange ? '' : `冷却中，剩余 ${formatRemaining(cooldown.remaining)}`;
            avatarModal.style.display = 'flex';
            fileInput.value = '';
            statusDiv.innerHTML = '';
        };
        
        document.getElementById('upload-avatar-btn').onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;
            
            const cooldown = calculateCooldown(currentProfile?.avatar_last_modified, 15);
            if (!cooldown.canChange) {
                alert('头像每15天只能修改一次');
                return;
            }
            
            const ext = file.name.split('.').pop();
            const path = `${currentUser.id}_${Date.now()}.${ext}`;
            statusDiv.innerHTML = '上传中...';
            
            // 上传头像到存储桶
            const { error: upErr } = await supabase.storage
                .from('avatars')
                .upload(path, file, { upsert: true });
            
            if (upErr) {
                statusDiv.innerHTML = '上传失败: ' + upErr.message;
                log(`头像上传失败: ${upErr.message}`, true);
                return;
            }
            
            // 获取公开URL
            const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(path);
            const newAvatarUrl = urlData.publicUrl;

            // 更新到数据库
            const { error: updateErr } = await supabase
                .from('profiles')
                .update({
                    avatar_url: newAvatarUrl,
                    avatar_last_modified: new Date().toISOString()
                })
                .eq('id', currentUser.id);
            
            if (updateErr) {
                statusDiv.innerHTML = '头像保存失败: ' + updateErr.message;
                log(`头像地址写入数据库失败: ${updateErr.message}`, true);
                return;
            }
            
            // 刷新本地数据和UI
            avatarModal.style.display = 'none';
            const { data: newProfile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
            currentProfile = newProfile;
            updateUI();
            log('头像更新成功，新地址: ' + newAvatarUrl);
        };
        
        document.getElementById('cancel-avatar-btn').onclick = () => {
            avatarModal.style.display = 'none';
        };

        document.getElementById('start-match-btn').onclick = () => {
            alert('匹配功能开发中...');
            log('开始匹配');
        };
    }

    // 修复4：核心会话校验逻辑，增加重试机制，避免临时失败直接跳转
    async function validateUserSession() {
        try {
            log(`🚀 开始校验用户会话，第${retryCount + 1}次尝试`);
            
            // 1. 获取当前登录用户
            const { data: { user }, error: userError } = await supabase.auth.getUser();
            
            // 2. 成功获取到用户，重置重试次数
            if (user && !userError) {
                retryCount = 0;
                currentUser = user;
                log(`当前用户: ${user.email}`);
                return { success: true, user };
            }

            // 3. 获取失败，判断是否需要重试
            retryCount++;
            log(`会话校验失败: ${userError?.message || '用户不存在'}，剩余重试次数: ${MAX_RETRY_COUNT - retryCount}`, true);
            
            // 还有重试次数，延迟重试
            if (retryCount < MAX_RETRY_COUNT) {
                setTimeout(() => validateUserSession(), 1000);
                return { success: false };
            }

            // 重试次数用尽，确认未登录，跳转登录页
            log(`重试次数用尽，确认未登录，跳转登录页`, true);
            window.location.href = LOGIN_PAGE_URL;
            return { success: false };

        } catch (err) {
            // 捕获所有异常，避免代码崩溃
            retryCount++;
            log(`会话校验异常: ${err.message}，剩余重试次数: ${MAX_RETRY_COUNT - retryCount}`, true);
            
            if (retryCount < MAX_RETRY_COUNT) {
                setTimeout(() => validateUserSession(), 1000);
                return { success: false };
            }

            window.location.href = LOGIN_PAGE_URL;
            return { success: false };
        }
    }

    // 主初始化流程
    async function initApp() {
        // 1. 校验用户会话
        const { success } = await validateUserSession();
        if (!success) return;

        try {
            // 2. 查询用户档案，不存在再创建，绝不覆盖已有数据
            let { data: profile, error: profileError } = await supabase
                .from('profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            
            // 3. 首次登录，创建初始档案
            if (profileError && profileError.code === 'PGRST116') {
                log('首次登录，创建用户档案...');
                const { data: newProfile, error: createErr } = await supabase
                    .from('profiles')
                    .insert({
                        id: currentUser.id,
                        display_name: currentUser.user_metadata?.full_name || currentUser.email,
                        avatar_url: currentUser.user_metadata?.avatar_url || DEFAULT_AVATAR,
                        rename_card_count: 1
                    })
                    .select('*')
                    .single();
                
                if (createErr) {
                    log(`档案创建失败: ${createErr.message}`, true);
                    return;
                }
                profile = newProfile;
                log('初始档案创建完成，已赠送1张改名卡');
            } else if (profileError) {
                // 其他查询错误
                log(`档案查询失败: ${profileError.message}`, true);
                return;
            }
            
            // 4. 赋值当前档案，更新UI
            currentProfile = profile;
            log(`档案已加载，头像地址: ${profile.avatar_url || '无'}，改名卡数量: ${profile.rename_card_count || 0}`);
            
            // 5. 绑定事件，完成初始化
            bindEvents();
            updateUI();
            log('✅ 大厅初始化完成');

        } catch (err) {
            log(`初始化异常: ${err.message}`, true);
            document.body.classList.remove('loading');
        }
    }

    // SDK加载完成后初始化
    function initAfterSdkLoad() {
        // 修复5：显式开启会话持久化，确保移动端切换模式会话不丢失
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        });
        initApp();
    }

    // 修复6：监听页面可见性变化/窗口大小变化（移动端切换桌面版触发），重新校验会话，不直接跳转
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && currentUser) {
            log('页面重新可见，刷新用户数据');
            supabase.from('profiles').select('*').eq('id', currentUser.id).single()
                .then(({ data, error }) => {
                    if (!error && data) {
                        currentProfile = data;
                        updateUI();
                    }
                });
        }
    });

    // 窗口大小变化（移动端切换桌面版必触发），不执行跳转，仅刷新数据
    window.addEventListener('resize', () => {
        if (currentUser && currentProfile) {
            updateUI();
        }
    });

    // 页面加载完成后执行初始化
    window.addEventListener('DOMContentLoaded', () => {
        // 检查SDK是否加载成功
        if (window.supabase) {
            initAfterSdkLoad();
        }
    });
</script>
</body>
</html>
