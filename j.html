<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystem,Roboto,sans-serif}
        body{
            background-image:url('./bg.jpg');
            background-size:cover;
            background-position:center center;
            background-repeat:no-repeat;
            background-attachment:fixed;
            min-height:100vh;
            padding:80px 20px 20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            position:relative;
        }
        body::before{
            content:'';
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.4);
            z-index:0;
        }
        .top-bar{
            position:fixed;top:20px;left:20px;right:20px;
            display:flex;justify-content:space-between;gap:12px;z-index:10;
        }
        .btn-small{height:44px;padding:0 20px;border-radius:12px;border:none;font-size:18px;cursor:pointer;}
        .btn-primary{background:#2563eb;color:white;}
        .btn-success{background:#5eead4;color:#0f172a;}
        .address-top{
            height:44px;padding:0 16px;background:white;border-radius:12px;
            font-size:14px;display:none;align-items:center;gap:8px;
        }
        .container{
            width:100%;max-width:480px;background:white;border-radius:24px;
            padding:40px 24px;position:relative;z-index:1;
        }
        h1{font-size:28px;text-align:center;margin-bottom:12px;color:#1e293b;}
        .desc{color:#64748e;text-align:center;margin-bottom:24px;line-height:1.5;}
        .btn-main{width:100%;height:56px;border:none;border-radius:16px;font-size:18px;margin-bottom:12px;cursor:pointer;}
        .btn-success-main{background:#5eead4;color:#0f172a;}
        .btn-main:disabled{opacity:0.5;}
        .form-input{
            width:100%;height:56px;padding:0 16px;border-radius:16px;
            border:1px solid #cbd5e1;font-size:16px;margin-bottom:12px;
        }
        .form-input:disabled{background:#f1f5f9;}
        .status-text{font-size:14px;text-align:center;margin:8px 0;}
        .status-success{color:#10b981;font-weight:500;}
        .status-error{color:#ef4444;}
        .finished{
            background:#d1fae5;color:#065f46;padding:16px;border-radius:12px;text-align:center;margin-bottom:20px;font-weight:600;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="address-top" id="addressTop">
        已连接：<span id="walletDisplay"></span>
    </div>
    <button class="btn-small btn-primary" id="connectBtn">连接钱包</button>
</div>

<div class="container">
    <h1>Twitter 任务</h1>
    <p class="desc">每个钱包仅限参与一次，绑定后不可修改</p>

    <div id="finishedBox" class="finished" style="display:none;">
        ✅ 此钱包已完成全部任务
    </div>

    <input type="text" class="form-input" id="twitterInput" placeholder="输入 Twitter 用户名" disabled>
    <button class="btn-main btn-success-main" id="bindBtn" disabled>确认绑定（永久）</button>

    <input type="text" class="form-input" id="tweetInput" placeholder="粘贴推文链接" disabled>
    <button class="btn-main btn-success-main" id="submitBtn" disabled>提交</button>

    <div class="status-text" id="status"></div>
</div>

<script>
const TALLY_URL = "https://tally.so/r/rjEXEN";

const BIND_KEY  = "TAICHI_BIND";
const DONE_KEY  = "TAICHI_DONE";

let currentAccount = null;

const $connect = document.getElementById('connectBtn');
const $addrBox = document.getElementById('addressTop');
const $display = document.getElementById('walletDisplay');
const $twitter = document.getElementById('twitterInput');
const $bind    = document.getElementById('bindBtn');
const $tweet   = document.getElementById('tweetInput');
const $submit  = document.getElementById('submitBtn');
const $status  = document.getElementById('status');
const $finish  = document.getElementById('finishedBox');

function short(addr){
  return addr ? addr.slice(0,6)+'...'+addr.slice(-4) : '';
}

function provider(){
  return window.ethereum || window.okxwallet || window.tpwallet;
}

function getBind(){
  try{ return JSON.parse(localStorage.getItem(BIND_KEY)) || {} }
  catch(e){ return {} }
}

function getDone(){
  try{ return JSON.parse(localStorage.getItem(DONE_KEY)) || {} }
  catch(e){ return {} }
}

function isBound(){
  if(!currentAccount) return false;
  return !!getBind()[currentAccount.toLowerCase()];
}

function isDone(){
  if(!currentAccount) return false;
  return !!getDone()[currentAccount.toLowerCase()];
}

function saveBind(twitter){
  const d = getBind();
  d[currentAccount.toLowerCase()] = twitter.trim();
  localStorage.setItem(BIND_KEY, JSON.stringify(d));
}

function markDone(){
  const d = getDone();
  d[currentAccount.toLowerCase()] = true;
  localStorage.setItem(DONE_KEY, JSON.stringify(d));
}

function msg(text, isOk){
  $status.textContent = text;
  $status.className = "status-text " + (isOk ? "status-success" : "status-error");
}

// 强制三字段校验：钱包 + Twitter + 链接 必须都有
function canSubmit(){
  if(!currentAccount) return false;
  const twitter = getBind()[currentAccount.toLowerCase()];
  const url = $tweet.value.trim();
  return !!twitter && !!url;
}

function refresh(){
  const addr = currentAccount;
  const done = isDone();

  if(done){
    $finish.style.display = "block";
    $twitter.disabled = true;
    $bind.disabled = true;
    $tweet.disabled = true;
    $submit.disabled = true;
    msg("已完成", true);
    return;
  }

  $finish.style.display = "none";

  if(!addr){
    $twitter.disabled = true;
    $bind.disabled = true;
    $tweet.disabled = true;
    $submit.disabled = true;
    return;
  }

  const bound = isBound();
  if(!bound){
    $twitter.disabled = false;
    $bind.disabled = !$twitter.value.trim();
    $tweet.disabled = true;
    $submit.disabled = true;
    return;
  }

  $twitter.disabled = true;
  $bind.disabled = true;
  $tweet.disabled = false;
  $submit.disabled = !canSubmit();
  msg("已绑定，请提交推文", true);
}

// 连接钱包
$connect.onclick = async ()=>{
  const p = provider();
  if(!p){
    alert("请在钱包浏览器打开");
    return;
  }

  if(currentAccount){
    currentAccount = null;
    $addrBox.style.display = "none";
    $connect.textContent = "连接钱包";
    $connect.classList.remove("btn-success");
    $connect.classList.add("btn-primary");
    refresh();
    return;
  }

  try{
    const accounts = await p.request({method:"eth_requestAccounts"});
    currentAccount = accounts[0];
    $display.textContent = short(currentAccount);
    $addrBox.style.display = "flex";
    $connect.textContent = "已连接";
    $connect.classList.remove("btn-primary");
    $connect.classList.add("btn-success");

    const name = getBind()[currentAccount.toLowerCase()];
    if(name) $twitter.value = name;

    refresh();
  }catch(e){
    alert("连接失败");
  }
};

$twitter.addEventListener("input", refresh);
$tweet.addEventListener("input", refresh);

// 绑定
$bind.onclick = ()=>{
  const name = $twitter.value.trim();
  if(!name) return msg("请输入用户名");
  if(!confirm("绑定后永久不可修改，确定？")) return;
  saveBind(name);
  msg("绑定成功 "+name, true);
  refresh();
};

// 提交：强制三字段 + 提交后锁死
$submit.onclick = async ()=>{
  if(!canSubmit()){
    msg("请完善信息后提交", false);
    return;
  }

  const twitter = getBind()[currentAccount.toLowerCase()];
  const url = $tweet.value.trim();

  $submit.disabled = true;
  msg("提交中...", true);

  try{
    const formData = new FormData();
    formData.append("wallet", currentAccount);
    formData.append("twitter", twitter);
    formData.append("tweetUrl", url);

    await fetch(TALLY_URL, {
      method: "POST",
      body: formData
    });
  }catch(e){
    console.error(e);
  }

  markDone();
  msg("提交成功，任务完成", true);
  refresh();
};

refresh();
</script>
</body>
</html>
