<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>YY Card · 游戏大厅</title>

    <!-- PWA 等配置不变 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YY Card">

    <!-- Three.js 导入映射不变 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        body {
            margin: 0;
            padding: 0;
        }
        #app {
            width: 100%;
            height: 100%;
            background: url("/assets/lobby.png") no-repeat center;
            background-size: 100% 100%;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        #lobby-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }
        #battle-view {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-image: url("/assets/battlebg.png");
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
            overflow: hidden;
            z-index: 1000;
        }
        /* 原样式保持不变... */
        .top-center-info, .top-right-actions {
            top: max(1vh, env(safe-area-inset-top)) !important;
        }
        .hand-area {
            bottom: env(safe-area-inset-bottom) !important;
        }
        .players-status-bar {
            top: max(0.2vh, env(safe-area-inset-top)) !important;
        }
        .shop-area {
            top: env(safe-area-inset-top) !important;
        }
        #battle-progress-wrapper {
            margin-left: env(safe-area-inset-left) !important;
            margin-right: env(safe-area-inset-right) !important;
        }
        #combat-3d-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        /* ========== 底部导航 ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: white;
            display: flex;
            border-top: 1px solid #e5e7eb;
            z-index: 1100;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .bottom-nav button {
            flex: 1;
            background: none;
            border: none;
            font-size: 13px;
            color: #9ca3af;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            transition: color 0.2s;
            cursor: pointer;
            white-space: nowrap;
            padding: 4px 2px;
        }
        .bottom-nav button.active {
            color: #3b82f6;
            font-weight: 600;
        }
        .bottom-nav button .nav-icon {
            font-size: 20px;
            line-height: 1;
        }
        /* 热点预测按钮脉冲动画（通用） */
        .bottom-nav button.hotbet-pulse .nav-icon {
            animation: hotbetPulse 1.5s ease-in-out infinite;
        }
        @keyframes hotbetPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); filter: drop-shadow(0 0 6px #f59e0b); }
        }

        /* ========== 区域切换 ========== */
        #game-area {
            display: block;
            height: 100%;
            overflow-y: auto;
        }
        #assets-area,
        #hotbet-area {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            background: #f8fafc;
            z-index: 10;
        }
        #assets-area.active,
        #hotbet-area.active {
            display: block;
        }
    </style>

    <!-- 原有样式 -->
    <link rel="stylesheet" href="/css/lobby.css">
    <link rel="stylesheet" href="/css/battle.css">
    <link rel="stylesheet" href="/css/assets.css">
    <!-- 🆕 热点预测独立样式 -->
    <link rel="stylesheet" href="/css/hotbet.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        if (typeof supabase === 'undefined') document.write('<script src="https://unpkg.com/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"><\/script>');
    </script>
    <script>
        if (typeof supabase === 'undefined') document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/supabase-js/2.45.0/supabase.min.js"><\/script>');
    </script>
    <script>
        if (typeof supabase === 'undefined') console.error('❌ Supabase SDK 全部CDN加载失败');
        else console.log('✅ Supabase SDK 加载成功');
    </script>
</head>
<body>
<div id="app">
    <!-- ===== 大厅视图 ===== -->
    <div id="lobby-view">
        <!-- 游戏区 -->
        <div id="game-area">
            <!-- 游戏区内容不变... -->
            <div class="top-section">
                <div class="header-bar">
                    <div class="user-profile">
                        <img id="lobby-avatar" class="avatar" src="" alt="avatar" onerror="this.src='/assets/default-avatar.png'">
                        <div class="user-info">
                            <div id="lobby-username"></div>
                            <div id="lobby-wallet" class="user-wallet"></div>
                            <div id="lobby-card-count" class="user-card">改名卡：0张</div>
                        </div>
                    </div>
                </div>
                <div class="action-buttons"></div>
                <div class="match-row">
                    <div id="match-status"></div>
                    <button class="btn" id="cancel-match-btn">取消匹配</button>
                </div>
            </div>
            <div class="spacer">
                <button class="btn-primary" id="start-match-btn" disabled>请先设置游戏ID</button>
            </div>
            <div id="debug-panel" class="debug-panel"></div>
        </div>

        <!-- 资产区 -->
        <div id="assets-area"></div>

        <!-- 🆕 热点预测区（独立模块，可随时扩展不同事件） -->
        <div id="hotbet-area">
            <!-- 由 hotbet.js 动态渲染 -->
        </div>
    </div>

    <!-- ===== 对战视图 (不变) ===== -->
    <div id="battle-view" style="display:none;">
        <span id="round-num" style="display:none;">1</span>
        <span id="my-health" style="display:none;">100</span>
        <div class="top-center-info prepare-only">
            <span>🔄 回合 <span id="round-num-top">1</span></span>
            <span>❤️ <span id="my-health-top">100</span></span>
        </div>
        <div class="top-right-actions">
            <button class="btn" id="leave-battle-btn">🚪 退出</button>
            <button class="btn" id="settings-btn">⚙️</button>
        </div>
        <div class="players-status-bar">
            <div id="player-status-list" class="player-status-list"></div>
        </div>
        <div class="shop-area prepare-only">
            <div class="shop-info">
                <span>🏪 Lv.<span id="shop-level">1</span></span>
                <span>💰 <span id="my-gold">5</span></span>
            </div>
            <div id="shop-container" class="shop-cards"></div>
            <div class="shop-bottom-bar">
                <div class="shop-actions">
                    <button class="btn" id="refresh-shop-btn"> 刷新</button>
                    <button class="btn" id="buy-exp-btn"> 升级</button>
                </div>
                <div class="prepare-timer-btn" style="pointer-events: none;">
                    <div class="prepare-num" id="phase-timer">25</div>
                    <div class="prepare-text">倒计时</div>
                </div>
            </div>
            <button id="buy-exp-btn-bottom" style="display:none;"></button>
        </div>
        <div class="board-area">
            <div class="enemy-board-section battle-only">
                <div id="enemy-board" class="board"></div>
            </div>
            <div class="battle-divider battle-only" id="battle-progress-wrapper" style="display: none; flex-direction: column; align-items: center; justify-content: center; gap: 6px; margin: 8px 0;"></div>
            <div class="my-board-section">
                <div id="my-board" class="board"></div>
            </div>
        </div>
        <div class="hand-area">
            <div class="hand-label"><span id="hand-count">0</span>/15</div>
            <div id="hand-container" class="hand"></div>
        </div>
    </div>

    <!-- ===== 底部导航（3个分区） ===== -->
    <nav class="bottom-nav">
        <button id="nav-game" class="active">
            <span class="nav-icon">🎮</span> 游戏
        </button>
        <button id="nav-assets">
            <span class="nav-icon">💼</span> 资产
        </button>
        <!-- 🔥 热点预测按钮 —— 独立模块，可随时更换图标/文案 -->
        <button id="nav-hotbet" class="hotbet-pulse">
            <span class="nav-icon">🔥</span> 热点预测
        </button>
    </nav>
</div>

<!-- 头像模态框不变 -->
<div id="avatar-modal" class="modal">
    <div class="modal-content">
        <h3>更换头像</h3>
        <p id="cooldown-warning"></p>
        <input type="file" id="avatar-file-input" accept="image/png,image/jpeg,image/webp">
        <div id="upload-status"></div>
        <div class="modal-buttons">
            <button class="btn" id="upload-avatar-btn">上传</button>
            <button class="btn" id="cancel-avatar-btn">取消</button>
        </div>
    </div>
</div>

<!-- 原有脚本 -->
<script src="/js/config.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/render.js"></script>
<script src="/js/shopRender.js"></script>

<script src="/js/shop.js"></script>

<script src="/js/battle.js"></script>

<!-- 🆕 热点预测主模块（统一入口，内部按事件类型分发） -->
<script src="/js/hotbet.js"></script>

<script>
    // ==================== 顶部回合/血量同步 (不变) ====================
    const roundNumTop = document.getElementById('round-num-top');
    const myHealthTop = document.getElementById('my-health-top');
    const originalRoundNum = document.getElementById('round-num');
    const originalMyHealth = document.getElementById('my-health');
    if (originalRoundNum && roundNumTop) {
        const roundObserver = new MutationObserver(() => { roundNumTop.textContent = originalRoundNum.textContent; });
        roundObserver.observe(originalRoundNum, { childList: true, characterData: true, subtree: true });
    }
    if (originalMyHealth && myHealthTop) {
        const healthObserver = new MutationObserver(() => { myHealthTop.textContent = originalMyHealth.textContent; });
        healthObserver.observe(originalMyHealth, { childList: true, characterData: true, subtree: true });
    }

    // ==================== 底部导航切换（支持热点预测） ====================
    function switchTab(tab) {
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('assets-area').classList.remove('active');
        document.getElementById('hotbet-area').classList.remove('active');
        document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.remove('active'));

        if (tab === 'game') {
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('nav-game').classList.add('active');
        } else if (tab === 'assets') {
            document.getElementById('assets-area').classList.add('active');
            document.getElementById('nav-assets').classList.add('active');
            if (window.refreshAssets) window.refreshAssets();
        } else if (tab === 'hotbet') {
            // 🔥 激活热点预测区域
            document.getElementById('hotbet-area').classList.add('active');
            document.getElementById('nav-hotbet').classList.add('active');
            if (window.YYCardHotBet && window.YYCardHotBet.refresh) {
                window.YYCardHotBet.refresh();
            }
        }
    }

    document.getElementById('nav-game').onclick = () => switchTab('game');
    document.getElementById('nav-assets').onclick = () => switchTab('assets');
    document.getElementById('nav-hotbet').onclick = () => switchTab('hotbet');

    // ==================== 谷歌邮箱同步 (不变) ====================
    async function syncGoogleProfile(user, supabase) {
        // 代码不变...
        if (!user || user.app_metadata?.provider !== 'google') return;
        const googleEmail = user.email;
        if (!googleEmail) return;
        const { data: existing } = await supabase
            .from('profiles')
            .select('id, google_email')
            .eq('google_email', googleEmail)
            .maybeSingle();
        if (!existing) {
            const { error } = await supabase.from('profiles').upsert({
                id: user.id,
                google_email: googleEmail,
                display_name: user.user_metadata?.full_name || googleEmail,
                avatar_url: user.user_metadata?.avatar_url || '',
                rename_card_count: 1,
                username: ''
            }, { onConflict: 'id' });
            if (error) console.error('谷歌档案写入失败:', error);
            else console.log('✅ 谷歌邮箱已绑定到当前用户');
        } else if (existing.id !== user.id) {
            const { error } = await supabase.from('profiles')
                .update({ id: user.id, google_email: googleEmail })
                .eq('id', existing.id);
            if (error) console.error('谷歌邮箱迁移失败:', error);
            else console.log('⚠️ 谷歌邮箱已迁移到新 UID');
        } else {
            console.log('✅ 谷歌邮箱绑定正确，UID 未变');
        }
    }

    // ==================== 主入口 ====================
    window.initApp = async function() {
        if (window.YYCardUtils && window.YYCardUtils.loadCardTemplates) {
            await window.YYCardUtils.loadCardTemplates();
        } else {
            console.error('❌ utils.js 未加载或缺少 loadCardTemplates');
        }

        const auth = window.YYCardAuth;
        const profileUI = window.YYCardProfileUI;
        const matchmaking = window.YYCardMatchmaking;

        const success = await auth.init();
        if (!success) return;

        if (auth.currentUser) {
            await syncGoogleProfile(auth.currentUser, window.supabase);
        }

        profileUI.update();
        if (window.YYCardCheckin) window.YYCardCheckin.init();
        profileUI.bindEvents();

        if (window.YYCardTgShare) {
            await window.YYCardTgShare.init();
        }

        // 🔥 初始化热点预测模块
        if (window.YYCardHotBet && window.YYCardHotBet.init) {
            await window.YYCardHotBet.init();
            console.log('🔥 热点预测模块已就绪');
        }

        document.getElementById('start-match-btn').onclick = () => {
            if (matchmaking?.start) matchmaking.start();
            else auth.log('❌ 匹配模块未正确加载', true);
        };
        document.getElementById('cancel-match-btn').onclick = () => {
            if (matchmaking?.cancel) matchmaking.cancel();
        };

        window.addEventListener('beforeunload', () => {
            const uid = auth.currentUser?.id;
            if (!uid) return;
            const isInBattle = document.getElementById('battle-view').style.display === 'block';
            const isMatching = document.getElementById('cancel-match-btn').style.display === 'inline-block';
            if (!isInBattle && !isMatching) {
                fetch(`${window.YYCardConfig.SUPABASE_URL}/rest/v1/room_players?player_id=eq.${uid}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': window.YYCardConfig.SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${auth.currentSession?.access_token}`,
                        'Content-Type': 'application/json'
                    },
                    keepalive: true
                }).catch(e => console.warn('页面关闭清理失败:', e));
            }
        });

        await window.YYCardReconnect.check();
        auth.log('✅ 大厅初始化完成');
    };

    document.addEventListener('DOMContentLoaded', () => {
        if (typeof window.initApp === 'function') window.initApp();
    });
</script>

<!-- Telegram Mini App 初始化 -->
<script>
    (function() {
        if (!window.Telegram || !window.Telegram.WebApp) return;
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    })();
</script>
</body>
</html>
