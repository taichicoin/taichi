<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
        body{
            background-image:url('./bg.jpg');
            background-size:cover;
            background-position:center center;
            background-repeat:no-repeat;
            background-attachment:fixed;
            min-height:100vh;
            padding:80px 20px 20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            position:relative;
        }
        body::before{
            content:'';
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background-color:rgba(0,0,0,0.35);
            z-index:0;
        }
        .top-bar{
            position:fixed;
            top:20px;
            left:20px;
            right:20px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            z-index:10;
        }
        .btn-small{
            height:44px;
            padding:0 20px;
            font-size:18px;
            font-weight:600;
            border-radius:12px;
            border:none;
            cursor:pointer;
            transition:all 0.2s ease;
            white-space:nowrap;
            -webkit-tap-highlight-color:transparent;
        }
        .btn-primary{
            background-color:#2563eb;
            color:#ffffff;
        }
        .btn-primary:hover{
            background-color:#1d4ed8;
        }
        .btn-success{
            background-color:#5eead4;
            color:#0f172a;
        }
        .btn-success:hover{
            background-color:#2dd4bf;
        }
        .address-top{
            height:44px;
            padding:0 16px;
            background-color:rgba(255,255,255,0.95);
            border-radius:12px;
            font-size:14px;
            color:#1e293b;
            display:none;
            align-items:center;
            gap:8px;
            flex:1;
            overflow:hidden;
            text-overflow:ellipsis;
            white-space:nowrap;
        }
        .container{
            width:100%;
            max-width:480px;
            background:rgba(255,255,255,0.95);
            border-radius:24px;
            box-shadow:0 4px 20px rgba(0,0,0,0.15);
            padding:40px 24px;
            position:relative;
            z-index:1;
        }
        h1{
            font-size:28px;
            font-weight:700;
            color:#1e293b;
            text-align:center;
            margin-bottom:12px;
        }
        .desc{
            font-size:16px;
            color:#64748b;
            text-align:center;
            margin-bottom:24px;
            line-height:1.5;
        }
        .btn-main{
            width:100%;
            height:56px;
            border:none;
            border-radius:16px;
            font-size:18px;
            font-weight:600;
            cursor:pointer;
            transition:all 0.2s ease;
            -webkit-tap-highlight-color:transparent;
            margin-bottom:12px;
        }
        .btn-success-main{
            background-color:#5eead4;
            color:#0f172a;
        }
        .btn-success-main:hover{
            background-color:#2dd4bf;
        }
        .btn-main:disabled{
            opacity:0.5;
            cursor:not-allowed;
        }
        .tips{
            font-size:13px;
            color:#f1f5f9;
            text-align:center;
            margin-top:24px;
            line-height:1.4;
            position:relative;
            z-index:1;
        }

        /* 新增样式 */
        .form-input {
            width: 100%;
            height: 56px;
            padding: 0 16px;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }
        .form-input:disabled {
            background: #f1f5f9;
        }
        .status-text {
            font-size: 14px;
            text-align: center;
            margin: 8px 0;
            min-height: 20px;
        }
        .status-error {
            color: #ef4444;
        }
        .status-success {
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="address-top" id="addressTop">
            已连接：<span id="walletAddress"></span>
        </div>
        <button class="btn-small btn-primary" id="connectBtn">
            连接钱包
        </button>
    </div>

    <div class="container">
        <h1>Twitter任务活动</h1>
        <p class="desc">关注+点赞+转推指定推文，提交链接完成验证</p>

        <!-- 绑定Twitter -->
        <button class="btn-main btn-success-main" id="bindTwitterBtn">
            绑定Twitter账号
        </button>

        <!-- 提交推文链接 -->
        <input
            type="text"
            class="form-input"
            id="tweetInput"
            placeholder="粘贴你的推文链接"
            disabled
        >

        <!-- 提交按钮 -->
        <button class="btn-main btn-success-main" id="submitBtn" disabled>
            提交验证
        </button>

        <div class="status-text" id="statusText"></div>

        <p class="tips">
            电脑端请安装MetaMask/OKX钱包插件使用<br>
            手机端请在钱包APP的DApp浏览器打开本页面
        </p>
    </div>

    <script>
        const CONFIG = {
            twitterLink: "https://x.com/i/status/2035345304766361607"
        };

        let currentAccount = null;
        let currentProvider = null;
        let twitterUser = null;

        const connectBtn = document.getElementById('connectBtn');
        const addressTop = document.getElementById('addressTop');
        const walletAddress = document.getElementById('walletAddress');
        const bindTwitterBtn = document.getElementById('bindTwitterBtn');
        const tweetInput = document.getElementById('tweetInput');
        const submitBtn = document.getElementById('submitBtn');
        const statusText = document.getElementById('statusText');

        function shortenAddress(address) {
            return address ? `${address.slice(0, 6)}...${address.slice(-4)}` : '';
        }

        function getProvider() {
            return window.okxwallet || window.ethereum || window.tpwallet || window.trustwallet || window.web3?.currentProvider;
        }

        // 更新按钮可用状态
        function updateAllState() {
            tweetInput.disabled = !twitterUser || !currentAccount;
            submitBtn.disabled = !twitterUser || !currentAccount || !tweetInput.value.trim();
        }

        // 绑定Twitter
        bindTwitterBtn.onclick = async () => {
            const user = prompt('请输入你的Twitter用户名（不带@）：');
            if (!user || !user.trim()) {
                setStatus('请输入有效的Twitter用户名', 'error');
                return;
            }
            twitterUser = user.trim().toLowerCase();
            bindTwitterBtn.textContent = `已绑定：@${twitterUser}`;
            bindTwitterBtn.disabled = true;
            setStatus(`已绑定Twitter：@${twitterUser}`, 'success');
            updateAllState();
        };

        // 钱包连接/断开
        async function toggleWallet() {
            if (currentAccount) {
                currentAccount = null;
                currentProvider = null;
                addressTop.style.display = 'none';
                connectBtn.textContent = '连接钱包';
                connectBtn.classList.replace('btn-success', 'btn-primary');
                setStatus('已断开钱包', 'error');
                updateAllState();
                return;
            }

            const provider = getProvider();
            if (!provider) {
                alert('未检测到钱包！\n电脑端请安装MetaMask/OKX插件\n手机端请在钱包DApp浏览器打开');
                return;
            }

            try {
                currentProvider = provider;
                const accounts = await provider.request({ method: 'eth_requestAccounts' });
                if (accounts?.length > 0) {
                    currentAccount = accounts[0];
                    walletAddress.textContent = shortenAddress(currentAccount);
                    addressTop.style.display = 'flex';
                    connectBtn.textContent = '已连接';
                    connectBtn.classList.replace('btn-primary', 'btn-success');
                    setStatus('钱包连接成功', 'success');

                    provider.on('accountsChanged', (accounts) => {
                        if (accounts.length === 0) toggleWallet();
                        else {
                            currentAccount = accounts[0];
                            walletAddress.textContent = shortenAddress(currentAccount);
                            updateAllState();
                        }
                    });

                    updateAllState();
                }
            } catch (err) {
                console.error(err);
                if (err.code === 4001) alert('您拒绝了钱包授权');
                else if (err.code === -32002) alert('请查看钱包弹窗');
                else alert('连接失败：' + (err.message || '未知错误'));
            }
        }

        // 状态提示
        function setStatus(msg, type) {
            statusText.textContent = msg;
            statusText.className = 'status-text';
            if (type === 'error') statusText.classList.add('status-error');
            else if (type === 'success') statusText.classList.add('status-success');
        }

        // 提交并校验
        submitBtn.onclick = () => {
            const url = tweetInput.value.trim();
            if (!url) {
                setStatus('请粘贴推文链接', 'error');
                return;
            }

            // 从URL提取用户名
            const match = url.match(/(?:twitter\.com|x\.com)\/([A-Za-z0-9_]+)/i);
            if (!match || !match[1]) {
                setStatus('无效的推文链接', 'error');
                return;
            }

            const urlUser = match[1].toLowerCase();
            if (urlUser !== twitterUser) {
                setStatus(`提交的用户名 @${urlUser} 与绑定的 @${twitterUser} 不一致`, 'error');
                return;
            }

            // 验证通过
            setStatus('验证成功！记录已提交', 'success');
            submitBtn.disabled = true;
            tweetInput.disabled = true;

            // ======================
            // 这里替换成你后端接口
            // 提交：wallet, twitterUser, tweetUrl
            // ======================
            const data = {
                wallet: currentAccount,
                twitter: twitterUser,
                tweetUrl: url
            };
            console.log('提交数据：', data);
        };

        tweetInput.addEventListener('input', updateAllState);
        connectBtn.onclick = toggleWallet;
    </script>
</body>
</html>
