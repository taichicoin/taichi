<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shan Hai Jing Card Game</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Arial', sans-serif;
  }
  body {
    background: linear-gradient(180deg, #4a5a72 0%, #6b7a92 50%, #8a9ab2 100%);
    color: #fff;
    padding: 20px;
    min-height: 100vh;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  .shop-section {
    margin-bottom: 20px;
  }
  .shop-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  .shop-title {
    font-size: 24px;
    font-weight: bold;
    color: #feca57;
  }

  .gold-display {
    font-size: 20px;
    font-weight: bold;
    color: #ffcc00;
    background: rgba(22, 22, 36, 0.8);
    padding: 8px 15px;
    border-radius: 8px;
    border: 2px solid #d4af37;
  }

  .shop-cards {
    display: flex;
    gap: 15px;
    min-height: 250px;
  }

  .card-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 180px;
    height: 250px;
    border: 3px solid #d4af37;
    border-radius: 12px;
    overflow: hidden;
    cursor: grab;
    background: #000;
    position: relative;
    transition: all 0.3s ease;
  }
  /* 只加：成长闪光动画（不破坏UI） */
  .card.glow-up {
    box-shadow: 0 0 18px #2ed573;
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  /* 只加：卡牌左下角攻击/右下角血量UI */
  .card-num {
    position: absolute;
    bottom: 10px;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 4px #000;
    z-index: 2;
  }
  .atk-num {
    left: 10px;
    color: #ff4757;
  }
  .hp-num {
    right: 10px;
    color: #2ed573;
  }

  .card-cost-external {
    margin-top: 8px;
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    background: #ff6b6b;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
  }

  .card.insufficient-funds {
    cursor: not-allowed;
    opacity: 0.6;
  }

  .control-bar {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 20px 0;
    justify-content: flex-start;
  }
  .turn-display {
    font-size: 18px;
    background: rgba(55, 66, 250, 0.8);
    padding: 5px 15px;
    border-radius: 20px;
  }
  #next-turn-btn, #refresh-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  #next-turn-btn {
    background: linear-gradient(135deg, #2ed573, #20bf6b);
  }
  #refresh-btn {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  }
  #next-turn-btn:disabled, #refresh-btn:disabled {
    background: #666;
    cursor: not-allowed;
    transform: none;
  }
  #next-turn-btn:hover:not(:disabled), #refresh-btn:hover:not(:disabled) {
    transform: 1.05;
  }

  .grid-section {
    margin-top: 20px;
  }
  .grid-title {
    font-size: 20px;
    font-weight: bold;
    color: #feca57;
    margin-bottom: 15px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .grid-slot {
    width: 180px;
    height: 220px;
    border: 2px dashed #666;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .grid-slot.drag-over {
    border-color: #feca57;
    background: rgba(254, 202, 87, 0.2);
  }
</style>
</head>
<body>
<div class="container">
  <div class="shop-section">
    <div class="shop-header">
      <div class="shop-title">Card Shop</div>
      <div class="gold-display">Gold: <span id="current-gold">2</span></div>
    </div>
    <div class="shop-cards" id="shop-cards"></div>
  </div>

  <div class="control-bar">
    <div class="turn-display">Turn: <span id="current-turn">1</span></div>
    <button id="next-turn-btn">Next Turn</button>
    <button id="refresh-btn">Refresh (1 Gold)</button>
  </div>

  <div class="grid-section">
    <div class="grid-title">Your Deck (Max 6)</div>
    <div class="card-grid" id="card-grid">
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
    </div>
  </div>
</div>

<script>
// 你的原始卡牌+技能绑定
const allCardsData = [
  { id: 1, name: "Ying Dragon", skill:"yinglong", image: "yl.jpg", atk: 3, hp: 5, cost: 1 },
  { id: 2, name: "Nine-Tailed Fox", skill:"fox", image: "jwf.jpg", atk: 8, hp: 10, cost: 3 },
  { id: 3, name: "Bai Ze", skill:"baize", image: "bz.jpg", atk: 5, hp: 10, cost: 2 },
  { id: 4, name: "Qiong Qi", skill:"qiongqi", image: "qq.jpg", atk: 10, hp: 15, cost: 4 },
  { id: 5, name: "Jingwei", skill:"jingwei", image: "jw.jpg", atk: 12, hp: 18, cost: 5 }
];

let currentGold = 2;
let currentTurn = 1;
let draggedCard = null;
let isNextTurnDisabled = false;
let sellingCard = null;
let buffSave = {}; // 存每一张卡的成长数值

const turnGoldIncrement = [0, 2, 3, 5, 7, 10, 15, 20];

// 判断卡槽行数
function getRow(index){
  return index < 3 ? 1 : 2;
}

// 核心：回合结算所有成长，自动刷新血量攻击
function calcSkillBuff(){
  const slots = Array.from(document.querySelectorAll(".grid-slot"));
  const layer = currentTurn - 1;

  // 检测场上卡牌
  let hasJingwei = false;
  let yingRows = [];
  let foxRows = [];
  let baizeIndex = -1;

  slots.forEach((s,i)=>{
    const c = s.querySelector(".card");
    if(!c) return;
    const sk = c.dataset.skill;
    if(sk === "jingwei") hasJingwei = true;
    if(sk === "yinglong") yingRows.push(getRow(i));
    if(sk === "fox") foxRows.push(getRow(i));
    if(sk === "baize") baizeIndex = i;
  });

  // 逐个卡牌加属性
  slots.forEach((slot,i)=>{
    const card = slot.querySelector(".card");
    if(!card) return;
    const key = `pos_${i}`;
    if(!buffSave[key]) buffSave[key] = {jw:0,yl:0,qq:0,bzAtk:0,bzHp:0};
    const b = buffSave[key];
    const skill = card.dataset.skill;
    const r = getRow(i);

    // 精卫全队
    if(hasJingwei) b.jw = layer;
    // 应龙同排
    if(yingRows.includes(r)) b.yl = layer * 2;
    // 穷奇自己
    if(skill === "qiongqi") b.qq = layer;
    // 九尾加速
    if(foxRows.includes(r)){b.jw +=1; b.yl +=2;}

    // 刷新数字
    let baseA = parseInt(card.dataset.baseAtk);
    let baseH = parseInt(card.dataset.baseHp);
    let nowA = baseA + b.jw + b.yl + b.qq + b.bzAtk;
    let nowH = baseH + b.jw + b.yl + b.qq + b.bzHp;
    card.querySelector(".atk-num").innerText = nowA;
    card.querySelector(".hp-num").innerText = nowH;

    // 发光提示成长
    card.classList.add("glow-up");
    setTimeout(()=>card.classList.remove("glow-up"),600);

    // 白泽加成
    if(baizeIndex >=0){
      let bzKey = `pos_${baizeIndex}`;
      if(buffSave[bzKey]){
        buffSave[bzKey].bzAtk +=2;
        buffSave[bzKey].bzHp +=5;
      }
    }
  });
}

function renderShop() {
  const shopContainer = document.getElementById("shop-cards");
  shopContainer.innerHTML = "";

  const shuffled = [...allCardsData].sort(() => Math.random() - 0.5);
  const selected = shuffled.slice(0, 3);

  selected.forEach(card => {
    const wrapper = document.createElement("div");
    wrapper.className = "card-wrapper";

    const el = document.createElement("div");
    el.className = "card";
    el.draggable = true;
    if (currentGold < card.cost) {
      el.classList.add("insufficient-funds");
      el.draggable = false;
    }
    // 绑定基础数值+技能
    el.dataset.skill = card.skill;
    el.dataset.baseAtk = card.atk;
    el.dataset.baseHp = card.hp;
    // 植入血量攻击UI
    el.innerHTML = `
      <img src="${card.image}" alt="${card.name}">
      <div class="card-num atk-num">${card.atk}</div>
      <div class="card-num hp-num">${card.hp}</div>
    `;

    const costEl = document.createElement("div");
    costEl.className = "card-cost-external";
    costEl.innerText = card.cost;

    wrapper.appendChild(el);
    wrapper.appendChild(costEl);
    shopContainer.appendChild(wrapper);

    el.addEventListener("dragstart", (e) => {
      if (el.classList.contains('insufficient-funds')) return;
      draggedCard = { ...card };
    });
  });

  shopContainer.addEventListener("dragover", (e) => e.preventDefault());
  shopContainer.addEventListener("drop", () => {
    if (sellingCard) {
      currentGold += sellingCard.cost;
      updateGameStatus();
      sellingCard = null;
      renderShop();
    }
  });

  updateButtonStates();
}

function initGridSlots() {
  const slots = document.querySelectorAll(".grid-slot");
  slots.forEach((slot,i) => {
    let saveKey = `pos_${i}`;
    if(!buffSave[saveKey]) buffSave[saveKey] = {jw:0,yl:0,qq:0,bzAtk:0,bzHp:0};

    slot.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (draggedCard && !slot.children.length) {
        slot.classList.add("drag-over");
      }
    });
    slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
    slot.addEventListener("drop", (e) => {
      e.preventDefault();
      slot.classList.remove("drag-over");
      if (!draggedCard || slot.children.length) return;

      currentGold -= draggedCard.cost;
      const deckCard = document.createElement("div");
      deckCard.className = "card";
      deckCard.draggable = true;
      deckCard.dataset.skill = draggedCard.skill;
      deckCard.dataset.baseAtk = draggedCard.atk;
      deckCard.dataset.baseHp = draggedCard.hp;
      // 保留血量攻击UI
      deckCard.innerHTML = `
        <img src="${draggedCard.image}" alt="${draggedCard.name}">
        <div class="card-num atk-num">${draggedCard.atk}</div>
        <div class="card-num hp-num">${draggedCard.hp}</div>
      `;
      deckCard.addEventListener("dragstart", () => {
        sellingCard = draggedCard;
        buffSave[`pos_${i}`] = {jw:0,yl:0,qq:0,bzAtk:0,bzHp:0};
        slot.innerHTML = "";
      });
      slot.appendChild(deckCard);
      draggedCard = null;
      updateGameStatus();
      renderShop();
    });
  });
}

function startNextTurn() {
  if (isNextTurnDisabled) return;
  currentTurn++;
  currentGold += turnGoldIncrement[currentTurn] || 0;

  // 点下一回合自动涨属性、刷新血量攻击
  calcSkillBuff();

  if (currentTurn >= 7) {
    isNextTurnDisabled = true;
    document.getElementById("next-turn-btn").disabled = true;
    document.getElementById("next-turn-btn").innerText = "Game Over";
  }
  updateGameStatus();
  renderShop();
}

document.getElementById("refresh-btn").onclick = () => {
  if (currentGold >= 1) {
    currentGold -= 1;
    updateGameStatus();
    renderShop();
  }
};

function updateGameStatus() {
  document.getElementById("current-gold").innerText = currentGold;
  document.getElementById("current-turn").innerText = currentTurn;
  updateButtonStates();
}

function updateButtonStates() {
  document.getElementById("refresh-btn").disabled = currentGold < 1;
}

document.getElementById("next-turn-btn").onclick = startNextTurn;
window.onload = () => {
  renderShop();
  initGridSlots();
};
</script>
</body>
</html>
