<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif}
        body{
            background-image:url('./bg.jpg');
            background-size:cover;
            background-position:center center;
            background-repeat:no-repeat;
            background-attachment:fixed;
            min-height:100vh;
            padding:80px 20px 20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            position:relative;
        }
        body::before{
            content:'';
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.4);
            z-index:0;
        }
        .top-bar{
            position:fixed;top:20px;left:20px;right:20px;
            display:flex;justify-content:space-between;gap:12px;z-index:10;
        }
        .btn-small{height:44px;padding:0 20px;border-radius:12px;border:none;font-size:18px;cursor:pointer;}
        .btn-primary{background:#2563eb;color:white;}
        .btn-success{background:#5eead4;color:#0f172a;}
        .address-top{
            height:44px;padding:0 16px;background:white;border-radius:12px;
            font-size:14px;display:none;align-items:center;gap:8px;
        }
        .container{
            width:100%;max-width:480px;background:white;border-radius:24px;
            padding:40px 24px;position:relative;z-index:1;
        }
        h1{font-size:28px;text-align:center;margin-bottom:12px;color:#1e293b;}
        .desc{color:#64748b;text-align:center;margin-bottom:24px;line-height:1.5;}
        .btn-main{width:100%;height:56px;border:none;border-radius:16px;font-size:18px;margin-bottom:12px;cursor:pointer;}
        .btn-success-main{background:#5eead4;color:#0f172a;}
        .btn-main:disabled{opacity:0.5;cursor:not-allowed;}
        .form-input{
            width:100%;height:56px;padding:0 16px;border-radius:16px;
            border:1px solid #cbd5e1;font-size:16px;margin-bottom:12px;outline:none;
        }
        .form-input:disabled{background:#f1f5f9;}
        .status-text{font-size:14px;text-align:center;margin:8px 0;min-height:20px;}
        .status-success{color:#10b981;font-weight:500;}
        .status-error{color:#ef4444;}
        .finished{
            background:#d1fae5;color:#065f46;padding:16px;border-radius:12px;text-align:center;margin-bottom:20px;font-weight:600;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="address-top" id="addressTop">
        已连接：<span id="walletDisplay"></span>
    </div>
    <button class="btn-small btn-primary" id="connectBtn">连接钱包</button>
</div>

<div class="container">
    <h1>Twitter 任务</h1>
    <p class="desc">每个钱包仅限参与一次，绑定后不可修改</p>

    <div id="finishedBox" class="finished" style="display:none;">
        ✅ 此钱包已完成全部任务
    </div>

    <input type="text" class="form-input" id="usernameInput" placeholder="输入 Twitter 用户名（不带@）" disabled>
    <button class="btn-main btn-success-main" id="bindBtn" disabled>确认绑定（永久绑定）</button>

    <input type="text" class="form-input" id="urlInput" placeholder="粘贴你的推文链接" disabled>
    <button class="btn-main btn-success-main" id="submitBtn" disabled>提交任务</button>

    <div class="status-text" id="status"></div>

    <p class="tips" style="font-size:13px;color:#f1f5f9;text-align:center;margin-top:24px;">
        电脑端请安装MetaMask/OKX钱包插件使用<br>
        手机端请在钱包APP的DApp浏览器打开本页面
    </p>
</div>

<script>
// ==============================================
// 已配置你的Tally表单，无需修改
// ==============================================
const TALLY_FORM_ID = "rjEXEN";
const TALLY_API_URL = `https://api.tally.so/forms/${TALLY_FORM_ID}/submissions`;

// 本地存储仅作辅助，核心防重复靠Tally后台
const BIND_KEY = "TAICHI_BIND";
const DONE_KEY = "TAICHI_DONE";

let currentAccount = null;

// DOM元素
const $connect = document.getElementById('connectBtn');
const $addrBox = document.getElementById('addressTop');
const $display = document.getElementById('walletDisplay');
const $username = document.getElementById('usernameInput');
const $bind = document.getElementById('bindBtn');
const $url = document.getElementById('urlInput');
const $submit = document.getElementById('submitBtn');
const $status = document.getElementById('status');
const $finish = document.getElementById('finishedBox');

// ==============================================
// 工具方法
// ==============================================
function shortAddress(addr) {
    return addr ? `${addr.slice(0,6)}...${addr.slice(-4)}` : '';
}

function getProvider() {
    return window.ethereum || window.okxwallet || window.tpwallet || window.trustwallet;
}

// ==============================================
// 本地数据读写（仅作辅助）
// ==============================================
function getBindMap() {
    try { return JSON.parse(localStorage.getItem(BIND_KEY)) || {}; }
    catch (e) { return {}; }
}

function getDoneMap() {
    try { return JSON.parse(localStorage.getItem(DONE_KEY)) || {}; }
    catch (e) { return {}; }
}

function isBound(wallet) {
    if (!wallet) return false;
    return !!getBindMap()[wallet.toLowerCase()];
}

function isLocalDone(wallet) {
    if (!wallet) return false;
    return !!getDoneMap()[wallet.toLowerCase()];
}

function saveBind(wallet, username) {
    const map = getBindMap();
    map[wallet.toLowerCase()] = username.trim();
    localStorage.setItem(BIND_KEY, JSON.stringify(map));
}

function markDone(wallet) {
    const map = getDoneMap();
    map[wallet.toLowerCase()] = true;
    localStorage.setItem(DONE_KEY, JSON.stringify(map));
}

// ==============================================
// 状态提示
// ==============================================
function setStatus(msg, type) {
    $status.textContent = msg;
    $status.className = "status-text";
    if (type === "error") $status.classList.add("status-error");
    if (type === "success") $status.classList.add("status-success");
}

// ==============================================
// 三字段强制校验
// ==============================================
function canSubmit() {
    if (!currentAccount) return false;
    const username = getBindMap()[currentAccount.toLowerCase()];
    const url = $url.value.trim();
    return !!username && !!url;
}

// ==============================================
// 界面状态刷新
// ==============================================
function refreshUI() {
    const wallet = currentAccount;
    const localDone = isLocalDone(wallet);

    // 本地已完成，直接锁死
    if (localDone) {
        $finish.style.display = "block";
        $username.disabled = true;
        $bind.disabled = true;
        $url.disabled = true;
        $submit.disabled = true;
        setStatus("此钱包已完成全部任务", "success");
        return;
    }

    $finish.style.display = "none";

    // 未连接钱包
    if (!wallet) {
        $username.disabled = true;
        $bind.disabled = true;
        $url.disabled = true;
        $submit.disabled = true;
        setStatus("请先连接钱包", "");
        return;
    }

    const bound = isBound(wallet);
    // 未绑定用户名
    if (!bound) {
        $username.disabled = false;
        $bind.disabled = !$username.value.trim();
        $url.disabled = true;
        $submit.disabled = true;
        setStatus("请输入Twitter用户名并绑定", "");
        return;
    }

    // 已绑定，未提交
    $username.disabled = true;
    $bind.disabled = true;
    $url.disabled = false;
    $submit.disabled = !canSubmit();
    setStatus(`已绑定 @${getBindMap()[wallet.toLowerCase()]}，请提交推文链接`, "success");
}

// ==============================================
// 连接钱包
// ==============================================
$connect.onclick = async () => {
    const p = getProvider();
    if (!p) {
        alert("请在钱包DApp浏览器或安装插件打开");
        return;
    }

    // 断开钱包
    if (currentAccount) {
        currentAccount = null;
        $addrBox.style.display = "none";
        $connect.textContent = "连接钱包";
        $connect.classList.replace("btn-success", "btn-primary");
        refreshUI();
        return;
    }

    // 连接钱包
    try {
        const accounts = await p.request({ method: "eth_requestAccounts" });
        currentAccount = accounts[0];

        // 显示地址
        $display.textContent = shortAddress(currentAccount);
        $addrBox.style.display = "flex";
        $connect.textContent = "已连接";
        $connect.classList.replace("btn-primary", "btn-success");

        // 加载本地绑定信息
        const username = getBindMap()[currentAccount.toLowerCase()];
        if (username) {
            $username.value = username;
        }

        // 监听账户切换
        p.on("accountsChanged", (accounts) => {
            if (accounts.length === 0) {
                currentAccount = null;
                $addrBox.style.display = "none";
                $connect.textContent = "连接钱包";
                $connect.classList.replace("btn-success", "btn-primary");
            } else {
                currentAccount = accounts[0];
                $display.textContent = shortAddress(currentAccount);
                const name = getBindMap()[currentAccount.toLowerCase()];
                if (name) $username.value = name;
            }
            refreshUI();
        });

        refreshUI();
    } catch (err) {
        alert("连接钱包失败：" + (err.message || "请重试"));
    }
};

// ==============================================
// 输入监听
// ==============================================
$username.addEventListener("input", refreshUI);
$url.addEventListener("input", refreshUI);

// ==============================================
// 绑定用户名
// ==============================================
$bind.onclick = () => {
    if (!currentAccount) return;
    const name = $username.value.trim();
    if (!name) {
        setStatus("请输入有效用户名", "error");
        return;
    }
    if (!confirm("绑定后永久不可修改，确定绑定吗？")) return;

    saveBind(currentAccount, name);
    setStatus(`绑定成功 @${name}，不可修改`, "success");
    refreshUI();
};

// ==============================================
// 提交任务（Tally官方API提交）
// ==============================================
$submit.onclick = async () => {
    // 最终校验
    if (!canSubmit()) {
        setStatus("请完善所有信息后提交", "error");
        return;
    }

    const wallet = currentAccount;
    const username = getBindMap()[wallet.toLowerCase()];
    const url = $url.value.trim();

    $submit.disabled = true;
    setStatus("提交中...", "");

    try {
        // Tally官方API提交，字段100%匹配
        const response = await fetch(TALLY_API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json"
            },
            body: JSON.stringify({
                data: {
                    wallet: wallet,
                    username: username,
                    URL: url
                }
            })
        });

        const result = await response.json();

        // 提交成功
        if (response.ok) {
            markDone(wallet);
            setStatus("提交成功！任务完成", "success");
            refreshUI();
            return;
        }

        // 重复提交（Tally唯一值拦截）
        if (result.code === "UNIQUE_CONSTRAINT_VIOLATION") {
            markDone(wallet);
            setStatus("此钱包已提交过任务，无法重复提交", "error");
            refreshUI();
            return;
        }

        // 其他错误
        setStatus(`提交失败：${result.message || "请重试"}`, "error");
        $submit.disabled = false;

    } catch (err) {
        console.error("提交错误:", err);
        setStatus("提交失败，请检查网络后重试", "error");
        $submit.disabled = false;
    }
};

// 初始加载
refreshUI();
</script>

</body>
</html>
