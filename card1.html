<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Shan Hai Jing Card Game</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
  body{
    background:linear-gradient(180deg,#4a5a72 0%,#6b7a92 50%,#8a9ab2 100%);
    color:#fff;
    padding:10px;
    min-height:100vh;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .container{max-width:100%;margin:0 auto;flex:1;}

  .shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .shop-title{font-size:20px;font-weight:bold;color:#feca57;}
  .gold-display{
    font-size:16px;font-weight:bold;color:#ffcc00;
    background:rgba(22,22,36,0.8);padding:4px 10px;border-radius:6px;border:2px solid #d4af37;
  }

  .shop-cards{
    display:flex;gap:8px;justify-content:center;
    min-height:0;margin-bottom:10px;
  }
  .card-wrapper{display:flex;flex-direction:column;align-items:center;}

  .card{
    width:110px;height:150px;
    border:2px solid #d4af37;border-radius:8px;overflow:hidden;
    cursor:grab;background:#000;position:relative;
  }
  .card img{width:100%;height:100%;object-fit:cover;pointer-events:none;}
  .card .stats{
    position:absolute;bottom:4px;width:100%;
    display:flex;justify-content:space-between;padding:0 6px;
    font-size:12px;font-weight:bold;text-shadow:1px 1px 2px #000;
  }
  .card .atk{color:#ff4757;}
  .card .hp{color:#2ed573;}

  .card-cost-external{
    margin-top:4px;font-size:14px;font-weight:bold;color:#fff;
    background:#ff6b6b;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;border:1px solid white;
  }
  .card.insufficient-funds{cursor:not-allowed;opacity:0.6;}

  .control-bar{display:flex;align-items:center;gap:8px;margin:8px 0;justify-content:center;}
  .turn-display{font-size:14px;background:rgba(55,66,250,0.8);padding:3px 10px;border-radius:12px;}
  #next-turn-btn,#refresh-btn{
    padding:6px 12px;border:none;border-radius:6px;color:white;font-size:12px;cursor:pointer;
  }
  #next-turn-btn{background:linear-gradient(135deg,#2ed573,#20bf6b);}
  #refresh-btn{background:linear-gradient(135deg,#ff6b6b,#ee5a24);}
  #next-turn-btn:disabled,#refresh-btn:disabled{background:#666;cursor:not-allowed;}

  .grid-section{margin-top:8px;}
  .grid-title{font-size:16px;font-weight:bold;color:#feca57;margin-bottom:8px;text-align:center;}
  .card-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    justify-items:center;
  }
  .grid-slot{
    width:110px;height:150px;
    border:2px dashed #666;border-radius:8px;
    background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;
  }
  .grid-slot.drag-over{border-color:#feca57;background:rgba(254,202,87,0.2);}

  /* 只保留版权文字 */
  footer{
    text-align:center;
    font-size:11px;
    color:rgba(255,255,255,0.6);
    padding:4px 0;
  }
</style>
</head>
<body>
<div class="container">
  <div class="shop-section">
    <div class="shop-header">
      <div class="shop-title">Card Shop</div>
      <div class="gold-display">Gold: <span id="current-gold">2</span></div>
    </div>
    <div class="shop-cards" id="shop-cards"></div>
  </div>

  <div class="control-bar">
    <div class="turn-display">Turn: <span id="current-turn">1</span></div>
    <button id="next-turn-btn">Next</button>
    <button id="refresh-btn">Refresh(1G)</button>
  </div>

  <div class="grid-section">
    <div class="grid-title">Your Deck (Max 6)</div>
    <div class="card-grid" id="card-grid">
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
    </div>
  </div>
</div>

<!-- 纯版权文字，无社交链接 -->
<footer>
© 2026 Taichicoin · Built by AI
</footer>

<script>
  const allCardsData = [
    {id:1,name:"Ying Dragon",image:"yl.jpg",atk:3,hp:5,cost:1},
    {id:2,name:"Nine-Tailed Fox",image:"jwf.jpg",atk:8,hp:10,cost:3},
    {id:3,name:"Bai Ze",image:"bz.jpg",atk:5,hp:10,cost:2},
    {id:4,name:"Qiong Qi",image:"qq.jpg",atk:10,hp:15,cost:4},
    {id:5,name:"Jingwei",image:"jw.jpg",atk:12,hp:18,cost:5}
  ];

  let currentGold=2,currentTurn=1,draggedCard=null,isNextTurnDisabled=false,sellingCard=null;
  const turnGoldIncrement=[0,2,3,5,7,10,15,20];

  function renderShop(){
    const shop=document.getElementById("shop-cards");shop.innerHTML="";
    const shuffled=[...allCardsData].sort(()=>Math.random()-0.5);
    const selected=shuffled.slice(0,3);

    selected.forEach(card=>{
      const wrap=document.createElement("div");wrap.className="card-wrapper";
      const el=document.createElement("div");el.className="card";el.draggable=true;
      if(currentGold<card.cost){el.classList.add("insufficient-funds");el.draggable=false;}
      el.innerHTML=`
        <img src="${card.image}" alt="${card.name}">
        <div class="stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>
      `;
      const cost=document.createElement("div");cost.className="card-cost-external";cost.innerText=card.cost;
      wrap.appendChild(el);wrap.appendChild(cost);shop.appendChild(wrap);

      el.addEventListener("dragstart",e=>{
        if(el.classList.contains("insufficient-funds"))return;draggedCard={...card};
      });
    });

    shop.addEventListener("dragover",e=>e.preventDefault());
    shop.addEventListener("drop",()=>{
      if(sellingCard){currentGold+=sellingCard.cost;updateGameStatus();sellingCard=null;renderShop();}
    });
    updateButtonStates();
  }

  function initGridSlots(){
    const slots=document.querySelectorAll(".grid-slot");
    slots.forEach(slot=>{
      slot.addEventListener("dragover",e=>{e.preventDefault();if(draggedCard&&!slot.children.length)slot.classList.add("drag-over");});
      slot.addEventListener("dragleave",()=>slot.classList.remove("drag-over"));
      slot.addEventListener("drop",e=>{
        e.preventDefault();slot.classList.remove("drag-over");
        if(!draggedCard||slot.children.length)return;
        currentGold-=draggedCard.cost;
        const deckCard=document.createElement("div");deckCard.className="card";deckCard.draggable=true;
        deckCard.innerHTML=`
          <img src="${draggedCard.image}" alt="${draggedCard.name}">
          <div class="stats"><span class="atk">${draggedCard.atk}</span><span class="hp">${draggedCard.hp}</span></div>
        `;
        deckCard.addEventListener("dragstart",()=>{sellingCard=draggedCard;slot.innerHTML="";});
        slot.appendChild(deckCard);draggedCard=null;updateGameStatus();renderShop();
      });
    });
  }

  function startNextTurn(){
    if(isNextTurnDisabled)return;currentTurn++;currentGold+=turnGoldIncrement[currentTurn]||0;
    if(currentTurn>=7){isNextTurnDisabled=true;document.getElementById("next-turn-btn").disabled=true;document.getElementById("next-turn-btn").innerText="Game Over";}
    updateGameStatus();renderShop();
  }

  document.getElementById("refresh-btn").onclick=()=>{if(currentGold>=1){currentGold-=1;updateGameStatus();renderShop();}};
  function updateGameStatus(){document.getElementById("current-gold").innerText=currentGold;document.getElementById("current-turn").innerText=currentTurn;updateButtonStates();}
  function updateButtonStates(){document.getElementById("refresh-btn").disabled=currentGold<1;}
  document.getElementById("next-turn-btn").onclick=startNextTurn;
  window.onload=()=>{renderShop();initGridSlots();};
</script>
</body>
</html>
