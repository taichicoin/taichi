<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taichi Coin Mint</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.7.2.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #f5b800;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: #111111;
            border: 2px solid #f5b800;
            border-radius: 20px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(245, 184, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(245, 184, 0, 0.5);
        }

        .subtitle {
            font-size: 1rem;
            color: #d4a000;
            margin-bottom: 30px;
        }

        .wallet-status {
            background: #1a1a1a;
            border: 1px solid #f5b800;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .mint-btn {
            width: 100%;
            padding: 18px;
            background: #f5b800;
            color: #0a0a0a;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .mint-btn:disabled {
            background: #886a00;
            cursor: not-allowed;
        }

        .mint-btn:hover:not(:disabled) {
            background: #ffc800;
            box-shadow: 0 0 15px rgba(245, 184, 0, 0.6);
        }

        .status {
            font-size: 1rem;
            margin-bottom: 25px;
            min-height: 24px;
        }

        .social-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: #ffffff;
            border: 3px solid #f5b800;
            border-radius: 16px;
            color: #f5b800;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 0 #d4a000;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #d4a000;
        }

        .social-icon {
            width: 28px;
            height: 28px;
            fill: #f5b800;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }
            .social-links {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Taichi Coin</h1>
        <p class="subtitle">Free Mint on BSC</p>

        <div class="wallet-status" id="walletStatus">
            Not Connected
        </div>

        <button class="mint-btn" id="connectBtn">Connect Wallet</button>
        <button class="mint-btn" id="mintBtn" disabled>Start Mint</button>

        <div class="status" id="status">Ready to mint</div>

        <div class="social-links">
            <a href="https://t.me/yourtelegram" target="_blank" class="social-btn">
                <svg class="social-icon" viewBox="0 0 24 24">
                    <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.962 6.502-1.358 8.627-.168.907-.5 1.209-.82 1.236-.703.056-1.237-.463-1.91-.904-.906-.58-1.424-.937-2.306-1.534-1.016-.707-.357-1.09.218-1.727.152-.163 2.718-2.488 2.768-2.706a.243.243 0 0 0-.058-.216c-.076-.063-.186-.035-.277-.02-.12.023-2.037 1.293-5.753 3.833-.544.373-1.034.558-1.47.548-.483-.012-1.419-.275-2.11-.501-.851-.283-1.528-.431-1.47-.907.03-.257.387-.523 1.073-.794 4.253-1.858 7.065-3.072 8.478-3.665 4.048-1.707 4.872-2.009 5.428-2.018.12 0 .387.027.56.16.153.118.193.277.207.397.015.122.045.437.03.677z"/>
                </svg>
                Telegram
            </a>
            <a href="https://x.com/yourtwitter" target="_blank" class="social-btn">
                <svg class="social-icon" viewBox="0 0 24 24">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
                X / Twitter
            </a>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "YOUR_CONTRACT_ADDRESS";
        const BSC_CHAIN_ID = "0x38";
        const connectBtn = document.getElementById("connectBtn");
        const mintBtn = document.getElementById("mintBtn");
        const walletStatus = document.getElementById("walletStatus");
        const statusEl = document.getElementById("status");

        let provider;
        let signer;
        let userAddress;

        connectBtn.addEventListener("click", async () => {
            if (!window.ethereum) {
                alert("Please install a Web3 wallet like MetaMask or TP Wallet");
                return;
            }
            try {
                await window.ethereum.request({ method: "eth_requestAccounts" });
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                userAddress = await signer.getAddress();

                const chainId = await provider.getNetwork().then(net => net.chainId);
                if (chainId !== 56) {
                    await window.ethereum.request({
                        method: "wallet_switchEthereumChain",
                        params: [{ chainId: BSC_CHAIN_ID }]
                    });
                }

                walletStatus.textContent = `Connected: ${userAddress.slice(0, 6)}...${userAddress.slice(-4)}`;
                connectBtn.disabled = true;
                connectBtn.textContent = "Connected";
                mintBtn.disabled = false;
                statusEl.textContent = "Ready to mint";
            } catch (err) {
                console.error(err);
                alert("Failed to connect wallet");
            }
        });

        mintBtn.addEventListener("click", async () => {
            if (!signer) return;

            mintBtn.disabled = true;
            statusEl.textContent = "Processing...";

            try {
                const tx = await signer.sendTransaction({
                    to: CONTRACT_ADDRESS,
                    value: ethers.utils.parseEther("0"),
                    gasLimit: ethers.utils.hexlify(100000)
                });

                statusEl.textContent = `Transaction sent: ${tx.hash.slice(0, 6)}...${tx.hash.slice(-4)}`;
                await tx.wait();

                statusEl.textContent = "Mint successful! 🎉";
            } catch (err) {
                console.error(err);
                statusEl.textContent = "Transaction failed";
            } finally {
                mintBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
