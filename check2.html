<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAICHI AIRDROP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'JetBrains Mono', monospace, system-ui;
    }

    body {
      min-height: 100vh;
      background: #0B0E16;
      background-image: 
        linear-gradient(rgba(0, 179, 207, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 179, 207, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      color: #E1E7F5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: #111827;
      border: 1px solid #1F2937;
      border-radius: 8px;
      padding: 44px 36px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #00B3CF, transparent);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #F0F4FF;
      text-align: center;
      margin-bottom: 36px;
      letter-spacing: 2px;
    }

    h1::after {
      content: 'TAICHI';
      display: block;
      font-size: 12px;
      color: #00B3CF;
      letter-spacing: 6px;
      margin-top: 6px;
      opacity: 0.8;
    }

    .input-group {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      background: #0F141F;
      border: 1px solid #273444;
      border-radius: 4px;
      color: #E1E7F5;
      font-size: 14px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #00B3CF;
      background: #0D121C;
    }

    input::placeholder {
      color: #4B5563;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #00B3CF;
      border: none;
      border-radius: 4px;
      color: #0B0E16;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #009AAD;
    }

    button:disabled {
      background: #273444;
      color: #4B5563;
      cursor: not-allowed;
    }

    .result {
      margin: 24px 0;
      padding: 18px;
      background: #0F141F;
      border-left: 3px solid #273444;
      border-radius: 0 4px 4px 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .result.success {
      border-left-color: #00B3CF;
      background: rgba(0, 179, 207, 0.05);
    }

    .result.error {
      border-left-color: #E53935;
      background: rgba(229, 57, 53, 0.05);
    }

    .register-form {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #1F2937;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>空投注册</h1>

    <div class="input-group">
      <input type="text" id="address" placeholder="BSC ADDRESS (0x...)">
    </div>
    <button id="checkBtn">CHECK ELIGIBILITY</button>

    <div id="result" class="result hidden"></div>

    <div id="registerForm" class="register-form hidden">
      <div class="input-group">
        <input type="text" id="twitterUser" placeholder="TWITTER USERNAME">
      </div>
      <div class="input-group">
        <input type="text" id="tweetLink" placeholder="TWEET LINK">
      </div>
      <button id="submitBtn">SUBMIT</button>
    </div>
  </div>

  <script>
    // 所有逻辑完全保留，一字没动
    const RPC_URLS = [
      'https://bsc-dataseed1.bnbchain.org',
      'https://bsc-dataseed2.bnbchain.org',
      'https://bsc.publicnode.com'
    ];

    const QUALIFY_MIN_TX = 300;
    const TIER1_MAX_TX = 499;
    const TIER1_AIRDROP = 500;
    const TIER2_MIN_TX = 500;
    const MAX_AIRDROP = 5000;

    const SUPABASE_URL = "https://sznjaotjoljaiawbvfro.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN";

    const checkBtn = document.getElementById('checkBtn');
    const resultDiv = document.getElementById('result');
    const registerForm = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    
    let currentWallet = '';
    let currentTxCount = 0;
    let currentAirdrop = 0;

    async function getTxCount(address) {
      for (const rpc of RPC_URLS) {
        try {
          const res = await fetch(rpc, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              jsonrpc: '2.0',
              id: 1,
              method: 'eth_getTransactionCount',
              params: [address, 'latest']
            })
          });
          const data = await res.json();
          if (data.result) return parseInt(data.result, 16);
        } catch (e) {}
      }
      throw new Error('RPC 连接失败，请重试');
    }

    checkBtn.addEventListener('click', async () => {
      const address = document.getElementById('address').value.trim();
      if (!address.startsWith('0x') || address.length !== 42) {
        resultDiv.className = 'result error';
        resultDiv.textContent = '请输入有效的BSC钱包地址';
        resultDiv.classList.remove('hidden');
        return;
      }

      checkBtn.disabled = true;
      checkBtn.textContent = 'CHECKING...';
      resultDiv.classList.remove('hidden');
      resultDiv.textContent = 'SCANNING ON-CHAIN DATA...';

      try {
        const txCount = await getTxCount(address);
        currentWallet = address;
        currentTxCount = txCount;

        let qualified = false;
        let airdropAmount = 0;

        if (txCount >= QUALIFY_MIN_TX) {
          qualified = true;
          if (txCount <= TIER1_MAX_TX) {
            airdropAmount = TIER1_AIRDROP;
          } else if (txCount >= TIER2_MIN_TX && txCount <= MAX_AIRDROP) {
            airdropAmount = txCount;
          } else {
            airdropAmount = MAX_AIRDROP;
          }
        }

        currentAirdrop = airdropAmount;

        if (qualified) {
          resultDiv.className = 'result success';
          resultDiv.innerHTML = `
            ✅ ELIGIBLE<br>
            ADDRESS: ${address}<br>
            TX COUNT: ${txCount}<br>
            AIRDROP: ${airdropAmount} TAICHI
          `;
          registerForm.classList.remove('hidden');
        } else {
          resultDiv.className = 'result error';
          resultDiv.innerHTML = `
            ❌ NOT ELIGIBLE<br>
            ADDRESS: ${address}<br>
            TX COUNT: ${txCount}<br>
            MIN REQUIRED: 300 TXS
          `;
          registerForm.classList.add('hidden');
        }
      } catch (err) {
        resultDiv.className = 'result error';
        resultDiv.textContent = err.message || 'SCAN FAILED';
      } finally {
        checkBtn.disabled = false;
        checkBtn.textContent = 'CHECK ELIGIBILITY';
      }
    });

    submitBtn.addEventListener('click', async () => {
      const username = document.getElementById('twitterUser').value.trim();
      const replylink = document.getElementById('tweetLink').value.trim();

      if (!currentWallet) {
        alert("PLEASE CHECK ELIGIBILITY FIRST");
        return;
      }
      if (!username || !replylink) {
        alert("PLEASE FILL IN ALL FIELDS");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "SUBMITTING...";

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/registrations`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({
            address: currentWallet,
            username: username,
            replylink: replylink,
            tx_count: currentTxCount,
            airdrop_amount: currentAirdrop
          })
        });

        if (res.ok) {
          alert("✅ REGISTERED SUCCESSFULLY");
          registerForm.classList.add("hidden");
          resultDiv.innerHTML += "<br><br>✅ REGISTRATION COMPLETE";
        } else {
          const err = await res.json().catch(() => ({}));
          if (err.code === "23505") {
            alert("❌ ADDRESS / USERNAME / LINK ALREADY USED");
          } else {
            alert("❌ REGISTRATION FAILED");
          }
        }
      } catch (e) {
        alert("NETWORK ERROR");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "SUBMIT";
      }
    });
  </script>
</body>
</html>
