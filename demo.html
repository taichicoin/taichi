<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shan Hai Jing Card Demo</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }
  body {
    background: #1a1a2e;
    color: #fff;
    padding: 20px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
  }
  /* 商店区域 */
  .shop-section {
    margin-bottom: 30px;
  }
  .shop-title {
    font-size: 24px;
    font-weight: bold;
    color: #feca57;
    margin-bottom: 15px;
  }
  .shop-cards {
    display: flex;
    gap: 15px;
  }
  .card {
    width: 180px;
    height: 250px;
    border: 3px solid #d4af37;
    border-radius: 12px;
    overflow: hidden;
    cursor: grab;
    background: #000;
    position: relative;
  }
  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }
  /* 攻击/生命数值样式 */
  .card .stats {
    position: absolute;
    bottom: 8px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 10px;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 2px 2px 2px #000;
  }
  .card .atk {
    color: #ff4757; /* 攻击红色 */
  }
  .card .hp {
    color: #2ed573; /* 生命绿色 */
  }

  /* 卡组格子区域 */
  .grid-section {
    margin-top: 40px;
  }
  .grid-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  .grid-title {
    font-size: 20px;
    font-weight: bold;
    color: #feca57;
  }
  #refresh-btn {
    padding: 10px 20px;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
  }
  .grid-slot {
    width: 180px;
    height: 250px;
    border: 2px dashed #666;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .grid-slot.drag-over {
    border-color: #feca57;
    background: rgba(254, 202, 87, 0.1);
  }
</style>
</head>
<body>
<div class="container">
  <!-- 商店区域 -->
  <div class="shop-section">
    <div class="shop-title">Card Shop</div>
    <div class="shop-cards" id="shop-cards"></div>
  </div>

  <!-- 卡组格子区域 -->
  <div class="grid-section">
    <div class="grid-header">
      <div class="grid-title">Your Deck (Max 6)</div>
      <button id="refresh-btn">Refresh Cards</button>
    </div>
    <div class="card-grid">
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
    </div>
  </div>
</div>

<script>
  // 卡牌数据：包含攻击和生命
  const allCards = [
    { id: 1, name: "Ying Dragon", image: "yl.jpg", atk: 3, hp: 5 },
    { id: 2, name: "Nine-Tailed Fox", image: "jwf.jpg", atk: 8, hp: 10 },
    { id: 3, name: "Bai Ze", image: "bz.jpg", atk: 5, hp: 10 },
    { id: 4, name: "Qiong Qi", image: "qq.jpg", atk: 10, hp: 15 },
    { id: 5, name: "Zhu Jiuyin", image: "zjy.jpg", atk: 12, hp: 18 }
  ];

  let draggedCard = null;

  // 随机刷新商店（3张）
  function refreshShop() {
    const shop = document.getElementById("shop-cards");
    shop.innerHTML = "";
    const shuffled = [...allCards].sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, 3);

    selected.forEach(card => {
      const el = document.createElement("div");
      el.className = "card";
      el.draggable = true;
      el.innerHTML = `
        <img src="${card.image}" alt="${card.name}">
        <div class="stats">
          <span class="atk">${card.atk}</span>
          <span class="hp">${card.hp}</span>
        </div>
      `;

      el.addEventListener("dragstart", (e) => {
        draggedCard = card;
      });
      shop.appendChild(el);
    });
  }

  // 拖放格子逻辑
  document.querySelectorAll(".grid-slot").forEach(slot => {
    slot.addEventListener("dragover", e => {
      e.preventDefault();
      slot.classList.add("drag-over");
    });
    slot.addEventListener("dragleave", () => {
      slot.classList.remove("drag-over");
    });
    slot.addEventListener("drop", e => {
      e.preventDefault();
      slot.classList.remove("drag-over");
      if (!slot.children.length && draggedCard) {
        slot.innerHTML = `
          <div class="card">
            <img src="${draggedCard.image}" alt="${draggedCard.name}">
            <div class="stats">
              <span class="atk">${draggedCard.atk}</span>
              <span class="hp">${draggedCard.hp}</span>
            </div>
          </div>
        `;
        draggedCard = null;
      }
    });
  });

  // 绑定刷新按钮
  document.getElementById("refresh-btn").addEventListener("click", refreshShop);
  window.onload = refreshShop;
</script>
</body>
</html>
