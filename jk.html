<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <!-- Google 验证码 -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif}
        body{
            background-image:url('./bg.jpg');
            background-size:cover;
            background-position:center center;
            background-repeat:no-repeat;
            background-attachment:fixed;
            min-height:100vh;
            padding:80px 20px 20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            position:relative;
        }
        body::before{
            content:'';
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.4);
            z-index:0;
        }
        .top-bar{
            position:fixed;top:20px;left:20px;right:20px;
            display:flex;justify-content:space-between;gap:12px;z-index:10;
        }
        .btn-small{height:44px;padding:0 20px;border-radius:12px;border:none;font-size:18px;cursor:pointer;}
        .btn-primary{background:#2563eb;color:white;}
        .btn-success{background:#5eead4;color:#0f172a;}
        .address-top{
            height:44px;padding:0 16px;background:white;border-radius:12px;
            font-size:14px;display:none;align-items:center;gap:8px;
        }
        .container{
            width:100%;max-width:480px;background:white;border-radius:24px;
            padding:40px 24px;position:relative;z-index:1;
        }
        h1{font-size:28px;text-align:center;margin-bottom:12px;color:#1e293b;}
        .desc{color:#64748b;text-align:center;margin-bottom:24px;line-height:1.5;}
        .g-recaptcha{
            display:flex;
            justify-content:center;
            margin:20px auto;
        }
        .btn-verify{
            width:100%;height:56px;border:none;border-radius:16px;
            font-size:20px;font-weight:700;cursor:pointer;
            background:#2563eb;color:white;
            display:none; /* 验证通过才显示 */
        }
        .btn-verify:disabled{
            opacity:0.5;
            cursor:not-allowed;
        }
        .tips{
            font-size:13px;color:#f1f5f9;text-align:center;margin-top:24px;line-height:1.4;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="address-top" id="addressTop">
        已连接：<span id="walletDisplay"></span>
    </div>
    <button class="btn-small btn-primary" id="connectBtn">连接钱包</button>
</div>

<div class="container">
    <h1>Twitter 任务验证</h1>
    <p class="desc">请先连接钱包，完成人机验证后提交</p>

    <!-- 谷歌验证码 -->
    <div class="g-recaptcha" 
         data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI" 
         data-callback="onCaptchaSuccess"
         data-expired-callback="onCaptchaExpired">
    </div>

    <button class="btn-verify" id="verifyBtn">Verify</button>
</div>

<p class="tips">
    电脑端请安装MetaMask/OKX钱包插件使用<br>
    手机端请在钱包APP的DApp浏览器打开本页面
</p>

<script>
const TALLY_URL = "https://tally.so/r/rjEXEN";
let currentAccount = null;
let captchaPassed = false;

const $connect = document.getElementById('connectBtn');
const $addrBox = document.getElementById('addressTop');
const $display = document.getElementById('walletDisplay');
const $verifyBtn = document.getElementById('verifyBtn');

// 工具
function shortAddress(addr) {
    return addr ? `${addr.slice(0,6)}...${addr.slice(-4)}` : '';
}
function getProvider() {
    return window.ethereum || window.okxwallet || window.tpwallet || window.trustwallet;
}

// 刷新按钮显示逻辑
function refreshUI() {
    if (currentAccount && captchaPassed) {
        $verifyBtn.style.display = "block";
    } else {
        $verifyBtn.style.display = "none";
    }
}

// 验证码成功
function onCaptchaSuccess() {
    captchaPassed = true;
    refreshUI();
}
// 验证码过期
function onCaptchaExpired() {
    captchaPassed = false;
    refreshUI();
}

// 连接钱包
$connect.onclick = async () => {
    const p = getProvider();
    if (!p) {
        alert("请在钱包DApp浏览器打开");
        return;
    }
    if (currentAccount) {
        currentAccount = null;
        $addrBox.style.display = "none";
        $connect.textContent = "连接钱包";
        $connect.classList.replace("btn-success", "btn-primary");
        refreshUI();
        return;
    }
    try {
        const accounts = await p.request({ method: "eth_requestAccounts" });
        currentAccount = accounts[0];
        $display.textContent = shortAddress(currentAccount);
        $addrBox.style.display = "flex";
        $connect.textContent = "已连接";
        $connect.classList.replace("btn-primary", "btn-success");
        refreshUI();
    } catch (e) {
        alert("连接失败");
    }
};

// 跳转到 Tally
$verifyBtn.onclick = () => {
    if (!currentAccount || !captchaPassed) return;
    const url = `${TALLY_URL}?wallet=${encodeURIComponent(currentAccount)}`;
    window.open(url, "_blank");
};

refreshUI();
</script>
</body>
</html>
