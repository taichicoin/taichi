<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAICHI 空投资格查询（OKX BSC 自动版）</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif;}
  body{background:#0a0a0f;color:#fff;min-height:100vh;padding:20px;}
  .container{max-width:500px;margin:40px auto;background:#161620;padding:24px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
  h2{text-align:center;margin-bottom:20px;color:#f0f0ff;}
  input{width:100%;padding:14px;background:#1f1f2b;border:1px solid #374151;border-radius:12px;color:#fff;margin-bottom:12px;}
  button{width:100%;padding:14px;background:#2563eb;border:none;border-radius:12px;color:#fff;font-weight:bold;cursor:pointer;transition:0.3s;}
  button:hover{background:#3b82f6;}
  .result{margin-top:20px;padding:16px;border-radius:12px;}
  .ok{background:#064e3b;border:1px solid #10b981;}
  .fail{background:#7f1d1d;border:1px solid #ef4444;}
  .loading{text-align:center;margin:10px 0;color:#9ca3af;}
</style>
</head>
<body>
<div class="container">
  <h2>TAICHI 空投资格查询</h2>
  <input id="walletAddr" placeholder="请输入 BSC 钱包地址（0x...）" required>
  <button onclick="checkGas()">一键查询 Gas 消耗</button>
  <div id="loading" class="loading" style="display:none;">正在从 OKX BSC 浏览器获取数据...</div>
  <div id="result" class="result" style="display:none;"></div>
</div>

<script>
// 你的空投阶梯规则
const AIRDROP_RULES = [
  { min: 0.01, max: 0.02, amount: 500 },
  { min: 0.02, max: 0.03, amount: 800 },
  { min: 0.03, max: 0.04, amount: 1000 },
  { min: 0.04, max: 0.05, amount: 1500 },
  { min: 0.05, max: 0.1, amount: 1600 },
  { min: 0.1, max: 0.5, amount: 2000 },
  { min: 0.5, max: Infinity, amount: 5000 }
];

// 免费跨域代理，用来绕过 OKX 的 CORS 限制
const PROXY_URL = "https://api.allorigins.win/raw?url=";

async function checkGas() {
  const addr = document.getElementById('walletAddr').value.trim().toLowerCase();
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  
  // 地址格式校验
  if (!addr.startsWith('0x') || addr.length !== 42) {
    result.innerHTML = '<strong>❌ 地址格式错误</strong><br>请输入以 0x 开头的 42 位 BSC 地址';
    result.className = 'result fail';
    result.style.display = 'block';
    return;
  }

  loading.style.display = 'block';
  result.style.display = 'none';

  try {
    // 拼接 OKX BSC 浏览器地址查询链接
    const okxUrl = `https://web3.okx.com/explorer/bsc/address/${addr}`;
    // 用代理跨域获取 OKX 页面 HTML
    const response = await fetch(PROXY_URL + encodeURIComponent(okxUrl));
    const html = await response.text();

    // 正则匹配 OKX 页面里的 Gas 消耗总和（BNB）
    // 匹配类似 "Total Gas Used: 0.1234 BNB" 的格式
    const gasMatch = html.match(/Total Gas Used.*?([\d,]+\.\d+)\s*BNB/i);
    if (!gasMatch) {
      throw new Error("未找到 Gas 消耗数据，请检查地址是否正确");
    }

    // 解析 Gas 数值（去掉千分位逗号）
    const gasTotal = parseFloat(gasMatch[1].replace(/,/g, ''));
    
    // 匹配空投规则
    let airdropAmount = 0;
    for (const rule of AIRDROP_RULES) {
      if (gasTotal >= rule.min && gasTotal < rule.max) {
        airdropAmount = rule.amount;
        break;
      }
    }

    // 显示结果
    if (airdropAmount > 0) {
      result.innerHTML = `
        <strong>✅ 符合空投资格！</strong><br>
        钱包地址：${addr}<br>
        总 Gas 消耗：${gasTotal.toFixed(4)} BNB<br>
        可获得空投：${airdropAmount} TAICHI
      `;
      result.className = 'result ok';
    } else {
      result.innerHTML = `
        <strong>❌ 不符合资格</strong><br>
        总 Gas 消耗：${gasTotal.toFixed(4)} BNB<br>
        最低要求：≥ 0.01 BNB
      `;
      result.className = 'result fail';
    }
    result.style.display = 'block';
  } catch (err) {
    result.innerHTML = `<strong>❌ 查询失败</strong><br>${err.message}`;
    result.className = 'result fail';
    result.style.display = 'block';
  } finally {
    loading.style.display = 'none';
  }
}
</script>
</body>
</html>
