<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多钱包连接示例</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/web3modal@2.8.6/dist/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
<style>
body { display:flex; justify-content:center; align-items:center; height:100vh; font-family: Arial; background:#f0f2f5; }
button { padding:12px 24px; font-size:16px; cursor:pointer; border:none; border-radius:6px; background-color:#4CAF50; color:white; }
</style>
</head>
<body>
<button id="connectWalletBtn">连接钱包</button>

<script>
// 公共 RPC，可根据需要修改成 BSC/OKC/ETH
const rpcUrls = {
  1: "https://cloudflare-eth.com", // Ethereum Mainnet
  56: "https://bsc-dataseed.binance.org/", // BSC
  66: "https://exchainrpc.okex.org" // OKExChain
};

const providerOptions = {
  walletconnect: {
    package: window.WalletConnectProvider.default,
    options: {
      rpc: rpcUrls,  // 公共RPC
      qrcode: true   // 弹出扫码
    }
  },
  injected: {
    package: null // 浏览器注入钱包
  }
};

const web3Modal = new Web3Modal.default({
  cacheProvider: false,
  providerOptions
});

const btn = document.getElementById('connectWalletBtn');

btn.addEventListener('click', async () => {
  try {
    const provider = await web3Modal.connect();
    const ethersProvider = new ethers.BrowserProvider(provider);
    const signer = await ethersProvider.getSigner();
    const address = await signer.getAddress();
    alert(`钱包已连接: ${address}`);
  } catch (err) {
    console.error(err);
    alert("钱包连接失败或取消");
  }
});
</script>
</body>
  </html>
