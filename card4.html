  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'
    const supabase = createClient(
      "https://sznjaotjoljaiawbvfro.supabase.co",
      "sb_publishable_iN3D88OfHeUre4ddCaDH7g_rlsQ8LGN"
    );
    window.supabase = supabase;
  </script>

  <script>
    let currentUser = null;
    let currentUserProfile = null;
    let matchSubscription = null;
    let currentRoom = null;
    const usernameRule = /^[a-z0-9]{1,7}$/;

    // 页面加载时，先校验登录，再读取资料，再判断是否弹窗
    window.addEventListener('DOMContentLoaded', async ()=>{
      await checkLogin();
    })

    async function checkLogin(){
      // 1. 先校验登录状态
      const { data: { session }, error } = await supabase.auth.getSession();
      if(error || !session){
        window.location.replace("/signup");
        return;
      }
      currentUser = session.user;
      window.currentUser = currentUser;

      // 2. 强制等待读取完整的用户资料，必须拿到结果再往下走
      const { data: profile, error: profileError } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();
      
      if(profileError || !profile){
        console.error("读取用户资料失败", profileError);
        return;
      }
      currentUserProfile = profile;
      window.currentUserProfile = currentUserProfile;

      // 3. 【核心加固】严格判断是否需要强制设置用户名
      // 只有username为null、空字符串、全空格，才弹出强制窗口
      const hasValidUsername = profile.username && profile.username.trim() !== "" && usernameRule.test(profile.username);
      if(!hasValidUsername){
        showUsernameSetModal();
        return;
      }

      // 4. 有有效用户名，正常加载UI，永远不会弹设置窗口
      await loadUserUI();
    }

    function showPage(page){
      ["lobby","game"].forEach(x=>{
        document.getElementById(x+"-page").classList.add("hidden");
      })
      document.getElementById(page+"-page").classList.remove("hidden");
    }

    async function loadUserUI(){
      const p = currentUserProfile;
      // 顶部用户名显示
      document.getElementById("user-name").textContent = p.username;
      document.getElementById("user-avatar").src = p.avatar_url ?? `https://api.dicebear.com/7.x/avataaars?seed=${currentUser.id}`;
      // 谷歌邮箱显示
      const emailEl = document.getElementById("googleEmailLine");
      let mail = currentUser.email;
      emailEl.innerText = (mail.length>22) ? mail.slice(0,19)+"…" : mail;
      // 钱包绑定状态
      const bindBtn = document.getElementById("menuBindWalletBtn");
      const unbindBtn = document.getElementById("menuUnbindWalletBtn");
      if(p.wallet_address){
        let s = p.wallet_address.slice(0,6)+"…"+p.wallet_address.slice(-4);
        bindBtn.innerText = "已绑定："+s;
        bindBtn.disabled = true;
        unbindBtn.classList.remove("hidden");
      }else{
        bindBtn.innerText = "绑定钱包";
        bindBtn.disabled = false;
        unbindBtn.classList.add("hidden");
      }
    }

    // 强制设置用户名弹窗
    function showUsernameSetModal(){
      document.getElementById("app-container").classList.add("hidden");
      document.getElementById("username-set-modal").classList.remove("hidden");
      document.body.classList.add("body-lock");
    }
    function hideUsernameSetModal(){
      document.getElementById("app-container").classList.remove("hidden");
      document.getElementById("username-set-modal").classList.add("hidden");
      document.body.classList.remove("body-lock");
    }

    // 【加固】首次设置用户名，必须校验数据库写入成功
    async function submitFirstUsername(){
      const input = document.getElementById("username-input");
      const tip = document.getElementById("username-tip");
      const btn = document.getElementById("submit-username-btn");
      let raw = input.value.trim().toLowerCase();

      // 1. 前端格式校验
      if(!usernameRule.test(raw)){
        tip.className="text-xs text-red-400 mt-1";
        tip.innerText="格式错误！仅支持1-7位小写字母、数字";
        return;
      }

      // 2. 禁用按钮，防止重复提交
      btn.disabled = true;
      tip.className="text-xs text-gray-400 mt-1";
      tip.innerText="正在检测用户名是否可用...";

      // 3. 检测用户名是否被占用
      const { data: exist } = await supabase
        .from("profiles")
        .select("id")
        .eq("username", raw)
        .single();
      if(exist){
        tip.className="text-xs text-red-400 mt-1";
        tip.innerText="该用户名已被占用，请换一个";
        btn.disabled = false;
        return;
      }

      // 4. 写入数据库，必须拿到成功结果
      tip.innerText="正在保存用户名...";
      const { error: updateError } = await supabase
        .from("profiles")
        .update({ username: raw })
        .eq("id", currentUser.id);
      
      if(updateError){
        tip.className="text-xs text-red-400 mt-1";
        tip.innerText="保存失败："+updateError.message;
        btn.disabled = false;
        return;
      }

      // 5. 【关键】重新读取最新资料，确认写入成功
      const { data: newProfile } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();
      currentUserProfile = newProfile;

      // 6. 写入成功，关闭弹窗，加载UI
      tip.className="text-xs text-green-400 mt-1";
      tip.innerText="设置成功，正在进入...";
      setTimeout(()=>{
        hideUsernameSetModal();
        loadUserUI();
      },800);
    }

    // 【加固】修改用户名弹窗，严格校验改名卡规则
    window.openRenameModal = async function(){
      // 每次打开都重新读取最新资料，防止缓存
      const { data: newProfile } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();
      currentUserProfile = newProfile;
      const p = currentUserProfile;

      // 填充当前信息
      document.getElementById("current-username").innerText = p.username;
      document.getElementById("rename-card-count").innerText = p.rename_card_count;
      document.getElementById("rename-input").value = "";
      document.getElementById("rename-tip").className = "text-xs text-gray-400 mt-1";
      document.getElementById("rename-tip").innerText = "仅支持小写英文字母a-z、数字0-9";

      // 计算冷却时间
      const lastRenameTip = document.getElementById("last-rename-tip");
      const limitTip = document.getElementById("rename-limit-tip");
      const submitBtn = document.getElementById("submit-rename-btn");
      let canRename = false;

      if(p.last_rename_date){
        const lastDate = new Date(p.last_rename_date);
        const nextFreeDate = new Date(lastDate);
        nextFreeDate.setFullYear(nextFreeDate.getFullYear() + 1);
        const now = new Date();
        const isCoolDownOver = now >= nextFreeDate;

        lastRenameTip.innerText = `上次改名：${lastDate.toLocaleDateString()} | 下次免费改名：${nextFreeDate.toLocaleDateString()}`;
        
        // 改名规则判断：有改名卡 或 冷却结束，才能改名
        canRename = (p.rename_card_count > 0) || isCoolDownOver;
      }else{
        lastRenameTip.innerText = "从未改名";
        canRename = true; // 首次改名，有初始改名卡
      }

      // 不满足改名条件，禁用按钮+提示
      if(!canRename){
        limitTip.classList.remove("hidden");
        submitBtn.disabled = true;
        submitBtn.className = "px-4 py-2 bg-gray-600 rounded cursor-not-allowed";
      }else{
        limitTip.classList.add("hidden");
        submitBtn.disabled = false;
        submitBtn.className = "px-4 py-2 bg-cf-blue rounded hover:bg-blue-700";
      }

      document.getElementById("username-rename-modal").classList.remove("hidden");
    }
    window.closeRenameModal = ()=>{
      document.getElementById("username-rename-modal").classList.add("hidden");
    }

    // 【加固】提交改名，严格执行规则
    window.submitRename = async function(){
      const input = document.getElementById("rename-input");
      const tip = document.getElementById("rename-tip");
      const btn = document.getElementById("submit-rename-btn");
      const p = currentUserProfile;
      let newName = input.value.trim().toLowerCase();

      // 1. 格式校验
      if(!usernameRule.test(newName)){
        tip.className="text-xs text-red-400 mt-1";
        tip.innerText="格式错误！仅支持1-7位小写字母、数字";
        return;
      }
      if(newName === p.username){
        tip.className="text-xs text-red-400 mt-1";
        tip.innerText="新用户名不能和当前用户名一致";
        return;
      }

      // 2. 二次校验改名权限
      let haveCard = p.rename_card_count > 0;
      let canYearFree = false;
      if(!p.last_rename_date){
        canYearFree = true;
      }else{
        const lastDate = new Date(p.last_rename_date);
        const nextFreeDate = new Date(lastDate);
        nextFreeDate.setFullYear(nextFreeDate.getFullYear() + 1);
        canYearFree = new Date() >= nextFreeDate;
      }
      if(!haveCard && !canYearFree){
        tip.className="text-xs text-red-400 mt-1";
        tip.innerText="无可用改名卡，且未满1年冷却，无法修改";
        return;
      }

      // 3. 检测占用
      btn.disabled = true;
      tip.innerText="正在检测用户名是否可用...";
      const { data: exist } = await supabase
        .from("profiles")
        .select("id")
        .eq("username", newName)
        .single();
      if(exist){
        tip.className="text-xs text-red-400 mt-1";
        tip.innerText="该用户名已被占用，请换一个";
        btn.disabled = false;
        return;
      }

      // 4. 写入数据库，扣改名卡/更新时间
      tip.innerText="正在修改用户名...";
      const updateData = {
        username: newName,
        last_rename_date: new Date().toISOString()
      };
      // 有改名卡且没到免费时间，才扣卡
      if(haveCard && !canYearFree){
        updateData.rename_card_count = p.rename_card_count - 1;
      }

      const { error: updateError } = await supabase
        .from("profiles")
        .update(updateData)
        .eq("id", currentUser.id);
      
      if(updateError){
        tip.className="text-xs text-red-400 mt-1";
        tip.innerText="修改失败："+updateError.message;
        btn.disabled = false;
        return;
      }

      // 5. 更新本地资料，刷新UI
      const { data: newProfile } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();
      currentUserProfile = newProfile;
      await loadUserUI();

      // 6. 成功提示，关闭弹窗
      tip.className="text-xs text-green-400 mt-1";
      tip.innerText="修改成功！";
      setTimeout(()=>{
        closeRenameModal();
      },1000);
    }

    // 其他原有功能
    window.bindWallet = async ()=>{
      alert("钱包绑定功能待接入");
    };
    window.unbindWallet = async function(){
      if(!confirm("确定解绑钱包？")) return;
      const { error } = await supabase.from("profiles").update({wallet_address:null}).eq("id",currentUser.id);
      if(!error) checkLogin();
    }
    window.signOut = async function(){
      await supabase.auth.signOut();
      location.href="/signup";
    };

    window.openAvatarModal = ()=>document.getElementById("avatar-modal").classList.remove("hidden");
    window.closeAvatarModal = ()=>document.getElementById("avatar-modal").classList.add("hidden");
    window.uploadAvatar = async ()=>{
      let file = document.getElementById("avatar-input").files[0];
      if(!file) return;
      const fileName = `${currentUser.id}-${Date.now()}`;
      const { error: uploadError } = await supabase.storage.from("avatars").upload(fileName, file);
      if(uploadError){
        alert("上传失败");
        return;
      }
      const { data: { publicUrl } } = supabase.storage.from("avatars").getPublicUrl(fileName);
      const { error: updateError } = await supabase.from("profiles").update({ avatar_url: publicUrl }).eq("id", currentUser.id);
      if(!updateError){
        document.getElementById("user-avatar").src = publicUrl;
        closeAvatarModal();
      }
    }

    async function startMatchmaking(){
      if(!currentUser || !currentUserProfile?.username) return;
      await supabase.from("matching").insert({
        user_id: currentUser.id,
        username: currentUserProfile.username,
        avatar_url: document.getElementById("user-avatar").src
      }).catch(()=>{});

      document.getElementById("match-btn").classList.add("hidden");
      document.getElementById("match-status").classList.remove("hidden");
      document.getElementById("cancel-match-btn").classList.remove("hidden");

      matchSubscription = supabase.channel("matchmaking")
      .on("postgres_changes",{event:"*",schema:"public",table:"matching"},async ()=>{
        const {count} = await supabase.from("matching").select("*",{count:"exact",head:true});
        document.getElementById("match-status").innerText = `正在匹配中... (${count}/8)`;
      }).subscribe();
    }
    async function cancelMatchmaking(){
      await supabase.from("matching").delete().eq("user_id",currentUser.id);
      if(matchSubscription) supabase.removeChannel(matchSubscription);
      document.getElementById("match-btn").classList.remove("hidden");
      document.getElementById("match-status").classList.add("hidden");
      document.getElementById("cancel-match-btn").classList.add("hidden");
    }
    window.startMatchmaking = startMatchmaking;
    window.cancelMatchmaking = cancelMatchmaking;

    // 菜单点击事件
    document.getElementById('user-menu-btn').addEventListener('click',()=>{
      document.getElementById('user-menu').classList.toggle('hidden');
    });
    document.addEventListener('click',e=>{
      if(!e.target.closest("#user-menu-btn") && !e.target.closest("#user-menu")){
        document.getElementById('user-menu').classList.add("hidden");
      }
    });
  </script>
</body>
</html>
