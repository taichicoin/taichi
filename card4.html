<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Shan Hai Jing Card Game</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  background:linear-gradient(180deg,#4a5a72,#6b7a92,#8a9ab2);
  color:#fff;
  padding:8px;
  min-height:100vh;
  overflow:hidden; /* 彻底禁止滚动，一屏卡死 */
}

/* 顶部栏 */
.shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.shop-title{font-size:18px;color:#feca57;font-weight:bold;}
.gold-display{font-size:16px;color:#ffcc00;background:#161624;padding:4px 8px;border-radius:6px;border:2px solid #d4af37;}

/* 上方商店：固定3张并排 */
.shop-cards{display:flex;justify-content:center;gap:6px;margin-bottom:8px;}
.card-wrapper{display:flex;flex-direction:column;align-items:center;}

/* 统一超小卡牌，上下完全一样 */
.card{
  width:90px;height:120px;
  border:2px solid #d4af37;border-radius:6px;overflow:hidden;
  background:#000;position:relative;cursor:grab;
}
.card img{width:100%;height:100%;object-fit:cover;}
.card .stats{position:absolute;bottom:3px;width:100%;display:flex;justify-content:space-between;padding:0 4px;font-size:10px;font-weight:bold;text-shadow:1px 1px #000;}
.atk{color:#ff4757;}
.hp{color:#2ed573;}

.card-cost-external{width:22px;height:22px;border-radius:50%;background:#ff6b6b;color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;border:1px solid #fff;margin-top:3px;}
.card.insufficient-funds{opacity:0.6;cursor:not-allowed;}

/* 中间按钮 */
.control-bar{display:flex;justify-content:center;gap:8px;margin:6px 0;}
.turn-display{font-size:12px;background:#3742fa;padding:3px 8px;border-radius:10px;}
#next-turn-btn,#refresh-btn{padding:5px 10px;border:none;border-radius:5px;font-size:11px;color:#fff;cursor:pointer;}
#next-turn-btn{background:#2ed573;}
#refresh-btn{background:#ff6b6b;}
button:disabled{background:#666;cursor:not-allowed;}

/* 下方卡组：3列2行 6格整齐排开 */
.grid-title{font-size:16px;color:#feca57;text-align:center;margin-bottom:6px;}
.card-grid{display:grid;grid-template-columns:repeat(3,90px);gap:4px;justify-content:center;}
.grid-slot{
  width:90px;height:120px;
  border:2px dashed #666;border-radius:6px;background:rgba(255,255,255,0.1);
}
.grid-slot.drag-over{border-color:#feca57;background:rgba(254,202,87,0.2);}

/* 版权：紧贴6张卡组下面，极小不占地 */
footer{text-align:center;font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;}
</style>
</head>
<body>

<div class="shop-section">
  <div class="shop-header">
    <div class="shop-title">Card Shop</div>
    <div class="gold-display">Gold: <span id="current-gold">2</span></div>
  </div>
  <div class="shop-cards" id="shop-cards"></div>
</div>

<div class="control-bar">
  <div class="turn-display">Turn: <span id="current-turn">1</span></div>
  <button id="next-turn-btn">Next</button>
  <button id="refresh-btn">Refresh(1G)</button>
</div>

<div class="grid-section">
  <div class="grid-title">Your Deck (Max 6)</div>
  <div class="card-grid">
    <div class="grid-slot"></div>
    <div class="grid-slot"></div>
    <div class="grid-slot"></div>
    <div class="grid-slot"></div>
    <div class="grid-slot"></div>
    <div class="grid-slot"></div>
  </div>
</div>

<!-- 版权紧贴底部，超紧凑 -->
<footer>© 2026 Taichicoin · Built by AI</footer>

<script>
const allCardsData = [
  {id:1,name:"Ying Dragon",image:"yl.jpg",atk:3,hp:5,cost:1},
  {id:2,name:"Nine-Tailed Fox",image:"jwf.jpg",atk:8,hp:10,cost:3},
  {id:3,name:"Bai Ze",image:"bz.jpg",atk:5,hp:10,cost:2},
  {id:4,name:"Qiong Qi",image:"qq.jpg",atk:10,hp:15,cost:4},
  {id:5,name:"Jingwei",image:"jw.jpg",atk:12,hp:18,cost:5}
];

let currentGold=2,currentTurn=1,draggedCard=null,isNextTurnDisabled=false,sellingCard=null;
const turnGoldIncrement=[0,2,3,5,7,10,15,20];

function renderShop(){
  const shop=document.getElementById("shop-cards");shop.innerHTML="";
  const sel=[...allCardsData].sort(()=>Math.random()-0.5).slice(0,3);
  sel.forEach(card=>{
    let wrap=document.createElement("div"),el=document.createElement("div");
    wrap.className="card-wrapper";el.className="card";el.draggable=true;
    if(currentGold<card.cost){el.classList.add("insufficient-funds");el.draggable=false;}
    el.innerHTML=`<img src="${card.image}"><div class="stats"><span class="atk">${card.atk}</span><span class="hp">${card.hp}</span></div>`;
    let cost=document.createElement("div");cost.className="card-cost-external";cost.innerText=card.cost;
    wrap.append(el,cost);shop.appendChild(wrap);
    el.ondragstart=()=>{if(!el.classList.contains("insufficient-funds"))draggedCard={...card};};
  });
  shop.ondragover=e=>e.preventDefault();
  shop.ondrop=()=>{if(sellingCard){currentGold+=sellingCard.cost;sellingCard=null;update();renderShop();}};
  updateBtn();
}

document.querySelectorAll(".grid-slot").forEach(slot=>{
  slot.ondragover=e=>{e.preventDefault();if(draggedCard&&!slot.innerHTML)slot.classList.add("drag-over");};
  slot.ondragleave=()=>slot.classList.remove("drag-over");
  slot.ondrop=e=>{
    e.preventDefault();slot.classList.remove("drag-over");
    if(!draggedCard||slot.innerHTML)return;
    currentGold-=draggedCard.cost;
    let d=document.createElement("div");d.className="card";d.draggable=true;
    d.innerHTML=`<img src="${draggedCard.image}"><div class="stats"><span class="atk">${draggedCard.atk}</span><span class="hp">${draggedCard.hp}</span></div>`;
    d.ondragstart=()=>{sellingCard=draggedCard;slot.innerHTML="";};
    slot.appendChild(d);draggedCard=null;update();renderShop();
  };
});

document.getElementById("next-turn-btn").onclick=()=>{
  if(isNextTurnDisabled)return;currentTurn++;currentGold+=turnGoldIncrement[currentTurn]||0;
  if(currentTurn>=7){isNextTurnDisabled=true;document.getElementById("next-turn-btn").innerText="Game Over";}
  update();renderShop();
};
document.getElementById("refresh-btn").onclick=()=>{if(currentGold>=1){currentGold--;update();renderShop();}};

function update(){document.getElementById("current-gold").innerText=currentGold;document.getElementById("current-turn").innerText=currentTurn;updateBtn();}
function updateBtn(){document.getElementById("refresh-btn").disabled=currentGold<1;}
window.onload=()=>renderShop();
</script>
</body>
</html>
