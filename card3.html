<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Shan Hai Jing Card Game</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
  body{
    background:linear-gradient(180deg,#4a5a72 0%,#6b7a92 50%,#8a9ab2 100%);
    color:#fff;
    padding:10px;
    min-height:100vh;
    /* 移除overflow:hidden，允许轻微滚动，保证页脚可见 */
    overflow-x:hidden;
  }
  .container{max-width:100%;margin:0 auto;}

  /* 顶部标题金币行 */
  .shop-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .shop-title{font-size:40px;font-weight:900;color:#feca57;text-shadow:2px 2px 4px rgba(0,0,0,0.3);}
  .gold-display{
    font-size:32px;font-weight:900;color:#ffcc00;
    background:rgba(22,22,36,0.9);padding:8px 20px;border-radius:12px;border:3px solid #d4af37;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);
  }

  /* 上方商店：固定3张并排 */
  .shop-cards{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
    margin-bottom:15px;
  }
  .card-wrapper{display:flex;flex-direction:column;align-items:center;}

  /* 统一卡牌尺寸 上下完全一样，匹配你截图的大小 */
  .card{
    width:280px;height:380px;
    border:3px solid #d4af37;border-radius:12px;overflow:hidden;
    cursor:grab;background:#000;position:relative;
    box-shadow:0 6px 12px rgba(0,0,0,0.4);
  }
  .card img{width:100%;height:100%;object-fit:cover;pointer-events:none;}
  .card .card-header{
    position:absolute;top:0;left:0;right:0;
    background:rgba(0,0,0,0.7);padding:4px 8px;
    font-size:14px;font-weight:bold;color:#fff;
    border-bottom:2px solid #d4af37;
    display:flex;justify-content:center;align-items:center;
  }
  .card .card-header::before,.card .card-header::after{
    content:'';position:absolute;top:50%;transform:translateY(-50%);
    width:20px;height:20px;background:#008B8B;
    clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);
  }
  .card .card-header::before{left:8px;}
  .card .card-header::after{right:8px;}
  .card .stats{
    position:absolute;bottom:0;left:0;right:0;
    background:rgba(0,0,0,0.7);padding:4px 8px;
    display:flex;justify-content:space-between;align-items:center;
    font-size:18px;font-weight:bold;text-shadow:2px 2px 3px #000;
    border-top:2px solid #d4af37;
  }
  .card .atk{color:#ff4757;}
  .card .hp{color:#2ed573;}

  .card-cost-external{
    margin-top:8px;font-size:24px;font-weight:bold;color:#fff;
    background:#ff6b6b;width:50px;height:50px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;border:2px solid white;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);
  }
  .card.insufficient-funds{cursor:not-allowed;opacity:0.6;}

  /* 中间按钮栏 */
  .control-bar{display:flex;align-items:center;gap:15px;margin:15px 0;justify-content:center;flex-wrap:wrap;}
  .turn-display{font-size:28px;font-weight:900;background:rgba(55,66,250,0.9);padding:8px 20px;border-radius:20px;box-shadow:0 4px 8px rgba(0,0,0,0.3);}
  #next-turn-btn,#refresh-btn{
    padding:12px 24px;border:none;border-radius:12px;color:white;font-size:24px;font-weight:bold;cursor:pointer;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);transition:transform 0.2s;
  }
  #next-turn-btn{background:linear-gradient(135deg,#2ed573,#20bf6b);}
  #refresh-btn{background:linear-gradient(135deg,#ff6b6b,#ee5a24);}
  #next-turn-btn:disabled,#refresh-btn:disabled{background:#666;cursor:not-allowed;transform:none;}
  #next-turn-btn:hover:not(:disabled),#refresh-btn:hover:not(:disabled){transform:scale(1.05);}

  /* 下方卡组：3列2行 共6格，尺寸和卡牌一模一样 */
  .grid-section{margin-top:20px;}
  .grid-title{font-size:32px;font-weight:900;color:#feca57;margin-bottom:15px;text-align:center;text-shadow:2px 2px 4px rgba(0,0,0,0.3);}
  .card-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    justify-items:center;
  }
  .grid-slot{
    width:280px;height:380px; /* 和上方卡牌宽高完全对齐 */
    border:3px dashed #666;border-radius:12px;
    background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;
    transition:all 0.3s;
  }
  .grid-slot.drag-over{border-color:#feca57;background:rgba(254,202,87,0.2);}

  /* 页脚版权：明确显示，不被遮挡 */
  footer{
    margin-top:30px;
    margin-bottom:20px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:rgba(255,255,255,0.8);
    /* 强制显示，不被压缩 */
    display:block;
    width:100%;
  }

  /* 手机端适配 */
  @media (max-width:768px){
    .shop-title{font-size:32px;}
    .gold-display{font-size:24px;padding:6px 16px;}
    .card{width:220px;height:300px;}
    .card-cost-external{width:40px;height:40px;font-size:20px;}
    .turn-display{font-size:22px;padding:6px 16px;}
    #next-turn-btn,#refresh-btn{font-size:20px;padding:10px 20px;}
    .grid-title{font-size:26px;}
    .grid-slot{width:220px;height:300px;}
    footer{font-size:14px;margin-top:20px;}
  }
</style>
</head>
<body>
<div class="container">
  <div class="shop-section">
    <div class="shop-header">
      <div class="shop-title">Card Shop</div>
      <div class="gold-display">Gold: <span id="current-gold">2</span></div>
    </div>
    <div class="shop-cards" id="shop-cards"></div>
  </div>

  <div class="control-bar">
    <div class="turn-display">Turn: <span id="current-turn">1</span></div>
    <button id="next-turn-btn">Next Turn</button>
    <button id="refresh-btn">Refresh (1 Gold)</button>
  </div>

  <div class="grid-section">
    <div class="grid-title">Your Deck (Max 6)</div>
    <div class="card-grid" id="card-grid">
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
      <div class="grid-slot"></div>
    </div>
  </div>
</div>

<!-- 页脚版权：明确放在最底部，100%可见 -->
<footer>
© 2026 @Taichicoin · Built by AI
</footer>

<script>
  const allCardsData = [
    { id: 1, name: "应龙·Ying Loong", image: "yl.jpg", atk: 3, hp: 5, cost: 1 },
    { id: 2, name: "九尾狐·Nine-Tailed Fox", image: "jwf.jpg", atk: 8, hp: 10, cost: 3 },
    { id: 3, name: "白泽·Bai Ze", image: "bz.jpg", atk: 5, hp: 10, cost: 2 },
    { id: 4, name: "穷奇·QiongQi", image: "qq.jpg", atk: 10, hp: 15, cost: 4 },
    { id: 5, name: "精卫·Jingwei", image: "jw.jpg", atk: 12, hp: 18, cost: 5 }
  ];

  let currentGold = 2;
  let currentTurn = 1;
  let draggedCard = null;
  let isNextTurnDisabled = false;
  let sellingCard = null;

  const turnGoldIncrement = [0, 2, 3, 5, 7, 10, 15, 20];

  function renderShop() {
    const shopContainer = document.getElementById("shop-cards");
    shopContainer.innerHTML = "";

    const shuffled = [...allCardsData].sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, 3);

    selected.forEach(card => {
      const wrapper = document.createElement("div");
      wrapper.className = "card-wrapper";

      const el = document.createElement("div");
      el.className = "card";
      el.draggable = true;
      if (currentGold < card.cost) {
        el.classList.add("insufficient-funds");
        el.draggable = false;
      }
      el.innerHTML = `
        <div class="card-header">山海经·COMAS</div>
        <img src="${card.image}" alt="${card.name}">
        <div class="stats">
          <span class="atk">${card.atk}</span>
          <span class="name">${card.name}</span>
          <span class="hp">${card.hp}</span>
        </div>
      `;

      const costEl = document.createElement("div");
      costEl.className = "card-cost-external";
      costEl.innerText = card.cost;

      wrapper.appendChild(el);
      wrapper.appendChild(costEl);
      shopContainer.appendChild(wrapper);

      el.addEventListener("dragstart", (e) => {
        if (el.classList.contains('insufficient-funds')) return;
        draggedCard = { ...card };
        e.dataTransfer.setData("text/plain", JSON.stringify(draggedCard));
      });
    });

    shopContainer.addEventListener("dragover", (e) => e.preventDefault());
    shopContainer.addEventListener("drop", (e) => {
      e.preventDefault();
      if (sellingCard) {
        currentGold += sellingCard.cost;
        updateGameStatus();
        sellingCard = null;
        renderShop();
      }
    });

    updateButtonStates();
  }

  function initGridSlots() {
    const slots = document.querySelectorAll(".grid-slot");
    slots.forEach(slot => {
      slot.addEventListener("dragover", (e) => {
        e.preventDefault();
        if (draggedCard && !slot.children.length) {
          slot.classList.add("drag-over");
        }
      });
      slot.addEventListener("dragleave", () => slot.classList.remove("drag-over"));
      slot.addEventListener("drop", (e) => {
        e.preventDefault();
        slot.classList.remove("drag-over");
        if (!draggedCard || slot.children.length) return;

        currentGold -= draggedCard.cost;
        const deckCard = document.createElement("div");
        deckCard.className = "card";
        deckCard.draggable = true;
        deckCard.innerHTML = `
          <div class="card-header">山海经·COMAS</div>
          <img src="${draggedCard.image}" alt="${draggedCard.name}">
          <div class="stats">
            <span class="atk">${draggedCard.atk}</span>
            <span class="name">${draggedCard.name}</span>
            <span class="hp">${draggedCard.hp}</span>
          </div>
        `;
        deckCard.addEventListener("dragstart", (e) => {
          sellingCard = draggedCard;
          e.dataTransfer.setData("text/plain", JSON.stringify(sellingCard));
          slot.innerHTML = "";
        });
        slot.appendChild(deckCard);
        draggedCard = null;
        updateGameStatus();
        renderShop();
      });
    });
  }

  function startNextTurn() {
    if (isNextTurnDisabled) return;
    currentTurn++;
    currentGold += turnGoldIncrement[currentTurn] || 0;
    if (currentTurn >= 7) {
      isNextTurnDisabled = true;
      document.getElementById("next-turn-btn").disabled = true;
      document.getElementById("next-turn-btn").innerText = "Game Over";
    }
    updateGameStatus();
    renderShop();
  }

  document.getElementById("refresh-btn").onclick = () => {
    if (currentGold >= 1) {
      currentGold -= 1;
      updateGameStatus();
      renderShop();
    }
  };

  function updateGameStatus() {
    document.getElementById("current-gold").innerText = currentGold;
    document.getElementById("current-turn").innerText = currentTurn;
    updateButtonStates();
  }

  function updateButtonStates() {
    document.getElementById("refresh-btn").disabled = currentGold < 1;
  }

  document.getElementById("next-turn-btn").onclick = startNextTurn;
  window.onload = () => {
    renderShop();
    initGridSlots();
  };
</script>
</body>
</html>
