<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shan Hai Jing Card Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Arial", sans-serif;
        }
        body {
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* 商店区域 */
        .shop-section {
            margin-bottom: 30px;
        }
        .shop-header {
            margin-bottom: 15px;
        }
        .shop-title {
            font-size: 24px;
            font-weight: bold;
            color: #feca57;
        }
        .shop-cards {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 10px 0;
        }
        .card {
            width: 180px;
            height: 250px;
            border: 3px solid #d4af37;
            border-radius: 12px;
            overflow: hidden;
            cursor: grab;
            transition: transform 0.2s;
            background: #000;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 下方格子区域 */
        .grid-section {
            margin-top: 40px;
        }
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .grid-title {
            font-size: 20px;
            font-weight: bold;
            color: #feca57;
        }
        #refresh-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        #refresh-btn:hover {
            transform: scale(1.05);
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .grid-slot {
            width: 180px;
            height: 250px;
            border: 2px dashed #666;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .grid-slot.drag-over {
            border-color: #feca57;
            background: rgba(254, 202, 87, 0.1);
        }
        .grid-slot .card {
            cursor: default;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 商店区域 -->
        <div class="shop-section">
            <div class="shop-header">
                <div class="shop-title">Card Shop</div>
            </div>
            <div class="shop-cards" id="shop-cards">
                <!-- 卡牌由JS动态生成 -->
            </div>
        </div>

        <!-- 下方格子区域 -->
        <div class="grid-section">
            <div class="grid-header">
                <div class="grid-title">Your Deck (Max 6)</div>
                <button id="refresh-btn">Refresh Cards</button>
            </div>
            <div class="card-grid" id="card-grid">
                <div class="grid-slot" data-index="0"></div>
                <div class="grid-slot" data-index="1"></div>
                <div class="grid-slot" data-index="2"></div>
                <div class="grid-slot" data-index="3"></div>
                <div class="grid-slot" data-index="4"></div>
                <div class="grid-slot" data-index="5"></div>
            </div>
        </div>
    </div>

    <script>
        // 卡牌数据：适配你的首字母小写缩写文件名
        const cardData = [
            { id: 1, name: "Ying Dragon", image: "yl.jpg" },
            { id: 2, name: "Nine-Tailed Fox", image: "jwh.jpg" },
            { id: 3, name: "Bai Ze", image: "bz.jpg" },
            { id: 4, name: "Qiong Qi", image: "qq.jpg" },
            { id: 5, name: "Zhu Jiuyin", image: "zjy.jpg" }
        ];

        let draggedCard = null;

        // 初始化商店卡牌
        function initShop() {
            const shopCards = document.getElementById("shop-cards");
            shopCards.innerHTML = "";
            const shuffled = [...cardData].sort(() => Math.random() - 0.5);
            shuffled.forEach(card => {
                const cardEl = document.createElement("div");
                cardEl.className = "card";
                cardEl.draggable = true;
                cardEl.dataset.id = card.id;
                cardEl.innerHTML = `<img src="${card.image}" alt="${card.name}">`;
                
                cardEl.addEventListener("dragstart", (e) => {
                    draggedCard = card;
                    e.dataTransfer.setData("text/plain", card.id);
                });
                shopCards.appendChild(cardEl);
            });
        }

        // 初始化格子拖放
        function initGridSlots() {
            const slots = document.querySelectorAll(".grid-slot");
            slots.forEach(slot => {
                slot.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    slot.classList.add("drag-over");
                });
                slot.addEventListener("dragleave", () => {
                    slot.classList.remove("drag-over");
                });
                slot.addEventListener("drop", (e) => {
                    e.preventDefault();
                    slot.classList.remove("drag-over");
                    if (slot.children.length === 0 && draggedCard) {
                        const cardEl = document.createElement("div");
                        cardEl.className = "card";
                        cardEl.innerHTML = `<img src="${draggedCard.image}" alt="${draggedCard.name}">`;
                        slot.appendChild(cardEl);
                        draggedCard = null;
                    }
                });
            });
        }

        // 刷新按钮事件
        document.getElementById("refresh-btn").addEventListener("click", initShop);

        // 页面加载时初始化
        window.onload = () => {
            initShop();
            initGridSlots();
        };
    </script>
</body>
</html>
