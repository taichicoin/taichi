<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · YY Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            /* 核心修复：调整背景顺序、路径兼容、加兜底色，解决不显示问题 */
            background: #0b0f1c url('../assets/default-avatar.png') center center / cover no-repeat;
            /* 叠加渐变遮罩，保证文字清晰，不覆盖背景图 */
            background-image: linear-gradient(145deg, rgba(11, 15, 28, 0.85) 0%, rgba(26, 31, 51, 0.85) 100%),
                              url('../assets/default-avatar.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f0f0f0;
        }
        .login-box {
            max-width: 420px;
            background: rgba(20, 28, 48, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .logo {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f5d76e, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
        }
        .btn-google {
            background: #fff;
            color: #1e1e2f;
            border: none;
            padding: 16px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #0a0e17;
            cursor: pointer;
            width: 100%;
        }
        .footer { margin-top: 32px; opacity: 0.7; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">⚔️ YY Card</div>
    <button class="btn-google" id="google-login-btn">
        <span style="font-size:1.8rem;">G</span> 使用 Google 登录
    </button>
    <div class="footer">山海经 · 西游 · 三国</div>
</div>

<script>
    // 所有交互、跳转逻辑完全保留，无任何改动
    document.getElementById('google-login-btn').addEventListener('click', () => {
        window.location.href = 'https://sznjaotjoljaiawbvfro.supabase.co/auth/v1/authorize?provider=google&redirect_to=https://taichicoin.xyz/yycard';
    });
</script>
</body>
</html>
