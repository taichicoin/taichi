<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-image: url('./bg.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 80px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.35);
            z-index: 0;
        }
        .top-bar {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            z-index: 10;
        }
        .btn-small {
            height: 44px;
            padding: 0 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background-color: #2563eb;
            color: #ffffff;
        }
        .btn-primary:hover, .btn-primary:active {
            background-color: #1d4ed8;
        }
        .btn-success {
            background-color: #5eead4;
            color: #0f172a;
        }
        .btn-success:hover, .btn-success:active {
            background-color: #2dd4bf;
        }
        .address-top {
            height: 44px;
            padding: 0 16px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            font-size: 14px;
            color: #1e293b;
            display: none;
            align-items: center;
            gap: 8px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 16px;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-success {
            background-color: #5eead4;
            color: #0f172a;
        }
        .btn-success:hover, .btn-success:active {
            background-color: #2dd4bf;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-wallet {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #f8fafc;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            height: 52px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .btn-wallet:hover, .btn-wallet:active {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }
        .wallet-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .wallet-modal.active {
            display: flex;
        }
        .modal-content {
            width: 100%;
            max-width: 400px;
            background-color: #ffffff;
            border-radius: 20px;
            padding: 24px;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
        }
        .close-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            font-size: 24px;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-tips {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .tips {
            font-size: 13px;
            color: #f1f5f9;
            text-align: center;
            margin-top: 24px;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }
        .wc-connecting {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            margin-top: 12px;
            display: none;
        }
    </style>
    <!-- WalletConnect v2 官方SDK，实现跨浏览器-钱包桥接 -->
    <script src="https://unpkg.com/@walletconnect/sign-client@2.11.0/dist/index.umd.js"></script>
    <script src="https://unpkg.com/@walletconnect/web3wallet@1.10.0/dist/index.umd.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="address-top" id="addressTop">
            已连接：<span id="walletAddress"></span>
        </div>
        <button class="btn-small btn-primary" id="connectWalletBtn">
            连接钱包
        </button>
    </div>

    <div class="container">
        <h1>Twitter任务活动</h1>
        <p class="desc">关注+点赞+转推指定推文，即可获得专属奖励</p>

        <button class="btn btn-success" id="twitterTaskBtn" disabled>
            前往点赞转推完成任务
        </button>

        <p class="tips">
            普通浏览器点击将唤起钱包APP<br>
            完成任务后请返回页面确认
        </p>
    </div>

    <div class="wallet-modal" id="walletModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>选择钱包</h3>
                <button class="close-btn" id="closeModal">×</button>
            </div>
            <p class="modal-tips">普通浏览器将唤起对应钱包APP，内置浏览器直接连接</p>
            
            <button class="btn btn-wallet" data-wallet="okx">
                🟠 OKX 钱包
            </button>
            <button class="btn btn-wallet" data-wallet="tp">
                🔵 TP 钱包 (TokenPocket)
            </button>
            <button class="btn btn-wallet" data-wallet="trust">
                🟢 Trust Wallet
            </button>
            <button class="btn btn-wallet" data-wallet="metamask">
                🦊 MetaMask 小狐狸
            </button>
            <button class="btn btn-wallet" data-wallet="wc">
                🔗 WalletConnect 通用连接
            </button>
            <p class="wc-connecting" id="wcConnecting">正在生成连接链接...</p>
        </div>
    </div>

    <script>
        // ===================== 配置区（仅需修改此处） =====================
        const CONFIG = {
            officialSite: "https://taichicoin.xyz",
            twitterLink: "https://x.com/i/status/2035345304766361607",
            pageTitle: "Twitter任务活动",
            taskDesc: "关注+点赞+转推指定推文，即可获得专属奖励",
            connectBtnText: "连接钱包",
            connectedBtnText: "已连接",
            twitterBtnText: "前往点赞转推完成任务",
            // WalletConnect 项目ID（免费申请：https://cloud.walletconnect.com/）
            wcProjectId: "a8510af6bab8956f8401418d64c759d3"
        };
        // =================================================================

        // 全局状态
        let currentAccount = null;
        let currentProvider = null;
        let wcSignClient = null;

        // DOM 元素
        const connectWalletBtn = document.getElementById('connectWalletBtn');
        const twitterTaskBtn = document.getElementById('twitterTaskBtn');
        const addressTop = document.getElementById('addressTop');
        const walletAddress = document.getElementById('walletAddress');
        const walletModal = document.getElementById('walletModal');
        const closeModal = document.getElementById('closeModal');
        const walletBtns = document.querySelectorAll('.btn-wallet[data-wallet]');
        const wcConnecting = document.getElementById('wcConnecting');

        // 地址缩短工具
        function shortenAddress(address) {
            return address ? `${address.slice(0, 6)}...${address.slice(-4)}` : '';
        }

        // 钱包Provider检测（兼容所有内置浏览器）
        function getProvider(walletType = 'default') {
            switch(walletType) {
                case 'okx': return window.okxwallet || window.ethereum;
                case 'tp': return window.tpwallet || window.ethereum;
                case 'trust': return window.trustwallet || window.ethereum;
                case 'metamask': return window.ethereum?.isMetaMask ? window.ethereum : window.ethereum;
                default: return window.okxwallet || window.ethereum || window.web3?.currentProvider;
            }
        }

        // 钱包深度链接（唤起APP用，优化兼容性）
        const walletDeeplink = {
            okx: `okx://wallet/dapp?url=${encodeURIComponent(window.location.href)}`,
            tp: `tp://dapp/open?url=${encodeURIComponent(window.location.href)}`,
            trust: `trust://browser/open?url=${encodeURIComponent(window.location.href)}`,
            metamask: `metamask://dapp/${encodeURIComponent(window.location.href)}`
        };

        // 初始化WalletConnect
        async function initWalletConnect() {
            try {
                const { SignClient } = window;
                wcSignClient = await SignClient.init({
                    projectId: CONFIG.wcProjectId,
                    metadata: {
                        name: CONFIG.pageTitle,
                        description: CONFIG.taskDesc,
                        url: CONFIG.officialSite,
                        icons: [`${CONFIG.officialSite}/icon.png`]
                    }
                });
                console.log("WalletConnect 初始化成功");
            } catch (err) {
                console.error("WalletConnect 初始化失败:", err);
            }
        }

        // WalletConnect 连接逻辑
        async function connectWithWalletConnect() {
            if (!wcSignClient) {
                alert("WalletConnect 初始化失败，请刷新页面重试");
                return;
            }

            try {
                wcConnecting.style.display = "block";
                const { uri, approval } = await wcSignClient.connect({
                    requiredNamespaces: {
                        eip155: {
                            chains: ["eip155:1", "eip155:56"], // 兼容ETH/BSC
                            methods: ["eth_requestAccounts", "eth_sendTransaction"],
                            events: ["accountsChanged", "chainChanged"]
                        }
                    }
                });

                // 生成通用连接链接，支持所有WC钱包
                const wcUri = uri;
                const universalLink = `https://walletconnect.com/wc?uri=${encodeURIComponent(wcUri)}`;

                // 唤起钱包
                window.location.href = wcUri.startsWith("wc:") ? `okx://wc?uri=${encodeURIComponent(wcUri)}` : universalLink;
                
                // 等待用户授权
                const session = await approval();
                const account = session.namespaces.eip155.accounts[0].split(":")[2];
                
                // 连接成功，更新页面
                currentAccount = account;
                currentProvider = wcSignClient;
                walletAddress.textContent = shortenAddress(account);
                addressTop.style.display = "flex";
                connectWalletBtn.textContent = CONFIG.connectedBtnText;
                connectWalletBtn.classList.remove("btn-primary");
                connectWalletBtn.classList.add("btn-success");
                twitterTaskBtn.disabled = false;
                walletModal.classList.remove("active");
                wcConnecting.style.display = "none";
                alert("钱包连接成功！");

                // 监听钱包状态
                wcSignClient.on("session_delete", () => {
                    disconnectWallet();
                });
            } catch (err) {
                console.error("WalletConnect 连接失败:", err);
                wcConnecting.style.display = "none";
                alert("连接失败，请重试或使用其他钱包");
            }
        }

        // 核心钱包连接逻辑
        async function connectWallet(walletType = 'default') {
            // 已连接则断开
            if (currentAccount) {
                disconnectWallet();
                return;
            }

            // WalletConnect 通用连接
            if (walletType === 'wc') {
                await connectWithWalletConnect();
                return;
            }

            try {
                const provider = getProvider(walletType);
                
                // 1. 钱包内置浏览器：直接连接
                if (provider) {
                    currentProvider = provider;
                    const accounts = await provider.request({ method: 'eth_requestAccounts' });
                    
                    if (accounts?.length > 0) {
                        currentAccount = accounts[0];
                        walletAddress.textContent = shortenAddress(currentAccount);
                        addressTop.style.display = "flex";
                        connectWalletBtn.textContent = CONFIG.connectedBtnText;
                        connectWalletBtn.classList.remove("btn-primary");
                        connectWalletBtn.classList.add("btn-success");
                        twitterTaskBtn.disabled = false;
                        walletModal.classList.remove("active");
                        alert("钱包连接成功！");

                        // 监听钱包状态
                        provider.on("accountsChanged", (accs) => {
                            if (accs.length === 0) disconnectWallet();
                            else {
                                currentAccount = accs[0];
                                walletAddress.textContent = shortenAddress(accs[0]);
                            }
                        });
                    }
                    return;
                }

                // 2. 普通浏览器：唤起对应钱包APP
                const deeplink = walletDeeplink[walletType];
                if (deeplink) {
                    window.location.href = deeplink;
                    // 兜底提示
                    setTimeout(() => {
                        alert(`未唤起${walletType.toUpperCase()}钱包，请确认已安装APP，或使用WalletConnect连接`);
                    }, 1500);
                } else {
                    alert("暂不支持该钱包，请使用WalletConnect通用连接");
                }
            } catch (err) {
                console.error("连接失败:", err);
                walletModal.classList.remove("active");
                if (err.code === 4001) alert("您拒绝了授权，请重试");
                else if (err.code === -32002) alert("授权已在钱包中处理");
                else alert(`连接失败: ${err.message || "未知错误"}`);
            }
        }

        // 断开钱包连接
        function disconnectWallet() {
            currentAccount = null;
            currentProvider = null;
            addressTop.style.display = "none";
            connectWalletBtn.textContent = CONFIG.connectBtnText;
            connectWalletBtn.classList.remove("btn-success");
            connectWalletBtn.classList.add("btn-primary");
            twitterTaskBtn.disabled = true;
            alert("已断开钱包连接");
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async () => {
            // 初始化WalletConnect
            await initWalletConnect();

            // 绑定按钮事件
            connectWalletBtn.addEventListener('click', () => {
                if (currentAccount) disconnectWallet();
                else walletModal.classList.add("active");
            });

            closeModal.addEventListener('click', () => walletModal.classList.remove("active"));
            walletModal.addEventListener('click', (e) => e.target === walletModal && walletModal.classList.remove("active"));

            // 钱包选择按钮
            walletBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const type = btn.dataset.wallet;
                    connectWallet(type);
                });
            });

            // Twitter跳转
            twitterTaskBtn.addEventListener('click', () => {
                if (confirm("即将跳转到Twitter，请确保网络可访问")) {
                    location.href = CONFIG.twitterLink;
                }
            });

            // 应用配置文案
            document.title = `${CONFIG.pageTitle} - ${CONFIG.officialSite.replace(/^https?:\/\//, '')}`;
            document.querySelector('h1').textContent = CONFIG.pageTitle;
            document.querySelector('.desc').textContent = CONFIG.taskDesc;
            twitterTaskBtn.textContent = CONFIG.twitterBtnText;
        });
    </script>
</body>
</html>
