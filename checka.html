permalink: /checka

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAICHI AIRDROP</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.3s;
    }
    html { touch-action: manipulation; }
    button {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      cursor: pointer !important;
    }
    :root {
      --bg: #0B0E16; --card: #111827; --input: #0F141F;
      --border: #1F2937; --text: #E1E7F5; --muted: #4B5563;
      --accent: #00B3CF; --success: #00B3CF; --error: #E53935;
    }
    :root.light {
      --bg: #f8fafc; --card: #fff; --input: #f1f5f9;
      --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
      --accent: #009AAD; --success: #009AAD; --error: #E53935;
    }
    body {
      min-height: 100vh; background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      padding: 20px; position: relative;
    }
    .toolbar {
      position: absolute; top: 20px; right: 20px;
      display: flex; gap: 8px; z-index: 9999;
    }
    .toolbar button {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 6px 10px; border-radius: 4px; font-size: 12px;
    }
    .toolbar button:hover, .toolbar button:active {
      background: var(--accent); color: #fff;
    }
    .card {
      width: 100%; max-width: 500px; background: var(--card);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 40px 30px; position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      animation: scan 3s linear infinite;
    }
    @keyframes scan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    h1 {
      text-align: center; margin-bottom: 20px; font-size: 24px;
    }
    .input-group {
      margin-bottom: 16px; position: relative;
    }
    input {
      width: 100%; padding: 14px; background: var(--input);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); outline: none; opacity: .6; pointer-events: none;
    }
    input.enabled {
      opacity: 1; pointer-events: all;
    }
    input::placeholder { color: var(--muted); }
    .clear-btn {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%); background: none; border: none;
      color: var(--muted); font-size: 24px;
      width: 32px; height: 32px; display: none;
      align-items: center; justify-content: center;
    }
    #address.enabled + .clear-btn { display: flex; }
    button.main-btn {
      width: 100%; padding: 14px; background: var(--accent);
      border: none; border-radius: 4px; color: #fff;
      font-weight: bold; opacity: .6; pointer-events: none;
    }
    button.main-btn.enabled {
      opacity: 1; pointer-events: all;
    }
    .result {
      margin: 20px 0; padding: 14px; background: var(--input);
      border-left: 3px solid var(--border); font-size: 13px; line-height: 1.5;
    }
    .result.success { border-color: var(--success); }
    .result.error { border-color: var(--error); }
    .form-row { margin: 16px 0; }
    .hidden { display: none !important; }
    #hcaptcha-container {
      margin: 20px 0; display: grid; place-items: center;
    }
  </style>
</head>
<body>

<div class="toolbar">
  <button id="langBtn">中文</button>
  <button id="themeBtn">Light</button>
</div>

<div class="card">
  <h1 id="title">Check and register</h1>

  <div id="hcaptcha-container"></div>

  <div class="input-group">
    <input type="text" id="address" placeholder="BSC ADDRESS (0x...)">
    <button class="clear-btn" onclick="clearAddr()">×</button>
  </div>
  <button class="main-btn" id="checkBtn">CHECK ELIGIBILITY</button>

  <div id="result" class="result hidden"></div>

  <div id="regForm" class="hidden">
    <div class="input-group form-row">
      <input type="text" id="twitter" placeholder="TWITTER USERNAME">
    </div>
    <div class="input-group form-row">
      <input type="text" id="tweet" placeholder="TWEET LINK">
    </div>
    <button class="main-btn" id="submitBtn">SUBMIT</button>
  </div>
</div>

<script>
const API = "https://sznjaotjoljaiawbvfro.supabase.co/functions/v1/c-r";
const SITEKEY = "6950fbbe-54f8-4dcc-98d4-4c68e496545a";

const texts = {
  en: {
    title: "Check and register", addrPlaceholder: "BSC ADDRESS (0x...)",
    checkBtn: "CHECK ELIGIBILITY", checking: "CHECKING...",
    twitterPlaceholder: "TWITTER USERNAME", tweetPlaceholder: "TWEET LINK",
    submitBtn: "SUBMIT", submitting: "SUBMITTING...",
    langBtn: "中文", themeBtn: "Light", themeBtnDark: "Dark",
    capSuccess: "hCaptcha verified ✅ You can now check eligibility",
    capExpired: "hCaptcha expired ❌ Please verify again",
    capFailed: "hCaptcha failed ❌ Please try again",
    needCap: "Please complete hCaptcha first",
    invalidAddr: "Please enter a valid BSC address",
    scanning: "SCANNING ON-CHAIN DATA...", scanFail: "SCAN FAILED, PLEASE TRY AGAIN",
    eligible: "✅ ELIGIBLE", addr: "ADDRESS", tx: "TX COUNT", drop: "AIRDROP",
    notEligible: "❌ NOT ELIGIBLE", minReq: "MIN REQUIRED: 300 TXS",
    checkFirst: "PLEASE CHECK ELIGIBILITY FIRST", fillAll: "PLEASE FILL IN ALL FIELDS",
    registered: "✅ REGISTERED SUCCESSFULLY!", regDone: "REGISTRATION COMPLETE",
    regFail: "REGISTER FAILED", netErr: "NETWORK ERROR, PLEASE TRY AGAIN",
    alreadyReg: "Already registered"
  },
  zh: {
    title: "资格查询与注册", addrPlaceholder: "BSC 钱包地址 (0x...)",
    checkBtn: "查询资格", checking: "查询中...",
    twitterPlaceholder: "推特用户名", tweetPlaceholder: "推文链接",
    submitBtn: "提交注册", submitting: "提交中...",
    langBtn: "English", themeBtn: "浅色", themeBtnDark: "深色",
    capSuccess: "人机验证完成 ✅ 可查询资格",
    capExpired: "验证已过期 ❌ 请重新验证",
    capFailed: "验证失败 ❌ 请重试",
    needCap: "请先完成人机验证",
    invalidAddr: "请输入有效 BSC 地址",
    scanning: "读取链上数据中...", scanFail: "查询失败，请重试",
    eligible: "✅ 符合空投资格", addr: "地址", tx: "交易数", drop: "可领取",
    notEligible: "❌ 暂不符合资格", minReq: "最低要求：300 笔交易",
    checkFirst: "请先查询资格", fillAll: "请填写完整信息",
    registered: "✅ 注册成功！", regDone: "注册完成",
    regFail: "注册失败", netErr: "网络异常，请重试",
    alreadyReg: "已注册"
  }
};

let lang = "en";
let light = false;
let capOk = false;
let currentAddr = "";
let hcaptchaInstance = null;

const title = document.getElementById("title");
const addr = document.getElementById("address");
const checkBtn = document.getElementById("checkBtn");
const twitter = document.getElementById("twitter");
const tweet = document.getElementById("tweet");
const submitBtn = document.getElementById("submitBtn");
const result = document.getElementById("result");
const regForm = document.getElementById("regForm");
const langBtn = document.getElementById("langBtn");
const themeBtn = document.getElementById("themeBtn");
const hcaptchaContainer = document.getElementById("hcaptcha-container");

// 加载hCaptcha脚本
function loadHCaptcha() {
  return new Promise((resolve) => {
    if (window.hcaptcha) {
      resolve();
      return;
    }
    const script = document.createElement("script");
    script.src = "https://js.hcaptcha.com/1/api.js?render=explicit&onload=onHCaptchaLoad";
    script.async = true;
    script.defer = true;
    document.head.appendChild(script);
    window.onHCaptchaLoad = resolve;
  });
}

// 渲染hCaptcha（动态语言+主题）
function renderHCaptcha() {
  if (hcaptchaInstance) {
    hcaptcha.reset(hcaptchaInstance);
    hcaptcha.remove(hcaptchaInstance);
  }
  capOk = false;
  reset();

  hcaptchaInstance = hcaptcha.render(hcaptchaContainer, {
    sitekey: SITEKEY,
    theme: light ? "light" : "dark",
    hl: lang === "zh" ? "zh-CN" : "en",
    callback: onHCaptchaSuccess,
    "expired-callback": onHCaptchaExpired,
    "error-callback": onHCaptchaError
  });
}

// 语言/主题切换时更新hCaptcha
function updateUI() {
  const t = texts[lang];
  title.textContent = t.title;
  addr.placeholder = t.addrPlaceholder;
  checkBtn.textContent = checkBtn.disabled ? t.checking : t.checkBtn;
  twitter.placeholder = t.twitterPlaceholder;
  tweet.placeholder = t.tweetPlaceholder;
  submitBtn.textContent = submitBtn.disabled ? t.submitting : t.submitBtn;
  langBtn.textContent = t.langBtn;
  themeBtn.textContent = light ? t.themeBtnDark : t.themeBtn;
  renderHCaptcha(); // 关键：切换时重绘hCaptcha
}

// 检测移动端
function isMobile() {
  return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
}

// 语言切换
if (isMobile()) {
  langBtn.ontouchstart = (e) => {
    e.preventDefault();
    lang = lang === "en" ? "zh" : "en";
    updateUI();
  };
} else {
  langBtn.onclick = () => {
    lang = lang === "en" ? "zh" : "en";
    updateUI();
  };
}

// 主题切换
if (isMobile()) {
  themeBtn.ontouchstart = (e) => {
    e.preventDefault();
    light = !light;
    document.documentElement.classList.toggle("light", light);
    updateUI();
  };
} else {
  themeBtn.onclick = () => {
    light = !light;
    document.documentElement.classList.toggle("light", light);
    updateUI();
  };
}

function clearAddr() {
  addr.value = "";
  addr.focus();
}

function onHCaptchaSuccess() {
  capOk = true;
  addr.classList.add("enabled");
  checkBtn.classList.add("enabled");
  alert(texts[lang].capSuccess);
}
function onHCaptchaExpired() {
  capOk = false;
  reset();
  alert(texts[lang].capExpired);
}
function onHCaptchaError() {
  capOk = false;
  reset();
  alert(texts[lang].capFailed);
}

function reset() {
  addr.classList.remove("enabled");
  twitter.classList.remove("enabled");
  tweet.classList.remove("enabled");
  checkBtn.classList.remove("enabled");
  submitBtn.classList.remove("enabled");
}

function needCap() {
  if (!capOk) {
    alert(texts[lang].needCap);
    return false;
  }
  return true;
}

checkBtn.onclick = async () => {
  if (!needCap()) return;
  const t = texts[lang];
  const v = addr.value.trim();

  if (!v.startsWith("0x") || v.length !== 42) {
    result.className = "result error";
    result.textContent = t.invalidAddr;
    result.classList.remove("hidden");
    return;
  }

  checkBtn.disabled = true;
  checkBtn.textContent = t.checking;
  result.classList.remove("hidden");
  result.textContent = t.scanning;

  try {
    const r = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ address: v })
    });
    const d = await r.json();
    currentAddr = v;

    if (d.eligible) {
      result.className = "result success";
      result.innerHTML = `
        ${t.eligible}<br>
        ${t.addr}: ${v}<br>
        ${t.tx}: ${d.tx_count}<br>
        ${t.drop}: ${d.airdrop_amount} TAICHI
      `;
      regForm.classList.remove("hidden");
      twitter.classList.add("enabled");
      tweet.classList.add("enabled");
      submitBtn.classList.add("enabled");
    } else {
      result.className = "result error";
      result.innerHTML = `
        ${t.notEligible}<br>
        ${t.addr}: ${v}<br>
        ${t.tx}: ${d.tx_count || 0}<br>
        ${t.minReq}
      `;
      regForm.classList.add("hidden");
    }
  } catch (e) {
    result.className = "result error";
    result.textContent = t.scanFail;
  } finally {
    checkBtn.disabled = false;
    updateUI();
  }
};

submitBtn.onclick = async () => {
  if (!needCap()) return;
  const t = texts[lang];
  const u = twitter.value.trim();
  const l = tweet.value.trim();

  if (!currentAddr) return alert(t.checkFirst);
  if (!u || !l) return alert(t.fillAll);

  submitBtn.disabled = true;
  submitBtn.textContent = t.submitting;

  try {
    const r = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ address: currentAddr, twitterUser: u, tweetLink: l })
    });
    const d = await r.json();

    if (d.eligible) {
      alert(t.registered);
      regForm.classList.add("hidden");
      result.innerHTML += `<br><br>✅ ${t.regDone}`;
    } else {
      let msg = "";
      if (d.error === "Already registered" || d.error === "该地址/推特/链接已注册过") {
        msg = t.alreadyReg;
      } else {
        msg = d.msg || d.error || t.regFail;
      }
      alert("❌ " + msg);
    }
  } catch (e) {
    alert(t.netErr);
  } finally {
    submitBtn.disabled = false;
    updateUI();
  }
};

// 初始化
loadHCaptcha().then(() => {
  updateUI();
});
</script>
</body>
</html>
