<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif}
        body{
            /* 背景图片已恢复，确保bg.jpg和html文件在同一文件夹 */
            background-image:url('./bg.jpg');
            background-size:cover;
            background-position:center center;
            background-repeat:no-repeat;
            background-attachment:fixed;
            min-height:100vh;
            padding:80px 20px 20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            position:relative;
        }
        body::before{
            content:'';
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.4);
            z-index:0;
        }
        .top-bar{
            position:fixed;top:20px;left:20px;right:20px;
            display:flex;justify-content:space-between;gap:12px;z-index:10;
        }
        .btn-small{height:44px;padding:0 20px;border-radius:12px;border:none;font-size:18px;cursor:pointer;}
        .btn-primary{background:#2563eb;color:white;}
        .btn-success{background:#5eead4;color:#0f172a;}
        .address-top{
            height:44px;padding:0 16px;background:white;border-radius:12px;
            font-size:14px;display:none;align-items:center;gap:8px;
        }
        .container{
            width:100%;max-width:480px;background:white;border-radius:24px;
            padding:40px 24px;position:relative;z-index:1;
        }
        h1{font-size:28px;text-align:center;margin-bottom:12px;color:#1e293b;}
        .desc{color:#64748b;text-align:center;margin-bottom:32px;line-height:1.5;}
        .btn-verify{
            width:100%;height:56px;border:none;border-radius:16px;
            font-size:20px;font-weight:700;cursor:pointer;
            background:#2563eb;color:white;
            transition:all 0.2s ease;
        }
        .btn-verify:hover{
            background:#1d4ed8;
        }
        .btn-verify:disabled{
            opacity:0.5;cursor:not-allowed;
        }
        .tips{
            font-size:13px;color:#f1f5f9;text-align:center;margin-top:24px;
            line-height:1.4;position:relative;z-index:1;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="address-top" id="addressTop">
        已连接：<span id="walletDisplay"></span>
    </div>
    <button class="btn-small btn-primary" id="connectBtn">连接钱包</button>
</div>

<div class="container">
    <h1>Twitter 任务验证</h1>
    <p class="desc">请先连接钱包，再点击下方按钮完成验证提交</p>

    <button class="btn-verify" id="verifyBtn" disabled>
        Verify
    </button>
</div>

<p class="tips">
    电脑端请安装MetaMask/OKX钱包插件使用<br>
    手机端请在钱包APP的DApp浏览器打开本页面
</p>

<script>
// 你的Tally表单地址，已固定
const TALLY_URL = "https://tally.so/r/rjEXEN";

let currentAccount = null;

const $connect = document.getElementById('connectBtn');
const $addrBox = document.getElementById('addressTop');
const $display = document.getElementById('walletDisplay');
const $verifyBtn = document.getElementById('verifyBtn');

// 工具方法
function shortAddress(addr) {
    return addr ? `${addr.slice(0,6)}...${addr.slice(-4)}` : '';
}

function getProvider() {
    return window.ethereum || window.okxwallet || window.tpwallet || window.trustwallet;
}

// 刷新按钮状态
function refreshUI() {
    // 已连接钱包，按钮可用
    if (currentAccount) {
        $verifyBtn.disabled = false;
    } else {
        $verifyBtn.disabled = true;
    }
}

// 连接钱包
$connect.onclick = async () => {
    const p = getProvider();
    if (!p) {
        alert("请在钱包DApp浏览器或安装插件打开");
        return;
    }

    // 断开钱包
    if (currentAccount) {
        currentAccount = null;
        $addrBox.style.display = "none";
        $connect.textContent = "连接钱包";
        $connect.classList.replace("btn-success", "btn-primary");
        refreshUI();
        return;
    }

    // 连接钱包
    try {
        const accounts = await p.request({ method: "eth_requestAccounts" });
        currentAccount = accounts[0];

        // 显示钱包地址
        $display.textContent = shortAddress(currentAccount);
        $addrBox.style.display = "flex";
        $connect.textContent = "已连接";
        $connect.classList.replace("btn-primary", "btn-success");

        // 监听账户切换
        p.on("accountsChanged", (accounts) => {
            if (accounts.length === 0) {
                currentAccount = null;
                $addrBox.style.display = "none";
                $connect.textContent = "连接钱包";
                $connect.classList.replace("btn-success", "btn-primary");
            } else {
                currentAccount = accounts[0];
                $display.textContent = shortAddress(currentAccount);
            }
            refreshUI();
        });

        refreshUI();
    } catch (err) {
        alert("连接钱包失败：" + (err.message || "请重试"));
    }
};

// 点击Verify跳转到Tally表单，自动预填钱包地址
$verifyBtn.onclick = () => {
    if (!currentAccount) return;
    // 拼接预填钱包地址的Tally链接，自动填充wallet字段
    const jumpUrl = `${TALLY_URL}?wallet=${encodeURIComponent(currentAccount)}`;
    // 新窗口打开表单，不离开原页面
    window.open(jumpUrl, "_blank");
};

// 初始加载
refreshUI();
</script>

</body>
</html>
