<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            /* 背景图设置，和之前保持一致 */
            background-image: url('./bg.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 80px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        /* 背景半透明遮罩 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.35);
            z-index: 0;
        }
        /* 右上角小尺寸连接钱包按钮 */
        .btn-small {
            position: fixed;
            top: 20px;
            right: 20px;
            height: 36px;
            padding: 0 16px;
            font-size: 14px;
            border-radius: 8px;
            width: auto;
            margin-bottom: 0;
            z-index: 10;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 16px;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        /* 已连接钱包地址：卡片内靠右显示 */
        .address-info {
            width: fit-content;
            margin-left: auto;
            padding: 8px 12px;
            background-color: rgba(241, 245, 249, 0.8);
            border-radius: 8px;
            font-size: 14px;
            color: #475569;
            text-align: right;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background-color: #2563eb;
            color: #ffffff;
        }
        .btn-primary:hover, .btn-primary:active {
            background-color: #1d4ed8;
        }
        .btn-success {
            background-color: #5eead4;
            color: #0f172a;
        }
        .btn-success:hover, .btn-success:active {
            background-color: #2dd4bf;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .tips {
            font-size: 13px;
            color: #f1f5f9;
            text-align: center;
            margin-top: 24px;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- 右上角小尺寸连接钱包按钮 -->
    <button class="btn btn-small btn-primary" id="connectWalletBtn">
        连接钱包
    </button>

    <div class="container">
        <h1>Twitter任务活动</h1>
        <p class="desc">关注+点赞+转推指定推文，即可获得专属奖励</p>
        
        <!-- 已连接钱包地址：卡片内靠右显示 -->
        <div class="address-info" id="addressBox" style="display: none;">
            已连接：<span id="walletAddress"></span>
        </div>

        <!-- 核心任务按钮 -->
        <button class="btn btn-success" id="twitterTaskBtn" disabled>
            前往点赞转推完成任务
        </button>

        <p class="tips">
            请在DEEP/OKX钱包内置浏览器中打开本页面<br>
            完成任务后请返回页面确认
        </p>
    </div>

    <script>
        // ===================== 配置区（已按你的需求设置好） =====================
        const CONFIG = {
            // 你的官网域名
            officialSite: "https://taichicoin.xyz",
            // 你指定的推文链接（点赞转推目标）
            twitterLink: "https://x.com/i/status/2035345304766361607",
            // 文案配置
            pageTitle: "Twitter任务活动",
            taskDesc: "关注+点赞+转推指定推文，即可获得专属奖励",
            connectBtnText: "连接钱包",
            connectedBtnText: "已连接",
            twitterBtnText: "前往点赞转推完成任务"
        };
        // ============================================================================

        // 全局变量
        let currentAccount = null;
        const connectWalletBtn = document.getElementById('connectWalletBtn');
        const twitterTaskBtn = document.getElementById('twitterTaskBtn');
        const addressBox = document.getElementById('addressBox');
        const walletAddress = document.getElementById('walletAddress');
        const taskDesc = document.getElementById('taskDesc');
        const pageTitle = document.querySelector('h1');

        // 钱包地址缩短函数（优化显示效果）
        function shortenAddress(address) {
            if (!address) return '';
            return address.slice(0, 6) + '...' + address.slice(-4);
        }

        // 页面加载完成初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 应用配置文案
            document.title = `${CONFIG.pageTitle} - ${CONFIG.officialSite.replace(/https?:\/\//, '')}`;
            pageTitle.textContent = CONFIG.pageTitle;
            taskDesc.textContent = CONFIG.taskDesc;
            twitterTaskBtn.textContent = CONFIG.twitterBtnText;

            // 绑定点击事件
            bindEvents();
        });

        // 绑定所有事件
        function bindEvents() {
            // 右上角连接钱包按钮事件
            connectWalletBtn.addEventListener('click', connectWallet);
            
            // 推特任务按钮事件（点击直接跳转到你指定的推文）
            twitterTaskBtn.addEventListener('click', () => {
                window.open(CONFIG.twitterLink, '_blank');
            });
        }

        // 核心钱包连接逻辑（适配DEEP/OKX内置浏览器）
        async function connectWallet() {
            try {
                // 优先适配DEEP/OKX钱包，兼容其他钱包
                const provider = window.okxwallet || window.ethereum;
                
                // 未检测到钱包提示
                if (!provider) {
                    alert('请在DEEP/OKX钱包内置浏览器中打开本页面');
                    return;
                }

                // 发起钱包授权
                const accounts = await provider.request({
                    method: 'eth_requestAccounts'
                });

                // 连接成功处理
                if (accounts && accounts.length > 0) {
                    currentAccount = accounts[0];
                    // 更新页面状态
                    walletAddress.textContent = shortenAddress(currentAccount);
                    addressBox.style.display = 'block';
                    connectWalletBtn.textContent = CONFIG.connectedBtnText;
                    connectWalletBtn.classList.remove('btn-primary');
                    connectWalletBtn.classList.add('btn-success');
                    // 解锁任务按钮
                    twitterTaskBtn.disabled = false;
                    alert('钱包连接成功！');
                }

            } catch (error) {
                // 错误提示，不会静默无反应
                console.error('钱包连接失败：', error);
                if (error.code === 4001) {
                    alert('您已拒绝钱包授权，请重新点击连接并允许授权');
                } else {
                    alert(`连接失败：${error.message || '未知错误，请刷新页面重试'}`);
                }
            }
        }

        // 监听钱包账号切换/断开
        if (window.okxwallet || window.ethereum) {
            const provider = window.okxwallet || window.ethereum;
            provider.on('accountsChanged', (accounts) => {
                if (accounts.length === 0) {
                    // 钱包断开连接
                    currentAccount = null;
                    addressBox.style.display = 'none';
                    connectWalletBtn.textContent = CONFIG.connectBtnText;
                    connectWalletBtn.classList.remove('btn-success');
                    connectWalletBtn.classList.add('btn-primary');
                    twitterTaskBtn.disabled = true;
                } else {
                    // 账号切换
                    currentAccount = accounts[0];
                    walletAddress.textContent = shortenAddress(currentAccount);
                }
            });
        }
    </script>
</body>
</html>
