permalink: /claim/verify
---
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bind Telegram</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.3s ease;
}
.hidden { display: none !important; }

:root {
--bg: #0B0E16;
--card: #1A1A1A;
--input: #222222;
--border: #FACC15;
--text: #FFFFFF;
--muted: #9CA3AF;
--accent: #FACC15;
--success: #22c55e;
--error: #E53935;
--white-light: #F9FAFB;
}

body {
min-height: 100vh;
background: var(--bg);
color: var(--text);
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}

.card {
width: 100%;
max-width: 450px;
background: var(--card);
border: 1px solid var(--border);
border-radius: 10px;
padding: 35px 25px;
text-align: center;
position: relative;
overflow: hidden;
}

.card::before {
content: '';
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 2px;
background: linear-gradient(90deg, var(--accent), transparent);
animation: scan 3s linear infinite;
}
@keyframes scan {
0%   { transform: translateX(-100%); }
100% { transform: translateX(100%); }
}

h1 {
font-size: 20px;
margin-bottom: 14px;
color: var(--white-light);
}

.subtitle {
font-size: 13px;
color: var(--muted);
margin-bottom: 10px;
line-height: 1.5;
}

.countdown {
font-size: 12px;
color: var(--accent);
margin: 16px 0;
font-weight: bold;
}

.loading {
padding: 35px 0;
}

.spinner {
width: 36px;
height: 36px;
border: 3px solid var(--muted);
border-top-color: var(--accent);
border-radius: 50%;
animation: spin 1s linear infinite;
margin: 0 auto 14px;
}
@keyframes spin {
to { transform: rotate(360deg); }
}

.code-container {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
background: var(--input);
border: 2px solid var(--accent);
border-radius: 8px;
padding: 16px;
margin: 20px 0;
}

.verification-code {
font-size: 38px;
font-weight: bold;
color: var(--accent);
letter-spacing: 5px;
user-select: all;
}

.copy-btn {
background: var(--accent);
border: none;
color: #000;
padding: 6px 10px;
border-radius: 4px;
cursor: pointer;
font-size: 12px;
font-weight: bold;
}
.copy-btn:hover { opacity: 0.9; }
.copy-btn.copied { background: var(--success); color: #fff; }

.refresh-btn {
background: transparent;
border: 1px solid var(--accent);
color: var(--accent);
padding: 6px 14px;
border-radius: 6px;
cursor: pointer;
font-size: 12px;
margin: 6px 0;
}
.refresh-btn:hover { background: var(--accent); color: #000; }

.action-btn {
width: 100%;
padding: 10px;
border: none;
border-radius: 6px;
background: var(--accent);
color: #000;
font-weight: bold;
font-size: 13px;
cursor: pointer;
text-decoration: none;
display: inline-block;
margin: 10px 0;
}
.action-btn:hover { opacity: 0.9; }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.tip {
font-size: 11px;
color: var(--muted);
line-height: 1.6;
margin-top: 16px;
}

.error {
color: var(--error);
padding: 16px;
background: rgba(229,57,53,0.1);
border-radius: 8px;
margin: 16px 0;
font-size: 13px;
}

.success {
color: var(--success);
padding: 16px;
background: rgba(250,204,21,0.1);
border-radius: 8px;
margin: 16px 0;
font-size: 13px;
}

.full-done-wrap{padding:30px 15px;}
.circle-check{
width:70px;height:70px;border-radius:50%;
border:4px solid var(--success);
display:flex;align-items:center;justify-content:center;
margin:0 auto 20px;
font-size:36px;color:var(--success);font-weight:bold;
}
.full-done-text{font-size:14px;color:var(--white-light);line-height:1.7;}

.toast {
position: fixed;
bottom: 25px;
left: 50%;
transform: translateX(-50%) translateY(100px);
background: var(--success);
color: white;
padding: 10px 20px;
border-radius: 6px;
font-size: 12px;
opacity: 0;
transition: all 0.3s ease;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media (max-width: 480px) {
.card { padding: 25px 18px; }
.verification-code { font-size: 30px; letter-spacing: 4px; }
.circle-check{width:60px;height:60px;font-size:30px;}
.action-btn{padding:9px;font-size:12px;}
}
</style>
</head>
<body>
<div class="card">
<h1>Bind Telegram Account</h1>
<p class="subtitle" id="stepTip">Checking verification status...</p>
<div class="countdown hidden" id="countdownTip">Code expires in: 15:00</div>

<!-- 最终全通关成功页 -->
<div id="fullDoneSection" class="hidden full-done-wrap">
<div class="circle-check">✓</div>
<div class="full-done-text">
All requirements completed<br>
TG ID Bound & Channel Joined
</div>
</div>

<div id="loading" class="loading">
<div class="spinner"></div>
</div>

<div id="codeSection" class="hidden">
<div class="code-container">
<div class="verification-code" id="verificationCode"></div>
<button class="copy-btn" id="copyBtn">Copy</button>
</div>
<button class="refresh-btn" id="refreshBtn">Refresh Code</button>
<a href="" id="actionBtn" class="action-btn" target="_blank">Open Verify Bot</a>
<p class="tip" id="tipText">Copy the code and send it to the bot</p>
</div>

<div id="errorSection" class="hidden">
<div class="error" id="errorMessage"></div>
<button class="action-btn" onclick="location.reload()">Try Again</button>
</div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const API_URL = "https://sznjaotjoljaiawbvfro.supabase.co/functions/v1/claim-check";
const VERIFY_BOT_URL = "https://t.me/taichicoinbot";
const OFFICIAL_CHANNEL_URL = "https://t.me/CHiiiiiiiiiiiiii";
const EXPIRE_MIN = 15;

const loading = document.getElementById('loading');
const codeSection = document.getElementById('codeSection');
const errorSection = document.getElementById('errorSection');
const fullDoneSection = document.getElementById('fullDoneSection');
const verificationCode = document.getElementById('verificationCode');
const copyBtn = document.getElementById('copyBtn');
const refreshBtn = document.getElementById('refreshBtn');
const actionBtn = document.getElementById('actionBtn');
const stepTip = document.getElementById('stepTip');
const errorMessage = document.getElementById('errorMessage');
const toast = document.getElementById('toast');
const countdownTip = document.getElementById('countdownTip');

let buttonStage = 0;
let countdownTimer = null;
let remainTime = EXPIRE_MIN * 60;
const urlParams = new URLSearchParams(window.location.search);
const wallet = urlParams.get('wallet');

window.onload = async () => {
if (!wallet || !wallet.startsWith('0x') || wallet.length !== 42) {
showError("Invalid wallet address.");
return;
}
await preCheckOnce();
};

// 打开Bot / 加频道 / All Done 三步切换
actionBtn.addEventListener('click', (e)=>{
e.preventDefault();
if(buttonStage === 0){
window.open(VERIFY_BOT_URL,"_blank");
actionBtn.innerText = "Join TG Channel";
stepTip.innerText = "Join our official Telegram channel";
buttonStage = 1;
}else if(buttonStage === 1){
window.open(OFFICIAL_CHANNEL_URL,"_blank");
actionBtn.innerText = "All Done";
stepTip.innerText = "Click All Done to confirm your status";
buttonStage = 2;
}else if(buttonStage === 2){
checkTwoConditions();
}
});

// 点All Done：复检TG绑定+加频道
async function checkTwoConditions(){
actionBtn.disabled = true;
actionBtn.innerText = "Checking...";
try{
const res = await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"full_tg_check",wallet:wallet.toLowerCase()})
});
const data = await res.json();

if(data.ok){
showFullSuccess();
}else{
let msg = "";
if(!data.bindTg) msg = "❌ Telegram ID not bound yet, send code to bot first.";
else if(!data.joinTg) msg = "❌ Not joined the official Telegram channel.";
else msg = "❌ Verification not completed, please try again.";
alert(msg);
}
}catch(err){
alert("❌ Network error, please try again later.");
}
actionBtn.disabled = false;
if(buttonStage === 2) actionBtn.innerText = "All Done";
}

async function preCheckOnce(){
try{
const res = await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({action:"full_tg_check",wallet:wallet.toLowerCase()})
});
const d = await res.json();
if(d.ok){
showFullSuccess();
return;
}
}catch(e){}
await getNewCode();
}

function showFullSuccess(){
loading.classList.add("hidden");
codeSection.classList.add("hidden");
errorSection.classList.add("hidden");
countdownTip.classList.add("hidden");
fullDoneSection.classList.remove("hidden");
}

async function getNewCode(){
showLoading();
try {
const response = await fetch(API_URL, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({action: "get_tg_code", wallet: wallet.toLowerCase()})
});
const data = await response.json();
if (!data.code) {
showError(data.msg || "Failed to generate code");
return;
}
verificationCode.textContent = data.code;
showCode();
startCountdown();
} catch (error) {
showError("Network error, please refresh.");
}
}

function startCountdown(){
remainTime = EXPIRE_MIN * 60;
countdownTip.classList.remove('hidden');
if(countdownTimer) clearInterval(countdownTimer);
countdownTimer = setInterval(()=>{
remainTime--;
let m = Math.floor(remainTime/60);
let s = remainTime%60;
countdownTip.innerText = `Code expires: ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
if(remainTime<=0){clearInterval(countdownTimer);countdownTip.innerText="Code expired, refresh";}
},1000);
}

refreshBtn.onclick = ()=>getNewCode();

copyBtn.onclick = async ()=>{
try{await navigator.clipboard.writeText(verificationCode.innerText);
copyBtn.innerText="✓";copyBtn.classList.add("copied");showToast();
setTimeout(()=>{copyBtn.innerText="Copy";copyBtn.classList.remove("copied");},2000);
}catch(e){
let r=document.createRange();r.selectNode(verificationCode);
window.getSelection().removeAllRanges();window.getSelection().addRange(r);
document.execCommand("copy");showToast();
}
};

function showLoading(){
fullDoneSection.classList.add("hidden");
loading.classList.remove("hidden");codeSection.classList.add("hidden");errorSection.classList.add("hidden");
}
function showCode(){
loading.classList.add("hidden");codeSection.classList.remove("hidden");errorSection.classList.add("hidden");fullDoneSection.classList.add("hidden");
}
function showError(txt){
if(countdownTimer)clearInterval(countdownTimer);
loading.classList.add("hidden");codeSection.classList.add("hidden");errorSection.classList.remove("hidden");
errorMessage.innerText=txt;countdownTip.classList.add("hidden");
}
function showToast(){toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),2000);}
window.addEventListener("beforeunload",()=>{if(countdownTimer)clearInterval(countdownTimer);});
</script>
</body>
</html>
