<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Task</title>
<script src="https://cdn.ethers.org/lib-ethers/6.11.1/ethers.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{max-width:500px;margin:40px auto;padding:0 20px;background:#0a0a0a;color:#fff}
.card{background:#111;border:1px solid #222;border-radius:16px;padding:24px;margin:20px 0}
h2{margin-bottom:16px;font-size:20px}
button{width:100%;padding:14px;border-radius:12px;border:none;background:#1da1f2;color:#fff;font-weight:600;font-size:15px;margin:10px 0;cursor:pointer}
#walletAddress{color:#ccc;margin:10px 0;font-size:14px}
</style>
</head>
<body>

<div class="card">
  <h2>1. Connect Wallet</h2>
  <button id="connectWallet">Connect Wallet</button>
  <div id="walletAddress"></div>
</div>

<div class="card">
  <h2>2. Twitter Tasks</h2>
  <button id="postTweet">Post Tweet</button>
  <button id="likeRetweet">Like & Retweet</button>
</div>

<script>
// ========== 你只需要改这里 ==========
const CONFIG = {
  TWEET_URL: "https://x.com/你的账号/status/推文ID",
  TWEET_TEXT: "参与活动 #Web3 #Airdrop",
  PROJECT_URL: "https://你的官网.com"
};

// 连接钱包
document.getElementById("connectWallet").onclick = async () => {
  if(!window.ethereum) return alert("Install MetaMask");
  try {
    const p = new ethers.BrowserProvider(window.ethereum);
    await p.send("eth_requestAccounts",[]);
    const addr = await (await p.getSigner()).getAddress();
    document.getElementById("walletAddress").textContent = addr.slice(0,6)+"..."+addr.slice(-4);
  }catch(e){console.error(e)}
};

// 发推
document.getElementById("postTweet").onclick = () => {
  const t = encodeURIComponent(CONFIG.TWEET_TEXT);
  const u = encodeURIComponent(CONFIG.PROJECT_URL);
  window.open(`https://x.com/intent/tweet?text=${t}&url=${u}`,"_blank");
};

// 点赞转发
document.getElementById("likeRetweet").onclick = () => {
  window.open(CONFIG.TWEET_URL,"_blank");
};
</script>
</body>
</html>
