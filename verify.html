<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter任务 - 太极币</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background-image: url('./bg.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 80px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.35);
            z-index: 0;
        }
        /* 右上角连接钱包按钮 */
        .btn-small {
            position: fixed;
            top: 20px;
            right: 20px;
            height: 36px;
            padding: 0 16px;
            font-size: 14px;
            border-radius: 8px;
            width: auto;
            margin-bottom: 0;
            z-index: 10;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            padding: 40px 24px;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            text-align: center;
            margin-bottom: 12px;
        }
        .desc {
            font-size: 16px;
            color: #64748b;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .address-info {
            width: fit-content;
            margin-left: auto;
            padding: 8px 12px;
            background-color: rgba(241, 245, 249, 0.8);
            border-radius: 8px;
            font-size: 14px;
            color: #475569;
            text-align: right;
            margin-bottom: 24px;
            word-break: break-all;
        }
        .btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background-color: #2563eb;
            color: #ffffff;
        }
        .btn-primary:hover, .btn-primary:active {
            background-color: #1d4ed8;
        }
        .btn-success {
            background-color: #5eead4;
            color: #0f172a;
        }
        .btn-success:hover, .btn-primary:active {
            background-color: #2dd4bf;
        }
        .btn-wallet {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #f8fafc;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            height: 52px;
            font-size: 16px;
            margin-bottom: 12px;
        }
        .btn-wallet:hover, .btn-wallet:active {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        /* 钱包选择弹窗 */
        .wallet-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .wallet-modal.active {
            display: flex;
        }
        .modal-content {
            width: 100%;
            max-width: 400px;
            background-color: #ffffff;
            border-radius: 20px;
            padding: 24px;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
        }
        .close-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            font-size: 24px;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-tips {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 16px;
            line-height: 1.4;
        }
        .tips {
            font-size: 13px;
            color: #f1f5f9;
            text-align: center;
            margin-top: 24px;
            line-height: 1.4;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <!-- 右上角连接钱包按钮 -->
    <button class="btn btn-small btn-primary" id="connectWalletBtn">
        连接钱包
    </button>

    <div class="container">
        <h1>Twitter任务活动</h1>
        <p class="desc">关注+点赞+转推指定推文，即可获得专属奖励</p>
        
        <!-- 已连接钱包地址靠右显示 -->
        <div class="address-info" id="addressBox" style="display: none;">
            已连接：<span id="walletAddress"></span>
        </div>

        <!-- Twitter任务按钮 -->
        <button class="btn btn-success" id="twitterTaskBtn" disabled>
            前往点赞转推完成任务
        </button>

        <p class="tips">
            普通浏览器点击将唤起钱包APP<br>
            完成任务后请返回页面确认
        </p>
    </div>

    <!-- 钱包选择弹窗 -->
    <div class="wallet-modal" id="walletModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>选择钱包</h3>
                <button class="close-btn" id="closeModal">×</button>
            </div>
            <p class="modal-tips">普通浏览器将唤起对应钱包APP，内置浏览器将直接连接</p>
            
            <button class="btn btn-wallet" data-wallet="okx">
                🟠 OKX 钱包
            </button>
            <button class="btn btn-wallet" data-wallet="tp">
                🔵 TP 钱包 (TokenPocket)
            </button>
            <button class="btn btn-wallet" data-wallet="trust">
                🟢 Trust Wallet
            </button>
            <button class="btn btn-wallet" data-wallet="metamask">
                🦊 MetaMask 小狐狸
            </button>
        </div>
    </div>

    <script>
        // ===================== 一键配置区（你只需要改这里） =====================
        const CONFIG = {
            officialSite: "https://taichicoin.xyz",
            twitterLink: "https://x.com/i/status/2035345304766361607",
            pageTitle: "Twitter任务活动",
            taskDesc: "关注+点赞+转推指定推文，即可获得专属奖励",
            connectBtnText: "连接钱包",
            connectedBtnText: "已连接",
            twitterBtnText: "前往点赞转推完成任务"
        };
        // ============================================================================

        // 全局变量
        let currentAccount = null;
        let currentProvider = null;
        const connectWalletBtn = document.getElementById('connectWalletBtn');
        const twitterTaskBtn = document.getElementById('twitterTaskBtn');
        const addressBox = document.getElementById('addressBox');
        const walletAddress = document.getElementById('walletAddress');
        const walletModal = document.getElementById('walletModal');
        const closeModal = document.getElementById('closeModal');
        const walletBtns = document.querySelectorAll('.btn-wallet');

        // 钱包地址缩短显示
        function shortenAddress(address) {
            return address ? address.slice(0, 6) + '...' + address.slice(-4) : '';
        }

        // 【核心】获取当前环境的钱包provider，兼容所有内置浏览器
        function getProvider(walletType = 'default') {
            switch (walletType) {
                case 'okx':
                    return window.okxwallet || window.ethereum;
                case 'tp':
                    return window.tpwallet || window.ethereum;
                case 'trust':
                    return window.trustwallet || window.ethereum;
                case 'metamask':
                    return window.ethereum?.isMetaMask ? window.ethereum : window.ethereum;
                default:
                    return window.okxwallet || window.ethereum || window.web3?.currentProvider;
            }
        }

        // 【核心】钱包深度链接配置，手机普通浏览器唤起APP用
        const walletDeeplink = {
            okx: `okx://wallet/dapp?dappUrl=${encodeURIComponent(window.location.href)}`,
            tp: `tp://dapp/open?url=${encodeURIComponent(window.location.href)}`,
            trust: `trust://dapp?url=${encodeURIComponent(window.location.href)}`,
            metamask: `metamask://dapp?url=${encodeURIComponent(window.location.href)}`
        };

        // 【核心】连接钱包逻辑，同时兼容内置浏览器+普通浏览器
        async function connectWallet(walletType = 'default') {
            try {
                const provider = getProvider(walletType);
                
                // 情况1：检测到钱包内置环境，直接连接
                if (provider) {
                    currentProvider = provider;
                    const accounts = await provider.request({
                        method: 'eth_requestAccounts'
                    });

                    // 连接成功处理
                    if (accounts && accounts.length > 0) {
                        currentAccount = accounts[0];
                        walletAddress.textContent = shortenAddress(currentAccount);
                        addressBox.style.display = 'block';
                        connectWalletBtn.textContent = CONFIG.connectedBtnText;
                        connectWalletBtn.classList.remove('btn-primary');
                        connectWalletBtn.classList.add('btn-success');
                        twitterTaskBtn.disabled = false;
                        walletModal.classList.remove('active');
                        alert('钱包连接成功！');
                    }
                    return;
                }

                // 情况2：普通浏览器，唤起对应钱包APP
                const deeplink = walletDeeplink[walletType];
                if (deeplink) {
                    // 先尝试直接唤起
                    window.location.href = deeplink;
                    // 兜底：1.5秒后没唤起，提示用户检查是否安装钱包
                    setTimeout(() => {
                        alert(`若未唤起${walletType.toUpperCase()}钱包，请先确认已安装该APP，或切换到钱包内置浏览器打开`);
                    }, 1500);
                } else {
                    alert('暂不支持该钱包，请切换到其他钱包或使用钱包内置浏览器打开');
                }

            } catch (error) {
                console.error('钱包连接失败：', error);
                walletModal.classList.remove('active');
                // 全场景错误提示，不会静默没反应
                if (error.code === 4001) {
                    alert('您已拒绝钱包授权，请重新点击连接并允许授权');
                } else if (error.code === -32002) {
                    alert('钱包授权已在处理中，请查看钱包弹窗');
                } else {
                    alert(`连接失败：${error.message || '未知错误，请刷新页面重试'}`);
                }
            }
        }

        // 监听钱包账号切换/断开
        function initWalletListener() {
            const provider = getProvider();
            if (provider) {
                provider.on('accountsChanged', (accounts) => {
                    if (accounts.length === 0) {
                        // 钱包断开连接
                        currentAccount = null;
                        addressBox.style.display = 'none';
                        connectWalletBtn.textContent = CONFIG.connectBtnText;
                        connectWalletBtn.classList.remove('btn-success');
                        connectWalletBtn.classList.add('btn-primary');
                        twitterTaskBtn.disabled = true;
                    } else {
                        // 账号切换
                        currentAccount = accounts[0];
                        walletAddress.textContent = shortenAddress(currentAccount);
                    }
                });
            }
        }

        // 页面初始化事件绑定
        document.addEventListener('DOMContentLoaded', () => {
            // 右上角按钮：打开钱包选择弹窗
            connectWalletBtn.addEventListener('click', () => {
                // 如果已连接，直接断开
                if (currentAccount) {
                    currentAccount = null;
                    addressBox.style.display = 'none';
                    connectWalletBtn.textContent = CONFIG.connectBtnText;
                    connectWalletBtn.classList.remove('btn-success');
                    connectWalletBtn.classList.add('btn-primary');
                    twitterTaskBtn.disabled = true;
                    alert('已断开钱包连接');
                    return;
                }
                // 未连接，打开选择弹窗
                walletModal.classList.add('active');
            });

            // 关闭弹窗
            closeModal.addEventListener('click', () => {
                walletModal.classList.remove('active');
            });

            // 点击弹窗遮罩关闭
            walletModal.addEventListener('click', (e) => {
                if (e.target === walletModal) {
                    walletModal.classList.remove('active');
                }
            });

            // 钱包按钮点击事件
            walletBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const walletType = btn.getAttribute('data-wallet');
                    connectWallet(walletType);
                });
            });

            // Twitter任务跳转
            twitterTaskBtn.addEventListener('click', () => {
                const confirmJump = confirm('即将跳转到Twitter推文页面，请确保您的网络可正常访问境外网站');
                if (confirmJump) {
                    location.href = CONFIG.twitterLink;
                }
            });

            // 初始化钱包监听
            if (window.ethereum) {
                initWalletListener();
            } else {
                // 监听钱包异步注入
                window.addEventListener('ethereum#initialized', initWalletListener, { once: true });
                setTimeout(initWalletListener, 3000);
            }

            // 应用配置文案
            document.title = `${CONFIG.pageTitle} - ${CONFIG.officialSite.replace(/https?:\/\//, '')}`;
            document.querySelector('h1').textContent = CONFIG.pageTitle;
            document.querySelector('.desc').textContent = CONFIG.taskDesc;
            twitterTaskBtn.textContent = CONFIG.twitterBtnText;
        });
    </script>
</body>
</html>
