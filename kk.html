<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Twitter Task - Taichi Coin</title>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Roboto,sans-serif}
        body{
            background-image:url('/bg.jpg') !important;
            background-size:cover !important;
            background-position:center center !important;
            background-repeat:no-repeat !important;
            background-attachment:fixed !important;
            min-height:100vh;
            padding:60px 20px 20px;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            position:relative;
            background:transparent;
        }
        /* 完全移除黑色遮罩，全透明 */
        body::before, body::after{display:none;}
        
        .top-bar{
            position:fixed;top:20px;left:20px;right:20px;
            display:flex;justify-content:space-between;gap:12px;z-index:10;
        }
        .btn-small{
            height:44px;padding:0 20px;border-radius:12px;border:1px solid rgba(255,255,255,0.3);
            font-size:16px;font-weight:600;cursor:pointer;
            background:transparent;
            color:#fff;
            transition:all 0.3s ease;
            backdrop-filter:blur(4px);
        }
        .btn-small:hover{
            background:rgba(255,255,255,0.1);
            border-color:rgba(255,255,255,0.8);
        }
        .btn-success{
            border-color:rgba(255,255,255,0.5);
            color:#fff;
        }
        .address-top{
            height:44px;padding:0 16px;background:transparent;
            border:1px solid rgba(255,255,255,0.3);border-radius:12px;
            font-size:14px;display:none;align-items:center;gap:8px;
            color:#fff;
            backdrop-filter:blur(4px);
        }
        /* 核心：中间容器全透明 */
        .container{
            width:100%;max-width:480px;
            background:transparent !important;
            border:1px solid rgba(255,255,255,0.2);
            border-radius:20px;
            padding:40px 24px;
            position:relative;z-index:2;
            backdrop-filter:blur(6px);
            overflow:hidden;
        }
        h1{
            font-size:30px;text-align:center;margin-bottom:32px;
            color:#fff;text-transform:uppercase;
            letter-spacing:2px;
            text-shadow:0 0 10px rgba(255,255,255,0.5);
        }
        .reward-info {
            color: #fff;
            text-align: center;
            font-size: 22px;
            line-height: 1.9;
            margin-bottom: 28px;
            text-shadow:0 0 8px rgba(255,255,255,0.4);
        }
        .h-captcha{
            display:flex;
            justify-content:center;
            margin:24px auto;
            display:none;
        }
        @media (max-width:480px){
            .h-captcha{transform:scale(0.9);transform-origin:center;}
        }
        .btn-twitter{
            background:transparent;
            border:1px solid rgba(255,255,255,0.4);
            color:#fff;width:100%;height:56px;border-radius:12px;
            font-size:18px;font-weight:700;cursor:pointer;
            text-transform:uppercase;letter-spacing:1px;
            transition:all 0.3s ease;
            margin-bottom:16px;
            display:none;
            backdrop-filter:blur(4px);
        }
        .btn-twitter:hover{
            background:rgba(255,255,255,0.1);
            border-color:rgba(255,255,255,1);
        }
        .btn-verify{
            width:100%;height:56px;border:1px solid rgba(255,255,255,0.4);border-radius:12px;
            font-size:19px;font-weight:700;cursor:pointer;
            background:transparent;
            color:#fff;
            text-transform:uppercase;letter-spacing:1px;
            transition:all 0.3s ease;
            display:none;
            backdrop-filter:blur(4px);
        }
        .btn-verify:hover{
            background:rgba(255,255,255,0.1);
            border-color:rgba(255,255,255,1);
        }
        .btn-verify:disabled{opacity:0.5;cursor:not-allowed;}
        /* 钱包提示语下移3行：margin-top从24px拉大到60px */
        .tips{
            font-size:13px;color:#fff;text-align:center;margin-top:60px;
            line-height:1.6;position:relative;z-index:2;
            text-shadow:0 0 5px rgba(255,255,255,0.3);
        }

        /* 弹窗全透明 */
        .tally-overlay{
            position:fixed;top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,0.3);
            z-index:9999;display:none;
            align-items:center;justify-content:center;
            padding:0;margin:0;
        }
        .tally-modal{
            width:100vw;height:100vh;
            background:transparent;
            border-radius:0;border:none;
            position:relative;overflow:hidden;
        }
        .tally-iframe{width:100%;height:100%;border:none;display:block;}
        .close-btn{
            position:fixed;top:20px;right:20px;
            width:44px;height:44px;border-radius:50%;
            background:transparent;
            color:#fff;
            font-size:22px;font-weight:bold;
            border:2px solid rgba(255,255,255,0.5);
            cursor:pointer;z-index:10000;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="address-top" id="addressTop">
        Connected: <span id="walletDisplay"></span>
    </div>
    <button class="btn-small btn-primary" id="connectBtn">Connect Wallet</button>
</div>

<div class="container">
    <h1>Twitter Task Verification</h1>
    
    <div class="reward-info">
        Prize pool:<br>
        • 2 500 000 $CHI AIRDROP<br>
        • 5000 WHITELIST<br>
        • Each address eligible 500 $CHI
    </div>

    <button class="btn-twitter" id="twitterBtn">Like / RT / Tag 3 friends</button>

    <div class="h-captcha" 
         data-sitekey="cf246c60-cb9c-44a6-9cf6-1fe6e60e01b8" 
         data-callback="onCaptchaSuccess"
         data-expired-callback="onCaptchaExpired">
    </div>

    <button class="btn-verify" id="verifyBtn">Verify and submit to tally</button>
</div>

<p class="tips">
    Desktop: Install MetaMask/OKX Wallet Extension<br>
    Mobile: Open in Wallet App DApp Browser
</p>

<div class="tally-overlay" id="tallyOverlay">
    <div class="tally-modal">
        <button class="close-btn" id="closeBtn">×</button>
        <iframe class="tally-iframe" id="tallyFrame"></iframe>
    </div>
</div>

<script>
const TALLY_URL = "https://tally.so/r/rjEXEN";
const TWITTER_URL = "https://x.com/i/status/203534530476636160";

let currentAccount = null;
let isCaptchaPassed = false;
let twitterTaskDone = false;

const $connect = document.getElementById('connectBtn');
const $addrBox = document.getElementById('addressTop');
const $display = document.getElementById('walletDisplay');
const $twitterBtn = document.getElementById('twitterBtn');
const $captcha = document.querySelector('.h-captcha');
const $verifyBtn = document.getElementById('verifyBtn');
const $tallyOverlay = document.getElementById('tallyOverlay');
const $tallyFrame = document.getElementById('tallyFrame');
const $closeBtn = document.getElementById('closeBtn');

function shortAddress(addr) {
    return addr ? `${addr.slice(0,6)}...${addr.slice(-4)}` : '';
}

function getProvider() {
    return window.ethereum || window.okxwallet || window.tpwallet || window.trustwallet;
}

function refreshUI() {
    $twitterBtn.style.display = currentAccount ? "block" : "none";
    $captcha.style.display = (currentAccount && twitterTaskDone) ? "flex" : "none";
    $verifyBtn.style.display = (currentAccount && twitterTaskDone && isCaptchaPassed) ? "block" : "none";
}

window.onCaptchaSuccess = function() {
    isCaptchaPassed = true;
    refreshUI();
}

window.onCaptchaExpired = function() {
    isCaptchaPassed = false;
    refreshUI();
}

function openTallyModal() {
    if (!currentAccount || !isCaptchaPassed) return;
    const formUrl = `${TALLY_URL}?wallet=${encodeURIComponent(currentAccount)}`;
    $tallyFrame.src = formUrl;
    $tallyOverlay.style.display = 'flex';
}

function closeTallyModal() {
    $tallyOverlay.style.display = 'none';
    $tallyFrame.src = '';
}

$twitterBtn.onclick = () => {
    if (!currentAccount) return;
    window.open(TWITTER_URL, '_blank');
    setTimeout(() => {
        twitterTaskDone = true;
        refreshUI();
    }, 800);
};

$connect.onclick = async () => {
    const p = getProvider();
    if (!p) {
        alert("Please open in wallet DApp browser or install wallet extension");
        return;
    }
    if (currentAccount) {
        currentAccount = null;
        twitterTaskDone = false;
        isCaptchaPassed = false;
        $addrBox.style.display = "none";
        $connect.textContent = "Connect Wallet";
        refreshUI();
        return;
    }
    try {
        const accounts = await p.request({ method: "eth_requestAccounts" });
        currentAccount = accounts[0];
        $display.textContent = shortAddress(currentAccount);
        $addrBox.style.display = "flex";
        $connect.textContent = "Connected";
        refreshUI();
    } catch (err) {
        alert("Connection failed: " + (err.message || "Please retry"));
    }
};

$verifyBtn.onclick = openTallyModal;
$closeBtn.onclick = closeTallyModal;
$tallyOverlay.onclick = (e) => {
    if (e.target === $tallyOverlay) closeTallyModal();
};

refreshUI();
</script>
</body>
</html>
